<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — AI Pipeline 생성 결과</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#6366f1', 50: '#eef2ff', 100: '#e0e7ff', 600: '#4f46e5', 700: '#4338ca' },
            destructive: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .input-focus:focus { outline: none; box-shadow: 0 0 0 2px #6366f1; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Layout: 2-column desktop / 1-column mobile -->
  <div class="flex min-h-screen">

    <!-- Left: Brand Panel (desktop only) -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-primary-700 to-indigo-900 text-white flex-col justify-between p-12">
      <div>
        <div class="flex items-center gap-2 mb-16">
          <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="white" fill-opacity="0.2"/>
            <path d="M10 16L14 20L22 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="text-xl font-bold">Pipeline</span>
        </div>

        <h2 class="text-4xl font-bold leading-tight mb-6">더 나은 업무를<br/>시작하세요</h2>
        <p class="text-indigo-200 text-lg mb-12">AI 기반 코드 생성 파이프라인으로<br/>개발 생산성을 10배 높이세요.</p>

        <div class="space-y-4">
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <span class="text-indigo-100">250개 Atomic Skill 기반 코드 생성</span>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <span class="text-indigo-100">Graph RAG 기반 자동 스킬 선택</span>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <span class="text-indigo-100">POST 검증으로 품질 보장</span>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="flex -space-x-2">
          <div class="w-8 h-8 rounded-full bg-indigo-400 border-2 border-indigo-900 flex items-center justify-center text-xs font-medium">A</div>
          <div class="w-8 h-8 rounded-full bg-purple-400 border-2 border-indigo-900 flex items-center justify-center text-xs font-medium">B</div>
          <div class="w-8 h-8 rounded-full bg-pink-400 border-2 border-indigo-900 flex items-center justify-center text-xs font-medium">C</div>
        </div>
        <span class="text-indigo-200 text-sm">10만+ 팀이 사용 중</span>
      </div>
    </div>

    <!-- Right: Form Panel -->
    <div class="flex-1 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-[420px]">

        <!-- Logo (mobile only) -->
        <div class="lg:hidden flex items-center gap-2 mb-8">
          <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="#6366f1"/>
            <path d="M10 16L14 20L22 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="text-xl font-bold text-gray-900">Pipeline</span>
        </div>

        <!-- Header -->
        <h1 class="text-2xl font-bold text-gray-900 mb-1">계정 만들기</h1>
        <p class="text-sm text-gray-500 mb-8">
          이미 계정이 있으신가요?
          <a href="#" class="text-primary font-medium hover:underline">로그인</a>
        </p>

        <!-- Social Login -->
        <div class="space-y-2.5 mb-6">
          <button
            type="button"
            onclick="alert('Google OAuth 연동 예정')"
            class="flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google로 계속하기
          </button>

          <button
            type="button"
            onclick="alert('GitHub OAuth 연동 예정')"
            class="flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            GitHub로 계속하기
          </button>
        </div>

        <!-- Divider -->
        <div class="relative mb-6">
          <div class="absolute inset-0 flex items-center">
            <span class="w-full border-t border-gray-200"></span>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-gray-50 px-3 text-gray-400">또는 이메일로 가입</span>
          </div>
        </div>

        <!-- Registration Form -->
        <form id="registerForm" class="space-y-4" novalidate>
          <!-- 이름 -->
          <div class="space-y-1.5">
            <label for="name" class="text-sm font-medium text-gray-700">
              이름 <span class="text-destructive" aria-hidden="true">*</span>
            </label>
            <input
              id="name" type="text" autocomplete="name" placeholder="홍길동"
              required minlength="2" maxlength="50"
              class="input-focus w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 transition"
            />
            <p id="name-error" class="text-xs text-destructive hidden"></p>
          </div>

          <!-- 이메일 -->
          <div class="space-y-1.5">
            <label for="email" class="text-sm font-medium text-gray-700">
              이메일 <span class="text-destructive" aria-hidden="true">*</span>
            </label>
            <input
              id="email" type="email" autocomplete="email" placeholder="hello@example.com"
              required maxlength="255"
              class="input-focus w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 transition"
            />
            <p id="email-error" class="text-xs text-destructive hidden"></p>
          </div>

          <!-- 비밀번호 -->
          <div class="space-y-1.5">
            <label for="password" class="text-sm font-medium text-gray-700">
              비밀번호 <span class="text-destructive" aria-hidden="true">*</span>
            </label>
            <div class="relative">
              <input
                id="password" type="password" autocomplete="new-password"
                placeholder="8자 이상, 대소문자+숫자+특수문자"
                required minlength="8" maxlength="72"
                class="input-focus w-full rounded-lg border border-gray-300 px-3.5 py-2.5 pr-10 text-sm text-gray-900 placeholder:text-gray-400 transition"
              />
              <button type="button" onclick="togglePassword('password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" aria-label="비밀번호 표시">
                <svg id="password-eye" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </button>
            </div>
            <!-- Password Strength Meter -->
            <div id="strength-meter" class="hidden mt-2 space-y-1.5">
              <div class="flex gap-1">
                <div id="bar-1" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                <div id="bar-2" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                <div id="bar-3" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                <div id="bar-4" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
              </div>
              <p id="strength-label" class="text-xs text-gray-500"></p>
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="space-y-1.5">
            <label for="confirmPassword" class="text-sm font-medium text-gray-700">
              비밀번호 확인 <span class="text-destructive" aria-hidden="true">*</span>
            </label>
            <div class="relative">
              <input
                id="confirmPassword" type="password" autocomplete="new-password"
                placeholder="비밀번호를 다시 입력하세요"
                required
                class="input-focus w-full rounded-lg border border-gray-300 px-3.5 py-2.5 pr-10 text-sm text-gray-900 placeholder:text-gray-400 transition"
              />
              <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" aria-label="비밀번호 표시">
                <svg class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </button>
            </div>
            <p id="confirm-error" class="text-xs text-destructive hidden"></p>
          </div>

          <!-- 약관 동의 -->
          <div class="flex items-start gap-2.5 pt-1">
            <input
              id="terms" type="checkbox" required
              class="mt-0.5 h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary cursor-pointer"
            />
            <label for="terms" class="text-sm text-gray-600 leading-snug cursor-pointer">
              <a href="#" class="text-primary hover:underline">서비스 이용약관</a> 및
              <a href="#" class="text-primary hover:underline">개인정보 처리방침</a>에 동의합니다
            </label>
          </div>

          <!-- Root Error -->
          <div id="root-error" class="hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-destructive" role="alert"></div>

          <!-- Submit -->
          <button
            type="submit"
            id="submitBtn"
            class="w-full rounded-lg bg-primary px-4 py-3 text-sm font-semibold text-white transition hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            계정 만들기
          </button>
        </form>

        <!-- Footer -->
        <p class="mt-6 text-center text-xs text-gray-400">
          가입 시 Pipeline의 서비스 약관에 동의하게 됩니다.
        </p>

        <!-- Pipeline Badge -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
          <p class="text-xs text-gray-400">
            AI Pipeline이 생성한 코드 (40 skills / 4 domains / complexity 5)
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Password Visibility Toggle ───
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.setAttribute('aria-label', isPassword ? '비밀번호 숨기기' : '비밀번호 표시');
    }

    // ─── Password Strength ───
    const strengthConfig = [
      { label: '', colors: [] },
      { label: '매우 약함', colors: ['bg-red-500'] },
      { label: '약함', colors: ['bg-orange-400', 'bg-orange-400'] },
      { label: '보통', colors: ['bg-yellow-400', 'bg-yellow-400', 'bg-yellow-400'] },
      { label: '강함', colors: ['bg-green-500', 'bg-green-500', 'bg-green-500', 'bg-green-500'] },
    ];

    function calcStrength(pw) {
      if (!pw) return 0;
      let s = 0;
      if (pw.length >= 8) s++;
      if (pw.length >= 12) s++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
      if (/\d/.test(pw)) s++;
      if (/[@$!%*?&]/.test(pw)) s++;
      return Math.min(4, s);
    }

    const pwInput = document.getElementById('password');
    pwInput.addEventListener('input', () => {
      const meter = document.getElementById('strength-meter');
      const pw = pwInput.value;
      if (!pw) { meter.classList.add('hidden'); return; }
      meter.classList.remove('hidden');

      const score = calcStrength(pw);
      const cfg = strengthConfig[score];

      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('bar-' + i);
        bar.className = 'h-1.5 flex-1 rounded-full transition-colors duration-300 ';
        bar.className += i <= score ? (cfg.colors[Math.min(i-1, cfg.colors.length-1)] || 'bg-gray-200') : 'bg-gray-200';
      }

      const label = document.getElementById('strength-label');
      const labelColors = ['', 'text-red-500', 'text-orange-500', 'text-yellow-600', 'text-green-600'];
      label.textContent = cfg.label ? `비밀번호 강도: ${cfg.label}` : '';
      label.className = 'text-xs font-medium ' + (labelColors[score] || 'text-gray-500');
    });

    // ─── Form Validation ───
    const form = document.getElementById('registerForm');
    const PASSWORD_REGEX = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])/;

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
      const input = el.previousElementSibling?.querySelector?.('input') || el.previousElementSibling;
      if (input?.classList) input.classList.add('border-red-400');
    }

    function clearErrors() {
      document.querySelectorAll('[id$="-error"]').forEach(el => {
        el.classList.add('hidden');
        el.textContent = '';
      });
      document.querySelectorAll('input').forEach(el => el.classList.remove('border-red-400'));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      let hasError = false;

      if (name.length < 2 || name.length > 50) {
        showError('name-error', '이름은 2~50자여야 합니다');
        hasError = true;
      }

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('email-error', '올바른 이메일 형식이 아닙니다');
        hasError = true;
      }

      if (password.length < 8 || password.length > 72) {
        showError('name-error', '비밀번호는 8~72자여야 합니다');
        hasError = true;
      } else if (!PASSWORD_REGEX.test(password)) {
        showError('name-error', '대소문자, 숫자, 특수문자를 포함해야 합니다');
        hasError = true;
      }

      if (password !== confirmPassword) {
        showError('confirm-error', '비밀번호가 일치하지 않습니다');
        hasError = true;
      }

      if (!terms) {
        const rootErr = document.getElementById('root-error');
        rootErr.textContent = '이용약관에 동의해야 합니다';
        rootErr.classList.remove('hidden');
        hasError = true;
      }

      if (hasError) return;

      // Simulate submission
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> 처리 중...`;

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '계정 만들기';
        // Success state
        form.innerHTML = `
          <div class="text-center py-8">
            <div class="mx-auto w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mb-4">
              <svg class="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">가입 완료!</h2>
            <p class="text-sm text-gray-500 mb-6">${email}로 인증 메일을 보냈습니다.<br/>메일함을 확인해주세요.</p>
            <button onclick="location.reload()" class="text-sm text-primary font-medium hover:underline">다시 테스트하기</button>
          </div>
        `;
      }, 1500);
    });
  </script>
</body>
</html>
