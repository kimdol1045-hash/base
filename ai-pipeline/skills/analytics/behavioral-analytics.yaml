bloom_level: ANALYZE
content: '# 행동 분석 가이드


  ## 핵심 원칙

  - 사용자가 "말하는 것"이 아닌 "하는 것"을 분석

  - 개별 이벤트가 아닌 행동 시퀀스로 분석

  - Aha Moment(핵심 가치 체험 순간) 식별

  - 정량 데이터 + 정성 데이터 결합


  ## 핵심 분석 기법

  1. **세션 분석**: 세션 길이, 깊이, 빈도

  2. **경로 분석**: 사용자의 실제 탐색 경로

  3. **퍼널 분석**: 주요 전환 경로의 단계별 이탈

  4. **히트맵**: 클릭, 스크롤, 마우스 이동 패턴

  5. **세션 리플레이**: 실제 사용자 행동 녹화 분석


  ## Aha Moment 분석

  - 정의: 사용자가 제품의 핵심 가치를 처음 경험하는 순간

  - 분석법: 리텐션 높은 코호트가 공통으로 수행한 행동 식별

  - 예시: Facebook → 10일 내 친구 7명 추가

  - 활용: 온보딩 퍼널을 Aha Moment으로 유도


  ## DO

  - 행동 기반 사용자 세그먼트 구성

  - 세션 리플레이로 정량 데이터의 맥락 파악

  - Aha Moment까지의 시간(Time to Value) 단축에 집중


  ## DON''T

  - 클릭 수만 세고 맥락을 무시하지 않기

  - PII 없이 행동 데이터만 수집 (프라이버시)

  - 모든 사용자에게 동일한 여정을 기대하지 않기

  '
