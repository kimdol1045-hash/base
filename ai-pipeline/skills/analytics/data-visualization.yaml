theory: 데이터 시각화는 데이터를 시각적 표현으로 변환하여 패턴, 추세, 이상값을 직관적으로 전달하는 기술이다. Edward Tufte의 데이터-잉크
  비율(Data-ink ratio) 원칙과 Cleveland & McGill의 시각 인지 계층이 기반이다.
