bloom_level: APPLY
content: '# 데이터 시각화 가이드


  ## 핵심 원칙

  - 데이터-잉크 비율 최대화 (불필요한 장식 제거)

  - 차트 유형은 데이터 관계에 맞게 선택

  - 색상은 정보 전달 목적으로만 사용

  - 맥락 정보(기준선, 목표선) 포함


  ## 차트 선택 가이드

  | 목적 | 추천 차트 |

  |------|----------|

  | 시간 추세 | 라인 차트 |

  | 비교 | 바 차트 |

  | 비율/구성 | 파이/도넛 (5개 이하) |

  | 분포 | 히스토그램, 박스플롯 |

  | 상관관계 | 산점도 |

  | 지리 데이터 | 코로플레스 맵 |


  ## 시각화 체크리스트

  1. 제목이 핵심 인사이트를 전달하는가?

  2. 축 레이블과 단위가 명확한가?

  3. 색상이 접근성 기준을 충족하는가? (색맹 고려)

  4. 기준선/목표선이 포함되어 있는가?

  5. 불필요한 3D 효과, 그리드라인이 제거되었는가?


  ## DO

  - 제목에 인사이트를 포함 ("매출이 15% 증가했다")

  - Y축은 0부터 시작 (예외: 주가 차트)

  - 색맹 친화적 팔레트 사용


  ## DON''T

  - 파이 차트에 7개 이상 항목 넣지 않기

  - 이중 Y축을 남용하지 않기

  - 3D 차트 사용하지 않기 (왜곡)

  - 축을 잘라 변화를 과장하지 않기

  '
