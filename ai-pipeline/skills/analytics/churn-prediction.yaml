bloom_level: ANALYZE
content: '# 이탈 예측 가이드


  ## 핵심 원칙

  - 이탈 정의를 명확히 (N일 미접속? 구독 해지?)

  - 행동 기반 선행 지표 식별

  - 예측 모델 + 비즈니스 규칙 결합

  - 예측 → 세그먼트 → 개입 → 측정 루프


  ## 이탈 선행 지표 (예시)

  | 지표 | 설명 |

  |------|------|

  | 접속 빈도 감소 | 주 5회 → 주 1회 |

  | 핵심 기능 미사용 | 7일 이상 핵심 기능 미사용 |

  | 지원 티켓 증가 | 불만 관련 문의 급증 |

  | 결제 실패 | 카드 만료, 한도 초과 |

  | 사용 패턴 변화 | 세션 시간 50% 이상 감소 |


  ## 분석 프로세스

  1. 이탈 정의 및 라벨링

  2. 피처 엔지니어링 (행동, 인구통계, 거래)

  3. 모델 학습 (로지스틱 회귀, XGBoost 등)

  4. 이탈 확률 스코어링

  5. 리스크 세그먼트별 개입 전략 설계

  6. 개입 효과 측정 (A/B 테스트)


  ## DO

  - 이탈 위험 점수를 CRM/대시보드에 연동

  - 고위험 세그먼트에 자동화된 개입 설정

  - 모델을 주기적으로 재학습


  ## DON''T

  - 이탈 후에만 분석하지 않기 (사전 예측 필수)

  - 전체 이탈률만 보고 세그먼트 무시하지 않기

  - 모든 이탈을 동일하게 취급하지 않기 (고가치 고객 우선)

  '
