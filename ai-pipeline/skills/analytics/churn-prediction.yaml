theory: 이탈 예측은 사용자 행동 데이터를 기반으로 이탈 위험이 높은 고객을 사전에 식별하여 선제적 대응을 하는 분석 기법이다. 로지스틱 회귀,
  랜덤 포레스트, 생존 분석 등의 모델이 활용된다.
