content: "코호트 분석 (동일 시점 사용자 그룹의 행동 변화를 추적한다):\n\n### 코호트 정의\n- 시간 코호트: 가입 주/월 기준 (가장\
  \ 일반적)\n- 행동 코호트: 특정 행동 완료 기준 (온보딩 완료 여부)\n- 크기 코호트: 구매 금액/사용량 기준\n\n### 리텐션 테이블\n\
  ```\n       Week 0  Week 1  Week 2  Week 3  Week 4\nJan    100%    40%     25% \
  \    20%     18%\nFeb    100%    45%     30%     24%     22%\nMar    100%    50%\
  \     35%     28%     25%\n```\n→ Feb, Mar 코호트 개선 = 온보딩 변경 효과 입증\n\n### 핵심 리텐션 지표\n\
  | 지표 | 공식 | 좋은 기준 (B2C SaaS) |\n|------|------|-------------------|\n| Day 1 | D1\
  \ 활성 / 가입자 | > 40% |\n| Day 7 | D7 활성 / 가입자 | > 20% |\n| Day 30 | D30 활성 / 가입자 |\
  \ > 10% |\n| 스마일 커브 | 하락 후 반등 | 존재 시 PMF 신호 |\n\n### 분석 시 주의사항\n- 최소 코호트 크기: 통계적\
  \ 유의성 위해 100명 이상\n- 시즌 효과 보정: 연말/명절 코호트는 별도 취급\n- 생존 편향: 초기 이탈자 데이터도 반드시 포함\n- Incomplete\
  \ cohort: 아직 안 끝난 코호트에 결론 금지\n"
