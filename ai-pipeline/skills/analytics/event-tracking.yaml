content: "이벤트 트래킹 설계 (무엇을 측정할지 체계적으로 정의한다):\n\n### 트래킹 플랜 템플릿\n| 이벤트 | 트리거 | 속성 |\
  \ 우선순위 |\n|--------|--------|------|---------|\n| page_viewed | 페이지 로드 | page, referrer\
  \ | P0 |\n| signup_completed | 가입 완료 | method, source | P0 |\n| feature_used | 핵심\
  \ 기능 사용 | feature_name | P0 |\n| purchase_completed | 결제 완료 | amount, plan | P0\
  \ |\n| button_clicked | CTA 클릭 | button_id, page | P1 |\n\n### 이벤트 분류\n- **P0 (필수)**:\
  \ 퍼널 전환, 핵심 지표 계산에 필요\n- **P1 (중요)**: 사용자 행동 분석, A/B 테스트\n- **P2 (선택)**: 세부 인터랙션,\
  \ 디버깅용\n\n### 구현 패턴\n```typescript\n// 중앙 집중 트래킹 함수\nfunction track(event: string,\
  \ properties?: Record<string, unknown>) {\n  const enriched = {\n    ...properties,\n\
  \    timestamp: new Date().toISOString(),\n    sessionId: getSessionId(),\n    userId:\
  \ getUserId(),\n    pageUrl: window.location.href,\n  };\n  analytics.track(event,\
  \ enriched);\n}\n```\n\n### 검증 체크리스트\n- [ ] 모든 P0 이벤트가 구현되었는가?\n- [ ] 이벤트 이름이 컨벤션을\
  \ 따르는가?\n- [ ] 필수 속성이 누락 없이 전송되는가?\n- [ ] 개인정보(PII)가 이벤트에 포함되지 않았는가?\n- [ ] 스테이징에서\
  \ 이벤트 발화 검증했는가?\n"
