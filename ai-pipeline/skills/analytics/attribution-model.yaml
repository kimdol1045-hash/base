content: '# 어트리뷰션 모델 가이드


  ## 핵심 원칙

  - 단일 터치포인트가 아닌 전체 여정을 분석

  - 비즈니스 모델에 맞는 어트리뷰션 모델 선택

  - 여러 모델을 비교하여 편향 파악

  - 증분 효과(Incrementality) 측정 병행


  ## 어트리뷰션 모델 비교

  | 모델 | 배분 방식 | 장점 | 단점 |

  |------|----------|------|------|

  | 라스트 클릭 | 마지막 터치 100% | 단순 | 인지 채널 과소평가 |

  | 퍼스트 클릭 | 첫 터치 100% | 인지 기여 반영 | 전환 기여 무시 |

  | 선형 | 균등 배분 | 공정 | 차별화 없음 |

  | 시간 감소 | 최근 터치에 가중 | 현실적 | 인지 과소평가 |

  | 데이터 기반 | ML로 기여도 산출 | 정확 | 데이터 요구량 높음 |


  ## 분석 프로세스

  1. 전환 이벤트 정의

  2. 터치포인트 데이터 수집 (UTM, 쿠키, 서버 로그)

  3. 여러 모델로 기여도 산출

  4. 모델 간 차이 분석

  5. 채널별 ROI 재산출

  6. 예산 재배분 의사결정


  ## DO

  - 최소 2개 이상 모델을 비교 분석

  - 오프라인 터치포인트도 추적 가능하면 포함

  - 증분 테스트(홀드아웃)로 어트리뷰션 검증


  ## DON''T

  - 라스트 클릭만으로 마케팅 효과 판단하지 않기

  - 어트리뷰션 창(window)을 무제한으로 설정하지 않기

  - 크로스 디바이스 추적 없이 분석하지 않기

  '
