content: '데이터 분석 자기 검증:


  ## 필수 확인


  ### A. 실험 설계

  - [ ] 가설이 검증 가능한 형태로 명확한가? (귀무가설/대립가설 명시)

  - [ ] 1차 지표(primary metric)가 정의되었는가?

  - [ ] 2차 지표(guardrail metric)도 설정했는가?

  - [ ] 표본 크기가 충분한가? (최소 감지 효과 MDE 기반 계산)

  - [ ] 실험 기간이 요일 효과를 포함하는가? (최소 1주, 가능하면 2주)

  - [ ] 트래픽 분배 비율이 적절한가? (50/50 권장)


  ### B. 분석 품질

  - [ ] 세그먼트별 분석을 했는가? (심슨의 역설 방지)

  - [ ] 통계적 유의성을 확인했는가? (p < 0.05 또는 95% CI)

  - [ ] 효과 크기(practical significance)도 확인했는가?

  - [ ] 교란 변수를 고려했는가? (시즌, 프로모션, 외부 이벤트)

  - [ ] 다중 비교 보정을 적용했는가? (Bonferroni 등)


  ## 권장 확인


  ### C. 해석

  - [ ] 상관관계를 인과관계로 혼동하지 않았는가?

  - [ ] 허영 지표가 아닌 실행 지표를 사용했는가?

  - [ ] 결론에 한계점과 외적 타당성을 명시했는가?

  - [ ] 반복 실험이나 추가 검증 계획을 제시했는가?


  ### D. 윤리 및 재현성

  - [ ] 데이터에서 개인 식별 정보가 제거되었는가?

  - [ ] 결과를 cherry-picking하지 않았는가?

  - [ ] 분석 코드와 데이터 소스가 재현 가능한가?

  - [ ] 분석 과정이 문서화되었는가?

  '
