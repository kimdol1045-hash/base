bloom_level: APPLY
content: '# 실시간 분석 가이드


  ## 핵심 원칙

  - 실시간이 필요한 유스케이스와 배치로 충분한 것 구분

  - 지연 시간(Latency) vs 정확도 트레이드오프 인식

  - 알림 피로(Alert Fatigue) 방지

  - Lambda/Kappa 아키텍처 선택


  ## 실시간 분석 유스케이스

  | 유스케이스 | 허용 지연 | 예시 |

  |-----------|----------|------|

  | 이상 탐지 | 초 단위 | 결제 사기 감지 |

  | 모니터링 | 분 단위 | 서버 헬스, 에러율 |

  | 운영 대시보드 | 분 단위 | 동시 접속자, 매출 |

  | 개인화 | 초-분 | 실시간 추천 |


  ## 아키텍처 패턴

  - **Lambda**: 배치 레이어 + 스트림 레이어 병행

  - **Kappa**: 스트림 레이어 단일화

  - **기술 스택**: Kafka → Flink/Spark Streaming → 저장소


  ## 알림 설계

  1. 알림 임계값: 이동 평균 ± N 표준편차

  2. 알림 등급: Critical / Warning / Info

  3. 에스컬레이션: 미응답 시 상위 전달


  ## DO

  - 실시간 필요 여부를 먼저 판단 (대부분 5분 배치면 충분)

  - 알림에 컨텍스트 정보 포함 (원인 추정, 영향 범위)

  - 대시보드에 시계열 + 이상치 동시 표시


  ## DON''T

  - 모든 데이터를 실시간으로 처리하려 하지 않기

  - 알림을 너무 많이 설정하지 않기 (피로)

  - 실시간 데이터만 보고 장기 트렌드 무시하지 않기

  '
