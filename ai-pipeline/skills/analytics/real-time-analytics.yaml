theory: 실시간 분석은 데이터 발생 시점에 즉시 분석하여 의사결정에 활용하는 기술이다. 스트림 처리(Kafka, Flink), 실시간 대시보드,
  알림 시스템이 핵심 구성 요소이며, 배치 분석과 상호 보완적으로 운영한다.
