bloom_level: ANALYZE
content: '# 메트릭 트리 가이드


  ## 핵심 원칙

  - 최상위 지표를 구성 요소로 분해 (Top-down)

  - 각 분기(Branch)는 수학적 관계로 연결

  - 조직 구조와 메트릭 트리 정렬

  - 리프 노드가 실행 가능한 지표여야 함


  ## 분해 방식

  ### 곱셈 분해

  매출 = 방문자 수 x 전환율 x 객단가


  ### 덧셈 분해

  총 매출 = 신규 매출 + 기존 매출 + 복귀 매출


  ### 비율 분해

  전환율 = 전환 수 / 방문자 수


  ## 구축 프로세스

  1. North Star Metric 정의

  2. 1차 분해: 핵심 구성 요소 (3-5개)

  3. 2차 분해: 각 요소를 실행 지표로 세분화

  4. 팀별 매핑: 각 리프 지표를 담당 팀에 할당

  5. 대시보드 구축: 트리 구조 반영

  6. 정기 리뷰: 지표 이상 시 분기별 진단


  ## 예시: SaaS 메트릭 트리

  ```

  MRR

  ├── 신규 MRR = 신규 고객 수 x ARPU

  ├── 확장 MRR = 업그레이드 고객 수 x 추가 금액

  ├── 축소 MRR = 다운그레이드 고객 수 x 감소 금액

  └── 이탈 MRR = 이탈 고객 수 x ARPU

  ```


  ## DO

  - 메트릭 트리를 팀 전체가 이해하고 공유

  - 지표 이상 시 트리를 따라 원인 추적

  - 분기별 트리 구조 유효성 검증


  ## DON''T

  - 5단계 이상으로 과도하게 분해하지 않기

  - 측정 불가능한 지표를 포함하지 않기

  - 트리를 만들고 활용하지 않기

  '
