bloom_level: ANALYZE
content: '# 프로덕트 애널리틱스 가이드


  ## 핵심 원칙

  - 이벤트 기반 추적: 페이지뷰가 아닌 사용자 행동 추적

  - 세그먼트 분석: 전체 평균이 아닌 사용자 그룹별 분석

  - 인과 추론: 상관관계와 인과관계 구분

  - 실행 가능한 인사이트: 분석 결과 → 구체적 액션


  ## 핵심 분석 기법

  1. **퍼널 분석**: 전환 경로의 각 단계별 이탈률 측정

  2. **코호트 분석**: 시간에 따른 사용자 그룹 행동 변화 추적

  3. **리텐션 분석**: N일/N주 재방문율 곡선

  4. **세그먼트 비교**: 파워유저 vs 이탈 위험 유저 행동 차이

  5. **경로 분석**: 사용자의 실제 탐색 경로 시각화


  ## 이벤트 설계 원칙

  - 네이밍 컨벤션: object_action (예: button_clicked)

  - 필수 속성: 사용자 ID, 타임스탬프, 플랫폼

  - 이벤트 계층: 카테고리 > 액션 > 속성

  - 이벤트 카탈로그 문서화 필수


  ## DO

  - 분석 전 가설을 먼저 수립

  - 허영 지표(vanity metrics) 대신 실행 지표 추적

  - 심슨의 역설 방지를 위한 세그먼트별 분석


  ## DON''T

  - 모든 클릭을 추적하려 하지 않기 (데이터 노이즈)

  - 상관관계를 인과관계로 해석하지 않기

  - 통계적 유의성 없이 결론 내리지 않기

  '
