content: '# 노스스타 메트릭 가이드


  ## 핵심 원칙

  - 고객이 받는 가치를 직접 반영하는 지표

  - 팀 전체가 하나의 방향으로 정렬

  - 선행 지표(Input)와 연결된 실행 가능한 구조

  - 성장과 가치 전달을 동시에 측정


  ## NSM 선정 기준

  1. **가치 반영**: 고객이 실제로 가치를 경험하는 순간 측정

  2. **성장 연결**: 이 지표가 증가하면 비즈니스가 성장

  3. **측정 가능**: 명확한 정의와 추적 가능

  4. **팀 정렬**: 모든 팀이 이 지표에 기여 가능

  5. **선행 지표 존재**: 이 지표를 움직이는 입력 지표가 있음


  ## 업종별 NSM 예시

  | 제품 유형 | NSM | 근거 |

  |----------|-----|------|

  | Airbnb | 숙박 예약 수 | 호스트+게스트 양면 가치 |

  | Slack | 일 메시지 전송 수 | 팀 커뮤니케이션 활성도 |

  | Spotify | 총 청취 시간 | 음악 소비 가치 |

  | Shopify | 판매자 GMV | 판매자 성공 = 플랫폼 성공 |


  ## NSM + Input Metrics 구조

  ```

  NSM: 주간 활성 구독자 수

  ├── Input 1: 신규 활성화율

  ├── Input 2: 주간 리텐션율

  ├── Input 3: 재활성화율

  └── Input 4: 핵심 기능 사용률

  ```


  ## DO

  - NSM을 전사 대시보드의 중심에 배치

  - 분기별 NSM 유효성 재검증

  - Input Metrics를 팀별 OKR에 연결


  ## DON''T

  - 매출만을 NSM으로 설정하지 않기 (후행 지표)

  - NSM을 분기마다 바꾸지 않기

  - 모든 팀에 동일한 NSM 목표를 강제하지 않기

  '
