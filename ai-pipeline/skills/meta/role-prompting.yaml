content: '# Role Prompting 가이드


  ## 적용 상황

  - 특정 도메인의 전문적 관점이 필요한 응답 생성 시

  - 일관된 톤, 어휘 수준, 분석 깊이를 유지해야 할 때

  - 복잡한 문제에 다양한 전문가 관점의 분석이 필요할 때

  - 코드 리뷰, 기술 문서, 비즈니스 분석 등 도메인별 품질 향상 시


  ## 구현 방법

  - 역할 명시: 경력 연차, 전문 분야, 핵심 역량을 구체적으로 기술

  예: "10년 경력의 백엔드 아키텍트. DDD, 마이크로서비스 전문"

  - 사고방식 정의: 역할이 우선시하는 가치와 의사결정 기준 명시

  예: "유지보수성과 테스트 가능성을 최우선으로 고려합니다"

  - 제약 조건 설정: 역할에 맞는 출력 형식, 용어 수준, 분석 범위 한정

  - 복수 역할 토론: 같은 문제를 다른 전문가 시각에서 분석 (개발자 vs 보안 전문가)

  - 도메인 어휘: 역할에 맞는 전문 용어와 프레임워크 활용 유도

  - 맥락 정보: 역할이 처한 상황(스타트업 vs 대기업, MVP vs 프로덕션) 명시


  ## 주의사항

  - 모호한 역할("전문가", "경험자") 부여 시 효과 미미. 구체적 경력/분야 명시

  - 역할과 무관한 작업 요청은 역할 프롬프팅 효과를 상쇄

  - 역할 간 충돌하는 지시를 동시에 부여하면 일관성 저하

  - 역할이 과도하게 전문적이면 일반 사용자가 이해하기 어려운 출력 생성 위험

  - 역할 설정은 프롬프트 초반(시스템 메시지)에 배치하는 것이 가장 효과적

  '
