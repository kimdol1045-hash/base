bloom_level: APPLY
content: '# Few-shot 프롬프팅 가이드


  ## 핵심 원칙

  - 예시의 품질이 양보다 중요

  - 입력-출력 형식을 일관되게 유지

  - 경계 케이스를 포함한 다양한 예시 선택

  - 예시 순서도 결과에 영향 (최신 편향)


  ## 예시 설계 전략

  ### 예시 수 결정

  - 2-5개가 최적 (너무 많으면 토큰 낭비)

  - 복잡한 태스크: 3-5개

  - 단순한 태스크: 1-2개


  ### 예시 선택 기준

  1. **대표성**: 일반적 케이스 포함

  2. **다양성**: 서로 다른 유형 커버

  3. **경계**: 엣지 케이스 1개 포함

  4. **명확성**: 모호하지 않은 입출력 쌍


  ### 예시 포맷

  ```

  입력: [사용자 입력]

  출력: [기대 출력]

  ---

  입력: [사용자 입력]

  출력: [기대 출력]

  ```


  ## 고급 기법

  - **동적 Few-shot**: 입력 유사도 기반 예시 자동 선택

  - **네거티브 Few-shot**: 잘못된 출력 예시 + 올바른 출력 대비

  - **CoT Few-shot**: 추론 과정이 포함된 예시


  ## DO

  - 실제 데이터에서 예시 추출

  - 출력 형식을 예시에서 명확히 보여주기

  - 예시 간 구분자(---) 명확히 사용


  ## DON''T

  - 너무 유사한 예시만 제공하지 않기

  - 예시의 출력 품질이 낮으면 안 됨

  - 예시와 실제 태스크의 형식이 다르면 안 됨

  - 10개 이상 예시로 토큰을 낭비하지 않기

  '
