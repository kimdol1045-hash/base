content: '# 출력 포매팅 가이드


  ## 핵심 원칙

  - 출력 형식을 프롬프트에서 명시적으로 지정

  - 파싱 가능한 구조화된 형식 우선

  - 스키마(Schema) 제공으로 필드 누락 방지

  - 형식 예시를 함께 제공하여 일관성 확보


  ## 주요 형식

  ### JSON 출력

  - 장점: 프로그래밍 연동 용이, 스키마 검증 가능

  - 기법: "다음 JSON 형식으로 응답하세요:" + 스키마

  - 주의: 코드 블록(```)으로 감싸도록 지시


  ### 마크다운 출력

  - 장점: 가독성 높음, 문서화에 적합

  - 기법: 헤딩 구조, 표, 목록 형식 지정

  - 활용: 보고서, 분석 결과, 가이드


  ### XML/YAML 출력

  - 장점: 계층 구조 표현, 태그 기반 파싱

  - 기법: 태그 구조를 예시로 제시


  ### 표 형식

  - 장점: 비교 분석, 데이터 정리에 적합

  - 기법: "| 열1 | 열2 |" 형태로 마크다운 표 지정


  ## 고급 기법

  - **Forced JSON**: 시스템 프롬프트에서 JSON만 허용

  - **Pydantic Schema**: 타입 검증 포함 스키마 제공

  - **delimiter 패턴**: <result>...</result> 태그로 추출 용이화


  ## DO

  - 출력 예시를 1개 이상 제공

  - 필수 필드와 선택 필드를 명시

  - 빈 값 처리 방법 지정 (null, 빈 문자열, 생략)


  ## DON''T

  - 형식 지정 없이 "자유롭게 작성해주세요" 하지 않기

  - JSON과 자유 텍스트를 혼합하지 않기

  - 복잡한 중첩 구조를 한 번에 요구하지 않기

  '
