content: '# 프롬프트 엔지니어링 가이드


  ## 핵심 원칙

  - 명확성: 모호한 표현 배제, 구체적 지시

  - 구조화: 역할 → 맥락 → 지시 → 형식 → 제약 순서

  - 반복성: 동일 프롬프트로 일관된 결과 확보

  - 점진적 개선: 결과 분석 → 프롬프트 조정 루프


  ## 프롬프트 구조 템플릿

  1. **역할 부여**: "당신은 ~입니다"

  2. **맥락 제공**: 배경 정보, 제약 사항

  3. **구체적 지시**: 수행할 태스크 명확 기술

  4. **출력 형식**: JSON, 마크다운, 표 등 지정

  5. **예시 제공**: 입력-출력 쌍 1-3개

  6. **제약 조건**: 하지 말아야 할 것 명시


  ## 주요 기법

  - **Zero-shot**: 예시 없이 지시만으로 수행

  - **Few-shot**: 2-5개 예시 제공

  - **Chain-of-Thought**: 단계별 사고 유도

  - **Self-consistency**: 여러 번 생성 후 다수결

  - **ReAct**: 추론 + 행동 교차 수행


  ## DO

  - 출력 형식을 명시적으로 지정

  - 부정형보다 긍정형 지시 사용 ("~하지 마세요" → "~하세요")

  - 복잡한 태스크는 단계로 분해

  - 시스템 프롬프트와 사용자 프롬프트 역할 분리


  ## DON''T

  - 하나의 프롬프트에 여러 태스크를 혼합하지 않기

  - 모순되는 지시를 포함하지 않기

  - 과도한 제약으로 창의성을 완전히 차단하지 않기

  - 프롬프트 길이를 불필요하게 늘리지 않기

  '
