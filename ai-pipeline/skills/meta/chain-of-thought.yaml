content: '# Chain-of-Thought 프롬프팅 가이드


  ## 핵심 원칙

  - 최종 답만이 아닌 사고 과정을 명시적으로 출력

  - 복잡한 문제를 작은 단계로 분해

  - 각 단계의 근거를 함께 제시

  - 중간 결과를 검증하며 진행


  ## 적용 기법

  ### Zero-shot CoT

  - "단계별로 생각해 봅시다" 한 줄 추가만으로 활성화

  - 간단한 추론 태스크에 적합


  ### Few-shot CoT

  - 중간 추론 과정이 포함된 예시 2-3개 제공

  - 복잡한 도메인 특화 문제에 효과적


  ### Self-Ask

  - "이 문제를 풀기 위해 먼저 알아야 할 것은?"

  - 하위 질문을 스스로 생성하고 답변


  ### Tree-of-Thought

  - 여러 추론 경로를 병렬 탐색

  - 각 경로를 평가하여 최적 선택


  ## 활용 시나리오

  - 다단계 수학/논리 문제

  - 코드 디버깅 (원인 추적)

  - 복잡한 비즈니스 의사결정

  - 텍스트 분석 및 요약


  ## DO

  - "먼저 ~를 확인하고, 그다음 ~를 계산합니다" 형태로 유도

  - 중간 결과가 틀릴 수 있으므로 검증 단계 포함

  - 최종 답변 전에 요약 단계 추가


  ## DON''T

  - 단순 사실 조회에 CoT 적용하지 않기 (오버헤드)

  - 추론 단계를 너무 세분화하지 않기

  - CoT 없이도 충분한 문제에 강제 적용하지 않기

  '
