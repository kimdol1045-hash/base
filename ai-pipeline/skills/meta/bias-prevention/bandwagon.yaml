bloom_level: ANALYZE
content: '# 밴드왜건 효과 방지 가이드


  ## 정의

  "모두가 하니까 우리도 해야 한다"는 논리로 의사결정하는 편향.

  예: "경쟁사가 모두 마이크로서비스를 도입했으니 우리도 해야 한다."


  ## 발생 시나리오

  - 기술 선택: 유행하는 기술을 맥락 없이 도입

  - 전략 수립: 경쟁사 모방 전략

  - 채용: "대기업이 다 쓰는 도구"라서 도입

  - 투자: 모두가 투자하는 분야에 뒤늦게 진입


  ## 방지 전략

  1. **고유 맥락 분석**: 우리 상황에 맞는지 독립적으로 평가

  2. **1차 원리 사고**: "왜 이것이 필요한가?" 근본 질문

  3. **반대 사례 탐색**: 이 트렌드를 따르지 않고 성공한 사례

  4. **비용-편익 분석**: 도입 비용과 기대 효과 정량화


  ## 체크리스트

  - [ ] "남들이 하니까"가 결정의 주된 이유는 아닌가?

  - [ ] 우리 상황(규모, 단계, 목표)에 적합한가?

  - [ ] 이 선택의 비용과 리스크를 산정했는가?

  - [ ] 대안을 충분히 검토했는가?


  ## DO

  - 트렌드 도입 전 파일럿/PoC 실행

  - "우리가 이것을 도입하지 않으면 어떻게 되는가?" 질문

  - 도입 결정의 근거를 문서화


  ## DON''T

  - Hype Cycle 정점에서 충동적으로 도입하지 않기

  - "업계 표준"이라는 이유만으로 선택하지 않기

  - 다수의 의견을 근거 없이 정답으로 간주하지 않기

  '
