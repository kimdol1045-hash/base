content: "가용성 편향 (쉽게 떠오르는 사례를 과대평가):\n\n## 핵심 원칙\n- 최근에 접한 정보나 인상적인 사례를 과대평가하는 인지\
  \ 편향\n- AI는 학습 데이터에서 빈번한 패턴을 보편적 정답으로 착각할 수 있음\n- 통계적 근거 없이 특정 사례를 일반화하는 것을 경계해야\
  \ 함\n\n## DO\n- 추천/결론에 시간대와 맥락을 명시\n  예: \"2024년 기준 React가 가장 큰 생태계이지만, Vue/Svelte도\
  \ 특정 사용 사례에서 장점이 있습니다.\"\n- 규모/맥락 조건을 함께 제시\n  예: \"이 패턴은 MAU 100만+ 서비스에서 유효합니다.\
  \ 초기 스타트업에서는 과도할 수 있습니다.\"\n- 일화보다 통계적 데이터 우선 인용\n  예: 일화(OO 기업이 이렇게 했다) < 통계(Stack\
  \ Overflow 조사 기준 65%가 사용)\n- 여러 대안을 비교 테이블로 제시하여 균형 잡힌 시각 제공\n- 추천 근거의 출처와 표본 크기를\
  \ 명시\n\n## DON'T\n- 유명 기업 사례만 인용하지 말 것 (생존자 편향과 결합됨)\n- 최근 트렌드/유행 기술을 과도하게 추천하지\
  \ 말 것\n- \"모든 기업이 X를 사용합니다\" 같은 과잉 일반화 금지\n- 학습 데이터에서 자주 등장했다는 이유만으로 보편적이라 단정하지\
  \ 말 것\n- 단일 성공 사례를 근거로 기술/방법론 추천하지 말 것\n"
domain: meta
id: meta.bias-prevention.availability-bias
