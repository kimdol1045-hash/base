content: '# 프레이밍 효과 방지 가이드


  ## 정의

  동일한 사실이 표현 방식에 따라 다르게 인식되는 편향.

  예: "90% 성공률" vs "10% 실패율" — 같은 사실, 다른 반응.


  ## 발생 시나리오

  - 보고서: 지표를 긍정적으로만 프레이밍

  - A/B 테스트: 결과 해석에 유리한 프레임 선택

  - 제품 기획: 기회만 강조, 리스크 축소

  - 데이터 시각화: 축 조작, 기간 선택 편향


  ## 방지 전략

  1. **양면 제시**: 긍정 + 부정 프레임 동시 제시

  2. **절대값 + 비율**: "전환율 5% 상승" + "일 추가 전환 3건"

  3. **기준점 명시**: 비교 기준(전월, 전년, 업계 평균) 명시

  4. **리프레이밍**: 의도적으로 반대 프레임으로 바꿔 보기


  ## 체크리스트

  - [ ] 이 데이터를 반대로 표현하면 인상이 달라지는가?

  - [ ] 절대값과 상대값을 모두 제시했는가?

  - [ ] 비교 기준을 명시했는가?

  - [ ] 불리한 데이터를 의도적으로 누락하지 않았는가?


  ## DO

  - 보고서에 긍정/부정 지표 균형 있게 포함

  - 차트에 기준선(baseline)과 맥락 정보 포함

  - "다른 관점에서 보면?" 질문을 습관화


  ## DON''T

  - 유리한 기간만 선택하여 그래프 만들지 않기

  - 비율만 제시하고 절대값 숨기지 않기

  - 긍정적 프레임으로만 의사결정 유도하지 않기

  '
