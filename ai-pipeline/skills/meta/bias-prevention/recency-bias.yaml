content: '# 최신 편향 방지 가이드


  ## 정의

  최근 경험이나 데이터에 과도한 비중을 두어 판단이 왜곡되는 편향.

  예: 최근 장애가 난 시스템을 "항상 문제가 있었다"고 평가.


  ## 발생 시나리오

  - 성과 평가: 최근 1개월 성과로 연간 평가 좌우

  - 데이터 분석: 최근 트렌드로 장기 패턴 무시

  - 기술 결정: 최근 장애 경험으로 기술 전체 부정

  - 사용자 피드백: 최근 불만에 과잉 대응


  ## 방지 전략

  1. **전체 기간 데이터**: 최근뿐 아니라 전체 기간 데이터 확인

  2. **구조화된 평가**: 사전 정의된 기준과 기간으로 평가

  3. **기록 참조**: 과거 기록/로그를 의사결정에 포함

  4. **이동 평균**: 단일 시점이 아닌 추세 기반 판단


  ## 체크리스트

  - [ ] 최근 사건에 과도하게 영향받고 있지 않은가?

  - [ ] 전체 기간 데이터를 확인했는가?

  - [ ] 6개월 전에도 같은 판단을 했을 것인가?

  - [ ] 구조화된 평가 기준을 사용하고 있는가?


  ## DO

  - 성과 평가 시 분기별 기록 참조

  - 대시보드에 장기 추세선 포함

  - 의사결정 전 과거 유사 사례 검토


  ## DON''T

  - 최근 1건의 사건으로 전체를 판단하지 않기

  - 최근 성공으로 리스크를 과소평가하지 않기

  - 최근 실패로 팀 역량 전체를 부정하지 않기

  '
