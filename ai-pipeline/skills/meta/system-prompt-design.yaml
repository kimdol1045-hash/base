content: '# 시스템 프롬프트 설계 가이드


  ## 핵심 원칙

  - 계층 구조: 정체성 → 능력 → 규칙 → 형식 → 제약

  - 명시적 경계: 할 수 있는 것과 없는 것 구분

  - 우선순위: 충돌 시 어떤 규칙이 우선하는지 명시

  - 탈옥 방지: 역할 이탈 시도 대응 전략 포함


  ## 설계 구조

  1. **정체성**: 역할, 전문 분야, 성격

  2. **능력 범위**: 수행 가능한 태스크 목록

  3. **출력 규칙**: 형식, 길이, 언어, 톤

  4. **상호작용 규칙**: 질문 방식, 확인 절차

  5. **안전 제약**: 금지 행동, 민감 정보 처리

  6. **폴백 전략**: 모르는 질문, 범위 밖 요청 대응


  ## 설계 패턴

  ### 페르소나 패턴

  - 구체적 경력·전문성으로 일관성 확보

  - "당신은 10년 경력의 ~입니다"


  ### 가드레일 패턴

  - 금지 목록 + 허용 목록 이중 안전장치

  - 탈옥 시도 감지 및 대응 규칙


  ### 출력 스키마 패턴

  - JSON Schema, 마크다운 템플릿 등 고정 형식

  - 필수 필드와 선택 필드 구분


  ## DO

  - 시스템 프롬프트를 버전 관리

  - A/B 테스트로 프롬프트 효과 측정

  - 에지 케이스 시나리오로 스트레스 테스트


  ## DON''T

  - 시스템 프롬프트에 민감 정보 포함하지 않기

  - 모순되는 규칙을 포함하지 않기

  - 시스템 프롬프트를 사용자에게 노출하지 않기

  - 지나치게 긴 시스템 프롬프트 (2000 토큰 초과) 작성하지 않기

  '
