bloom_level: APPLY
content: '# RAG (Retrieval-Augmented Generation) 프롬프팅 가이드


  ## 적용 상황

  - 최신 정보나 도메인 특화 지식이 필요한 응답 생성 시

  - AI 환각을 줄이고 사실 기반 답변이 필요할 때

  - 내부 문서, 지식베이스를 활용한 Q&A 시스템 구축 시

  - LLM의 학습 데이터에 없는 정보를 활용해야 할 때


  ## 구현 방법

  - 검색 결과의 관련성 점수(similarity score) 기반 필터링 (threshold 설정)

  - 컨텍스트와 지시를 명확히 구분: XML 태그(<context>...</context>) 등 구조화

  - "제공된 정보만 사용하여 답변하세요" 지시를 시스템 프롬프트에 포함

  - 출처 인용 형식 지정: [1], [2] 등 번호 매기기로 출처 추적 가능하게

  - 청크 크기 최적화: 너무 짧으면 맥락 손실, 너무 길면 노이즈 증가 (300-500 토큰 권장)

  - 검색 결과 reranking: 초기 검색 후 Cross-encoder로 재순위화

  - 검색 실패 시 폴백: "제공된 정보에서 답을 찾을 수 없습니다" 응답 설계


  ## 주의사항

  - 무관한 컨텍스트 과다 주입 시 오히려 답변 품질 저하 (노이즈)

  - 컨텍스트 윈도우 한계 고려: 검색 결과 총량이 토큰 제한 내에 있어야 함

  - 검색 품질이 RAG 전체 성능을 결정. 임베딩 모델과 인덱싱 전략에 투자

  - 환각 완전 제거는 불가. "정보 없음" 응답을 허용하는 설계 필요

  - 검색 결과의 신선도(freshness) 관리: 오래된 문서 가중치 감소

  '
