bloom_level: APPLY
content: '# 구조화 출력 프롬프팅


  ## 적용 상황

  - LLM 출력을 프로그래밍적으로 파싱해야 할 때 (API 응답, 파이프라인 중간 단계)

  - 일관된 형식의 데이터 추출이 필요할 때 (엔티티 추출, 분류, 요약)

  - 여러 필드를 포함하는 복합 응답을 구조화해야 할 때

  - 데이터 변환이나 포맷 변경 작업 시


  ## 구현 방법

  - JSON Schema를 프롬프트에 명시: 필드명, 타입, 필수 여부, 설명 포함

  - Few-shot 예시로 동일 형식의 입출력 쌍 2-3개 제공

  - 출력 시작을 강제하여 형식 유도: "응답을 다음 JSON 형식으로 작성하세요: {"

  - 중첩 구조의 각 필드에 주석/설명 추가하여 의도 명확화

  - OpenAI의 structured output 또는 function calling 활용 (지원 모델에서)

  - 응답 후 JSON 파서로 형식 검증: 실패 시 재요청 로직 구현

  - enum 타입 활용: 분류 문제에서 허용 값을 명시적으로 제한


  ## 주의사항

  - 자유 형식 텍스트와 구조화 데이터를 한 응답에 혼합 요청하면 파싱 실패율 증가

  - 중첩 깊이 3단계 이상은 LLM이 구조를 유지하기 어려움. 가능하면 평탄화

  - 형식 검증 없이 파싱하면 런타임 에러 발생. 반드시 try-catch + 재시도 로직

  - 매우 긴 구조화 출력은 토큰 제한에 걸릴 수 있음. 필요시 분할 요청

  - 한국어 등 비영어 필드값에서 인코딩 이슈 주의 (UTF-8 확인)

  '
