bloom_level: APPLY
content: "# API 테스트 가이드\n\n## 핵심 원칙\n- Happy Path + Edge Case + Error Case 모두 커버\n\
  - 상태 코드, 응답 바디, 헤더 모두 검증\n- 테스트 데이터 격리 (테스트 간 독립성)\n- 인증/인가 시나리오 필수 포함\n\n## 테스트\
  \ 범위\n| 영역 | 검증 항목 |\n|------|----------|\n| 기능 | 올바른 응답 데이터, 상태 코드 |\n| 검증 | 필수\
  \ 필드 누락, 잘못된 타입 |\n| 인증 | 토큰 없음, 만료, 권한 부족 |\n| 성능 | 응답 시간, 동시 요청 |\n| 에러 | 404,\
  \ 500, 타임아웃 처리 |\n\n## 테스트 구조\n```\ndescribe(\"POST /api/users\")\n  it(\"201: 유효한\
  \ 데이터로 사용자 생성\")\n  it(\"400: 이메일 누락 시 검증 에러\")\n  it(\"400: 잘못된 이메일 형식\")\n  it(\"\
  409: 중복 이메일\")\n  it(\"401: 인증 토큰 없음\")\n  it(\"403: 권한 부족\")\n```\n\n## 테스트 데이터\
  \ 관리\n- Factory 패턴으로 테스트 데이터 생성\n- 테스트 후 정리(Cleanup) 자동화\n- 시드 데이터와 동적 데이터 분리\n\n\
  ## DO\n- 모든 엔드포인트의 에러 응답 형식 일관성 검증\n- Rate Limit, 페이지네이션 경계값 테스트\n- CI에서 매 PR마다\
  \ 자동 실행\n\n## DON'T\n- 프로덕션 데이터로 테스트하지 않기\n- Happy Path만 테스트하지 않기\n- 테스트 간 상태 의존성\
  \ 만들지 않기\n"
domain: qa
id: qa.test-gen.api-testing
