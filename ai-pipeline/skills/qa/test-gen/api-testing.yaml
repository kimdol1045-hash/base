theory: API 테스트는 애플리케이션 인터페이스의 기능, 성능, 보안을 검증하는 테스트로, UI 없이 비즈니스 로직을 직접 테스트한다. 테스트
  피라미드에서 통합 테스트 레벨에 해당하며, E2E보다 빠르고 안정적이다.
