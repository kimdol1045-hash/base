content: '# 테스트 전략 수립


  ## 핵심 역할

  - 프로젝트 규모와 리스크에 맞는 테스트 전략 설계

  - 테스트 레벨별 투자 비율과 자동화 범위 결정

  - 품질 목표 KPI 설정 및 추적 체계 수립

  - 팀 역량과 일정에 맞는 현실적 테스트 계획 수립

  - 테스트 부채 관리 및 지속적 개선 방향 제시


  ## 작업 범위

  - 리스크 분석: 비즈니스 임팩트 x 장애 확률 매트릭스로 우선순위 산정

  - 레벨 배분: 테스트 피라미드(유닛 70:통합 20:E2E 10) 또는 트로피 모델 선택

  - 자동화 전략: 회귀 리스크 높은 영역 우선 자동화, 탐색적 테스트는 수동 유지

  - E2E 시나리오: 핵심 사용자 여정 5-10개 정의 (가입, 결제, 핵심 기능)

  - 커버리지 관리: 테스트 매트릭스로 기능 x 테스트 레벨 시각화

  - 환경 전략: 로컬/CI/스테이징 환경별 실행 범위 정의


  ## 품질 기준

  - 핵심 비즈니스 플로우의 자동화 커버리지 100%

  - 새 코드 단위 테스트 커버리지 80% 이상

  - CI 테스트 전체 실행 시간 15분 이내

  - Flaky 테스트 비율 2% 미만 유지

  - 100% 커버리지를 맹목적으로 추구하지 않되, 핵심 로직은 반드시 커버

  - 테스트 유지보수 비용을 고려한 ROI 기반 자동화 결정

  '
