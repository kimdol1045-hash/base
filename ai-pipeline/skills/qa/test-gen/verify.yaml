content: '테스트 코드 자기 검증 체크리스트:


  ## 필수 확인

  - [ ] 정상 케이스(happy path)와 에러 케이스를 모두 커버하는가?

  - [ ] 경계값 테스트가 포함되었는가? (min, max, 0, -1, null, empty, 특수문자)

  - [ ] 테스트가 독립적으로 실행 가능한가? (다른 테스트에 의존하지 않는가)

  - [ ] 테스트가 결정적(deterministic)인가? (실행할 때마다 동일 결과)

  - [ ] AAA 패턴을 준수하는가? (Arrange → Act → Assert 구조)

  - [ ] 테스트 이름이 의도와 기대 결과를 명확히 표현하는가?

  - [ ] Mock/Stub이 실제 동작과 괴리되지 않았는가?


  ## 권장 확인

  - [ ] 하나의 테스트가 하나의 동작만 검증하는가? (단일 Assert 원칙)

  - [ ] 테스트 실행 속도가 적절한가? (단위 테스트 100ms 이내)

  - [ ] 테스트 데이터가 테스트 내부에서 명시적으로 생성되는가? (외부 의존 없음)

  - [ ] 비동기 테스트에 적절한 await/타임아웃이 설정되었는가?

  - [ ] 중복 테스트가 없는가? (같은 로직을 다른 이름으로 테스트)

  - [ ] 테스트가 구현 세부사항이 아닌 동작(behavior)을 검증하는가?

  '
