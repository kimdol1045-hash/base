bloom_level: ANALYZE
content: '# 에러 시나리오 테스트 가이드


  ## 적용 상황

  - API 엔드포인트의 에러 핸들링을 검증할 때

  - 사용자 입력 유효성 검사 로직을 테스트할 때

  - 외부 서비스(DB, API, 캐시) 장애 상황에 대한 복원력을 확인할 때

  - 프로덕션 장애를 재현하고 회귀 테스트를 추가할 때


  ## 구현 방법

  - 경계값 분석: 각 입력에 최소/최대/제로/음수/오버플로/빈 값/null 테스트

  - 유효하지 않은 타입: 숫자 필드에 문자열, 날짜 필드에 잘못된 형식 등

  - 외부 서비스 Mock: 네트워크 타임아웃, 5xx 에러, 느린 응답(latency injection)

  - HTTP 상태 코드 검증: 400(잘못된 요청), 401(인증), 403(권한), 404(미발견), 409(충돌), 422(유효성)

  - 에러 응답 구조 검증: { error: { code, message, details } } 일관된 형식

  - 동시성: 동일 리소스에 대한 동시 수정(race condition), 중복 요청(idempotency)

  - 파일 업로드: 빈 파일, 초과 크기, 잘못된 MIME 타입, 악성 파일명

  - 인증/인가: 만료된 토큰, 위조된 토큰, 권한 없는 리소스 접근


  ## 주의사항

  - Happy path만 테스트하면 프로덕션 에러의 80%를 놓침

  - 에러 핸들링 코드도 반드시 테스트. catch 블록이 올바르게 동작하는지 확인

  - 비현실적 에러 시나리오(동시에 100개 DB 장애 등)에 과투자하지 말 것

  - 에러 메시지에 민감 정보(스택 트레이스, DB 쿼리) 노출 여부도 검증

  - 프로덕션 장애 발생 시 해당 시나리오를 테스트로 추가하여 재발 방지

  '
