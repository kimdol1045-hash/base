bloom_level: APPLY
content: '# 테스트 데이터 관리 가이드


  ## 핵심 원칙

  - 테스트 간 데이터 독립성 보장

  - 최소 데이터 원칙: 테스트에 필요한 것만 생성

  - 프로덕션 데이터 사용 금지 (PII 보호)

  - 테스트 후 자동 정리(Cleanup)


  ## 데이터 생성 패턴

  ### Factory 패턴

  - 동적으로 테스트 데이터 생성

  - 기본값 + 오버라이드 지원

  - 관계 데이터 자동 생성


  ### Fixture 패턴

  - 정적 테스트 데이터 파일 (JSON, YAML)

  - 반복 사용되는 고정 데이터에 적합

  - 버전 관리 가능


  ### Seed 데이터

  - 개발/테스트 환경 초기화 데이터

  - 마이그레이션과 함께 관리

  - 현실적인 데이터셋 제공


  ## 데이터 격리 전략

  | 전략 | 설명 | 적합 |

  |------|------|------|

  | 트랜잭션 롤백 | 테스트를 트랜잭션으로 감싸고 롤백 | 단위/통합 |

  | 테스트별 DB | 각 테스트에 별도 DB | E2E |

  | 데이터 정리 | 테스트 후 생성 데이터 삭제 | 통합 |

  | 스냅샷 복원 | DB 스냅샷으로 초기 상태 복원 | E2E |


  ## DO

  - faker 라이브러리로 현실적 더미 데이터 생성

  - 테스트 데이터 생성 유틸리티를 팀에서 공유

  - 민감 데이터 마스킹/익명화 자동화


  ## DON''T

  - 프로덕션 DB 복사본을 테스트에 사용하지 않기

  - 테스트 간 데이터 의존성 만들지 않기

  - 하드코딩된 ID로 데이터 참조하지 않기

  '
