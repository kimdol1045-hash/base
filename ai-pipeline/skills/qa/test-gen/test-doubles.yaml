bloom_level: APPLY
content: '# 테스트 더블 가이드


  ## 적용 상황

  - 외부 API, 데이터베이스, 파일시스템 등 외부 의존성을 격리해야 할 때

  - 테스트 실행 속도를 높이기 위해 느린 의존성을 대체할 때

  - 이메일 발송, 결제 등 부수효과를 안전하게 검증하고 싶을 때

  - 네트워크 장애, 타임아웃 등 특정 시나리오를 재현해야 할 때


  ## 구현 방법

  - Stub: 고정 응답을 반환. 입력에 따른 출력만 제어할 때 사용

  예: vi.fn().mockReturnValue({ id: 1, name: "test" })

  - Spy: 호출 기록(횟수, 인자)을 추적. 부수효과 검증에 사용

  예: vi.spyOn(emailService, "send") → expect(send).toHaveBeenCalledWith(...)

  - Mock: 기대 동작을 사전 정의하고 검증. 상호작용 패턴 테스트

  - Fake: 간소화된 실제 구현. in-memory DB, 로컬 파일시스템 등

  - 외부 API: MSW(Mock Service Worker)로 네트워크 레벨에서 인터셉트

  - 의존성 주입: 생성자/팩토리로 더블을 주입하여 테스트 가능하게 설계


  ## 주의사항

  - 내부 구현 세부사항을 과도하게 Mock하면 리팩터링 시 테스트가 깨짐

  - Mock이 실제 동작과 괴리되지 않게 계약 테스트(contract test)로 보완

  - 모든 것을 Mock하면 테스트는 통과하지만 실제 통합에서 실패할 수 있음

  - Mock 설정이 복잡해지면 설계 문제 신호. 의존성 분리를 재고

  - Stub/Mock은 단위 테스트에, Fake는 통합 테스트에 주로 활용

  '
