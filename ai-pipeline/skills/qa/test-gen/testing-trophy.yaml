content: "테스트 전략 프레임워크 (무엇을 얼마나 테스트할지 결정한다):\n\n### Testing Trophy (프론트엔드 권장)\n```\n\
  \     E2E (소수)          ← 핵심 유저 플로우만\n    Integration (다수)    ← 컴포넌트 조합 테스트 (가장\
  \ ROI 높음)\n   Unit (적당히)          ← 순수 함수, 유틸리티\n  Static (기본)           ← TypeScript,\
  \ ESLint\n```\n\n### Test Pyramid (백엔드 권장)\n```\n     E2E (소수)\n    Integration\
  \ (중간)\n   Unit (다수)            ← 비즈니스 로직 집중\n  Static (기본)\n```\n\n### 유형별 가이드\n\
  | 유형 | 대상 | 속도 | 비율 |\n|------|------|------|------|\n| Static | 타입 에러, 린트 규칙 |\
  \ 즉시 | 항상 |\n| Unit | 순수 함수, 유틸 | ms | 20-30% |\n| Integration | API+DB, 컴포넌트+훅\
  \ | 100ms~1s | 40-50% |\n| E2E | 사용자 시나리오 | 수초~분 | 10-20% |\n\n### 테스트 작성 우선순위\n\
  1. 버그가 발생한 곳 (회귀 방지)\n2. 비즈니스 크리티컬 경로 (결제, 인증)\n3. 복잡한 로직 (조건 분기 많은 곳)\n4. 자주 변경되는\
  \ 코드\n\n### 안티패턴\n- 100% 커버리지 집착 (유지보수 비용 > 가치)\n- 구현 디테일 테스트 (리팩토링 시 전부 깨짐)\n-\
  \ Snapshot 남용 (변경 시 무조건 업데이트)\n- 느린 테스트 방치 (10초 넘으면 분리)\n"
