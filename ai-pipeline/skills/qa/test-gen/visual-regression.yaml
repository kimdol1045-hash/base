content: '# 시각적 회귀 테스트 가이드


  ## 핵심 원칙

  - 기준 스크린샷(Baseline)과 현재 스크린샷 비교

  - 의도된 변경은 기준 업데이트, 의도치 않은 변경은 실패

  - 다양한 뷰포트/브라우저에서 테스트

  - Flaky 테스트 최소화 (동적 콘텐츠 처리)


  ## 도구 옵션

  | 도구 | 특징 |

  |------|------|

  | Chromatic | Storybook 통합, 클라우드 기반 |

  | Percy | CI 통합, 다중 브라우저 |

  | Playwright | 내장 스크린샷 비교 |

  | BackstopJS | 오픈소스, Docker 지원 |


  ## 테스트 전략

  1. 컴포넌트 수준: Storybook 스토리별 스크린샷

  2. 페이지 수준: 주요 페이지 전체 스크린샷

  3. 반응형: 모바일/태블릿/데스크톱 뷰포트

  4. 상태별: 로딩/에러/빈 상태 스크린샷


  ## Flaky 테스트 방지

  - 동적 데이터(날짜, 랜덤 ID) 목킹

  - 폰트 로딩 대기 후 스크린샷

  - 애니메이션 비활성화

  - 일관된 테스트 데이터 사용


  ## DO

  - CI 파이프라인에 통합하여 PR마다 자동 실행

  - 의도된 변경 시 기준 스크린샷 업데이트 프로세스 정의

  - 다크 모드도 테스트 범위에 포함


  ## DON''T

  - 모든 페이지를 테스트하려 하지 않기 (핵심 페이지 우선)

  - 동적 콘텐츠를 목킹 없이 테스트하지 않기

  - 기준 업데이트를 리뷰 없이 자동 승인하지 않기

  '
