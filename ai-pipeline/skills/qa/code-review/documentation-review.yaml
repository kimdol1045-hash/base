bloom_level: EVALUATE
content: '# 문서 리뷰 가이드


  ## 핵심 원칙

  - 코드 변경과 문서 변경은 동일 PR에 포함

  - 문서는 코드의 ''왜''를 설명 (코드는 ''무엇'')

  - 타겟 독자를 명확히 인식하고 수준에 맞게 작성

  - 자동화된 문서 검증 도구 활용


  ## 리뷰 체크리스트

  ### README

  - [ ] 설치 방법이 실제 동작하는가?

  - [ ] 환경 변수 목록이 최신인가?

  - [ ] 예제 코드가 실행 가능한가?


  ### API 문서

  - [ ] 새 엔드포인트가 문서화되었는가?

  - [ ] 요청/응답 예시가 정확한가?

  - [ ] 에러 코드가 문서화되었는가?


  ### 인라인 주석

  - [ ] ''왜''를 설명하는 주석인가? (무엇은 코드가 설명)

  - [ ] TODO/FIXME에 이슈 번호가 있는가?

  - [ ] 오래된 주석이 삭제되었는가?


  ### ADR (Architecture Decision Record)

  - [ ] 중요한 구조적 결정에 ADR이 작성되었는가?

  - [ ] 대안과 트레이드오프가 기록되었는가?


  ## DO

  - 코드 변경 PR에 "문서 업데이트 필요?" 체크리스트 포함

  - 자동 링크 검증 (깨진 링크 탐지)

  - 문서 최종 업데이트 날짜 표시


  ## DON''T

  - "나중에 문서 추가" PR을 방치하지 않기

  - 코드를 그대로 번역한 무의미한 주석 작성하지 않기

  - 문서 리뷰를 선택사항으로 두지 않기

  '
