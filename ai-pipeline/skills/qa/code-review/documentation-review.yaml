theory: 문서 리뷰는 코드 변경에 동반되는 문서(README, API 문서, 인라인 주석, ADR)의 정확성과 최신성을 검증하는 프로세스이다.
  코드와 문서의 불일치는 온보딩 비용 증가와 장애의 주요 원인이다.
