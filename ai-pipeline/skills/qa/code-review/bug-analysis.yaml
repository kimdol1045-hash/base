content: "버그 분석 (근본 원인을 찾아 재발을 방지한다):\n\n### 5 Whys 기법\n표면적 증상이 아닌 **구조적 원인**에 도달할\
  \ 때까지 \"왜?\"를 반복한다.\n\n```\n버그: 결제 완료 후 주문 상태가 '대기중'으로 남음\n\nWhy 1: 왜 주문 상태가 업데이트되지\
  \ 않았는가?\n→ 결제 완료 이벤트 핸들러가 실행되지 않았다\n\nWhy 2: 왜 이벤트 핸들러가 실행되지 않았는가?\n→ 이벤트 큐에서 메시지\
  \ 처리 실패(타임아웃)\n\nWhy 3: 왜 타임아웃이 발생했는가?\n→ DB 쿼리가 5초 이상 소요 (타임아웃 3초)\n\nWhy 4: 왜\
  \ DB 쿼리가 느렸는가?\n→ orders 테이블에 status 컬럼 인덱스가 없었다\n\nWhy 5: 왜 인덱스가 없었는가?\n→ 마이그레이션\
  \ 리뷰에 성능 체크리스트가 없었다\n\n✅ 근본 원인: DB 마이그레이션 리뷰 프로세스에 성능 체크 누락\n✅ 해결: 인덱스 추가 + 마이그레이션\
  \ PR 체크리스트에 인덱스 검토 항목 추가\n```\n\n### 버그 분류\n| 분류 | 설명 | 예시 |\n|------|------|------|\n\
  | Logic | 비즈니스 로직 오류 | 할인 계산 잘못 |\n| Race Condition | 동시성/타이밍 문제 | 중복 결제, 재고 초과\
  \ |\n| Edge Case | 경계값/예외 미처리 | null 입력, 빈 배열, 0원 |\n| Integration | 외부 시스템 연동 오류\
  \ | API 스키마 불일치 |\n| Configuration | 환경/설정 문제 | 잘못된 환경변수, 타임존 |\n\n### Blameless\
  \ Postmortem 템플릿\n```markdown\n## 사고 보고서 — [제목]\n**날짜**: YYYY-MM-DD\n**심각도**: P1/P2/P3/P4\n\
  **영향**: 사용자 N명, 기간 N분\n\n### 타임라인\n- HH:MM 최초 감지 (모니터링 알림 / 사용자 제보)\n- HH:MM 원인\
  \ 파악 시작\n- HH:MM 임시 조치 적용\n- HH:MM 완전 복구\n\n### 근본 원인 (5 Whys)\n(위 형식으로 기술)\n\n\
  ### 재발 방지 조치\n- [ ] 단기: 핫픽스 배포 (담당: OOO, 기한: D+1)\n- [ ] 중기: 회귀 테스트 추가 (담당: OOO,\
  \ 기한: D+7)\n- [ ] 장기: 프로세스 개선 (담당: OOO, 기한: D+30)\n```\n\n### DO: 회귀 테스트 필수\n```typescript\n\
  // 모든 버그 수정에는 해당 버그를 재현하는 테스트가 동반되어야 한다\ndescribe('BUG-1234: 0원 상품 결제 시 에러', ()\
  \ => {\n  it('0원 상품은 결제 없이 주문 완료', async () => {\n    const order = await createOrder({\n\
  \      items: [{ productId: 'free-sample', price: 0 }],\n    });\n    // 이전에는 여기서\
  \ ZeroDivisionError 발생\n    expect(order.status).toBe('completed');\n    expect(order.paymentRequired).toBe(false);\n\
  \  });\n});\n```\n\n### Fix 검증 체크리스트\n- [ ] 원래 버그가 재현되는 테스트를 먼저 작성했는가?\n- [ ] 수정\
  \ 후 해당 테스트가 통과하는가?\n- [ ] 관련 edge case도 추가로 커버했는가?\n- [ ] 수정이 다른 기능에 영향을 주지 않는가?\
  \ (기존 테스트 통과)\n\nDON'T:\n```typescript\n// ❌ 증상만 치료 (근본 원인 미해결)\nif (order.total\
  \ === 0) return; // 0원이면 그냥 무시\n// → 왜 0원 주문이 발생하는지 원인 분석 없이 회피\n\n// ❌ 회귀 테스트 없이\
  \ 수정만\n// \"급하니까 테스트 나중에 추가할게요\" → 영원히 추가 안 됨\n\n// ❌ 개인 비난\n// \"누가 이런 코드를 짰어?\"\
  \ → 시스템/프로세스 관점으로 전환\n```\n"
