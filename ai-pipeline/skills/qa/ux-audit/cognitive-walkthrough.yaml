bloom_level: ANALYZE
content: '# 인지적 워크스루 가이드


  ## 적용 상황

  - 새 기능이나 플로우의 사용성을 출시 전에 평가할 때

  - 온보딩 프로세스의 직관성을 검증하고 싶을 때

  - 사용자 이탈이 높은 특정 단계의 원인을 분석할 때

  - 실사용자 테스트 전 빠른 휴리스틱 평가가 필요할 때


  ## 구현 방법

  - 핵심 사용자 여정 3-5개 선정 (가입, 첫 경험, 핵심 기능, 결제 등)

  - 각 여정을 개별 단계(step)로 분해

  - 각 단계에서 4가지 질문으로 평가:

  1. 목표: 사용자가 이 단계에서 무엇을 해야 하는지 아는가?

  2. 행동: 올바른 행동(버튼, 링크)을 찾을 수 있는가?

  3. 피드백: 행동 후 적절한 피드백을 받는가? (성공/실패 알 수 있는가?)

  4. 진행: 다음 단계로 자연스럽게 이동할 수 있는가?

  - 신규 사용자(도메인 지식 없음) 관점에서 평가 수행

  - 발견된 문제를 심각도 분류: Critical(태스크 차단) > Major(지연) > Minor(불편)

  - 각 문제에 개선 제안을 함께 기록


  ## 주의사항

  - 전문 사용자 기준으로만 평가하면 초보자 이탈 원인을 놓침

  - 미적 요소(디자인, 색상)만 평가하고 태스크 완수율을 무시하지 말 것

  - 발견된 문제를 심각도 분류 없이 나열하면 우선순위 결정 불가

  - 인지적 워크스루는 실사용자 테스트를 대체하지 않음. 보완적으로 활용

  - 평가자의 편향을 줄이기 위해 최소 2-3명이 독립적으로 수행 후 결과 통합

  '
