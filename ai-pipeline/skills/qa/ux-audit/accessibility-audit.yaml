content: '# 접근성 감사 가이드


  ## 핵심 원칙

  - WCAG 2.1 AA 수준 최소 충족 목표

  - 자동화 + 수동 테스트 병행 (자동화는 30% 커버)

  - 실제 보조 기술 사용자 테스트가 가장 정확

  - 접근성은 사후 감사가 아닌 설계 단계부터 반영


  ## WCAG 4대 원칙 (POUR)

  | 원칙 | 의미 | 예시 |

  |------|------|------|

  | 인지 가능 | 모든 정보를 인식 가능 | 이미지 alt, 캡션 |

  | 운용 가능 | 모든 기능을 조작 가능 | 키보드 탐색 |

  | 이해 가능 | 정보와 UI를 이해 가능 | 명확한 레이블 |

  | 견고함 | 다양한 기술과 호환 | 시맨틱 HTML |


  ## 감사 체크리스트

  - [ ] 키보드만으로 모든 기능 사용 가능

  - [ ] 포커스 순서가 논리적

  - [ ] 색상 대비 4.5:1 이상 (텍스트)

  - [ ] 모든 이미지에 적절한 alt 텍스트

  - [ ] 폼 필드에 레이블 연결 (htmlFor)

  - [ ] 에러 메시지가 프로그래밍적으로 접근 가능

  - [ ] 모달/드롭다운의 포커스 트랩 동작

  - [ ] 동영상에 자막 제공


  ## 도구

  - 자동화: axe-core, Lighthouse, WAVE

  - 수동: VoiceOver, NVDA, 키보드 테스트

  - CI: axe-linter, pa11y-ci


  ## DO

  - CI에 axe-core 자동 검사 통합

  - 분기별 수동 접근성 감사 실시

  - 접근성 이슈를 버그와 동일 우선순위로 처리


  ## DON''T

  - 자동화 도구 결과만으로 "접근성 통과" 판단하지 않기

  - 접근성을 출시 후 별도 프로젝트로 미루지 않기

  - aria 속성을 시맨틱 HTML 대신 남용하지 않기

  '
