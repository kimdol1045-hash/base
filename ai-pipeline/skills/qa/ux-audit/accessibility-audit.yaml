theory: 접근성 감사(Accessibility Audit)는 WCAG 2.1 가이드라인을 기준으로 디지털 제품의 접근성 수준을 평가하는 프로세스이다.
  자동화 도구(axe, Lighthouse)와 수동 테스트(스크린 리더, 키보드)를 병행한다.
