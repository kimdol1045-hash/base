content: '# 반응형 감사 가이드


  ## 적용 상황

  - 새 페이지/컴포넌트의 반응형 레이아웃을 검증할 때

  - 모바일 사용자 이탈률이 높아 원인을 분석할 때

  - 디자인 시스템의 반응형 규칙을 수립하거나 검증할 때

  - 다양한 디바이스에서 일관된 사용자 경험을 보장해야 할 때


  ## 구현 방법

  - 주요 브레이크포인트별 전수 검증:

  - 320px (소형 모바일, iPhone SE)

  - 375px (표준 모바일, iPhone 12/13)

  - 768px (태블릿, iPad)

  - 1024px (소형 랩탑)

  - 1440px (표준 데스크탑)

  - 터치 타겟: 모든 인터랙티브 요소 최소 44x44px 확보

  - 콘텐츠 리플로우: 가로 스크롤 없이 모든 콘텐츠 접근 가능 확인

  - 방향 전환: 가로/세로 모드 전환 시 레이아웃 깨짐 없는지 확인

  - 이미지/미디어: srcset, picture 태그로 뷰포트별 최적 해상도 제공

  - 타이포그래피: 뷰포트별 폰트 크기, 줄 간격이 가독성 기준 충족

  - 실제 디바이스 테스트: 에뮬레이터 + 실물 기기 최소 2-3종 병행


  ## 주의사항

  - 데스크탑만 테스트하고 모바일을 무시하면 전체 트래픽의 50%+ 소외

  - 고정 px 너비 대신 %, rem, vw 등 상대 단위 사용

  - 호버 전용 인터랙션은 터치 디바이스에서 접근 불가. 대안 제공 필수

  - 키보드/스크린리더 사용자의 모바일 접근성도 함께 확인

  - 성능: 모바일에서 불필요한 고해상도 이미지 로딩으로 인한 느린 로딩 주의

  '
