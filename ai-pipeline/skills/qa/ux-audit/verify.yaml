content: 'UX 감사 자기 검증 체크리스트:


  ### H1. 시스템 상태 가시성 (Visibility of System Status)

  - [ ] 로딩/처리 중 상태가 사용자에게 항상 표시되는가?

  - [ ] 현재 위치(breadcrumb, 활성 탭)가 명확한가?

  - [ ] 진행률(프로그레스바, 단계 표시)이 제공되는가?


  ### H2. 실세계 일치 (Match Between System and Real World)

  - [ ] 기술 용어 대신 사용자가 이해하는 언어를 사용하는가?

  - [ ] 아이콘과 메타포가 실세계와 일치하는가?

  - [ ] 정보가 자연스럽고 논리적인 순서로 배열되는가?


  ### H3. 사용자 제어와 자유 (User Control and Freedom)

  - [ ] 실행 취소(Undo)와 다시 실행(Redo)이 가능한가?

  - [ ] 잘못된 경로에서 쉽게 빠져나올 수 있는가? (취소 버튼, 뒤로 가기)

  - [ ] 강제 완료 없이 중간에 이탈할 수 있는가?


  ### H4. 일관성과 표준 (Consistency and Standards)

  - [ ] 같은 용어/아이콘이 전체 서비스에서 동일한 의미로 사용되는가?

  - [ ] 버튼 스타일, 색상, 위치가 일관적인가?

  - [ ] 플랫폼 관례(OS, 웹 표준)를 준수하는가?


  ### H5. 에러 방지 (Error Prevention)

  - [ ] 위험한 작업(삭제, 탈퇴)에 확인 단계가 있는가?

  - [ ] 입력 시 실시간 유효성 검사가 제공되는가?

  - [ ] 자동 저장 또는 임시 저장이 구현되어 있는가?


  ### H6. 기억보다 인식 (Recognition Rather Than Recall)

  - [ ] 옵션과 행동이 화면에 보이는가? (숨겨진 기능 최소화)

  - [ ] 최근 검색, 자동완성 등으로 기억 부담을 줄이는가?

  - [ ] 필요한 정보가 해당 컨텍스트에서 바로 접근 가능한가?


  ### H7. 유연성과 효율 (Flexibility and Efficiency of Use)

  - [ ] 키보드 단축키, 빠른 실행 등 전문가 기능이 있는가?

  - [ ] 자주 쓰는 기능에 빠르게 접근할 수 있는가?

  - [ ] 초보자를 위한 온보딩/가이드가 제공되는가?


  ### H8. 미니멀 디자인 (Aesthetic and Minimalist Design)

  - [ ] 화면에 불필요한 정보가 없는가?

  - [ ] 핵심 행동(CTA)이 시각적으로 가장 두드러지는가?

  - [ ] 시각적 계층 구조가 명확한가? (크기, 색상, 여백)


  ### H9. 에러 인식, 진단, 복구 (Help Users Recognize, Diagnose, and Recover)

  - [ ] 에러 메시지가 평문(코드 아닌)으로 작성되었는가?

  - [ ] 에러 원인과 해결 방법이 함께 제시되는가?

  - [ ] 에러 상태에서 데이터 손실 없이 복구 가능한가?


  ### H10. 도움말과 문서 (Help and Documentation)

  - [ ] 도움말이 쉽게 검색 가능한가?

  - [ ] 단계별 안내가 구체적이고 간결한가?

  - [ ] 맥락에 맞는 인라인 도움말(툴팁, 힌트)이 있는가?


  ### 접근성 (Accessibility — WCAG 2.1 AA)

  - [ ] 색상 대비 비율이 4.5:1 이상인가? (텍스트 기준)

  - [ ] 키보드만으로 모든 기능을 사용할 수 있는가?

  - [ ] 스크린리더가 콘텐츠를 올바르게 읽는가? (alt, aria-label)

  - [ ] 포커스 표시(focus indicator)가 명확한가?

  '
