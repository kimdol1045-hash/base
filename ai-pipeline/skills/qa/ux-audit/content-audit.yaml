bloom_level: ANALYZE
content: '# UX 콘텐츠 감사 가이드


  ## 적용 상황

  - 제품의 모든 사용자 대면 텍스트 품질을 체계적으로 점검할 때

  - 에러 메시지, 빈 상태(empty state), 로딩 텍스트의 UX를 개선할 때

  - 다국어/현지화 지원을 준비하거나 검증할 때

  - 브랜드 톤앤보이스 일관성을 확인할 때


  ## 구현 방법

  - 에러 메시지 감사: 원인 + 구체적 해결 방법이 포함되었는지 확인

  예: "네트워크 오류" → "인터넷 연결을 확인하고 다시 시도해 주세요"

  - CTA 버튼 텍스트: 동작을 명확히 표현하는지 검증 ("확인" → "결제하기")

  - 빈 상태: 안내 텍스트 + 다음 행동 유도가 포함되었는지 확인

  - 전문 용어: 사용자 친화적 대체어 또는 괄호 설명이 있는지 확인

  - 톤앤보이스: 브랜드 가이드 기준으로 전체 텍스트 일관성 점검

  - 마이크로카피: 툴팁, placeholder, 라벨, 도움말의 유용성 검증

  - 다국어: 번역 누락, 하드코딩된 텍스트, 날짜/통화 형식 현지화 확인


  ## 주의사항

  - 개발자 용어(404, null, exception)를 사용자 메시지에 노출 금지

  - placeholder 텍스트("Lorem ipsum", "TODO") 프로덕션 배포 전 전수 검사

  - 톤앤보이스 가이드 없이 각자 임의로 작성하면 브랜드 일관성 파괴

  - 에러 메시지에 민감 정보(쿼리, 스택트레이스) 노출 여부도 함께 점검

  - 콘텐츠 감사는 일회성이 아닌 주기적(분기 1회) 프로세스로 운영

  '
