content: "경쟁 분석 자기 검증 체크리스트 (분석 완성 후 반드시 실행):\n\n### 왜 경쟁 분석 검증이 필요한가?\n경쟁 분석은 확증편향에\
  \ 가장 취약한 작업이다. 무의식적으로\n우리 제품에 유리한 정보만 수집하거나, 경쟁사를 과소평가하는\n경향이 있다. 체계적 검증으로 객관성을\
  \ 확보해야 한다.\n\n### 데이터 신뢰성 검증\n- [ ] 모든 수치(MAU, 다운로드 수, 매출)에 출처가 있는가?\n- [ ] 출처 없는\
  \ 수치에 [추정치] 또는 [검증 필요] 태그가 있는가?\n- [ ] 인용한 기업/서비스가 실제로 존재하는가? (AI 환각 체크)\n- [ ]\
  \ 앱스토어 리뷰, 공식 웹사이트 등 공개 데이터에 기반하는가?\n- [ ] 1년 이상 된 데이터에 시점이 명시되어 있는가?\n\n### 균형성\
  \ 검증\n- [ ] 경쟁사의 장점과 단점이 균형 있게 제시되는가?\n  → 장점만 3개, 단점 0개인 경쟁사가 있다면 재분석\n- [ ] 우리\
  \ 제품의 약점도 솔직하게 인정되어 있는가?\n- [ ] \"우리가 무조건 이긴다\"는 톤이 없는가?\n- [ ] 경쟁사가 우리보다 나은 점을\
  \ 최소 1개 이상 식별했는가?\n\n### 분석 범위 검증\n- [ ] 직접 경쟁사가 3-5개 범위 내인가? (3개 미만이면 시장 조사 부족)\n\
  - [ ] 간접 경쟁사/대체재가 포함되어 있는가? (엑셀, 수기, 무소비 등)\n- [ ] 포지셔닝 맵의 축이 고객 관점에서 의미 있는 기준인가?\n\
  \  → \"기능 많음 vs 기능 적음\"은 고객 가치가 아닐 수 있다\n  → \"사용 편의성 vs 기능 깊이\" 같은 트레이드오프 축이 더\
  \ 유용\n- [ ] 포지셔닝 맵에 빈 사분면(기회 영역)이 식별되었는가?\n\n### Porter 5 Forces 검증 (해당 시)\n- [\
  \ ] 5개 Force 모두 분석되어 있는가?\n- [ ] 각 Force에 높/중/낮 수준과 구체적 근거가 있는가?\n- [ ] 종합 판단이 개별\
  \ Force 분석과 일관성이 있는가?\n- [ ] 대체재 분석에 비전통적 경쟁(엑셀, 카톡 등)이 포함되어 있는가?\n\n### SWOT 검증\
  \ (해당 시)\n- [ ] 내부 요인(S/W)과 외부 요인(O/T)이 구분되어 있는가?\n- [ ] 각 사분면에 3-5개 항목이 있는가?\n\
  - [ ] Strength가 실제 검증 가능한 역량인가? (희망사항이 아닌가?)\n- [ ] Threat에 현실적이고 구체적인 위협이 포함되어\
  \ 있는가?\n\n### 전략적 연결 검증\n- [ ] 차별화 기회가 실제 고객 불만(리뷰)에서 도출되었는가?\n- [ ] 진입 전략이 분석 결과와\
  \ 논리적으로 연결되는가?\n- [ ] 경쟁사 예상 대응이 고려되어 있는가?\n\n### 검증 실패 시 조치\n- 데이터 신뢰성 미통과: 해당\
  \ 수치 제거하거나 [추정치] 태그 추가\n- 균형성 미통과: 경쟁사 장점과 우리 약점을 추가 분석\n- 분석 범위 미통과: 누락된 경쟁사/대체재\
  \ 추가\n- 전략 연결 미통과: 분석 → 전략 논리 재구성\n"
