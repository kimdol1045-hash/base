content: "Blue Ocean Strategy & Value Curve (경쟁 없는 새로운 시장 공간을 창출한다):\n\n### 왜 Blue\
  \ Ocean인가?\nRed Ocean(기존 시장)에서 경쟁사와 같은 축으로 싸우면\n가격 경쟁과 기능 군비 경쟁에 빠진다. Blue Ocean\
  \ 전략은\n경쟁의 축 자체를 바꿔서 \"경쟁이 무의미한\" 새로운 시장을 만든다.\n\n### 가치 곡선(Value Curve) 작성법\n\n\
  **Step 1: 경쟁 요소 식별**\n산업 내에서 경쟁이 일어나는 핵심 요소를 나열한다 (6-10개):\n- 현재 경쟁사들이 투자하는 요소\n\
  - 고객이 비교할 때 사용하는 기준\n- 예시 (프로젝트 관리 도구): 기능 수, 가격, 사용 편의성, 커스터마이징,\n  통합(Integration)\
  \ 수, 디자인, 협업 기능, 모바일 지원, 보안, 온보딩\n\n**Step 2: 가치 곡선 그리기**\n각 경쟁 요소에 대해 경쟁사와 우리의\
  \ 수준을 1-5로 평가:\n\n```\n높음 5 │     *           *\n     4 │   * │ *       * │\n  \
  \   3 │ * │ │ │ *   * │ │ *\n     2 │ │ │ │ │ │ * │ │ │ │\n낮음 1 │ │ │ │ │ │ │ │\
  \ │ │ │\n       └─┴─┴─┴─┴─┴─┴─┴─┴─┴─\n        가 사 커 통 디 협 모 보 온 기\n        격 용 스\
  \ 합 자 업 바 안 보 능\n          편 터   인   일   딩 수\n          의 마       지\n          성\
  \ 이       원\n             징\n\n── 경쟁사 A  -- 경쟁사 B  ** 우리 제품\n```\n\n**Step 3: 전략\
  \ 캔버스 분석**\n- 곡선이 겹치는 부분: Red Ocean (동일한 방식으로 경쟁 중)\n- 곡선이 분리되는 부분: 차별화 기회\n- 모든\
  \ 경쟁사가 높은 부분: 과잉 투자 가능성 (줄일 기회)\n- 모든 경쟁사가 낮은 부분: Underserved 기회\n\n### ERRC 프레임워크\
  \ (제거-감소-증가-창조)\n\n가치 곡선의 형태를 바꾸는 4가지 액션:\n\n| 액션 | 정의 | 질문 |\n|------|------|------|\n\
  | **Eliminate** (제거) | 업계 당연시하지만 실제로 불필요한 요소 | \"이 기능이 정말 사용자에게 가치가 있는가?\" |\n|\
  \ **Reduce** (감소) | 업계 표준 이하로 낮춰도 되는 요소 | \"과잉 투자하고 있는 요소는?\" |\n| **Raise** (증가)\
  \ | 업계 표준 이상으로 올려야 하는 요소 | \"고객이 타협하고 있는 것은?\" |\n| **Create** (창조) | 업계에 없던 완전히\
  \ 새로운 요소 | \"제공된 적 없는 가치는?\" |\n\n### ERRC 템플릿\n```\n┌─────────────────────┬─────────────────────┐\n\
  │ Eliminate (제거)     │ Raise (증가)         │\n│                     │           \
  \          │\n│ - _____________     │ - _____________     │\n│ - _____________ \
  \    │ - _____________     │\n│ - _____________     │ - _____________     │\n├─────────────────────┼─────────────────────┤\n\
  │ Reduce (감소)       │ Create (창조)        │\n│                     │            \
  \         │\n│ - _____________     │ - _____________     │\n│ - _____________  \
  \   │ - _____________     │\n│ - _____________     │ - _____________     │\n└─────────────────────┴─────────────────────┘\n\
  ```\n\n### DO/DON'T 예시\n\n**DO (밀키트 서비스 예시):**\n- Eliminate: 오프라인 매장 운영 → 온라인 전용으로\
  \ 비용 구조 혁신\n- Reduce: 메뉴 다양성 (100개→15개) → 큐레이션으로 선택 피로 감소\n- Raise: 조리 편의성 (전처리\
  \ 수준을 업계 최고로)\n- Create: \"15분 요리 보장\" → 시간 약속이라는 새로운 가치 축\n\n**DON'T:**\n- \"모든\
  \ 요소를 다 올린다\" → 그것은 Blue Ocean이 아니라 비용 증가\n- \"경쟁사가 하는 것을 더 잘한다\" → Red Ocean 접근\n\
  - Eliminate/Reduce 없이 Raise/Create만 나열\n  → 반드시 줄이는 것이 있어야 집중이 가능\n\n### 가치 곡선 비교표\
  \ 템플릿\n| 경쟁 요소 | 경쟁사A | 경쟁사B | 경쟁사C | 우리(AS-IS) | 우리(TO-BE) | ERRC |\n|-----------|---------|---------|---------|-------------|-------------|------|\n\
  | 요소1 | 3 | 4 | 3 | - | 1 | Eliminate |\n| 요소2 | 4 | 4 | 5 | - | 2 | Reduce |\n\
  | 요소3 | 2 | 3 | 2 | - | 5 | Raise |\n| 요소4 | 0 | 0 | 0 | - | 4 | Create |\n\n###\
  \ 주의사항\n- 경쟁 요소는 고객 관점에서 선정 (기술 내부 요소가 아닌 사용자 가치)\n- \"우리만의 새로운 축\"이 최소 1개는 있어야\
  \ Blue Ocean\n- ERRC 4가지 중 최소 3가지는 채워야 전략적 의미가 있음\n- 가치 곡선의 점수는 주관적이므로 \"[팀 합의 기반]\"\
  \ 명시\n"
