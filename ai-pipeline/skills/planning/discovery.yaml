content: '# 디스커버리 가이드


  ## 핵심 원칙

  - 솔루션이 아닌 문제에서 출발

  - 최소 5명 이상 고객 인터뷰로 패턴 확인

  - 가정(Assumption)을 명시하고 검증

  - 정성 + 정량 데이터 결합


  ## 디스커버리 프로세스

  1. **기회 발굴**: 고객 피드백, 데이터, 시장 트렌드

  2. **문제 정의**: JTBD, 5 Whys로 근본 문제 도출

  3. **고객 인터뷰**: 비유도적 질문으로 맥락 파악

  4. **가설 수립**: "~라면 ~일 것이다" 형태

  5. **실험 설계**: 가장 빠르게 가설을 검증하는 방법

  6. **프로토타입**: 최소 비용 검증 도구 제작

  7. **검증**: 실험 결과 → 피봇 또는 진행


  ## 인터뷰 기법

  - 열린 질문: "어떻게 하셨나요?" (O) / "좋았나요?" (X)

  - 과거 행동: "마지막으로 ~한 적이 언제인가요?"

  - 감정 탐색: "그때 어떤 느낌이었나요?"

  - 5 Whys: 표면 답변의 근본 원인 탐색


  ## 가설 검증 방법 (비용 순)

  | 방법 | 비용 | 신뢰도 |

  |------|------|--------|

  | 데스크 리서치 | 최저 | 낮음 |

  | 고객 인터뷰 | 낮음 | 중간 |

  | 랜딩 페이지 | 중간 | 중간 |

  | 프로토타입 | 중간 | 높음 |

  | MVP | 높음 | 높음 |


  ## DO

  - 주 1회 이상 고객과 대화하는 루틴 구축

  - 인터뷰 녹취록을 팀 전체와 공유


  ## DON''T

  - 고객이 "원하는 기능"을 그대로 만들지 않기

  - 인터뷰에서 자사 솔루션을 유도하지 않기

  - 5명 미만 인터뷰로 패턴을 일반화하지 않기

  '
