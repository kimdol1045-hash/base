bloom_level: ANALYZE
content: "# Opportunity Solution Tree 가이드\n\n## 핵심 원칙\n- 결과(Outcome)에서 시작하여 역순으로 탐색\n\
  - 기회(Opportunity)는 고객의 니즈/페인/욕구\n- 하나의 기회에 여러 솔루션을 탐색\n- 실험으로 솔루션 검증 후 구현\n\n##\
  \ OST 구조\n```\n비즈니스 목표 (Desired Outcome)\n├── 기회 1 (Customer Need)\n│   ├── 솔루션\
  \ A\n│   │   └── 실험 A-1\n│   └── 솔루션 B\n│       └── 실험 B-1\n├── 기회 2\n│   ├── 솔루션\
  \ C\n│   └── 솔루션 D\n└── 기회 3\n    └── 솔루션 E\n```\n\n## 작성 프로세스\n1. **Outcome 정의**:\
  \ 팀의 분기 목표 (OKR의 KR)\n2. **기회 발굴**: 고객 인터뷰에서 니즈/페인 추출\n3. **기회 구조화**: 상위/하위 기회로\
  \ 계층화\n4. **기회 선택**: 영향도 x 빈도로 우선순위\n5. **솔루션 발상**: 선택된 기회에 3개 이상 솔루션\n6. **실험 설계**:\
  \ 가장 빠르게 검증할 방법\n7. **반복**: 실험 결과로 트리 업데이트\n\n## DO\n- 주간 디스커버리 미팅에서 OST 업데이트\n\
  - 기회를 고객의 언어로 표현\n- 솔루션 편향 방지: 기회부터 충분히 탐색\n\n## DON'T\n- 솔루션에서 시작하여 기회를 역추적하지 않기\n\
  - 기회 탐색 없이 바로 솔루션 구현하지 않기\n- OST를 한 번 만들고 방치하지 않기\n"
