content: "애자일 + 스크럼 (변화에 대응하는 반복적 개발 프레임워크):\n\n### 애자일 선언문 4가지 핵심 가치\n1. 프로세스와 도구보다\
  \ **개인과 상호작용**을 중시한다\n2. 포괄적 문서보다 **작동하는 소프트웨어**를 중시한다\n3. 계약 협상보다 **고객과의 협력**을\
  \ 중시한다\n4. 계획을 따르기보다 **변화에 대응**하는 것을 중시한다\n\n### 12원칙 핵심 요약 (실무 적용 관점)\n- **조기 +\
  \ 지속적 전달**: 2주마다 동작하는 소프트웨어를 전달한다\n- **변화 환영**: 후반부 요구사항 변경도 경쟁 우위를 위해 수용한다\n- **자기\
  \ 조직화 팀**: 최고의 설계와 아키텍처는 자기 조직화 팀에서 나온다\n- **지속 가능한 속도**: 일정한 속도를 무한히 유지할 수 있어야\
  \ 한다\n- **정기적 회고**: 팀은 정기적으로 효율성을 개선할 방법을 숙고하고 조율한다\n\n### 스크럼 프레임워크 (2주 스프린트 기준)\n\
  ```\n스프린트 구조:\nDay 0 (월): 스프린트 플래닝 (2-4시간)\nDay 1-8:    개발 + 데일리 스크럼 (매일 15분)\n\
  Day 9 (금): 스프린트 리뷰 (1시간) + 회고 (1시간)\n\n역할:\n- Product Owner: 백로그 우선순위 결정, 스토리 수락/거절\n\
  - Scrum Master: 장애물 제거, 프로세스 코칭\n- Dev Team: 자기 조직화, 스프린트 목표 달성\n\n산출물:\n- Product\
  \ Backlog: PO가 관리하는 전체 요구사항 목록\n- Sprint Backlog: 이번 스프린트에서 수행할 항목\n- Increment:\
  \ 스프린트 종료 시 잠재적으로 출시 가능한 제품\n```\n\n### 백로그 그루밍 (Refinement)\n스프린트 중간에 1-2시간 진행.\
  \ 다음 스프린트 준비:\n```\n그루밍 체크리스트:\n- [ ] 스토리가 INVEST 기준을 충족하는가?\n      I: Independent\
  \ (독립적)\n      N: Negotiable (협상 가능)\n      V: Valuable (가치 있음)\n      E: Estimable\
  \ (추정 가능)\n      S: Small (작은 단위)\n      T: Testable (테스트 가능)\n- [ ] 수락 기준(Acceptance\
  \ Criteria)이 명확한가?\n- [ ] 기술적 의존성이 파악되었는가?\n- [ ] Story Point 추정이 완료되었는가?\n```\n\
  \n### 회고 (Retrospective) 형식\n```\n형식: Start / Stop / Continue\n\nStart (새로 시작할 것):\n\
  - \"PR 크기를 300줄 이하로 제한하자\"\n\nStop (그만할 것):\n- \"금요일 오후에 새로운 기능 개발 시작하는 것\"\n\n\
  Continue (계속할 것):\n- \"데일리 스크럼에서 블로커 먼저 공유하는 것\"\n\n액션 아이템 (최대 3개, 담당자 + 기한 명시):\n\
  - [ ] [담당] [기한]: [구체적 액션]\n```\n\n### DO / DON'T\nDO: \"이번 스프린트 velocity가 20SP였으므로,\
  \ 다음 스프린트도\n     20SP 이내로 계획한다. 버퍼 포함 시 16SP를 목표로 한다.\"\nDON'T: \"팀이 열심히 하면 30SP도\
  \ 가능하다\"\n       → 지속 가능한 속도를 초과하는 계획은 번아웃과 품질 저하를 유발한다\n"
