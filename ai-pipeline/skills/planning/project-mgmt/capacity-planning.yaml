theory: 용량 계획(Capacity Planning)은 팀의 가용 리소스를 파악하고 업무량과 균형을 맞추는 프로세스이다. 이론적 용량의 60-70%를
  계획 가능 용량으로 산정하는 것이 현실적이며, 지속 가능한 페이스 유지가 핵심이다.
