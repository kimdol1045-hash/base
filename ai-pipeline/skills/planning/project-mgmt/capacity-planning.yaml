content: '# 용량 계획 가이드


  ## 핵심 원칙

  - 팀 용량 = 인원 x 가용 시간 x 집중도(0.6-0.7)

  - 계획된 업무 + 비계획 업무(20-30%) 고려

  - 지속 가능한 페이스: 크런치 모드는 단기만 허용

  - 데이터 기반: 과거 벨로시티로 미래 예측


  ## 용량 산출 공식

  | 항목 | 계산 |

  |------|------|

  | 이론 용량 | 인원 x 근무일 x 8시간 |

  | 가용 용량 | 이론 - 휴가 - 교육 - 회의 |

  | 계획 용량 | 가용 x 0.7 (집중도) |

  | 예비(Buffer) | 가용 x 0.2 (버그, 긴급) |

  | 개선(Kaizen) | 가용 x 0.1 (기술 부채) |


  ## 계획 프로세스

  1. 팀원별 가용 시간 확인 (휴가, 교육 차감)

  2. 과거 3스프린트 벨로시티 평균 산출

  3. 벨로시티 기반 스프린트 용량 설정

  4. 우선순위 순으로 태스크 배정 (용량 내)

  5. 비계획 업무 버퍼 확보


  ## DO

  - 스프린트 시작 전 팀원별 가용 시간 확인

  - 벨로시티 트렌드를 장기적으로 추적

  - 과잉 할당(Over-allocation) 경고 시스템


  ## DON''T

  - 100% 용량으로 계획하지 않기 (여유 없으면 지연)

  - 개인 벨로시티로 비교/평가하지 않기

  - 벨로시티를 인위적으로 높이려 하지 않기

  '
