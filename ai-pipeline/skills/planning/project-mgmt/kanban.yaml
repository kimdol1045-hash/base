content: "칸반 (WIP 제한을 통한 흐름 최적화):\n\n### 왜 칸반인가?\n작업을 시작하기는 쉽지만 완료하기는 어렵다. WIP(Work\
  \ In Progress) 제한이\n없으면 모든 사람이 여러 작업을 동시에 시작하고, 어떤 것도 완료하지 못하는\n상태에 빠진다. 칸반은 \"\
  시작한 것을 먼저 끝내라\"는 원칙을 시스템으로 강제한다.\n\n### 칸반 보드 기본 구조\n```\n| Backlog | Todo | In\
  \ Progress | Review | Done |\n|         | (∞)  | (WIP: 3)    | (WIP: 2)| (∞) |\n\
  |---------|------|-------------|---------|------|\n|         |      |          \
  \   |         |      |\n```\n\n### WIP 제한 설정 기준\n팀 규모와 역할에 따른 WIP 제한 가이드라인:\n```\n\
  공식: WIP Limit = 팀원 수 × (1.0 ~ 1.5)\n\n예시:\n- 개발자 3명 → In Progress WIP: 3~4\n- 리뷰어\
  \ 2명 → Review WIP: 2~3\n- 1인 프로젝트 → In Progress WIP: 2 (컨텍스트 스위칭 최소화)\n\nWIP 초과\
  \ 시 규칙:\n1. 새 작업을 시작하지 않는다\n2. 다른 사람의 진행 중인 작업을 돕는다 (특히 리뷰)\n3. 블로커가 있는 작업을 해결한다\n\
  ```\n\n### 핵심 메트릭: 사이클 타임 (Cycle Time)\n```\n사이클 타임 = 작업 시작 시점 ~ 작업 완료 시점\n\n측정\
  \ 방법:\n- 각 카드에 \"시작일\"과 \"완료일\" 기록\n- 주 단위로 평균 사이클 타임 추적\n- 사이클 타임 추이 차트로 개선 여부\
  \ 확인\n\n예시:\n| 주차 | 완료 항목 | 평균 사이클 타임 | WIP 준수율 |\n|------|-----------|------------------|------------|\n\
  | W1   | 5개       | 4.2일            | 80%        |\n| W2   | 7개       | 3.1일   \
  \         | 95%        |\n| W3   | 8개       | 2.8일            | 100%       |\n→\
  \ WIP 준수율이 올라갈수록 사이클 타임이 단축된다\n```\n\n### 칸반 컬럼별 규칙\n- **Backlog**: 우선순위 정렬, 상위\
  \ 10개만 유지 (나머지는 아이스박스)\n- **Todo**: 다음으로 착수할 작업. 완료 정의(DoD)가 명확한 것만 진입\n- **In Progress**:\
  \ 활발히 작업 중. WIP 제한 엄격 적용\n- **Review**: 코드 리뷰/QA 대기. 24시간 내 리뷰 완료 목표\n- **Done**:\
  \ 완료 정의를 모두 충족한 항목\n\n### DO / DON'T\nDO: \"In Progress가 WIP 한도에 도달했으므로, 새 작업 대신\n\
  \     Review 컬럼의 PR 리뷰를 먼저 진행한다\"\nDON'T: \"급해서 WIP 제한을 일시적으로 해제한다\"\n       → 한\
  \ 번 해제하면 규칙이 무너진다. 정말 필요하면 팀 합의 후 WIP 수를 조정\n\n### 스크럼과의 차이점\n| 항목 | 스크럼 | 칸반 |\n\
  |------|--------|------|\n| 주기 | 고정 스프린트 (2주) | 연속 흐름 |\n| 역할 | 스크럼 마스터, PO | 명시적\
  \ 역할 없음 |\n| 변경 | 스프린트 중 변경 불가 | 언제든 우선순위 변경 가능 |\n| 핵심 제약 | 타임박스 | WIP 제한 |\n"
