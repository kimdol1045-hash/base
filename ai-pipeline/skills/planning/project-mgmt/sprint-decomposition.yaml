content: "스프린트 분해 패턴 (유저 스토리를 실행 가능한 태스크로 분해하고 추정한다):\n\n### 분해 흐름\n```\nEpic (대규모\
  \ 기능)\n  → User Story (사용자 가치 단위)\n    → Task (개발 작업 단위, 최대 1일)\n      → Sub-task\
  \ (필요 시)\n```\n\n### 1. User Story → Task 분해\n\nDO:\n```\nUser Story: \"사용자로서 소셜\
  \ 로그인을 통해 간편하게 가입할 수 있다\"\nAcceptance Criteria:\n- Google OAuth 로그인 가능\n- 신규 유저\
  \ 자동 생성\n- 기존 이메일과 자동 연결\n- 프로필 이미지 동기화\n\nTask 분해:\n┌────┬──────────────────────────────┬────┬──────────┐\n\
  │ #  │ Task                          │ SP │ 담당     │\n├────┼──────────────────────────────┼────┼──────────┤\n\
  │ 1  │ Google OAuth Provider 설정    │ 1  │ Backend  │\n│ 2  │ OAuth 콜백 API 구현   \
  \        │ 2  │ Backend  │\n│ 3  │ 유저 생성/연결 로직           │ 3  │ Backend  │\n│ 4\
  \  │ 프로필 이미지 동기화          │ 2  │ Backend  │\n│ 5  │ 소셜 로그인 버튼 UI           │ 1 \
  \ │ Frontend │\n│ 6  │ 로그인 플로우 통합 테스트     │ 2  │ QA       │\n└────┴──────────────────────────────┴────┴──────────┘\n\
  합계: 11 SP\n```\n\n### 2. Story Point 추정 기준 (Fibonacci)\n\n| SP | 기준 | 예시 |\n|----|------|------|\n\
  | 1 | 설정 변경, 환경변수 추가 | ENV 추가, 패키지 설치 |\n| 2 | 단순 CRUD, UI 컴포넌트 | 목록 조회 API, 버튼\
  \ 컴포넌트 |\n| 3 | 표준 기능, 비즈니스 로직 포함 | 폼 유효성 + API 연동 |\n| 5 | 복잡한 통합, 외부 API 연동 |\
  \ OAuth, 결제 연동 |\n| 8 | 불확실성 높음, Spike 필요 | 실시간 동기화, 복잡한 마이그레이션 |\n| 13 | 스토리 분할\
  \ 필요 (너무 큼) | 이 크기는 2-3개 스토리로 분리 |\n\n**규칙: 8SP 이상이면 Spike 태스크를 먼저 배정하여 불확실성을 제거한다.**\n\
  \n### 3. Sprint Capacity Planning\n\n```\n팀 구성: 개발자 4명\n스프린트: 2주 (10 영업일)\nFocus\
  \ Factor: 0.7 (미팅, 코드리뷰, 장애 대응 등 30% 차감)\n\n가용 capacity = 4명 × 10일 × 0.7 = 28 person-days\n\
  Velocity (과거 3스프린트 평균): 24 SP\n\n이번 스프린트 계획: 24 SP 이내\n버퍼: 20% (약 5SP)를 기술 부채/버그\
  \ 수정에 예약\n실 투입: 19 SP의 새 기능\n```\n\n### 4. Spike 태스크 (탐색/학습)\n\n```typescript\n\
  // ✅ Spike 정의 예시\n// Title: [Spike] WebSocket 기반 실시간 알림 기술 검토\n// Time-box: 2일 (최대)\n\
  // 목표: 기술 선택 + POC + 추정 가능한 수준의 이해\n// 산출물:\n//   - 기술 비교표 (Socket.io vs Pusher\
  \ vs SSE)\n//   - POC 코드 (연결/메시지 수신 확인)\n//   - 구현 스토리 분해 + SP 추정\n\n// Spike 완료\
  \ 후 → 본 스토리의 SP 추정이 가능해진다\n```\n\n### 5. Definition of Done (완료 정의)\n\n```\n개별 Task\
  \ 완료 기준:\n- [ ] 코드 작성 완료 + 셀프 리뷰\n- [ ] 유닛 테스트 작성 (커버리지 80%+)\n- [ ] PR 생성 + 1명\
  \ 이상 리뷰 승인\n- [ ] CI 파이프라인 통과 (lint, test, build)\n- [ ] 스테이징 환경 배포 확인\n\nUser Story\
  \ 완료 기준:\n- [ ] 모든 Task 완료\n- [ ] Acceptance Criteria 전체 충족\n- [ ] QA 테스트 통과\n-\
  \ [ ] PO 수락 (데모)\n```\n\nDON'T:\n```\n❌ 2일 이상 걸리는 태스크:\n\"OAuth 전체 구현\" (5일) → 분할:\
  \ Provider 설정(1일) + 콜백 API(1일) + ...\n태스크가 2일을 초과하면 반드시 분할한다\n\n❌ Acceptance Criteria\
  \ 없는 스토리:\n\"로그인 기능 개선\" → 무엇이 \"개선\"인지 정의 없음\n→ \"Google OAuth 추가, 기존 이메일과 자동 연결\"\
  \ 명시\n\n❌ 추정 패딩:\n\"혹시 모르니까 5SP에 3SP 더 붙여서 8SP\"\n→ 불확실하면 Spike로 분리. 추정은 정직하게.\n\
  \n❌ Velocity 무시한 계획:\n과거 평균 24SP인데 이번에 40SP 계획\n→ 지속 가능한 속도 유지. velocity ±10% 범위\
  \ 내 계획.\n```\n"
