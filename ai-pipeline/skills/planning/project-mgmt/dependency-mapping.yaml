bloom_level: ANALYZE
content: '# 의존성 매핑 가이드


  ## 핵심 원칙

  - 의존성은 프로젝트 지연의 1순위 원인

  - 내부 의존성(팀 간)과 외부 의존성(서드파티) 구분

  - 크리티컬 패스 위의 의존성 우선 관리

  - 의존성을 줄이는 것이 최선의 관리


  ## 의존성 유형

  | 유형 | 설명 | 예시 |

  |------|------|------|

  | 완료-시작(FS) | A 완료 후 B 시작 | API 완성 → FE 연동 |

  | 시작-시작(SS) | A 시작 후 B 시작 가능 | 설계 시작 → 개발 시작 |

  | 완료-완료(FF) | A 완료 전 B 미완료 | 코드 완료 → 테스트 완료 |

  | 외부 | 외부 팀/서비스 의존 | 결제 API 승인 대기 |


  ## 매핑 프로세스

  1. 모든 태스크를 목록화

  2. 태스크 간 의존 관계 식별 (입력-출력 분석)

  3. 의존성 그래프(DAG) 시각화

  4. 크리티컬 패스 식별 (최장 경로)

  5. 의존성별 리스크 평가

  6. 완화 전략 수립 (병렬화, 버퍼, 목업)


  ## 의존성 완화 전략

  - 인터페이스 사전 합의 → 병렬 개발

  - 목(Mock) 서비스로 외부 의존성 격리

  - 일정에 버퍼 추가 (크리티컬 패스 +20%)

  - 의존성 담당자 지정 + 주간 체크인


  ## DO

  - 스프린트 계획 시 의존성 명시적 확인

  - 의존성 보드를 팀 전체 가시화

  - 외부 의존성에 가장 큰 일정 버퍼 부여


  ## DON''T

  - 의존성을 구두로만 합의하지 않기 (문서화 필수)

  - 크리티컬 패스 위 태스크를 유연하게 일정 조정하지 않기

  - 모든 의존성을 동일 우선순위로 관리하지 않기

  '
