content: '# GTM(Go-to-Market) 전략 가이드


  ## 핵심 원칙

  - 제품-시장 적합성(PMF) 확인 후 스케일

  - 크로스 펑셔널 정렬: 제품, 마케팅, 세일즈, CS

  - 단계적 런칭: 베타 → 소프트 런칭 → 정식 런칭

  - 런칭은 시작이지 끝이 아님 (런칭 후 최적화)


  ## GTM 프레임워크

  1. **타겟 시장**: ICP(Ideal Customer Profile) 정의

  2. **가치 제안**: 핵심 메시지 + 포지셔닝

  3. **가격 전략**: 경쟁 기반, 가치 기반, 비용 기반

  4. **채널 전략**: 직접(세일즈), 간접(파트너), 셀프서비스

  5. **마케팅 계획**: 인지 → 리드 → 전환 캠페인

  6. **세일즈 인에이블먼트**: 피치 덱, 데모, 객체 처리

  7. **성공 지표**: 런칭 후 30/60/90일 목표


  ## 런칭 타임라인

  | 시기 | 활동 |

  |------|------|

  | -4주 | 메시지, 콘텐츠, 에셋 준비 |

  | -2주 | 내부 트레이닝, 프리뷰 |

  | -1주 | 사전 알림, 카운트다운 |

  | D-Day | 공식 발표, 프레스 릴리즈 |

  | +1주 | 피드백 수집, 이슈 대응 |

  | +4주 | 성과 분석, 최적화 |


  ## DO

  - ICP를 데이터 기반으로 구체적으로 정의

  - 내부 팀(CS, 세일즈)을 먼저 교육

  - 런칭 후 첫 2주 집중 모니터링


  ## DON''T

  - PMF 검증 없이 대규모 런칭하지 않기

  - 마케팅만 하고 세일즈 준비 없이 런칭하지 않기

  - 런칭 후 "다음 기능"으로 바로 넘어가지 않기

  '
