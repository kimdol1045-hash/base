theory: 가격 전략은 제품의 수익화 방식을 결정하는 핵심 비즈니스 레버이다. 가치 기반 가격(Value-based Pricing)이 비용 기반이나
  경쟁 기반보다 수익성이 높으며, Van Westendorp PSM이 대표적 가격 감도 측정 방법이다.
