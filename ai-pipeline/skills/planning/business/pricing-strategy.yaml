content: '# 가격 전략 가이드


  ## 핵심 원칙

  - 가치 기반 가격: 고객이 인지하는 가치에 연동

  - 가격은 기능이 아닌 결과(Outcome)에 기반

  - 세그먼트별 차등 가격으로 수익 최대화

  - 단순한 가격 구조가 전환율을 높임


  ## 가격 모델 유형

  | 모델 | 특징 | 적합 |

  |------|------|------|

  | 정액제 | 고정 월/연 요금 | 단순 SaaS |

  | 사용량 기반 | 사용한 만큼 과금 | API, 인프라 |

  | 좌석(Seat) 기반 | 사용자 수 x 단가 | 협업 도구 |

  | 프리미엄 | 무료 + 유료 | PLG 제품 |

  | 하이브리드 | 기본료 + 사용량 | 성장형 SaaS |


  ## 가격 설정 프로세스

  1. 고객 세그먼트별 WTP(Willingness to Pay) 조사

  2. 경쟁사 가격 벤치마킹

  3. 원가 분석 (마진율 최소 70% 목표)

  4. 가격 감도 분석 (Van Westendorp PSM)

  5. A/B 테스트 또는 코호트 테스트

  6. 런칭 후 데이터 기반 조정


  ## 플랜 설계 원칙

  - 3가지 플랜 (Good-Better-Best)

  - 중간 플랜을 가장 매력적으로 설계 (앵커링)

  - 연간 결제 할인 (15-20%)

  - 무료 플랜은 유료 전환의 관문


  ## DO

  - 가격을 정기적으로 재검토 (연 1회 이상)

  - 기존 고객 그랜드파더링 정책 명확히

  - 가격 변경의 고객 커뮤니케이션 계획 수립


  ## DON''T

  - 경쟁사 가격만 따라가지 않기

  - 무료 플랜을 너무 관대하게 설정하지 않기

  - 가격 인상 없이 기능만 추가하지 않기

  '
