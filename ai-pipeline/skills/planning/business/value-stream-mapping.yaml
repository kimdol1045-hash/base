bloom_level: ANALYZE
content: '# 가치 흐름 매핑 가이드


  ## 핵심 원칙

  - 전체 흐름을 시각화하여 병목과 낭비 식별

  - 리드 타임(전체 시간)과 프로세스 타임(실작업 시간) 구분

  - 현재 상태(As-Is) → 미래 상태(To-Be) 순서

  - 고객 관점의 가치 중심 평가


  ## VSM 프로세스

  1. **범위 정의**: 시작점과 끝점 결정

  2. **현재 상태 매핑**: 모든 단계, 시간, 대기 기록

  3. **데이터 수집**: 각 단계의 리드타임, 완료율

  4. **낭비 식별**: 7가지 낭비 유형으로 분류

  5. **미래 상태 설계**: 낭비 제거, 흐름 최적화

  6. **개선 계획**: 우선순위별 실행


  ## 소프트웨어 개발 VSM

  | 단계 | 리드타임 예시 | 프로세스 타임 |

  |------|-------------|-------------|

  | 요구사항 정의 | 5일 | 4시간 |

  | 설계 | 3일 | 6시간 |

  | 개발 | 5일 | 20시간 |

  | 코드 리뷰 | 2일 | 2시간 |

  | QA | 3일 | 4시간 |

  | 배포 | 1일 | 30분 |


  ## 7가지 낭비

  대기, 과잉 생산, 운반, 과잉 처리, 재고, 동작, 결함


  ## DO

  - 실제 데이터로 각 단계의 시간 측정

  - 대기 시간(큐 타임)에 특히 주목

  - 개선 효과를 정량적으로 추적


  ## DON''T

  - 이상적 프로세스를 매핑하지 않기 (있는 그대로)

  - 한 번에 모든 낭비를 제거하려 하지 않기

  - VSM을 만들고 실행하지 않기

  '
