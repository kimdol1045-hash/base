content: '# UX 라이팅 가이드


  ## 핵심 원칙

  - 명확성 우선: 사용자가 0.5초 안에 이해할 수 있어야 한다

  - 행동 지향: 사용자가 다음에 무엇을 해야 하는지 안내

  - 일관된 톤: 제품 전체에서 동일한 어투 유지

  - 공감 기반: 사용자의 감정 상태를 고려한 문구


  ## 작성 프로세스

  1. 사용자 맥락 파악 (어떤 화면, 어떤 상태)

  2. 목표 행동 정의 (클릭, 입력, 확인 등)

  3. 초안 작성 → 간결화 → 톤 조정

  4. 엣지 케이스 검토 (빈 상태, 에러, 로딩)


  ## DO

  - 버튼: 동사로 시작 ("저장하기", "다음으로 이동")

  - 에러 메시지: 원인 + 해결 방법 함께 제시

  - 빈 상태: 다음 행동을 유도하는 문구 사용

  - 로딩: 진행 상황을 구체적으로 안내


  ## DON''T

  - "오류가 발생했습니다" (원인 불명확)

  - "확인" 만 있는 버튼 (행동 불명확)

  - 기술 용어 노출 ("null", "undefined", "500 error")

  - 이중 부정 사용 ("취소하지 않으시겠습니까?")

  '
