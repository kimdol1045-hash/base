bloom_level: ANALYZE
content: '# 콘텐츠 전략 프레임워크


  ## 핵심 원칙

  - 비즈니스 목표와 콘텐츠 목표 정렬

  - 타겟 오디언스 페르소나 기반 기획

  - 콘텐츠 라이프사이클 전체를 관리

  - 데이터 기반 지속적 최적화


  ## 전략 수립 프로세스

  1. **현황 분석**: 기존 콘텐츠 인벤토리 + 감사

  2. **목표 설정**: SMART 기준의 콘텐츠 KPI

  3. **오디언스 리서치**: 페르소나 + 콘텐츠 니즈 매핑

  4. **채널 전략**: 어떤 콘텐츠를 어디에 배포할지

  5. **에디토리얼 캘린더**: 주제 + 일정 + 담당자

  6. **측정·개선**: 성과 분석 → 전략 조정


  ## DO

  - 콘텐츠 필러(Pillar) 3-5개를 먼저 정의

  - 각 콘텐츠에 퍼널 단계(인지→관심→전환→유지) 매핑

  - 재활용 가능한 에버그린 콘텐츠 비율 30% 이상 유지

  - 경쟁사 콘텐츠 갭 분석 분기별 실시


  ## DON''T

  - 채널부터 정하고 콘텐츠를 끼워 맞추지 않기

  - 양적 목표(월 N건)만 세우고 질적 기준 무시하지 않기

  - 제작에만 집중하고 배포·측정을 소홀히 하지 않기

  - 트렌드만 쫓아 브랜드 톤과 무관한 콘텐츠 남발하지 않기

  '
