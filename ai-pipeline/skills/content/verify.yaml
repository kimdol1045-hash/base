content: '콘텐츠 자기 검증:


  ## 필수 확인


  ### A. 구조

  - [ ] 결론/핵심이 첫 1-2문장에 있는가? (역피라미드)

  - [ ] 목적에 맞는 구조를 선택했는가? (문제-해결, 단계별, 비교, 원인-결과)

  - [ ] H2/H3 제목만 읽어도 전체 흐름이 파악되는가?

  - [ ] 논리적 흐름이 자연스러운가? (이전 섹션이 다음 섹션의 기반)


  ### B. 가독성

  - [ ] 문장이 30자 이내인가? (최대 50자)

  - [ ] 문단이 3-4문장 이내인가?

  - [ ] 능동태를 사용했는가?

  - [ ] 전문용어에 설명을 병기했는가?

  - [ ] 리스트, 표, 코드 블록 등 시각적 요소를 활용했는가?


  ### C. 정확성

  - [ ] 검증 불가능한 주장에 [출처 필요] 태그가 있는가?

  - [ ] 수치/데이터에 출처와 날짜가 있는가?

  - [ ] 코드 예시가 실제로 동작하는가? (복사-붙여넣기 테스트)

  - [ ] 링크가 유효한가?


  ## 권장 확인


  ### D. 목적 달성

  - [ ] 독자가 이 글을 읽고 다음 행동을 알 수 있는가?

  - [ ] CTA가 명확하고 구체적인가?

  - [ ] 타겟 독자 수준에 맞는 난이도인가?


  ### E. SEO 및 배포

  - [ ] 메타 디스크립션(160자 이내)이 작성되었는가?

  - [ ] 주요 키워드가 제목, 첫 문단, H2에 포함되었는가?

  - [ ] 이미지에 alt 텍스트가 있는가?

  '
