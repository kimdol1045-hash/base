bloom_level: ANALYZE
content: '# 톤 앤 보이스 설계 가이드


  ## 핵심 개념

  - **보이스**: 브랜드 정체성 (변하지 않음)

  - **톤**: 상황별 감정 조절 (맥락에 따라 변함)

  - 4차원 스펙트럼으로 위치 정의


  ## 톤 스펙트럼 (4축)

  1. 재미있는 ↔ 진지한

  2. 격식 있는 ↔ 캐주얼한

  3. 존중하는 ↔ 도발적인

  4. 열정적인 ↔ 사실적인


  ## 설계 프로세스

  1. 브랜드 가치 3-5개에서 보이스 키워드 도출

  2. 각 키워드에 "이것이다/이것이 아니다" 정의

  3. 상황별 톤 매트릭스 작성 (성공/에러/온보딩 등)

  4. 예시 문장 Before/After 작성

  5. 팀 전체 워크숍으로 합의 → 문서화


  ## DO

  - 보이스 속성마다 구체적 예문 3개 이상 제시

  - 상황별 톤 가이드 (에러, 축하, 안내, 경고) 별도 작성

  - 금지 표현 목록 (비속어, 전문용어, 클리셰) 관리

  - 신규 입사자 온보딩 자료에 톤 가이드 포함


  ## DON''T

  - 추상적 형용사만 나열 ("친근하고 전문적인")

  - 상황 구분 없이 단일 톤만 정의

  - 경쟁사 톤을 그대로 복제

  - 톤 가이드 작성 후 업데이트하지 않기

  '
