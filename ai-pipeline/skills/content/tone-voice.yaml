theory: 톤 앤 보이스는 브랜드의 성격을 텍스트로 표현하는 체계이다. 보이스(Voice)는 브랜드 정체성으로 일관되고, 톤(Tone)은 상황에
  따라 조절된다. NNGroup의 4차원 톤 모델(재미-진지, 격식-캐주얼, 존경-도발, 열정-사실)이 대표적이다.
