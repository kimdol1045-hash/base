bloom_level: APPLY
content: '# 도움말 문서 작성 가이드


  ## 핵심 원칙

  - 사용자의 문제 상황에서 출발 (기능 중심 X)

  - 단계별 안내로 누구나 따라할 수 있게

  - 검색 최적화: 사용자가 쓰는 단어로 제목 작성

  - 시각 자료(스크린샷, GIF) 필수 포함


  ## 문서 구조

  1. **제목**: 사용자 질문 형태 ("비밀번호를 변경하려면?")

  2. **요약**: 1-2문장으로 핵심 답변

  3. **사전 조건**: 필요한 권한, 설정 등

  4. **단계별 안내**: 번호 매긴 순서 (스크린샷 포함)

  5. **결과 확인**: 성공 시 기대되는 상태

  6. **문제 해결**: 흔한 오류 + 해결법

  7. **관련 문서**: 연관 링크 2-3개


  ## DO

  - 한 문서에 하나의 주제만 다루기

  - 실제 사용자 문의 데이터로 우선순위 결정

  - 제품 업데이트 시 관련 문서 동시 갱신

  - 문서 하단에 "도움이 되었나요?" 피드백 수집


  ## DON''T

  - 내부 전문 용어 그대로 사용하지 않기

  - 스크린샷 없이 텍스트만으로 UI 조작 설명하지 않기

  - 오래된 스크린샷 방치하지 않기

  - FAQ를 도움말 대체로 사용하지 않기

  '
