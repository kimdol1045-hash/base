theory: 스토리텔링은 정보를 서사 구조로 전달하여 기억률과 감정적 연결을 높이는 기법이다. 조셉 캠벨의 영웅의 여정(Hero's Journey)과
  픽사의 스토리 스파인이 대표적 프레임워크이다.
