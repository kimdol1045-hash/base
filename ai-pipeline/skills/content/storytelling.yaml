content: '# 스토리텔링 가이드


  ## 핵심 원칙

  - 캐릭터(주인공) + 갈등(문제) + 해결(변화)의 3요소

  - 독자가 주인공에 감정 이입할 수 있어야 함

  - 구체적 디테일이 추상적 설명보다 강력함

  - 시작 5초 안에 호기심을 자극하는 훅(Hook) 필요


  ## 스토리 프레임워크

  1. **픽사 스파인**: 매일 _했다. 어느 날 _했다. 그래서 _했다.

  2. **영웅의 여정**: 일상 → 소명 → 시련 → 변화 → 귀환

  3. **Before-After-Bridge**: 이전 상태 → 이후 상태 → 연결 방법

  4. **Problem-Agitate-Solve**: 문제 제시 → 심화 → 해결책


  ## 적용 영역

  - 케이스 스터디: 고객의 변화 스토리

  - 제품 소개: 문제 → 솔루션 서사

  - 브랜드 소개: 창업 스토리, 미션

  - 프레젠테이션: 데이터 + 스토리 결합


  ## DO

  - 실제 인물/사례 기반으로 구체적으로 서술

  - 감각적 디테일 포함 (보고, 듣고, 느끼는 것)

  - 긴장(Tension)과 해소(Resolution) 리듬 설계

  - 핵심 메시지를 스토리 결론에 자연스럽게 연결


  ## DON''T

  - 허구의 과장된 성공 스토리 만들지 않기

  - 스토리 없이 기능만 나열하지 않기

  - 너무 긴 도입부로 핵심을 늦추지 않기

  - 독자를 수동적 관찰자로 두지 않기

  '
