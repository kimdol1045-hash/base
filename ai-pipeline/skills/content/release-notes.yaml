content: "# 릴리즈 노트 작성 가이드\n\n## 핵심 원칙\n- 기술 변경이 아닌 사용자 가치 중심 서술\n- 카테고리별 분류: 신기능/개선/수정/제거\n\
  - 시각적 변경은 스크린샷 또는 GIF 포함\n- 일관된 발행 주기와 포맷 유지\n\n## 릴리즈 노트 구조\n1. **버전 + 날짜**: v2.4.0\
  \ — 2024년 3월 15일\n2. **하이라이트**: 가장 중요한 변경 1-2개 강조\n3. **신기능** (New): 새로 추가된 기능\n\
  4. **개선** (Improved): 기존 기능 개선\n5. **수정** (Fixed): 버그 수정\n6. **제거** (Removed): 더\
  \ 이상 지원하지 않는 기능\n7. **마이그레이션 가이드**: 필요 시 업데이트 방법\n\n## 작성 포맷\n```\n### 신기능\n- **다크\
  \ 모드 지원**: 설정 > 테마에서 다크 모드를 선택할 수 있습니다.\n  눈의 피로를 줄이고 배터리 사용량을 절약합니다.\n```\n\n##\
  \ DO\n- \"~할 수 있습니다\" 형태로 사용자 행동 중심 서술\n- Breaking Change는 상단에 경고로 표시\n- 관련 도움말\
  \ 문서 링크 첨부\n\n## DON'T\n- 커밋 메시지를 그대로 나열하지 않기\n- 내부 이슈 번호만 기재하지 않기\n- 사용자에게 영향 없는\
  \ 내부 리팩토링 포함하지 않기\n"
