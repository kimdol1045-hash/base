content: '# 콘텐츠 재활용 가이드


  ## 핵심 원칙

  - 1개 필러 콘텐츠 → 10개 이상 파생 콘텐츠

  - 채널별 최적 형식으로 변환 (복사가 아닌 변환)

  - 핵심 메시지는 유지, 형식과 깊이만 조절

  - 성과 좋은 콘텐츠를 우선 재활용


  ## 재활용 피라미드

  1. **필러 콘텐츠** (롱폼): 웨비나, 백서, 심층 가이드

  2. **2차 콘텐츠**: 블로그 포스트, 뉴스레터 시리즈

  3. **마이크로 콘텐츠**: SNS 카드, 인포그래픽, 숏폼 영상

  4. **인터랙티브**: 퀴즈, 체크리스트, 템플릿


  ## 변환 매트릭스

  | 원본 형식 | 변환 가능 형식 |

  |-----------|---------------|

  | 웨비나 60분 | 블로그 3편 + 숏클립 10개 + 인용 카드 15장 |

  | 백서 20페이지 | 인포그래픽 + 슬라이드 + 이메일 시리즈 |

  | 인터뷰 | 팟캐스트 + 블로그 + SNS 인용 |


  ## DO

  - 원본 제작 시부터 재활용 계획 수립

  - 채널별 네이티브 형식에 맞게 편집

  - 재활용 콘텐츠에도 고유한 가치 추가


  ## DON''T

  - 원본을 그대로 복사하여 다른 채널에 게시하지 않기

  - 오래된 데이터가 포함된 콘텐츠를 업데이트 없이 재활용하지 않기

  - 맥락 없이 발췌만 하지 않기

  '
