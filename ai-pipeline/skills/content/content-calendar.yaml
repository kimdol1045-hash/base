bloom_level: APPLY
content: '# 콘텐츠 캘린더 가이드


  ## 핵심 원칙

  - 최소 4주 전 기획, 2주 전 제작 완료

  - 채널별 발행 빈도와 최적 시간대 정의

  - 시즌 이벤트 + 상시 콘텐츠 균형 유지

  - 유연성 확보: 긴급 콘텐츠를 위한 슬롯 확보


  ## 캘린더 구성 요소

  | 필드 | 설명 |

  |------|------|

  | 발행일 | 콘텐츠 공개 날짜 |

  | 제목 | 콘텐츠 가제목 |

  | 유형 | 블로그/SNS/뉴스레터/영상 등 |

  | 채널 | 배포 채널 |

  | 담당자 | 작성자 + 리뷰어 |

  | 상태 | 기획/작성중/리뷰/완료/발행 |

  | 퍼널 단계 | 인지/관심/전환/유지 |

  | CTA | 기대 행동 |


  ## DO

  - 월간 테마를 먼저 정하고 주간 주제로 세분화

  - 에버그린 콘텐츠와 시의성 콘텐츠 비율 6:4 유지

  - 팀 전체가 접근 가능한 공유 캘린더 사용

  - 발행 후 성과 데이터를 캘린더에 기록


  ## DON''T

  - 캘린더 없이 즉흥적으로 콘텐츠 발행하지 않기

  - 모든 채널에 동일 콘텐츠를 그대로 복사하지 않기

  - 한 담당자에게 모든 콘텐츠를 몰아주지 않기

  '
