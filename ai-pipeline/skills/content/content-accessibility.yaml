bloom_level: APPLY
content: '# 콘텐츠 접근성 가이드


  ## 핵심 원칙

  - 인지 가능: 텍스트 대체 수단 제공 (이미지 alt 등)

  - 이해 가능: 평이한 언어, 명확한 구조

  - 운용 가능: 키보드만으로 탐색 가능

  - 견고함: 다양한 보조 기술과 호환


  ## 텍스트 접근성

  - 읽기 수준: 중학교 2-3학년 수준 권장

  - 문장 길이: 25단어 이내

  - 전문 용어: 첫 사용 시 정의 제공

  - 약어: 풀네임 먼저 표기 후 괄호로 약어


  ## 구조적 접근성

  - 제목(H1-H6) 계층 구조 준수 (건너뛰기 금지)

  - 목록은 ul/ol 사용 (시각적 들여쓰기만 하지 않기)

  - 링크 텍스트는 목적지를 설명 ("여기" X → "가격 안내 페이지" O)

  - 표(Table)에 헤더 셀(th)과 캡션 포함


  ## 미디어 접근성

  - 이미지: 설명적 alt 텍스트 필수

  - 동영상: 자막(CC) + 대본(Transcript) 제공

  - 인포그래픽: 동등한 텍스트 대안 제공

  - 색상만으로 정보를 전달하지 않기


  ## DO

  - 자동 접근성 검사 도구(axe, WAVE) 활용

  - 스크린 리더로 콘텐츠 흐름 직접 테스트

  - 색상 대비율 4.5:1 이상 유지


  ## DON''T

  - "여기를 클릭하세요" 링크 텍스트 사용하지 않기

  - 자동 재생 미디어 사용하지 않기

  - 깜빡이는 콘텐츠(3Hz 이상) 사용하지 않기

  '
