content: '에러 메시지 & 마이크로카피 (사용자 좌절을 최소화한다):


  ### 에러 메시지 3원칙

  1. **무엇이** 잘못되었는지 (문제 설명)

  2. **왜** 잘못되었는지 (원인)

  3. **어떻게** 해결하는지 (다음 행동)


  ### 좋은 vs 나쁜 예시

  | 나쁜 예시 | 좋은 예시 |

  |----------|----------|

  | Error 500 | 서버에 문제가 생겼습니다. 잠시 후 다시 시도해주세요. |

  | Invalid input | 이메일 형식이 올바르지 않습니다. (예: user@example.com) |

  | Failed | 결제에 실패했습니다. 카드 정보를 확인하거나 다른 카드를 사용해주세요. |

  | 404 | 페이지를 찾을 수 없습니다. 주소를 확인하거나 홈으로 이동하세요. |


  ### 톤 가이드

  - 사용자 탓 금지: "잘못 입력했습니다" → "입력 형식을 확인해주세요"

  - 기술 용어 금지: "null reference" → "정보를 불러오지 못했습니다"

  - 긍정적 프레이밍: "실패" → "아직 완료되지 않았습니다"

  - 유머는 상황에 맞게: 404는 OK, 결제 실패는 진지하게


  ### 마이크로카피 체크리스트

  - 빈 상태: "아직 항목이 없습니다. 첫 번째 항목을 추가해보세요."

  - 로딩: 2초 이상이면 진행 상태 표시

  - 성공: 명확한 확인 메시지 + 다음 행동 안내

  - 플레이스홀더: 예시 값 제공 (format hint)

  '
