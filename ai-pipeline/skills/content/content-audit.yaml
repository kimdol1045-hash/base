bloom_level: EVALUATE
content: '# 콘텐츠 감사 가이드


  ## 핵심 원칙

  - 모든 콘텐츠를 인벤토리에 목록화

  - 정량 + 정성 두 축으로 평가

  - 감사 결과를 액션 아이템으로 전환

  - 분기별 정기 감사 루틴화


  ## 감사 프로세스

  1. **인벤토리 수집**: URL, 제목, 유형, 작성일, 담당자

  2. **정량 분석**: 페이지뷰, 이탈률, 체류시간, 전환율

  3. **정성 평가**: 정확성, 최신성, 톤 일관성, 접근성

  4. **분류**: 유지(Keep) / 개선(Improve) / 통합(Merge) / 삭제(Remove)

  5. **우선순위**: 영향도 × 개선 용이성 매트릭스

  6. **실행 계획**: 담당자 + 기한 + 기대 효과


  ## 평가 기준표

  | 항목 | 점수 기준 (1-5) |

  |------|----------------|

  | 정확성 | 사실 오류 없음 |

  | 최신성 | 6개월 내 업데이트 |

  | 성과 | 월 100회 이상 조회 |

  | 톤 일관성 | 스타일 가이드 준수 |

  | SEO | 타겟 키워드 순위 30위 내 |


  ## DO

  - 스프레드시트로 전체 콘텐츠 추적

  - ROT(Redundant, Outdated, Trivial) 분류 적용

  - 감사 결과를 이해관계자와 공유


  ## DON''T

  - 감사 없이 콘텐츠를 계속 생산하지 않기

  - 감정적으로 삭제 결정을 내리지 않기 (데이터 기반)

  - 감사를 일회성 프로젝트로 끝내지 않기

  '
