content: "인터랙션 디자인 (모든 사용자 행동에 즉각적 피드백):\n\n### 상태별 스타일 (모든 인터랙티브 요소)\n```tsx\n//\
  \ 버튼 상태: default → hover → active → focus → disabled\n<Button className=\"\n  bg-primary\
  \ text-primary-foreground\n  hover:bg-primary/90           /* 호버: 약간 어둡게 */\n  active:scale-[0.98]\
  \           /* 클릭: 미세 축소 */\n  focus-visible:ring-2 ring-ring /* 포커스: 링 표시 */\n\
  \  disabled:opacity-50 disabled:pointer-events-none\n  transition-all duration-150\
  \   /* 부드러운 전환 */\n\">\n  저장\n</Button>\n```\n\n### 로딩 상태\n```tsx\n<Button disabled={isPending}>\n\
  \  {isPending ? (\n    <>\n      <Loader2 className=\"mr-2 h-4 w-4 animate-spin\"\
  \ />\n      저장 중...\n    </>\n  ) : '저장'}\n</Button>\n```\n\n### 피드백 유형별 사용\n| 피드백\
  \ | 시간 | 사용 |\n|--------|------|------|\n| 인라인 (버튼 상태 변화) | 즉시 | 클릭, 호버, 입력 |\n\
  | 토스트 | 2-5초 | 성공/실패 알림 |\n| 모달 다이얼로그 | 사용자 닫기 | 확인 필요한 행동 (삭제) |\n| 스켈레톤 | 로딩 중\
  \ | 콘텐츠 로딩 |\n| 프로그레스 바 | 긴 작업 | 파일 업로드, 처리 |\n\n### 트랜지션 규칙\n- 시간: 150ms (빠른 반응)\
  \ ~ 300ms (화면 전환)\n- 이징: ease-out (나타남), ease-in (사라짐)\n- 동시다발 애니메이션 금지 (한 번에 하나씩)\n"
