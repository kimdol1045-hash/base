bloom_level: APPLY
content: '# 스켈레톤 로딩 가이드


  ## 핵심 원칙

  - 실제 콘텐츠 레이아웃과 동일한 구조

  - 좌측 상단에서 우측 하단으로 순차 로딩

  - 미세한 애니메이션으로 진행 중임을 표시

  - 콘텐츠 로드 후 부드러운 전환


  ## 적용 가이드

  | 콘텐츠 유형 | 스켈레톤 형태 |

  |------------|-------------|

  | 텍스트 | 높이 12-16px 회색 바 |

  | 이미지 | 동일 비율 회색 사각형 |

  | 아바타 | 원형 회색 도형 |

  | 카드 | 카드 레이아웃 뼈대 |

  | 리스트 | 반복되는 행 뼈대 |


  ## 구현 패턴

  1. 콘텐츠 영역과 동일한 크기/위치의 뼈대 렌더링

  2. shimmer 또는 pulse 애니메이션 적용

  3. 데이터 로드 완료 시 fade-in으로 전환

  4. 부분 로딩: 먼저 도착한 데이터부터 표시


  ## DO

  - 실제 콘텐츠와 1:1 대응하는 레이아웃

  - 중립적 회색(#E0E0E0) 배경색 사용

  - 로딩 상태가 2초 이상일 때 적용


  ## DON''T

  - 스켈레톤과 실제 콘텐츠 레이아웃이 다르면 안 됨

  - 이미 캐시된 콘텐츠에 스켈레톤 표시하지 않기

  - 스피너와 스켈레톤을 동시에 사용하지 않기

  - 과도하게 상세한 스켈레톤 (텍스트 위치까지 정확히)

  '
