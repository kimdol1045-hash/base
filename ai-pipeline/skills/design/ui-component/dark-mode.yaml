content: "다크모드 설계 (시스템 설정 연동 + 수동 토글):\n\n### CSS 변수 기반 테마\n```css\n:root {\n  --background:\
  \ 0 0% 100%;\n  --foreground: 222 84% 5%;\n  --card: 0 0% 100%;\n  --border: 214\
  \ 32% 91%;\n}\n.dark {\n  --background: 222 84% 5%;\n  --foreground: 210 40% 98%;\n\
  \  --card: 222 84% 5%;\n  --border: 217 33% 17%;\n}\n```\n\n### Tailwind dark: 접두사\n\
  ```tsx\n<div className=\"bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-50\"\
  >\n  <p className=\"text-gray-600 dark:text-gray-400\">보조 텍스트</p>\n</div>\n```\n\
  \n### 다크모드 색상 규칙\n- 순수 검정(#000) 배경 금지 → gray-950 (#0a0a0a) 사용\n- 순수 흰색(#fff) 텍스트\
  \ 금지 → gray-50 (#fafafa) 사용\n- 채도 10-20% 낮추기 (눈부심 방지)\n- 그림자 대신 보더로 계층 구분 (dark에서\
  \ shadow 안 보임)\n- 이미지: brightness(0.9) 적용 또는 다크용 에셋 준비\n\n### 시스템 연동 + 수동 토글\n```tsx\n\
  // next-themes 사용\nimport { ThemeProvider } from 'next-themes';\n<ThemeProvider\
  \ attribute=\"class\" defaultTheme=\"system\">\n  {children}\n</ThemeProvider>\n\
  ```\n\n### 흔한 실수\n- 다크모드에서 테스트 안 함 (라이트만 보고 배포)\n- 하드코딩된 색상 (bg-white 대신 bg-background\
  \ 사용)\n- 다크모드에서 텍스트 대비 부족\n"
