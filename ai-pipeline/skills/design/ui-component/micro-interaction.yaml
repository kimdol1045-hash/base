content: '# 마이크로 인터랙션 가이드


  ## 핵심 원칙

  - 사용자 동작에 즉각적 시각 피드백 제공

  - 시스템 상태를 명확하게 전달

  - 자연스럽고 직관적인 반응

  - 과도하지 않은 적절한 수준의 피드백


  ## 4단계 구조

  1. **트리거**: 사용자 동작 또는 시스템 이벤트

  2. **규칙**: 인터랙션의 동작 방식 정의

  3. **피드백**: 시각/청각/촉각 반응

  4. **루프/모드**: 반복 또는 상태 변화


  ## 주요 마이크로 인터랙션

  | 상황 | 인터랙션 | 예시 |

  |------|---------|------|

  | 버튼 클릭 | 눌림 효과 + 색상 변화 | scale(0.95) + 색상 전환 |

  | 좋아요 | 하트 애니메이션 | 크기 변화 + 색상 채움 |

  | 토글 | 슬라이드 + 색상 전환 | 부드러운 위치 이동 |

  | 폼 검증 | 성공/실패 아이콘 | 체크마크 또는 흔들림 |

  | 당겨서 새로고침 | 로딩 인디케이터 | 회전 + 진행률 |

  | 스와이프 삭제 | 항목 밀림 + 삭제 표시 | 빨간 배경 + 휴지통 아이콘 |


  ## DO

  - 모든 사용자 입력에 즉각적 피드백 제공

  - 성공/실패 상태를 명확히 구분

  - 일관된 인터랙션 패턴 유지


  ## DON''T

  - 피드백 없이 상태가 변경되게 하지 않기

  - 동일한 동작에 다른 피드백 사용하지 않기

  - 과도한 애니메이션으로 사용성 저해하지 않기

  '
