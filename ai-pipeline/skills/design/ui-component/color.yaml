content: "색상 설계 (색상은 감정과 행동을 유도한다):\n\n### 60-30-10 규칙\n- 60% 주색 (배경, 큰 영역): neutral/background\n\
  - 30% 보조색 (카드, 섹션): muted/card\n- 10% 강조색 (CTA, 링크): primary/accent\n\n### 시맨틱 컬러\
  \ 시스템\n```css\n:root {\n  --background: 0 0% 100%;       /* 흰색 배경 */\n  --foreground:\
  \ 222 84% 5%;      /* 거의 검정 텍스트 */\n  --primary: 222 47% 11%;        /* 핵심 CTA */\n\
  \  --secondary: 210 40% 96%;      /* 보조 요소 */\n  --destructive: 0 84% 60%;     \
  \ /* 삭제/에러 */\n  --muted: 210 40% 96%;          /* 비활성 영역 */\n  --accent: 210 40%\
  \ 96%;         /* 호버/선택 */\n}\n.dark {\n  --background: 222 84% 5%;\n  --foreground:\
  \ 210 40% 98%;\n  /* 다크모드: 채도 낮추고 명도 반전 */\n}\n```\n\n### 접근성 대비\n- 일반 텍스트: 4.5:1\
  \ 이상 (WCAG AA)\n- 큰 텍스트(18px+): 3:1 이상\n- UI 요소(아이콘, 보더): 3:1 이상\n- 확인 도구: Chrome\
  \ DevTools → Rendering → CSS contrast\n\n### 색상 의미 (국제적 기준)\n| 색상 | 의미 | 사용 |\n\
  |------|------|------|\n| 파랑 | 신뢰, 전문성 | 링크, 정보 |\n| 초록 | 성공, 안전 | 완료, 저장 |\n| 빨강\
  \ | 위험, 긴급 | 에러, 삭제 |\n| 노랑/주황 | 주의, 경고 | 경고 메시지 |\n| 회색 | 중립, 비활성 | 비활성 요소 |\n"
domain: design
