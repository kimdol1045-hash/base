content: '# UI 애니메이션 원칙 가이드


  ## 핵심 원칙

  - 애니메이션은 장식이 아닌 기능적 목적을 가져야 함

  - 지속 시간: 200-500ms (너무 빠르거나 느리면 불쾌)

  - 이징(Easing): 자연스러운 가감속 적용

  - 사용자 동작에 즉각적 피드백 제공


  ## 기능별 애니메이션 가이드

  | 유형 | 지속 시간 | 이징 | 용도 |

  |------|----------|------|------|

  | 마이크로 피드백 | 100-200ms | ease-out | 버튼 클릭, 호버 |

  | 화면 전환 | 200-300ms | ease-in-out | 페이지 이동 |

  | 확장/축소 | 200-400ms | ease-out | 아코디언, 모달 |

  | 알림 진입 | 300-500ms | spring | 토스트, 스낵바 |

  | 로딩 | 반복 | linear | 스피너, 프로그레스 |


  ## 모션 유형

  1. **진입(Enter)**: 요소가 화면에 나타남 (fade-in, slide-in)

  2. **퇴장(Exit)**: 요소가 화면에서 사라짐 (fade-out, slide-out)

  3. **강조(Emphasis)**: 주의 끌기 (pulse, shake)

  4. **전환(Transition)**: 상태 변화 (색상, 크기, 위치)


  ## DO

  - 사용자 동작에 연결된 목적 있는 애니메이션만 사용

  - prefers-reduced-motion 미디어 쿼리 존중

  - GPU 가속 속성(transform, opacity) 우선 사용


  ## DON''T

  - 장식 목적의 불필요한 애니메이션 추가하지 않기

  - 500ms 초과 애니메이션 사용하지 않기

  - 레이아웃 속성(width, height, top) 직접 애니메이션하지 않기

  - 접근성 설정을 무시하지 않기

  '
