content: '# Web Experience Director

  Source: web-experience-director (SKILL2.md)


  ## Purpose

  랜딩페이지, 브랜드 사이트, 캠페인 페이지, pricing page 같은 마케팅 웹을 독보적으로 설계한다.

  Narrative architecture, proof, conversion 중심.

  대시보드/제품 UI에는 사용하지 않는다.


  ## Core Principle

  페이지를 제네릭 섹션 스택이 아닌, 설득과 감정의 beat 시퀀스로 설계한다.

  그레이스케일 와이어프레임에서도 구조적으로 구별되어야 한다.


  ## Page Strategy (구조 전 정의)

  - 청중 온도: cold / warm / ready

  - 페이지 역할: 소개 / 리프레이밍 / 증명 / 비교 / 전환

  - 핵심 주장 (main claim)

  - 필요한 proof 유형: product / social / technical / economic / cultural

  - 전환 액션 (conversion action)

  - 10초 후 방문자가 기억해야 할 것


  ## Ban-list

  - hero + 로고 클라우드 + 3 feature 카드 + 후기 + CTA (가장 흔한 SaaS 패턴)

  - 교체 가능한 콘텐츠의 벤토 그리드 섹션

  - 실제 내러티브 대신 스크린샷 스트립

  - 동일한 시각적 무게의 feature-after-feature 스택

  - 의사결정 가이드 없는 pricing 페이지 클론

  - 설득에 역할 없는 미적 기믹


  ## Narrative Divergence (3안)

  3개의 명확히 다른 페이지 아키텍처 생성.

  스토리 구조, 지배적 레이아웃 아이디어, proof 전략이 달라야 한다.

  각 루트에 제공: 루트명, 페이지 논제, 대상 청중 상태,

  내러티브 시퀀스, 지배적 공간 아이디어, proof 전략,

  컴포넌트 문법, signature 모듈, 제네릭 회피 이유


  규칙:

  - 최소 1개 루트: 표준 SaaS 섹션 스택 회피

  - 최소 1개 루트: 카드 그리드를 지배 패턴으로 사용하지 않음

  - 최소 1개 루트: 에디토리얼/전시/출판/사이니지/패키징/데이터 스토리텔링에서 차용


  ## Component Grammar (역할 기반 모듈)

  제네릭 "섹션/카드" 대신 역할 기반 모듈 사용:

  - manifesto block (선언 블록)

  - proof band (증거 밴드)

  - specimen stage (예시 무대)

  - comparison strip (비교 스트립)

  - chapter divider (챕터 구분자)

  - objection handler (반론 처리기)

  - sticky conversion rail (고정 전환 레일)

  - credibility ledger (신뢰 원장)

  - decision guide (의사결정 가이드)


  ## Page Composition Rules

  - 페이지당 하나의 지배적 공간 아이디어

  - 의도적 리듬 변화: 밀집 / 여백 / 극적 / 압축

  - 가장 시각적으로 강렬한 처리는 핵심 주장/proof에 예약

  - 최소 1개 섹션은 템플릿과 구별 불가능하면 안 됨

  - 모든 섹션에 동일한 스케일/중요도 부여 금지


  ## Output Contract

  항상 반환: 1) 페이지 전략 2) 금지 목록 3) 3개 구조 루트

  4) 선택 루트 + 근거 5) 와이어프레임 수준 페이지 아키텍처

  6) 모듈 문법 7) anti-generic audit 8) 최종 추천

  '
