bloom_level: APPLY
content: '# 점진적 노출 가이드


  ## 핵심 원칙

  - 초보자에게 단순함, 전문가에게 강력함 동시 제공

  - 사용 빈도에 따라 노출 수준 결정

  - 고급 옵션은 숨기되, 발견 가능하게

  - 정보 과부하 방지


  ## 적용 패턴

  | 패턴 | 구현 | 활용 |

  |------|------|------|

  | 기본/고급 탭 | 탭 또는 토글 | 설정 화면 |

  | 더 보기 | 링크 또는 버튼 | 목록, 상세 정보 |

  | 마법사(Wizard) | 단계별 폼 | 복잡한 입력 |

  | 툴팁/팝오버 | 호버 또는 클릭 | 부가 설명 |

  | 온보딩 투어 | 단계별 가이드 | 첫 사용 안내 |


  ## 적용 프로세스

  1. 기능/정보를 사용 빈도로 분류 (80/20 법칙)

  2. 상위 20%를 1차 화면에 노출

  3. 나머지는 "고급 설정", "더 보기"로 접근 가능하게

  4. 사용자 테스트로 숨긴 기능의 발견성 확인


  ## DO

  - 80% 사용자가 필요한 기능만 1차 화면에 노출

  - 고급 옵션 접근 경로를 명확히 표시

  - 사용 빈도 데이터 기반으로 노출 수준 결정


  ## DON''T

  - 중요한 기능을 3클릭 이상 숨기지 않기

  - 모든 옵션을 한 화면에 나열하지 않기

  - 고급 기능을 완전히 숨기지 않기 (발견 경로 유지)

  '
