theory: 점진적 노출은 John M. Carroll이 제안한 정보 설계 원칙으로, 사용자에게 필요한 정보를 단계적으로 제공하여 인지 부하를 줄이는
  전략이다. 복잡한 기능을 단순하게 보이게 하면서도 고급 기능을 숨기지 않는다.
