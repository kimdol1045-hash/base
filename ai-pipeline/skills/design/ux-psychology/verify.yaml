content: 'UX 심리학 자기 검증:


  ### A. 인지부하

  - [ ] 한 화면의 선택지가 5개 이하인가? (힉스 법칙)

  - [ ] CTA 버튼이 44×44px 이상인가? (피츠 법칙)

  - [ ] 검증된 표준 UI 패턴을 사용했는가? (제이콥 법칙)

  - [ ] 선택지를 빈칸 입력 대신 제시했는가? (재인 > 회상)


  ### B. 시각 설계

  - [ ] 핵심 CTA가 시각적으로 차별화되었는가? (폰 레스토프)

  - [ ] 핵심 기능이 처음/마지막에 배치되었는가? (직렬 위치)

  - [ ] 디자인이 일관되고 세련되었는가? (심미적 사용성)


  ### C. 동기 부여

  - [ ] 미완료 작업에 진행 상태를 표시했는가? (자이가르닉)

  - [ ] 시작점에 기부된 진행이 있는가? (진행 기부 효과)

  - [ ] 핵심 인터랙션에 즐거움(delight)이 있는가? (피크엔드)


  ### D. 성능 인지

  - [ ] 시스템 응답이 400ms 이내인가? (도허티 임계값)

  - [ ] 로딩 시 스켈레톤/프로그레스가 표시되는가?

  - [ ] 스마트 기본값으로 사용자 입력을 줄였는가? (테슬러)


  ### E. 마무리 경험

  - [ ] 성공 화면이 긍정적인가? (피크엔드)

  - [ ] 에러 메시지가 친절하고 복구 가능한가?

  '
