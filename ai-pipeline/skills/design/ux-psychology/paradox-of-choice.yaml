content: '# 선택의 역설 가이드


  ## 정의

  선택지가 많을수록 결정 장애, 후회, 불만족이 증가하는 현상.

  예: 요금제 10개 → 사용자 이탈, 요금제 3개 → 전환율 상승.


  ## UI 적용 영역

  - 요금제/플랜 선택: 3개 이하 권장

  - 네비게이션 메뉴: 최상위 7개 이하

  - 필터 옵션: 기본 필터 + 고급 필터 분리

  - 폼 선택지: 드롭다운 항목 15개 이하


  ## 해결 전략

  1. **기본값 설정**: 추천 옵션을 미리 선택

  2. **카테고리화**: 관련 옵션을 그룹으로 묶기

  3. **스마트 기본값**: 사용자 컨텍스트 기반 추천

  4. **점진적 필터링**: 대분류 → 소분류 순차 좁히기

  5. **비교 도구**: 선택지 간 차이를 명확히 시각화


  ## DO

  - 추천 옵션을 시각적으로 강조 ("가장 인기", "추천")

  - 선택지를 의미 있는 기준으로 정렬

  - 비교가 필요한 경우 핵심 차이만 강조


  ## DON''T

  - 사용자에게 10개 이상 동등한 선택지 제시하지 않기

  - 기본 선택값 없이 빈 상태로 시작하지 않기

  - 모든 옵션을 동일한 시각적 비중으로 표시하지 않기

  '
