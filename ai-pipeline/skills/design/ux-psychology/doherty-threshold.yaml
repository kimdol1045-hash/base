content: "도허티 임계값 (시스템 응답이 400ms 이내면 사용자 생산성이 급증한다):\n\n### 응답 시간 기준\n| 시간 | 사용자 인지\
  \ | 대응 |\n|------|-----------|------|\n| < 100ms | 즉각 반응으로 느낌 | 최적 |\n| 100-400ms\
  \ | 약간 지연 인지 | 수용 가능 |\n| 400ms-1s | 명확한 지연 | 로딩 인디케이터 필요 |\n| 1-5s | 집중력 이탈 시작\
  \ | 프로그레스 바 + 스켈레톤 |\n| > 5s | 작업 포기 가능 | 비동기 처리 + 알림 |\n\n### 400ms 이내 달성 전략\n\
  1. **낙관적 업데이트 (Optimistic Update)**\n   ```tsx\n   const handleLike = async () =>\
  \ {\n     setLiked(true); // 즉시 UI 반영\n     setCount(prev => prev + 1);\n     try\
  \ {\n       await api.like(postId);\n     } catch {\n       setLiked(false); //\
  \ 실패 시 롤백\n       setCount(prev => prev - 1);\n       toast.error(\"다시 시도해주세요\"\
  );\n     }\n   };\n   ```\n\n2. **스켈레톤 UI**: 콘텐츠 로딩 중 레이아웃 미리 표시\n3. **프리페치**: 사용자가\
  \ 클릭하기 전에 데이터 미리 로드\n   ```tsx\n   <Link href=\"/dashboard\" prefetch={true}>대시보드</Link>\n\
  \   ```\n4. **스피너 대신 스켈레톤**: 스피너는 시간을 인지하게 함\n"
