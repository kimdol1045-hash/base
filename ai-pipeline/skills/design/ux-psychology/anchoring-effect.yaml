content: '# UX 앵커링 효과 가이드


  ## 정의

  첫 번째 접하는 정보가 이후 판단의 기준점이 되는 현상.

  디자인에서 의도적으로 앵커를 설정하여 사용자 인식을 유도.


  ## UX 적용 영역

  | 영역 | 앵커링 기법 | 예시 |

  |------|-----------|------|

  | 가격 | 높은 가격 먼저 표시 | 프리미엄 → 스탠다드 → 베이직 |

  | 할인 | 원가 대비 할인가 | ~~50,000원~~ → 29,900원 |

  | 수량 | 기본 수량 설정 | 기본 3개 선택 상태 |

  | 기부 | 추천 금액 제시 | 10,000원 / 30,000원 / 50,000원 |

  | 사회적 증거 | 대다수 선택 표시 | "78%가 이 플랜을 선택" |


  ## 가격 페이지 앵커링 전략

  1. 가장 비싼 플랜을 왼쪽(첫 번째)에 배치

  2. 추천 플랜에 시각적 강조 (배지, 테두리)

  3. 월 가격 대신 일 가격 표시 ("하루 1,000원")

  4. 절약 금액 표시 ("연간 구독 시 40% 절약")


  ## 윤리적 고려사항

  - 앵커가 사실에 기반해야 함 (가짜 원가 X)

  - 사용자가 자유롭게 변경할 수 있어야 함

  - 오도하는 앵커링은 장기적으로 신뢰 훼손


  ## DO

  - 사용자에게 유리한 기본값 설정 (좋은 앵커)

  - 가격 대비 가치를 명확히 전달

  - 사회적 증거를 실제 데이터로 뒷받침


  ## DON''T

  - 허위 원가로 할인율 부풀리지 않기

  - 사용자를 속이는 다크 패턴으로 활용하지 않기

  - 앵커링에만 의존하고 실제 가치를 소홀히 하지 않기

  '
