content: "제이콥 법칙 — 사용자는 대부분의 시간을 *다른* 사이트에서 보낸다.\n따라서 당신의 사이트도 이미 알고 있는 방식으로 동작하길\
  \ 기대한다.\n\n### 핵심 원칙\n- 검증된 UI 패턴을 **우선** 사용 (재발명 금지)\n- 커스텀 UI는 명확한 사용성 이득이 있을\
  \ 때만 허용\n- shadcn/ui 등 **표준 컴포넌트 라이브러리** 기반 설계\n- 사용자 멘탈 모델과 일치하는 정보 구조\n\n### 1.\
  \ 검증된 패턴 — E-commerce 레이아웃\n\nDO:\n```tsx\n{/* 사용자가 이미 아는 표준 패턴: 좌 필터, 우 그리드, 상단\
  \ 정렬 */}\n<div className=\"flex gap-6\">\n  <aside className=\"w-64 shrink-0 space-y-6\"\
  >\n    <FilterSection title=\"카테고리\" options={categories} />\n    <FilterSection\
  \ title=\"가격대\" options={priceRanges} />\n    <FilterSection title=\"브랜드\" options={brands}\
  \ />\n  </aside>\n  <main className=\"flex-1 space-y-4\">\n    <div className=\"\
  flex items-center justify-between\">\n      <p className=\"text-sm text-muted-foreground\"\
  >1,234개 상품</p>\n      <Select defaultValue=\"popular\">\n        <SelectTrigger\
  \ className=\"w-40\">\n          <SelectValue placeholder=\"정렬 기준\" />\n       \
  \ </SelectTrigger>\n        <SelectContent>\n          <SelectItem value=\"popular\"\
  >인기순</SelectItem>\n          <SelectItem value=\"price-asc\">낮은 가격순</SelectItem>\n\
  \          <SelectItem value=\"price-desc\">높은 가격순</SelectItem>\n          <SelectItem\
  \ value=\"newest\">최신순</SelectItem>\n        </SelectContent>\n      </Select>\n\
  \    </div>\n    <div className=\"grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4\
  \ gap-4\">\n      {products.map((p) => <ProductCard key={p.id} {...p} />)}\n   \
  \ </div>\n  </main>\n</div>\n```\n\nDON'T:\n```tsx\n{/* 비표준: 필터가 하단에, 정렬이 좌측 사이드바에\
  \ → 멘탈 모델 불일치 */}\n<div className=\"flex flex-col\">\n  <div className=\"grid grid-cols-4\
  \ gap-4\">{products.map(...)}</div>\n  <aside className=\"mt-8 border-t pt-4\">필터...</aside>\n\
  </div>\n```\n\n### 2. 표준 컴포넌트 활용 — shadcn/ui 우선\n\n```tsx\n{/* 표준 Dialog: 제목→설명→내용→액션\
  \ 패턴 준수 */}\n<Dialog>\n  <DialogTrigger asChild>\n    <Button variant=\"destructive\"\
  >계정 삭제</Button>\n  </DialogTrigger>\n  <DialogContent>\n    <DialogHeader>\n   \
  \   <DialogTitle>정말 삭제하시겠습니까?</DialogTitle>\n      <DialogDescription>\n       \
  \ 이 작업은 되돌릴 수 없습니다. 모든 데이터가 영구 삭제됩니다.\n      </DialogDescription>\n    </DialogHeader>\n\
  \    <DialogFooter className=\"gap-2\">\n      <DialogClose asChild><Button variant=\"\
  ghost\">취소</Button></DialogClose>\n      <Button variant=\"destructive\" onClick={handleDelete}>삭제</Button>\n\
  \    </DialogFooter>\n  </DialogContent>\n</Dialog>\n```\n\n### 3. 관습적 위치 — 사용자\
  \ 기대 매핑\n\n| 요소 | 기대 위치 | 근거 |\n|------|----------|------|\n| 로고 | 좌상단 | 홈 링크 기대\
  \ (96% 사이트) |\n| 검색 | 상단 중앙/우측 | 글로벌 검색 기대 |\n| 장바구니 | 우상단 | E-commerce 표준 |\n|\
  \ 로그인/프로필 | 우상단 | 98% 사이트 관습 |\n| 푸터 링크 | 하단 | 약관, 연락처, 사이트맵 |\n| 뒤로가기 | 좌상단 | 모바일\
  \ 네이티브 관습 |\n\n### 언제 관습을 깨도 되는가?\n- 사용자 테스트에서 기존 패턴보다 **측정 가능하게** 나은 경우만\n- 학습\
  \ 비용 < 장기 효율 이득일 때\n- 반드시 온보딩/툴팁으로 새 패턴을 안내할 것\n"
