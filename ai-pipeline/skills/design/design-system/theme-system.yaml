theory: 테마 시스템은 디자인 토큰(색상, 타이포, 간격 등)을 추상화하여 다크 모드, 브랜드 변형, 화이트 라벨링을 지원하는 구조이다. CSS
  Custom Properties 또는 ThemeProvider 패턴이 핵심 구현 방식이다.
