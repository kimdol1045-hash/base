theory: 컴포넌트 라이브러리는 재사용 가능한 UI 컴포넌트의 집합으로, 디자인 일관성과 개발 효율성을 동시에 달성한다. Atomic Design(Brad
  Frost)의 원자-분자-유기체 계층 구조가 대표적 설계 방법론이다.
