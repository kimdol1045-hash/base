content: '# App Product UI Director

  Source: app-product-ui-director (SKILL3.md)


  ## Purpose

  대시보드, SaaS, 운영툴, 모바일/데스크톱 앱 UI를 독보적으로 설계한다.

  Object model, workflow shell, state map, density, component composition 중심.

  랜딩/브랜드 웹에는 사용하지 않는다.


  ## Core Principle

  카드, 템플릿, 컴포넌트 라이브러리가 아닌 objects, tasks, states, shell에서 시작한다.

  색상과 브랜드 스타일을 제거해도 구조적으로 구별되어야 한다.


  ## Step 1. Classify Product Surface

  UI 제안 전 정의:

  - 플랫폼: mobile / desktop-web / tablet / desktop-native

  - 프로덕트 모드: create / monitor / review / research / operate / communicate

  - 주요 객체 (primary object)

  - 보조 객체 (secondary objects)

  - 상위 3개 사용자 태스크

  - 에러 비용 (cost of error)

  - 밀도 수준 (density level)

  - 핵심 상태: empty, loading, error, success, partial, permission-limited

  데스크톱 밀도/내비 깊이를 모바일에 재사용 금지.


  ## Step 2. Ban-list

  흔한 제네릭 구조 금지:

  - 왼쪽 사이드바 + 상단바 + KPI 행 + 최근 활동 테이블

  - 모든 엔티티를 동일한 rounded card로 표시

  - 데이터 밀집 도구에 마케팅 스타일 여유 간격

  - 모달 안의 탭 안의 카드 (복잡도 폭발)

  - 운영 역할 없는 장식적 차트/위젯

  - 데스크톱 레이아웃을 압축한 모바일 화면

  - 모든 것이 동일한 시각적 우선순위를 가진 대시보드


  ## Step 3. Shell Divergence (3안)

  shell, 인터랙션 모델, 태스크 플로우가 다른 3개 구조 루트 생성.

  가능한 쉘 패턴:

  - canvas + inspector + asset tray

  - status band + dense table + detail pane + alert rail

  - queue/list + detail view + action dock

  - notebook/results + source rail + comparison drawer

  - activity spine + command shelf + evidence rail

  - map/timeline + filter dock + contextual sheet


  규칙:

  - 최소 1개: 카드 그리드 회피

  - 최소 1개: 기본 대시보드 쉘 회피

  - 최소 1개: 아무 스타트업에 그대로 적용 불가한 역할 특화 컴포넌트 도입


  ## Component Grammar (구조 원시 요소)

  2~4개 구조 프리미티브만 선택하고 대부분의 UI를 구성:

  rail, panel, list, sheet, canvas, timeline, matrix, band, stack, tray

  역할 기반 명명: action dock, inspector pane, evidence rail,

  comparison matrix, activity spine, source tray, command shelf,

  triage lane, status band


  ## State Design

  선택한 루트에 대해 실제 상태 설계:

  - empty state 행동

  - loading 전략

  - error recovery

  - selected/expanded 상태

  - permission-limited 상태

  - batch-action 행동 (해당 시)


  ## Library Mapping

  구조가 결정된 후에만 라이브러리에 매핑한다.

  shadcn/Material/iOS 기본값이 프로덕트 쉘을 결정하게 하지 않는다.


  ## Output Contract

  항상 반환: 1) 플랫폼 + 워크플로우 분류 2) 객체 모델

  3) 금지 목록 4) 3개 구조 루트 5) 선택한 쉘 + 근거

  6) 컴포넌트 문법 7) 상태 맵 8) anti-generic audit 9) 최종 추천

  '
