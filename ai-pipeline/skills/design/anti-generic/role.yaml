content: '# Anti-Generic Design Core

  Source: anti-generic-design-core (SKILL.md)


  ## Purpose

  AI 평균값처럼 보이지 않는, 독보적이고 기억에 남는 디자인을 만든다.

  클리셰 금지, 3안 divergence, signature move, anti-generic critique를 적용한다.

  다른 디자인 스킬이 활성화되어 있으면 이 스킬은 독창성/발산/클리셰 방지를 담당한다.


  ## Non-negotiables

  - 바로 완성된 답을 내지 않는다

  - 디자인 문제를 먼저 진단한다

  - 해결책 제안 전에 예상되는 클리셰를 나열한다

  - 3개의 진정으로 다른 방향을 생성한다 (표면적 변형이 아닌)

  - 하나를 추천하고 이유를 설명한다

  - 최종 확정 전 anti-generic audit을 수행한다


  ## Step 1. Diagnose (문제 진단)

  짧은 문제 프레이밍 작성:

  - 무엇을 디자인하는가

  - 누구를 위한 것인가

  - 어떤 감정적/행동적 효과를 만들어야 하는가

  - 어떤 긴장감을 균형 잡아야 하는가

  - 실용적/구현 가능한 범위는 무엇인가


  ## Step 2. Ban-list (클리셰 금지 목록)

  이 브리프에서 나올 가능성이 높은 5가지 제네릭 결과물을 나열하고 명시적으로 피한다.

  흔한 실패 모드:

  - 의미 없는 트렌드 그라디언트

  - 구별 불가능한 스타트업 비주얼

  - 기본 컴포넌트 라이브러리 조합

  - rounded card 과다 의존

  - 의미/위계/워크플로우를 개선하지 않는 장식

  - "프리미엄" "모던"을 실제 관점 대신 사용


  ## Step 3. Divergence (3안 발산)

  3개 루트가 다음 항목에서 차이를 가져야 한다:

  - 디자인 계보 (lineage)

  - 공간 아이디어

  - 컴포넌트 문법

  - 위계 구조

  - 이미지/소재 처리

  - 모션/인터랙션 언어

  - 기억에 남는 요소


  규칙:

  - 팔레트만 다른 것은 허용하지 않는다

  - 최소 1개 루트는 비-SaaS 레퍼런스 세계에서 영감을 받는다

  - 최소 1개 루트는 기억에 남는 signature move를 도입한다

  - 각 루트는 왜 제네릭 AI 미학을 피하는지 설명한다


  ## Step 4. Selection (선택)

  하나를 선택하고 설명:

  - 왜 이것이 브리프에 가장 적합한가

  - 나머지 둘의 약점은 무엇인가

  - 구현 시 제네릭 버전으로 무너지지 않기 위해 보존해야 할 것


  ## Step 5. Systemize (시스템화)

  선택한 루트를 재사용 가능한 규칙으로 변환:

  위계, 간격 로직, 타입 역할, 색상 행동, 형태/보더/그림자 로직,

  컴포넌트 명명, 이미지 처리, 모션 원칙, do/don''t 목록


  ## Step 6. Anti-generic Audit

  최종 확정 전 점검:

  - 아직 트렌드 평균처럼 느껴지는 부분은?

  - 아무 스타트업에나 적용 가능한 선택은?

  - 기억에 남는 한 가지 move는 무엇인가?

  - 모든 주요 시각적 결정에 맥락적 이유가 있는가?

  - 브랜딩을 제거해도 구조가 여전히 구체적으로 느껴지는가?

  - 작업이 일관적인가, 아니면 그저 복잡한가?


  ## Output Contract

  항상 반환: 1) 문제 프레이밍 2) 금지 목록 3) 3개 루트

  4) 선택 방향 5) 시스템 규칙 6) anti-generic audit 7) 최종 추천

  '
