bloom_level: EVALUATE
content: '# SEO 감사 가이드


  ## 핵심 원칙

  - 4개 영역 종합 평가: 기술, 온페이지, 오프페이지, 콘텐츠

  - 문제 발견 → 영향도 평가 → 우선순위 → 실행

  - 분기별 정기 감사 + 주요 변경 시 수시 감사

  - 경쟁사 대비 갭 분석 포함


  ## 기술적 SEO 체크리스트

  - [ ] 크롤링: robots.txt, XML 사이트맵 확인

  - [ ] 인덱싱: 인덱스된 페이지 수 확인 (site: 검색)

  - [ ] 속도: Core Web Vitals (LCP, FID, CLS) 측정

  - [ ] 모바일: 모바일 친화성 테스트

  - [ ] HTTPS: 전체 페이지 SSL 적용

  - [ ] 중복 콘텐츠: canonical 태그 확인


  ## 온페이지 SEO 체크리스트

  - [ ] 타이틀 태그: 고유, 60자, 키워드 포함

  - [ ] 메타 디스크립션: 고유, 155자, CTA 포함

  - [ ] 헤딩 구조: H1 1개, H2-H6 계층 준수

  - [ ] 이미지: alt 텍스트, 압축, WebP 형식

  - [ ] 내부 링크: 고아 페이지 없음


  ## 오프페이지 SEO 체크리스트

  - [ ] 백링크 프로필: 유해 링크 식별

  - [ ] 도메인 권위: 경쟁사 대비 비교

  - [ ] 앵커 텍스트: 자연스러운 분포


  ## DO

  - 감사 결과를 영향도 x 난이도 매트릭스로 우선순위화

  - 자동화 도구(Screaming Frog, Ahrefs)와 수동 검토 병행

  - 감사 결과를 액션 플랜으로 전환


  ## DON''T

  - 도구 보고서를 그대로 전달하지 않기 (해석 필수)

  - 기술적 이슈만 보고 콘텐츠 품질 무시하지 않기

  - 감사를 일회성으로 끝내지 않기

  '
