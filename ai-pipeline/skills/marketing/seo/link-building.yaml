theory: 링크 빌딩은 외부 웹사이트에서 자사 사이트로의 백링크를 확보하여 도메인 권위를 높이는 SEO 전략이다. Google은 백링크를 타 사이트의
  추천(vote)으로 간주하며, 양보다 질이 중요하다.
