theory: 활성화(Activation)는 사용자가 제품의 핵심 가치를 처음 경험하는 단계로, Aha Moment에 도달시키는 것이 목표이다. 온보딩
  퍼널의 각 단계별 이탈을 줄이고 Time to Value를 최소화하는 것이 핵심이다.
