bloom_level: ANALYZE
content: '# 활성화 전략 가이드


  ## 핵심 원칙

  - Aha Moment까지의 경로를 최단으로 설계

  - 필수 단계만 남기고 마찰 제거

  - 완료율이 아닌 가치 경험을 목표로

  - 세그먼트별 다른 온보딩 경로 제공


  ## Aha Moment 식별

  1. 리텐션 높은 코호트의 초기 행동 분석

  2. 상관관계 높은 행동 패턴 식별

  3. 인과관계 검증 (A/B 테스트로 해당 행동 유도)

  4. 예: "가입 7일 내 프로젝트 3개 생성" = Aha Moment


  ## 온보딩 최적화

  | 단계 | 목표 | 기법 |

  |------|------|------|

  | 가입 | 마찰 최소화 | 소셜 로그인, 최소 필드 |

  | 프로필 설정 | 개인화 데이터 확보 | 2-3개 질문 |

  | 첫 행동 | 핵심 기능 사용 | 가이드 투어 |

  | 가치 경험 | Aha Moment | 샘플 데이터, 템플릿 |

  | 습관 형성 | 재방문 트리거 | 알림, 이메일 시퀀스 |


  ## 활성화 지표

  - 온보딩 완료율 (단계별)

  - Time to Value (가입~첫 가치 경험)

  - Day 1 리텐션

  - 핵심 기능 사용률 (가입 7일 내)


  ## DO

  - 가입 직후 샘플 데이터/템플릿 제공

  - 체크리스트로 진행률 시각화

  - 온보딩 미완료 사용자에게 후속 이메일 발송


  ## DON''T

  - 가입 시 불필요한 정보 요구하지 않기

  - 모든 기능을 한꺼번에 소개하지 않기

  - 가이드 없이 빈 화면에 사용자를 두지 않기

  '
