content: '# 바이럴 루프 설계


  ## 적용 상황

  - 유기적 사용자 획득으로 CAC를 낮추고 싶을 때

  - 제품이 협업/공유 특성을 가질 때 (문서, 디자인, 커뮤니케이션 도구)

  - 네트워크 효과가 제품 가치를 강화하는 구조일 때

  - 초기 성장 동력으로 바이럴 채널이 필요할 때


  ## 구현 방법

  - K-factor 정의: K = 사용자당 초대 수(i) x 초대 전환율(c). K > 1이면 바이럴 성장

  - 자연스러운 공유 트리거 식별: 성과 달성, 콘텐츠 생성, 협업 초대 시점

  - 양면 인센티브 설계: 초대자 + 피초대자 모두 혜택 (예: Dropbox 추가 용량)

  - 공유 마찰 최소화: 1-click 초대, 딥링크, 소셜 미디어 연동

  - 바이럴 루프 측정: 초대 발송 → 랜딩 도착 → 가입 → 활성화 → 재초대 각 단계 전환율 추적

  - 루프 사이클 시간 단축: 가입부터 첫 공유까지 시간을 최소화

  - 제품 사용 자체가 공유를 유발하는 구조 설계 (예: Figma 협업 링크)


  ## 주의사항

  - 스팸성 초대 메커니즘은 단기 효과만 있고 브랜드를 훼손함

  - 제품 핵심 가치 없이 인센티브만으로는 리텐션이 유지되지 않음

  - K-factor만 추적하지 말고 초대된 사용자의 리텐션/LTV도 함께 측정

  - 바이럴 채널은 예측 불가능. 유료 채널과 병행하여 안정적 성장 확보

  - 지역/문화별 공유 채널 차이 고려 (카카오톡, LINE, WhatsApp 등)

  '
