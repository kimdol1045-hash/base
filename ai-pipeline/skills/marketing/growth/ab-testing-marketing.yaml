bloom_level: ANALYZE
content: '# 마케팅 A/B 테스트 가이드


  ## 적용 상황

  - 랜딩페이지 전환율 개선이 필요할 때

  - CTA, 헤드라인, 가격 표시 등 마케팅 요소 최적화 시

  - 이메일 캠페인 제목/본문/발송 시간 최적화 시

  - 광고 크리에이티브 성과 비교 시


  ## 구현 방법

  - 가설 수립: "[변수]를 [A→B]로 변경하면 [지표]가 [X%] 개선될 것이다"

  - MDE(최소 감지 효과) 기반 샘플 사이즈 산정 후 테스트 기간 결정

  - 단일 변수 격리: 한 번에 하나의 변수만 테스트 (헤드라인 OR CTA, 동시 변경 금지)

  - 트래픽 분배: 50/50 균등 분배, AA 테스트로 도구 검증 선행

  - 랜딩 페이지 → CTA → 카피 → 이미지 → 가격 표시 순서로 임팩트 순 테스트

  - 통계적 유의성(p < 0.05) 확보 후 의사결정. 조기 종료 금지

  - 승리 변형 적용 후 다음 변수로 반복 (가설 → 실험 → 분석 → 적용 사이클)


  ## 주의사항

  - 동시에 여러 변수 변경 시 어떤 변수가 효과를 냈는지 알 수 없음

  - 시즌/이벤트 기간(블랙프라이데이, 연말) 중 테스트 결과를 일반화하지 말 것

  - 트래픽이 적은 경우 테스트 기간이 수 주로 늘어남. 이때는 큰 변경만 테스트

  - 여러 페이지에 걸친 테스트는 MVT(다변량 테스트) 검토

  - 테스트 결과는 반드시 문서화하여 조직 학습 자산으로 축적

  '
