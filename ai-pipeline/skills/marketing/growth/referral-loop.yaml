content: '# 레퍼럴 루프 가이드


  ## 핵심 원칙

  - 양면 인센티브: 추천인과 피추천인 모두에게 가치 제공

  - 마찰 최소화: 추천 과정을 최대한 간소화

  - 제품 가치와 연결: 제품 사용 맥락에서 자연스러운 초대

  - 바이럴 계수(K) > 1 목표 (자기 지속 성장)


  ## 레퍼럴 메커니즘 유형

  | 유형 | 인센티브 | 예시 |

  |------|---------|------|

  | 양면 보상 | 양쪽 할인/크레딧 | Dropbox, Uber |

  | 사회적 가치 | 공유 자체가 가치 | Spotify Wrapped |

  | 협업 가치 | 함께 써야 이득 | Slack, Notion |

  | 단면 보상 | 추천인만 보상 | 쿠폰 제공 |


  ## 설계 프로세스

  1. 추천 트리거 시점 결정 (Aha Moment 직후)

  2. 인센티브 설계 (제품 가치와 연결)

  3. 공유 채널 최적화 (링크, 이메일, SNS)

  4. 추적 시스템 구축 (UTM, 레퍼럴 코드)

  5. A/B 테스트로 인센티브/문구 최적화

  6. 어뷰징 방지 정책 수립


  ## 핵심 지표

  - K-factor: 바이럴 계수 (사용자당 초대 수 x 전환율)

  - 추천 전환율: 초대 링크 클릭 → 가입

  - 추천 참여율: 전체 사용자 중 추천한 비율


  ## DO

  - 추천 링크 생성을 1클릭으로 가능하게

  - 추천 현황 대시보드 제공 (투명성)

  - 가치 경험 직후에 추천 유도


  ## DON''T

  - 강압적 추천 팝업 남발하지 않기

  - 인센티브를 제품 가치와 무관하게 설정하지 않기

  - 어뷰징 방지 없이 런칭하지 않기

  '
