content: '콘텐츠 마케팅 (가치 있는 콘텐츠로 잠재 고객을 끌어온다):


  ## 적용 상황

  - 오가닉 트래픽 기반 장기적 고객 획득이 필요할 때

  - 브랜드 전문성과 신뢰를 구축해야 할 때

  - CAC(고객 획득 비용)를 낮추고 지속 가능한 성장을 원할 때


  ## 구현 방법


  ### 콘텐츠 퍼널

  | 단계 | 목적 | 콘텐츠 유형 |

  |------|------|-----------|

  | TOFU (인지) | 트래픽 유입 | 블로그, 인포그래픽, 소셜 포스트 |

  | MOFU (고려) | 리드 생성 | 가이드, 웨비나, 사례 연구 |

  | BOFU (결정) | 전환 | 무료 체험, 데모, 비교표 |


  ### 콘텐츠 캘린더

  - 주 1~2회 블로그 발행 (SEO 키워드 리서치 기반 주제 선정)

  - 월 1회 깊이 있는 가이드/백서 (리드 마그넷 용도)

  - 일 1~2회 소셜 포스트 (기존 콘텐츠 재가공 포함)


  ### 배포 채널

  - Owned: 블로그, 뉴스레터, 앱 내 콘텐츠

  - Earned: PR, 게스트 포스팅, 바이럴

  - Paid: 검색 광고, 소셜 광고, 스폰서 콘텐츠


  ## 주의사항

  - 콘텐츠 퍼널 전체를 커버해야 함. TOFU만 있으면 전환 안됨

  - SEO 효과는 3-6개월 후 나타남. 단기 성과 기대 금지

  - 양보다 질. 주 1회 고품질 > 매일 저품질 콘텐츠

  - 모든 콘텐츠에 명확한 CTA 포함 (다음 퍼널 단계로 유도)


  ### 측정 지표

  - TOFU: 트래픽, 소셜 공유, 백링크, 키워드 순위

  - MOFU: 이메일 구독, 다운로드, 체류 시간, 페이지 깊이

  - BOFU: 전환율, CAC, 콘텐츠 기여 매출, 파이프라인 기여도

  '
