content: "랜딩 페이지 설계 — AIDA 구조와 Fogg 행동 모델을 결합하여 전환율을 극대화하는 패턴:\n\n### Above-the-Fold\
  \ 구조 (스크롤 없이 보이는 영역)\n```\n┌─────────────────────────────────────────────────┐\n\
  │ [로고]                    [로그인] [무료 시작하기] │  ← 네비게이션 최소화\n│                    \
  \                              │\n│   팀 생산성을 34% 높이는                          │\
  \  ← 헤드라인 (이점 + 수치)\n│   프로젝트 관리의 새로운 방법                       │\n│            \
  \                                      │\n│   칸반 보드, 자동화, 실시간 협업으로             \
  \   │  ← 서브헤드 (HOW)\n│   매주 5시간을 절약하세요.                         │\n│           \
  \                                       │\n│        [무료로 시작하기]                 \
  \          │  ← Primary CTA (1개만)\n│   카드 등록 없이 14일 체험 | 2분 만에 설정          │  ←\
  \ 리스크 제거\n│                                                  │\n│   ⭐ 4.8/5 (2,341개\
  \ 리뷰) | 12,000+ 팀 사용      │  ← 소셜 프루프\n│   [삼성] [카카오] [토스] [배민] [당근]           \
  \   │  ← 로고월\n└─────────────────────────────────────────────────┘\n```\n\n### Fogg\
  \ 행동 모델 적용\n```\n행동 = 동기(Motivation) x 능력(Ability) x 촉발(Prompt)\n\n동기 ↑: 이점 중심 헤드라인,\
  \ 사회적 증거, 손실 회피 카피\n능력 ↑: 폼 필드 최소화 (이름 + 이메일만), 원클릭 가입\n촉발 ✓: 명확한 CTA 1개, 스크롤 시\
  \ CTA 반복, 긴급성 요소\n```\n\n### F-패턴 레이아웃 (시선 흐름)\n```\n시선 흐름:\n████████████████████\
  \  ← 헤드라인 (가로 스캔)\n████████████████      ← 서브헤드 (가로 스캔)\n████                  ←\
  \ CTA 버튼 (시선 정지)\n████████████          ← 소셜 프루프 (가로 스캔)\n██                   \
  \ ← 세로 스캔 시작\n██\n██\n핵심 요소는 F 패턴의 '가로선' 위치에 배치\n```\n\n### DO: 전환율 높이는 패턴\n```html\n\
  <!-- 이점 중심 헤드라인 (Feature X → Benefit O) -->\n<h1>매주 금요일 야근을 없애는 리포트 자동화</h1>\n<p>AI가\
  \ 데이터를 분석하고, 리포트를 자동 생성합니다.\n   매주 5시간을 전략 기획에 쓰세요.</p>\n\n<!-- CTA: 행동 동사 + 구체적\
  \ 결과 -->\n<button>무료로 리포트 자동화 시작하기</button>\n<p class=\"subtext\">30초 가입 | 카드 등록\
  \ 불필요 | 언제든 취소</p>\n\n<!-- 소셜 프루프를 CTA 근처에 배치 -->\n<div class=\"social-proof\">\n\
  \  <img src=\"/stars.svg\" /> 4.8/5 (2,341개 리뷰)\n  <span>| 이번 주 89명 가입</span>\n\
  </div>\n```\n\nDON'T:\n```html\n<!-- ❌ 복수 CTA가 경쟁 — 선택 마비 유발 -->\n<button>무료 시작</button>\n\
  <button>데모 예약</button>\n<button>가격 보기</button>\n<a href=\"/docs\">문서 보기</a>\n<!--\
  \ Hick's Law: 선택지가 많을수록 결정 시간 증가 → 이탈 -->\n\n<!-- ❌ 기능 중심 헤드라인 (사용자 이점 없음) -->\n\
  <h1>AI 기반 실시간 데이터 파이프라인 솔루션</h1>\n<!-- \"그래서 나한테 뭐가 좋은데?\"에 답하지 못함 -->\n\n<!-- ❌\
  \ 소셜 프루프 없음 -->\n<!-- 신뢰 요소 0 → \"이거 믿을 만해?\" 의구심 → 이탈 -->\n```\n\n### A/B 테스트 우선순위\
  \ (영향도 순)\n| 요소 | 테스트 예시 | 기대 전환율 변화 |\n|------|-----------|---------------|\n|\
  \ 헤드라인 | 이점형 vs 고통형 | +10~30% |\n| CTA 문구 | \"무료로 시작\" vs \"지금 체험\" | +5~15% |\n\
  | 소셜 프루프 위치 | CTA 위 vs 아래 | +3~10% |\n| 폼 필드 수 | 4개 → 2개 | +10~25% |\n| 페이지 로딩 속도\
  \ | 4초 → 2초 | +7~12% |\n\n### 필수 기준\n- 로딩 시간: 3초 이내 (1초 지연 → 전환율 7% 하락)\n- 모바일 최적화:\
  \ 트래픽 60%+ 모바일, 반드시 우선\n- CTA 버튼: 대비 높은 색상, 최소 44x44px 터치 영역\n"
