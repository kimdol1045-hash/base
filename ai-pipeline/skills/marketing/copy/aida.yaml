content: 'AIDA 프레임워크 — 주의 → 관심 → 욕구 → 행동 순서로 설득 구조를 설계한다.

  각 단계를 건너뛰면 전환율이 급락한다. 반드시 순서대로 전개한다.


  ### 1. Attention (주의) — 스크롤을 멈추게 하라

  목표: 3초 내 "이건 나한테 해당되는 이야기다" 인식

  도구: 헤드라인, 히어로 이미지, 숫자


  공식:

  - 숫자 공식: "[숫자] + [기간] + [결과]"

  - 질문 공식: "[고통 포인트]하고 계신가요?"

  - 네거티브: "[일반적 방법]으로는 [문제]를 해결할 수 없습니다"


  DO:

  ```

  "매출 리포트, 아직도 엑셀로 만드시나요?"

  "3일 만에 첫 고객을 만든 창업자 127명의 비결"

  "월 마케팅 비용 200만 원을 50만 원으로 줄인 방법"

  ```


  DON''T:

  ```

  "혁신적인 솔루션을 소개합니다" (추상적, 자기 중심적)

  "최고의 서비스" (검증 불가, 차별점 없음)

  "환영합니다!" (행동 유도 없음)

  ```


  ### 2. Interest (관심) — 계속 읽어야 할 이유를 제공하라

  목표: "이 글이 나한테 도움이 되겠다" 확신

  도구: 서브헤드, 구체적 이점, 문제 공감


  기법:

  - 고통 포인트 확대: 독자가 겪는 불편함을 구체적으로 묘사

  - 이점 제시: 기능(Feature)이 아닌 이점(Benefit) 중심

  - 대비 효과: Before/After 구조


  DO:

  ```

  "매주 금요일 밤, 리포트 만드느라 야근하셨죠.

  이제 버튼 하나로 자동 생성됩니다.

  남는 시간에 전략을 고민하세요."

  ```


  DON''T:

  ```

  "저희 솔루션은 AI 기반 데이터 파이프라인을 통해

  실시간 분석을 제공합니다." (기능 나열, 이점 없음)

  ```


  Feature vs Benefit 전환:

  | Feature (기능) | Benefit (이점) |

  |---------------|---------------|

  | AI 자동 분석 | 리포트 작성 시간 90% 절감 |

  | 클라우드 동기화 | 어디서든 팀과 실시간 협업 |

  | 256bit 암호화 | 고객 데이터 유출 걱정 제로 |

  | 원클릭 배포 | 개발자 없이 5분 만에 업데이트 |


  ### 3. Desire (욕구) — "나도 저렇게 되고 싶다"를 자극하라

  목표: 감정적 확신 → "이거 안 사면 손해"

  도구: 사회적 증거, 후기, 수치, 비교


  기법:

  - 구체적 수치: "도입 후 전환율 34% 증가"

  - 고객 후기: 이름 + 직함 + 구체적 결과

  - 비교표: 우리 vs 대안 (공정한 비교)

  - 손실 회피: "매월 200만 원이 낭비되고 있습니다"


  DO:

  ```

  "스타트업 대표 김OO님:

  ''3개월 만에 MRR이 2배가 됐습니다.

  마케팅팀 인원 추가 없이요.''"

  ```


  DON''T:

  ```

  "많은 고객이 만족하고 있습니다." (구체성 없음)

  "업계 최고의 솔루션입니다." (근거 없는 주장)

  ```


  ### 4. Action (행동) — 지금 당장 행동하게 하라

  목표: 마찰을 최소화하고, 즉시 행동을 유도

  도구: CTA 버튼, 리스크 제거, 긴급성


  기법:

  - 구체적 CTA: "행동 동사 + 결과" ("무료로 리포트 자동화 시작하기")

  - 리스크 제거: "14일 무료 체험 | 카드 등록 불필요 | 언제든 취소"

  - 적절한 긴급성: "이번 달 가입자 100명 한정 30% 할인" (거짓 긴급성 금지)

  - 선택 단순화: 주요 CTA 1개 + 보조 링크 1개 이하


  DO:

  ```

  [무료로 시작하기]  ← Primary CTA

  "카드 등록 없이 14일 체험 | 2분이면 설정 완료"


  또는


  [도입 사례 무료 다운로드]  ← Lead Magnet

  "이름과 이메일만 입력하세요"

  ```


  DON''T:

  ```

  [클릭하세요]  (결과 불명확)

  [자세히 보기] [문의하기] [데모 신청] [가입하기]  (선택지 과다)

  ```

  '
