content: "소셜 프루프 카피 (다른 사람이 쓴다는 증거로 신뢰를 구축한다):\n\n### 유형별 활용\n1. **숫자**: \"10,000+\
  \ 개발자가 사용 중\" — 가장 직관적\n2. **로고월**: 고객사 로고 5-8개 나열 (알려진 브랜드 우선)\n3. **후기/추천사**:\
  \ 실명+직책+사진 포함. 구체적 결과 언급.\n   - DO: \"배포 시간이 3시간에서 15분으로 줄었습니다. — 김OO, OO사 CTO\"\
  \n   - DON'T: \"좋은 제품입니다. — 익명\"\n4. **사례 연구**: Before→After 수치 중심\n   \"도입 전 주\
  \ 3회 장애 → 도입 후 월 0회\"\n5. **미디어 노출**: \"~에 소개되었습니다\" + 미디어 로고\n6. **실시간 증거**: \"\
  지금 42명이 보고 있습니다\" (과하면 조작처럼 보임)\n\n### 배치 위치\n- 히어로 섹션 아래 (첫 신뢰 구축)\n- 가격 페이지 (결정\
  \ 직전)\n- 가입 폼 옆 (전환 포인트)\n\n### 한국어 카피 예시\n- \"누적 가입자 50,000명 돌파\"\n- \"고객 평점 4.9/5.0\
  \ (1,200개 리뷰)\"\n- \"국내 스타트업 300곳이 선택한 이유\"\n"
