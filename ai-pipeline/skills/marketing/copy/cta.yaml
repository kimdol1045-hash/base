content: "CTA (Call to Action) 설계 — 사용자의 행동 마찰을 최소화하고 즉시 행동을 유도한다.\nCTA는 카피의 최종 목적지다.\
  \ 여기서 실패하면 모든 설득이 무의미해진다.\n\n### 1. CTA 문구 공식\n**공식: [행동 동사] + [구체적 결과/혜택]**\n\n\
  효과적인 CTA 문구 (DO):\n| 유형 | CTA 문구 | 이유 |\n|------|---------|------|\n| SaaS | \"\
  무료로 자동화 시작하기\" | 행동+혜택+리스크 제거 |\n| 커머스 | \"30% 할인가로 주문하기\" | 행동+구체적 혜택 |\n| 뉴스레터\
  \ | \"매주 인사이트 받아보기\" | 행동+기대 가치 |\n| 다운로드 | \"무료 가이드북 받기\" | 행동+무료+결과물 |\n| 상담 |\
  \ \"15분 무료 상담 예약하기\" | 행동+시간 구체화+무료 |\n| 데모 | \"나에게 맞는 플랜 찾기\" | 행동+개인화 |\n\n비효과적인\
  \ CTA 문구 (DON'T):\n| CTA 문구 | 문제점 |\n|---------|--------|\n| \"클릭하세요\" | 결과 불명확\
  \ |\n| \"자세히 보기\" | 행동이 아닌 탐색 |\n| \"제출\" | 비인간적, 결과 없음 |\n| \"여기를 눌러주세요\" | 모호,\
  \ 가치 없음 |\n| \"가입\" | 사용자에게 비용만 암시 |\n\n### 2. CTA 시각 설계 규칙\n- 색상: 페이지에서 가장 높은 대비\
  \ 색상 (Primary 색상)\n- 크기: 최소 높이 44px, 너비 최소 120px (모바일에서 전폭 권장)\n- 여백: CTA 주변 최소\
  \ 24px 빈 공간 (시각적 고립)\n- 위치: Above the Fold에 1개, 페이지 하단에 1개 (긴 페이지)\n- 개수: 주요 CTA\
  \ 1개 + 보조 CTA 최대 1개 (Hick's Law)\n\n```tsx\n{/* Primary CTA + 보조 텍스트 */}\n<div className=\"\
  flex flex-col items-center gap-3\">\n  <Button size=\"lg\" className=\"w-full sm:w-auto\
  \ min-w-[200px]\">\n    무료로 시작하기\n  </Button>\n  <p className=\"text-sm text-muted-foreground\"\
  >\n    카드 등록 불필요 · 14일 무료 체험 · 언제든 취소\n  </p>\n</div>\n```\n\n### 3. 리스크 제거 패턴 (Friction\
  \ Reducers)\nCTA 바로 아래에 불안 요소를 해소하는 텍스트를 배치한다.\n\n효과적인 리스크 제거 문구:\n- \"카드 등록 없이\
  \ 시작\" — 결제 불안 해소\n- \"14일 무료 체험\" — 비용 불안 해소\n- \"2분이면 설정 완료\" — 시간 부담 해소\n- \"\
  언제든 취소 가능\" — 구속 불안 해소\n- \"100% 환불 보장\" — 손실 불안 해소\n- \"10,000개 팀이 사용 중\" — 선택\
  \ 불안 해소\n\n### 4. 긴급성/희소성 (Scarcity & Urgency)\n남용하면 신뢰가 파괴된다. 진실한 경우에만 사용한다.\n\n\
  DO (진실한 긴급성):\n```\n\"얼리버드 할인: 6월 30일까지 (잔여 23석)\"\n\"이번 분기 도입 시 온보딩 무료 지원\"\n```\n\
  \nDON'T (거짓 긴급성):\n```\n\"지금 안 사면 영원히 못 삽니다!!!\"\n\"딱 1시간 남았습니다!\" (매일 반복되는 타이머)\n\
  \"마지막 기회!!!\" (매주 반복)\n```\n\n### 5. CTA 배치 전략 (페이지 유형별)\n- 랜딩 페이지: Hero CTA + 중간\
  \ CTA + 하단 CTA (3회 반복)\n- 블로그 포스트: 하단 CTA + 사이드바 CTA\n- 가격 페이지: 각 플랜별 CTA + 추천 플랜\
  \ 강조\n- 이메일: 상단 1개 CTA (스크롤 없이 보이는 위치)\n\n### 6. A/B 테스트 우선순위\nCTA 최적화 시 테스트 순서:\n\
  1. CTA 문구 (가장 큰 영향)\n2. CTA 색상/크기\n3. 리스크 제거 문구\n4. CTA 위치\n5. 보조 CTA 유무\n"
