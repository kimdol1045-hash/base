content: '# CTA 최적화 가이드


  ## 핵심 원칙

  - CTA 문구는 행동 + 결과를 포함

  - 시각적으로 페이지에서 가장 돋보여야 함

  - 마찰 감소 문구로 불안 해소

  - 하나의 화면에 주요 CTA는 1개


  ## CTA 문구 공식

  | 패턴 | 예시 |

  |------|------|

  | 동사 + 이점 | "무료로 시작하기" |

  | 동사 + 구체적 결과 | "30일 무료 체험 시작" |

  | 1인칭 | "내 보고서 받기" |

  | 긴급성 | "오늘만 50% 할인 받기" |


  ## 위치 최적화

  - Above the fold: 스크롤 없이 보이는 영역

  - 콘텐츠 중간: 가치 설명 직후

  - 페이지 하단: 전체 내용 읽은 후

  - 플로팅/스티키: 스크롤 시 항상 노출


  ## 마찰 감소 요소

  - "신용카드 불필요"

  - "1분이면 가입 완료"

  - "언제든 해지 가능"

  - 보안 배지, 이용자 수 표시


  ## DO

  - 대비가 높은 색상으로 버튼 강조

  - CTA 주변에 마찰 감소 문구 배치

  - A/B 테스트로 문구, 색상, 위치 최적화


  ## DON''T

  - "제출", "클릭" 같은 무의미한 CTA 사용하지 않기

  - 페이지에 동등한 CTA 3개 이상 배치하지 않기

  - CTA 색상을 배경과 비슷하게 하지 않기

  '
