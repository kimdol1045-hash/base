content: '정교화 가능성 모델 (ELM) — 타겟의 관여도에 따라 설득 경로를 달리 선택한다.

  잘못된 경로를 선택하면 메시지가 무시되거나 반발을 일으킨다.


  ### 관여도 판단 기준

  | 요소 | 고관여 (중심 경로) | 저관여 (주변 경로) |

  |------|-------------------|-------------------|

  | 가격 | 50만 원+ / 월 구독 | 5만 원 이하 / 단건 |

  | 의사결정 | 팀/상사 승인 필요 | 개인 즉시 결정 |

  | 리스크 | 실패 시 큰 손실 | 실패해도 부담 적음 |

  | 정보 욕구 | 상세 스펙, ROI 필요 | 감성, 후기면 충분 |

  | 구매 주기 | 분기/연간 | 충동/주간 |


  **원칙: 타겟의 관여도를 먼저 판단하고, 경로를 선택한다.**


  ---


  ### 중심 경로 (Central Route) — 고관여 타겟

  논리, 데이터, 비교로 설득한다. B2B SaaS, 엔터프라이즈, 고가 서비스.


  핵심 도구:

  - 구체적 수치: "ROI 340%", "처리 시간 73% 단축"

  - 비교표: 기능별 경쟁사 대비 장단점 (공정하게)

  - 케이스 스터디: 도입 전/후 수치 변화

  - 기술 상세: 아키텍처, 보안 인증, SLA

  - 논리적 구조: 문제 정의 → 원인 분석 → 해결 방법 → 증거 → 결론


  DO:

  ```

  "기존 수동 리포팅 프로세스:

  - 데이터 수집: 3시간

  - 분석 및 시각화: 4시간

  - 검토 및 수정: 2시간

  → 총 9시간/주


  DataFlow 도입 후:

  - 자동 수집 + 분석: 10분

  - AI 인사이트 생성: 5분

  - 검토만: 30분

  → 총 45분/주 (88% 절감)


  [14일 무료 체험 시작하기]

  엔터프라이즈 보안 인증: SOC2 Type II, ISO 27001"

  ```


  DON''T:

  ```

  "가장 빠른 데이터 분석 툴! 지금 바로 사용해보세요!"

  (고관여 타겟에게 감성 호소 → 신뢰 하락)

  ```


  ---


  ### 주변 경로 (Peripheral Route) — 저관여 타겟

  감정, 시각, 사회적 증거, 권위로 설득한다. B2C 커머스, 앱, 저가 서비스.


  핵심 도구:

  - 사회적 증거: "127,000명이 선택했습니다"

  - 권위: "OOO 전문가 추천", "Forbes 선정"

  - 감정 호소: 공포, 기대, 소속감, FOMO

  - 시각 자극: 히어로 이미지, 비포/애프터 사진

  - 희소성: "오늘만 40% 할인" (진실한 경우만)


  DO:

  ```

  "12만 명이 매일 아침 마시는 커피


  ''출근길 한 잔이 하루를 바꿔요'' - 김OO, 직장인


  ☆☆☆☆☆ 4.9/5 (리뷰 8,432개)


  [첫 구매 30% 할인받기]

  무료 배송 | 맛 보장 환불"

  ```


  DON''T:

  ```

  "저희 원두는 해발 1,500m 에티오피아 예가체프 지역의

  single origin으로, 미디엄 로스팅 프로파일은..."

  (저관여 타겟에게 전문 정보 과다 → 이탈)

  ```


  ---


  ### 혼합 전략 (Dual Route)

  일부 제품은 양쪽 경로를 모두 활용한다.


  예시: 중가 SaaS (월 5~30만 원)

  ```

  [주변 경로 → 관심 유도]

  "5,000개 팀이 선택한 프로젝트 관리 도구"


  [중심 경로 → 확신 부여]

  "평균 프로젝트 완료 기간 23% 단축

  Gantt, Kanban, 타임라인 뷰 지원

  Slack, Notion, GitHub 연동"


  [주변 경로 → 행동 유도]

  "지금 시작하면 첫 달 무료"

  ```

  '
