content: '# 일관성 원리 마케팅


  ## 적용 상황

  - 무료 → 유료 전환 퍼널을 최적화할 때

  - 온보딩 과정에서 사용자 이탈을 줄이고 싶을 때

  - 구독 갱신율이나 업셀 전환율을 높이고 싶을 때

  - 사용자 참여도를 점진적으로 높여야 할 때


  ## 구현 방법

  - Foot-in-the-door: 작은 무료 행동(이메일 입력, 퀴즈 참여) → 단계적 요청 확대

  - 프로그레스 바: 프로필 완성도, 온보딩 진행률을 시각화하여 완료 동기 부여

  - 이전 선택 상기: "지난번에 Pro 플랜에 관심을 보이셨습니다" 등 과거 행동 참조

  - 공개적 약속: 목표 설정, 커뮤니티 공유 등 공개적 커밋먼트 유도

  - 작은 승리 설계: 첫 5분 내 핵심 가치 경험 (Aha moment) 도달하도록 퍼널 설계

  - 매몰 비용 활용: 투자한 시간/데이터가 이탈 장벽으로 작용 (단, 윤리적 범위 내)

  - 구독 단계화: 월간 → 연간, Basic → Pro 단계적 업그레이드 경로 설계


  ## 주의사항

  - 강압적 약속 유도는 사용자 반발과 이탈을 가속화함

  - 첫 단계가 너무 크면 Foot-in-the-door 효과가 사라짐 (이메일만 OK, 신용카드 NO)

  - 다크 패턴과 일관성 원리의 경계를 명확히 인식. 사용자 이익에 부합해야 함

  - 약속을 상기시킬 때 압박이 아닌 도움의 톤을 유지할 것

  - A/B 테스트로 각 단계별 전환율을 측정하고 최적화

  '
