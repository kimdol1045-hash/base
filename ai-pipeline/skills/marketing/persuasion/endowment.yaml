content: '소유 효과 — 소유하면 가치가 올라간다 (WTA > WTP, 약 2배 차이):


  ### 핵심 원리

  사람은 자신이 소유한 것에 실제 가치보다 높은 가치를 부여한다.

  판매 의향 가격(WTA)이 구매 의향 가격(WTP)보다 약 2배 높다 (Kahneman et al., 1990).

  "내 것"이라는 느낌만으로도 이탈 비용이 심리적으로 증가한다.


  ### 적용 전략


  **1. Free Trial에서 "내 것" 만들기**

  무료 체험 기간에 사용자가 제품을 "소유"했다고 느끼게 한다.

  - 맞춤 설정 유도: 테마 색상, 로고 업로드, 도메인 연결

  - 데이터 생성 유도: 프로젝트 생성, 문서 작성, 팀 구성

  - 이름 부여 유도: "내 워크스페이스", "김민수의 대시보드"

  - 결과물 공유: 생성한 리포트를 팀/고객에게 공유


  **체험 기간 "소유" 퍼널**:

  ```

  Day 1: 가입 → 워크스페이스 이름 설정 → 로고 업로드

  Day 2: 첫 프로젝트 생성 → 데이터 연동

  Day 3: 대시보드 커스터마이징 → 위젯 배치

  Day 5: 팀원 초대 → 협업 시작

  Day 7: 첫 리포트 생성 → 고객에게 공유

  Day 10: "김민수님의 워크스페이스에 47개의 데이터가 쌓였습니다"

  Day 13: "무료 체험 종료 1일 전. 이 모든 것을 유지하시겠습니까?"

  ```


  **2. 커머스에서 가상 소유 효과**

  물리적 소유 전에 심리적 소유를 만든다.

  - AR 시착/시사: "이 소파가 우리 집 거실에 놓인 모습"

  - 맞춤 구성: "나만의 조합" (색상, 사이즈, 각인 선택)

  - 위시리스트: "내 리스트"에 추가 → 소유 착각

  - 장바구니: "장바구니에 담긴 상품"이라는 표현 자체가 소유 프레이밍


  **3. 무료 → 유료 전환 시 소유 효과 활용**

  ```

  ┌─────────────────────────────────────┐

  │  김민수님의 Pro 워크스페이스           │

  │                                      │

  │  ✓ 프로젝트 47개                     │

  │  ✓ 팀원 12명                        │

  │  ✓ 연동 서비스 5개                   │

  │  ✓ 맞춤 대시보드 3개                 │

  │  ✓ 누적 리포트 23건                  │

  │                                      │

  │  무료 체험이 내일 종료됩니다.          │

  │  구독하시면 모든 것이 그대로 유지됩니다.│

  │                                      │

  │  [Pro 유지하기 — ₩49,000/월]        │

  │  [해지하기 — 데이터 30일 후 삭제]     │

  └─────────────────────────────────────┘

  ```


  ### 한국어 카피 예시

  - "김민수님만의 맞춤 대시보드가 준비되었습니다"

  - "내 브랜드 색상으로 꾸며보세요"

  - "이미 김민수님의 데이터 1,247건이 분석되었습니다"

  - "이 리포트는 김민수님만 볼 수 있습니다"

  - "내 워크스페이스를 팀원과 함께 쓰세요"

  - "나만의 자동화 규칙을 만들어보세요"


  ### 설계 원칙

  - 가입 후 24시간 내에 최소 1개의 "내 것"을 만들게 한다

  - 사용자 이름을 UI 곳곳에 노출한다 ("김민수님의 OOO")

  - 커스터마이징 옵션을 초기에 제공한다 (테마, 레이아웃)

  - 생성한 데이터를 정량적으로 보여준다 (47개 프로젝트, 12명 팀원)

  '
