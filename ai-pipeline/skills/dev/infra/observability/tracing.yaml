content: "# 분산 추적(Distributed Tracing) 가이드\n\n## 핵심 원칙\n- 요청이 여러 서비스를 거치는 전체 경로를 추적한다\n\
  - OpenTelemetry를 표준 계측 프레임워크로 사용한다\n- 트레이스 ID로 관련된 모든 서비스의 로그와 메트릭을 연결한다\n- 샘플링으로\
  \ 비용을 관리하면서 중요한 요청은 반드시 추적한다\n\n## DO\n- OpenTelemetry SDK로 자동 계측(auto-instrumentation)을\
  \ 적용한다\n- 서비스 간 호출 시 트레이스 컨텍스트(W3C Trace Context)를 전파한다\n- 에러가 발생한 트레이스는 항상 수집한다\n\
  - 커스텀 스팬에 비즈니스 관련 속성을 추가한다\n\n## DON'T\n- 모든 요청을 100% 추적하지 않는다 (비용 관리, 1-10% 샘플링)\n\
  - 스팬에 개인정보나 민감 데이터를 포함하지 않는다\n- 트레이싱 장애가 애플리케이션에 영향을 미치도록 하지 않는다\n- 자체 트레이싱 솔루션을\
  \ 구축하지 않는다 (OpenTelemetry 사용)\n\n## 코드 예시\n```typescript\nimport { NodeSDK } from\
  \ \"@opentelemetry/sdk-node\";\nimport { OTLPTraceExporter } from \"@opentelemetry/exporter-trace-otlp-http\"\
  ;\nimport { getNodeAutoInstrumentations } from \"@opentelemetry/auto-instrumentations-node\"\
  ;\nimport { trace, SpanStatusCode } from \"@opentelemetry/api\";\n\n// SDK 초기화\n\
  const sdk = new NodeSDK({\n  traceExporter: new OTLPTraceExporter({\n    url: process.env.OTEL_EXPORTER_OTLP_ENDPOINT,\n\
  \  }),\n  instrumentations: [getNodeAutoInstrumentations()],\n  serviceName: \"\
  order-service\",\n});\nsdk.start();\n\n// 커스텀 스팬 생성\nconst tracer = trace.getTracer(\"\
  order-service\");\n\nasync function processOrder(orderId: string) {\n  return tracer.startActiveSpan(\"\
  processOrder\", async (span) => {\n    try {\n      span.setAttribute(\"order.id\"\
  , orderId);\n\n      const order = await tracer.startActiveSpan(\"fetchOrder\",\
  \ async (s) => {\n        const result = await db.orders.findById(orderId);\n  \
  \      s.end();\n        return result;\n      });\n\n      await tracer.startActiveSpan(\"\
  processPayment\", async (s) => {\n        await paymentService.charge(order);\n\
  \        s.setAttribute(\"payment.amount\", order.totalAmount);\n        s.end();\n\
  \      });\n\n      span.setStatus({ code: SpanStatusCode.OK });\n    } catch (err)\
  \ {\n      span.setStatus({ code: SpanStatusCode.ERROR, message: err.message });\n\
  \      span.recordException(err);\n      throw err;\n    } finally {\n      span.end();\n\
  \    }\n  });\n}\n```\n"
