content: "# 메트릭 수집 가이드\n\n## 핵심 원칙\n- RED(Rate, Errors, Duration) 메서드를 서비스 메트릭에 적용한다\n\
  - USE(Utilization, Saturation, Errors) 메서드를 리소스 메트릭에 적용한다\n- Prometheus + Grafana를\
  \ 메트릭 수집/시각화 표준으로 사용한다\n- 비즈니스 메트릭과 기술 메트릭을 모두 수집한다\n\n## DO\n- 4가지 골든 시그널(지연시간,\
  \ 트래픽, 에러, 포화도)을 수집한다\n- 히스토그램을 사용하여 백분위수(p50, p95, p99)를 계산한다\n- 메트릭 이름에 일관된 네이밍\
  \ 규칙을 적용한다\n- 레이블 카디널리티를 관리한다 (고유 값이 많은 레이블 주의)\n\n## DON'T\n- 사용자 ID 같은 높은 카디널리티\
  \ 값을 레이블에 넣지 않는다\n- 평균값에만 의존하지 않는다 (백분위수 확인)\n- 메트릭 수집이 애플리케이션 성능에 영향을 미치도록 하지 않는다\n\
  - Counter와 Gauge를 혼동하지 않는다\n\n## 코드 예시\n```typescript\nimport { Registry, Histogram,\
  \ Counter, Gauge } from \"prom-client\";\n\nconst register = new Registry();\nregister.setDefaultLabels({\
  \ service: \"order-service\" });\n\n// RED 메트릭\nconst httpRequestDuration = new\
  \ Histogram({\n  name: \"http_request_duration_seconds\",\n  help: \"HTTP 요청 처리\
  \ 시간\",\n  labelNames: [\"method\", \"route\", \"status_code\"],\n  buckets: [0.01,\
  \ 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5],\n  registers: [register],\n});\n\nconst httpRequestTotal\
  \ = new Counter({\n  name: \"http_requests_total\",\n  help: \"총 HTTP 요청 수\",\n\
  \  labelNames: [\"method\", \"route\", \"status_code\"],\n  registers: [register],\n\
  });\n\n// 비즈니스 메트릭\nconst ordersCreated = new Counter({\n  name: \"orders_created_total\"\
  ,\n  help: \"생성된 주문 수\",\n  labelNames: [\"payment_method\"],\n  registers: [register],\n\
  });\n\nconst activeConnections = new Gauge({\n  name: \"websocket_active_connections\"\
  ,\n  help: \"활성 WebSocket 연결 수\",\n  registers: [register],\n});\n\n// 미들웨어\napp.use((req,\
  \ res, next) => {\n  const end = httpRequestDuration.startTimer();\n  res.on(\"\
  finish\", () => {\n    const labels = { method: req.method, route: req.route?.path\
  \ ?? \"unknown\", status_code: res.statusCode };\n    end(labels);\n    httpRequestTotal.inc(labels);\n\
  \  });\n  next();\n});\n\n// /metrics 엔드포인트\napp.get(\"/metrics\", async (req, res)\
  \ => {\n  res.set(\"Content-Type\", register.contentType);\n  res.end(await register.metrics());\n\
  });\n```\n"
