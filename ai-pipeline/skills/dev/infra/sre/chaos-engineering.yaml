content: "# 카오스 엔지니어링 가이드\n\n## 핵심 원칙\n- 실험을 통해 시스템의 약점을 사전에 발견한다\n- 정상 상태(Steady\
  \ State)를 먼저 정의하고, 실험 후 비교한다\n- 실 환경에서 수행하되, 폭발 반경(Blast Radius)을 제한한다\n- 자동 중단\
  \ 조건(Abort Condition)을 설정한다\n\n## DO\n- 정상 상태 가설을 먼저 세운다 (\"서버 1대가 죽어도 에러율 < 1%\"\
  )\n- 스테이징에서 충분히 검증한 후 프로덕션에서 수행한다\n- 소규모부터 시작하여 점진적으로 범위를 넓힌다\n- Game Day를 정기적으로\
  \ 수행한다\n- Litmus, Chaos Mesh 같은 도구를 활용한다\n\n## DON'T\n- 모니터링/알림 없이 카오스 실험을 수행하지\
  \ 않는다\n- 자동 중단 조건 없이 실험하지 않는다\n- 팀에 알리지 않고 프로덕션에서 실험하지 않는다\n- 한 번에 여러 장애를 동시에 주입하지\
  \ 않는다\n\n## 실험 유형\n| 실험 | 방법 | 검증 대상 |\n|------|------|-----------|\n| 인스턴스 종료 |\
  \ Pod/VM 랜덤 종료 | 자동 복구, 로드밸런싱 |\n| 네트워크 지연 | tc 명령으로 지연 주입 | 타임아웃, 서킷브레이커 |\n| 네트워크\
  \ 파티션 | iptables로 통신 차단 | 장애 격리, 폴백 |\n| CPU/메모리 압박 | stress-ng 실행 | 오토스케일링, OOM\
  \ 처리 |\n| DNS 장애 | DNS 응답 차단 | DNS 캐싱, 폴백 |\n\n## 코드 예시\n```yaml\n# Chaos Mesh -\
  \ Pod 장애 실험\napiVersion: chaos-mesh.org/v1alpha1\nkind: PodChaos\nmetadata:\n  name:\
  \ pod-kill-experiment\nspec:\n  action: pod-kill\n  mode: one                # 1개\
  \ Pod만 대상\n  selector:\n    namespaces: [production]\n    labelSelectors:\n    \
  \  app: order-service\n  scheduler:\n    cron: \"@every 4h\"     # 4시간마다 실행\n  duration:\
  \ \"30s\"\n\n# 네트워크 지연 실험\napiVersion: chaos-mesh.org/v1alpha1\nkind: NetworkChaos\n\
  metadata:\n  name: network-delay-experiment\nspec:\n  action: delay\n  mode: all\n\
  \  selector:\n    labelSelectors:\n      app: payment-service\n  delay:\n    latency:\
  \ \"500ms\"\n    jitter: \"100ms\"\n  duration: \"5m\"\n```\n"
