content: "# Argo CD GitOps 가이드\n\n## 핵심 원칙\n- Git을 배포의 단일 진실 원천(Single Source of Truth)으로\
  \ 사용한다\n- Git 커밋으로 배포를 트리거하고, 롤백은 Git revert로 수행한다\n- Argo CD가 Git 상태와 클러스터 상태를\
  \ 자동으로 동기화한다\n- 선언적 배포로 재현 가능성과 감사 추적을 보장한다\n\n## DO\n- Application 매니페스트로 배포 대상을\
  \ 선언한다\n- 자동 동기화(auto-sync)를 프로덕션에서는 비활성화한다 (수동 승인)\n- 헬스 체크를 커스텀하여 배포 성공 여부를 정확히\
  \ 판단한다\n- App of Apps 패턴으로 여러 서비스를 관리한다\n\n## DON'T\n- kubectl apply를 직접 실행하지 않는다\
  \ (Git을 통해서만 변경)\n- Git 저장소에 시크릿을 평문으로 커밋하지 않는다 (Sealed Secrets 사용)\n- 프로덕션에서 auto-sync\
  \ + auto-prune을 동시에 활성화하지 않는다\n- 하나의 Application에 모든 서비스를 포함하지 않는다\n\n## 코드 예시\n\
  ```yaml\n# Argo CD Application 매니페스트\napiVersion: argoproj.io/v1alpha1\nkind: Application\n\
  metadata:\n  name: my-app-production\n  namespace: argocd\nspec:\n  project: default\n\
  \  source:\n    repoURL: https://github.com/org/k8s-manifests.git\n    targetRevision:\
  \ main\n    path: apps/my-app/overlays/production\n  destination:\n    server: https://kubernetes.default.svc\n\
  \    namespace: production\n  syncPolicy:\n    automated:\n      prune: false  \
  \     # 프로덕션: 자동 삭제 비활성화\n      selfHeal: true     # 수동 변경 자동 복구\n    syncOptions:\n\
  \      - CreateNamespace=true\n      - PruneLast=true\n    retry:\n      limit:\
  \ 3\n      backoff:\n        duration: 5s\n        maxDuration: 3m\n\n# App of Apps\
  \ 패턴 (루트 앱)\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name:\
  \ root-app\nspec:\n  source:\n    repoURL: https://github.com/org/k8s-manifests.git\n\
  \    path: apps\n  destination:\n    server: https://kubernetes.default.svc\n```\n\
  \n```\n# 디렉토리 구조 (Kustomize)\napps/\n├── my-app/\n│   ├── base/\n│   │   ├── deployment.yaml\n\
  │   │   ├── service.yaml\n│   │   └── kustomization.yaml\n│   └── overlays/\n│ \
  \      ├── staging/\n│       │   └── kustomization.yaml\n│       └── production/\n\
  │           └── kustomization.yaml\n```\n"
