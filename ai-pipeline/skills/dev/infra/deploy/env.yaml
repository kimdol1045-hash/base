content: '환경변수 관리 규칙 (12-Factor: Config):


  ## 핵심 원칙

  - 모든 설정은 환경변수로 분리. 코드에 하드코딩 절대 금지

  - 설정은 배포 환경마다 달라지는 값. 코드는 모든 환경에서 동일

  - 환경변수가 없으면 앱이 시작 시 즉시 실패해야 함 (fail-fast)


  ## DO

  - .env.example: 모든 키를 빈 값으로 커밋 (실제 값 커밋 금지)

  - .env.local: 로컬 개발용 (gitignore 필수)

  - 환경별 분리: development / staging / production

  - 시크릿(API 키, DB 비밀번호): 플랫폼 시크릿 매니저 사용 (AWS SSM, Vault)

  - 네이밍: SCREAMING_SNAKE_CASE (DATABASE_URL, NEXT_PUBLIC_API_URL)

  - Next.js: 클라이언트 노출은 NEXT_PUBLIC_ 접두사만

  - 앱 시작 시 필수 환경변수 존재 여부 검증 (zod, envalid 등)

  - 환경변수 변경 시 .env.example도 함께 업데이트


  ## DON''T

  - .env 파일을 git에 커밋하지 말 것

  - 시크릿을 로그에 출력하지 말 것 (마스킹 필수)

  - 환경변수에 JSON이나 복잡한 구조를 넣지 말 것 (파싱 에러 위험)

  - 프로덕션 시크릿을 로컬에서 사용하지 말 것

  - 기본값으로 프로덕션 URL을 설정하지 말 것 (안전한 기본값 사용)

  '
