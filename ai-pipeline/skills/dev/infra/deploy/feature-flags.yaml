content: "피처 플래그 — 코드 배포와 기능 릴리즈를 분리하여 점진적 출시와 즉각 롤백을 가능하게 하는 패턴:\n\n### 플래그 4가지 유형\n\
  | 유형 | 수명 | 용도 | 예시 |\n|------|------|------|------|\n| Release Flag | 1~2주 | 점진적\
  \ 기능 출시 | `new-checkout-flow` |\n| Experiment Flag | 2~4주 | A/B 테스트 | `pricing-page-variant-b`\
  \ |\n| Ops Flag | 영구 | 운영 제어 (Kill Switch) | `enable-external-api` |\n| Permission\
  \ Flag | 영구 | 사용자/플랜 권한 | `enterprise-analytics` |\n\n### 점진적 롤아웃 전략\n```\n1% →\
  \ 내부 QA 팀 (dogfooding)\n10% → 얼리 어답터 코호트\n50% → 전체 사용자 절반 (안정성 확인)\n100% → 전체 출시\n\
  각 단계에서 에러율 > 0.5% 또는 p95 레이턴시 > 500ms 시 자동 롤백\n```\n\n### 구현 패턴 (LaunchDarkly /\
  \ Unleash / Custom)\n```typescript\n// DO: 플래그 평가를 edge에서, 기본값 항상 명시\nimport { getFlag\
  \ } from \"@/lib/feature-flags\";\n\nasync function checkoutPage(userId: string)\
  \ {\n  const useNewCheckout = await getFlag(\"new-checkout-flow\", {\n    userId,\n\
  \    default: false,           // 플래그 서버 장애 시 기본값\n    percentage: 10,         \
  \  // 10% 롤아웃\n  });\n\n  if (useNewCheckout) {\n    return renderNewCheckout();\n\
  \  }\n  return renderLegacyCheckout();\n}\n\n// Kill Switch: Ops 플래그로 외부 의존성 즉시\
  \ 차단\nconst externalApiEnabled = await getFlag(\"enable-external-api\", {\n  default:\
  \ true,              // 기본은 활성\n  killSwitch: true,           // 대시보드에서 즉시 비활성화\
  \ 가능\n});\n```\n\nDON'T:\n```typescript\n// ❌ 중첩 플래그 조건 — 디버깅 불가능\nif (flagA &&\
  \ !flagB && (flagC || flagD)) {\n  // 16가지 조합... 테스트 불가능\n}\n\n// ❌ 플래그를 영구 설정으로\
  \ 사용\nif (getFlag(\"dark-mode-enabled\")) { ... }\n// → 이건 user preference이지 feature\
  \ flag가 아님\n\n// ❌ 정리 계획 없는 플래그\n// 6개월 된 release flag 200개 → 기술 부채 폭발\n```\n\n\
  ### 플래그 정리 라이프사이클\n```\n생성 → TTL 설정 (release: 14일, experiment: 30일)\n→ 100% 롤아웃\
  \ 완료 → Jira 티켓 자동 생성\n→ 코드에서 플래그 분기 제거 → 플래그 아카이브\n월 1회 stale flag 감사: 마지막 평가 >\
  \ 30일인 플래그 자동 알림\n```\n\n### 플래그 네이밍 컨벤션\n- Release: `release-{feature-name}` (예:\
  \ `release-new-checkout`)\n- Experiment: `exp-{test-name}` (예: `exp-pricing-v2`)\n\
  - Ops: `ops-{system-name}` (예: `ops-external-payment`)\n- Permission: `perm-{capability}`\
  \ (예: `perm-advanced-analytics`)\n"
