content: "# AI 에이전트 패턴 가이드\n\n## 핵심 원칙\n- 에이전트는 LLM이 도구(Tool)를 사용하여 작업을 수행하는 패턴이다\n\
  - ReAct(Reasoning + Acting) 루프로 추론과 실행을 반��한다\n- 도구 정의를 명확히 하여 LLM이 올바르게 선택하도록 한다\n\
  - 에이전트의 행동 범위를 제한하여 안전성을 확보한다\n\n## DO\n- 각 도구의 이름, 설명, 파라미터를 명확히 정의한다\n- 최대 실행\
  \ 단계(max iterations)를 설정한다\n- 도구 실행 결과를 에이전트에 피드백한다\n- 에이전트의 추론 과정(thought)을 로깅한다\n\
  - 위험한 도구(삭제, 결제)에는 확인 단계를 추가한다\n\n## DON'T\n- 에이전트에게 무제한 도구 접근 권한을 주지 않는다\n- 도구\
  \ 실행 결과를 검증하지 않고 사용자에게 전달하지 않는다\n- 무한 루프에 빠질 수 있는 에이전트를 방치하지 않는다\n- 모든 작업에 에이전트를\
  \ 사용하지 않는다 (단순 작업은 직접 처리)\n\n## 코드 예시\n```typescript\nimport Anthropic from \"@anthropic-ai/sdk\"\
  ;\n\nconst tools = [\n  {\n    name: \"search_database\",\n    description: \"데이터베이스에서\
  \ 사용자 정보를 검색합니다\",\n    input_schema: {\n      type: \"object\",\n      properties:\
  \ {\n        query: { type: \"string\", description: \"검색 쿼리\" },\n        limit:\
  \ { type: \"number\", description: \"최대 결과 수\", default: 10 },\n      },\n     \
  \ required: [\"query\"],\n    },\n  },\n  {\n    name: \"send_email\",\n    description:\
  \ \"이메일을 전송합니다. 반드시 사용자 확인 후 실행하세요.\",\n    input_schema: {\n      type: \"object\"\
  ,\n      properties: {\n        to: { type: \"string\" },\n        subject: { type:\
  \ \"string\" },\n        body: { type: \"string\" },\n      },\n      required:\
  \ [\"to\", \"subject\", \"body\"],\n    },\n  },\n];\n\n// ReAct 루프\nasync function\
  \ runAgent(userMessage: string, maxSteps = 10) {\n  const messages = [{ role: \"\
  user\", content: userMessage }];\n\n  for (let step = 0; step < maxSteps; step++)\
  \ {\n    const response = await anthropic.messages.create({\n      model: \"claude-sonnet-4-20250514\"\
  ,\n      tools,\n      messages,\n      max_tokens: 4096,\n    });\n\n    if (response.stop_reason\
  \ === \"end_turn\") {\n      return response.content; // 최종 응답\n    }\n\n    //\
  \ 도구 호출 처리\n    for (const block of response.content) {\n      if (block.type ===\
  \ \"tool_use\") {\n        const result = await executeTool(block.name, block.input);\n\
  \        messages.push({ role: \"assistant\", content: response.content });\n  \
  \      messages.push({\n          role: \"user\",\n          content: [{ type: \"\
  tool_result\", tool_use_id: block.id, content: result }],\n        });\n      }\n\
  \    }\n  }\n}\n```\n"
