content: "# AI 스트리밍 응답 가��드\n\n## 핵심 원칙\n- LLM 응답을 토큰 단위로 스트리밍하여 체감 응답 시간을 단축한다\n\
  - Server-Sent Events(SSE)를 기본 프로토콜로 사용한다\n- 스트리밍 중 에러 처리와 연결 끊김을 안전하게 처리한다\n- 전체\
  \ 응답을 기다리지 않고 점진적으로 UI를 업데이트한다\n\n## DO\n- SSE(`text/event-stream`)로 스트리밍 엔드포인트를\
  \ 구현한다\n- 클라이언트에서 `ReadableStream`으로 토큰을 실시간 렌더링한다\n- 스트리밍 중단(abort) 기능을 제공한다\n\
  - 스트리밍 완료 후 전체 응답을 저장/캐시한다\n\n## DON'T\n- 짧은 응답(한 문장)에 스트리밍을 불필요하게 적용하지 않는다\n- 스트리밍\
  \ 중 에러를 무시하지 않는다\n- SSE 연결을 타임아웃 없이 유지하지 않는다\n- 스트리밍 응답을 파싱하지 않고 raw로 출력하지 않는다\n\
  \n## 코드 예시\n```typescript\n// 서버: SSE 스트리밍 엔드포인트\napp.post(\"/api/chat\", async\
  \ (req, res) => {\n  res.setHeader(\"Content-Type\", \"text/event-stream\");\n \
  \ res.setHeader(\"Cache-Control\", \"no-cache\");\n  res.setHeader(\"Connection\"\
  , \"keep-alive\");\n\n  const stream = await openai.chat.completions.create({\n\
  \    model: \"gpt-4o\",\n    messages: req.body.messages,\n    stream: true,\n \
  \ });\n\n  for await (const chunk of stream) {\n    const content = chunk.choices[0]?.delta?.content;\n\
  \    if (content) {\n      res.write(`data: ${JSON.stringify({ content })}\\n\\\
  n`);\n    }\n  }\n  res.write(\"data: [DONE]\\n\\n\");\n  res.end();\n});\n\n//\
  \ 클라이언트: 스트리밍 읽기\nasync function streamChat(messages: Message[], onToken: (token:\
  \ string) => void) {\n  const response = await fetch(\"/api/chat\", {\n    method:\
  \ \"POST\",\n    headers: { \"Content-Type\": \"application/json\" },\n    body:\
  \ JSON.stringify({ messages }),\n  });\n\n  const reader = response.body!.getReader();\n\
  \  const decoder = new TextDecoder();\n  let buffer = \"\";\n\n  while (true) {\n\
  \    const { done, value } = await reader.read();\n    if (done) break;\n\n    buffer\
  \ += decoder.decode(value, { stream: true });\n    const lines = buffer.split(\"\
  \\n\\n\");\n    buffer = lines.pop()!;\n\n    for (const line of lines) {\n    \
  \  const data = line.replace(\"data: \", \"\");\n      if (data === \"[DONE]\")\
  \ return;\n      const { content } = JSON.parse(data);\n      onToken(content);\n\
  \    }\n  }\n}\n```\n"
