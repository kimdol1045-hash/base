content: "# 임베딩(Embedding) 가이드\n\n## 핵심 원칙\n- 텍스트를 의미론적 벡터 공간에 매핑하여 유사도를 계산한다\n- 임베딩\
  \ 모델 선택은 성능에 큰 영향을 미친다\n- 용도(검색, 분류, 클러스터링)에 맞는 모델을 선택한다\n- 벡터 DB에 저장하여 근사 최근접 이웃(ANN)\
  \ 검색을 수행한다\n\n## DO\n- 용도에 맞는 임베딩 모델을 선택한다 (다국어: multilingual-e5-large)\n- 입력 텍스트를\
  \ 전처리하여 노이즈를 제거한다\n- 차원 축소가 필요하면 PCA나 Matryoshka 표현을 활용한다\n- 임베딩 결과를 캐시하여 비용을 절감한다\n\
  - 코사인 유사도를 기본 유사도 메트릭으로 사용한���\n\n## DON'T\n- 모든 용도에 동일한 임베딩 모델을 사용하지 않는다\n- 너무\
  \ 긴 텍스트를 임베딩하지 않는다 (모델별 최대 토큰 확인)\n- 임베딩 모델을 자주 변경하지 않는다 (변경 시 전체 재임베딩 필요)\n- 유클리드\
  \ 거리로 정규화되지 않은 임베딩을 비교하지 않는다\n\n## 코드 예��\n```typescript\nimport OpenAI from \"\
  openai\";\nimport { QdrantClient } from \"@qdrant/js-client-rest\";\n\nconst openai\
  \ = new OpenAI();\nconst qdrant = new QdrantClient({ url: process.env.QDRANT_URL\
  \ });\n\n// 임베딩 생성\nasync function embed(texts: string[]): Promise<number[][]> {\n\
  \  const response = await openai.embeddings.create({\n    model: \"text-embedding-3-small\"\
  ,\n    input: texts,\n    dimensions: 512, // 차원 축소 (비용/성능 트레이드오프)\n  });\n  return\
  \ response.data.map(d => d.embedding);\n}\n\n// 벡터 DB에 저장\nasync function indexDocuments(docs:\
  \ Document[]) {\n  const texts = docs.map(d => d.content);\n  const embeddings =\
  \ await embed(texts);\n\n  await qdrant.upsert(\"documents\", {\n    points: docs.map((doc,\
  \ i) => ({\n      id: doc.id,\n      vector: embeddings[i],\n      payload: { content:\
  \ doc.content, source: doc.source },\n    })),\n  });\n}\n\n// 유사 문서 검색\nasync function\
  \ search(query: string, limit = 5) {\n  const [queryVector] = await embed([query]);\n\
  \  return qdrant.search(\"documents\", {\n    vector: queryVector,\n    limit,\n\
  \    score_threshold: 0.7,\n  });\n}\n```\n"
