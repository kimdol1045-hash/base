content: "# Function Calling(Tool Use) 가이드\n\n## 핵심 원칙\n- LLM이 구조화된 함수 호출을 생성하여 외부\
  \ 시스템과 상호작용한다\n- 함수 스키마를 명확히 정의하여 LLM이 올바르게 호출하도록 한다\n- 함수 실행 결과를 LLM에 다시 제공하여 최종\
  \ 응답을 생성한다\n- 병렬 함수 호출을 지원하여 효율성을 높인다\n\n## DO\n- 함수 이름, 설명, 파라미터를 명확하고 구체적으로 정의한다\n\
  - 파라미터에 enum, description을 포함하여 호출 정확도를 높인다\n- 함수 실행 전 파라미터를 유효성 검사한다\n- 함수 결과를\
  \ 구조화된 형식으로 LLM에 반환한다\n\n## DON'T\n- 너무 많은 함수(20개 이상)를 한 번에 제공하지 않는다\n- 함수 설명을 모호하게\
  \ 작성하지 않는다\n- LLM이 생성한 파라미터를 검증 없이 실행하지 않는다 (SQL 인젝션 등)\n- 부작용이 있는 함수를 확인 없이 자동\
  \ 실행하지 않는다\n\n## ��드 예시\n```typescript\nimport Anthropic from \"@anthropic-ai/sdk\"\
  ;\n\nconst tools: Anthropic.Tool[] = [\n  {\n    name: \"get_weather\",\n    description:\
  \ \"특정 도시의 현재 날씨 정보를 조회합니다\",\n    input_schema: {\n      type: \"object\",\n  \
  \    properties: {\n        city: { type: \"string\", description: \"도시명 (예: 서울,\
  \ 부산)\" },\n        unit: {\n          type: \"string\",\n          enum: [\"celsius\"\
  , \"fahrenheit\"],\n          description: \"온도 단위\",\n          default: \"celsius\"\
  ,\n        },\n      },\n      required: [\"city\"],\n    },\n  },\n  {\n    name:\
  \ \"search_products\",\n    description: \"상품을 검색합니다\",\n    input_schema: {\n \
  \     type: \"object\",\n      properties: {\n        query: { type: \"string\"\
  \ },\n        category: { type: \"string\", enum: [\"전자기기\", \"의류\", \"식품\"] },\n\
  \        maxPrice: { type: \"number\", description: \"최대 가격 (원)\" },\n      },\n\
  \      required: [\"query\"],\n    },\n  },\n];\n\n// 함수 실행 맵\nconst toolHandlers:\
  \ Record<string, (input: unknown) => Promise<string>> = {\n  get_weather: async\
  \ (input: { city: string; unit?: string }) => {\n    const weather = await weatherApi.getCurrent(input.city);\n\
  \    return JSON.stringify(weather);\n  },\n  search_products: async (input: { query:\
  \ string; category?: string }) => {\n    const products = await productApi.search(input);\n\
  \    return JSON.stringify(products.slice(0, 5)); // 상위 5개만\n  },\n};\n\n// Tool\
  \ Use 루프\nasync function chat(userMessage: string) {\n  let messages: Anthropic.MessageParam[]\
  \ = [\n    { role: \"user\", content: userMessage },\n  ];\n\n  while (true) {\n\
  \    const response = await anthropic.messages.create({\n      model: \"claude-sonnet-4-6\"\
  ,\n      tools,\n      messages,\n      max_tokens: 1024,\n    });\n\n    if (response.stop_reason\
  \ === \"end_turn\") {\n      return response.content[0].text;\n    }\n\n    messages.push({\
  \ role: \"assistant\", content: response.content });\n    const toolResults = [];\n\
  \    for (const block of response.content) {\n      if (block.type === \"tool_use\"\
  ) {\n        const result = await toolHandlers[block.name](block.input);\n     \
  \   toolResults.push({ type: \"tool_result\", tool_use_id: block.id, content: result\
  \ });\n      }\n    }\n    messages.push({ role: \"user\", content: toolResults\
  \ });\n  }\n}\n```\n"
