content: "# AI 가드레일(Guardrails) 가이��\n\n## 핵심 원칙\n- LLM 입출력에 안전장치를 설정하여 유해한 사용을 방지한다\n\
  - 프롬프트 인젝션, 데이터 유출, 유해 콘텐츠를 차단한다\n- 입력 검증(Input Guard)과 출력 검증(Output Guard)을 모두\
  \ 적용한다\n- 가드레일 우회 시도를 로깅하고 모니터링한다\n\n## DO\n- 입력에서 프롬프트 인젝션 패턴을 감지한다\n- 출력에서 개인정보(PII),\
  \ 민감 데이터를 필터링한다\n- 허용된 주제/도메인을 벗어나는 요청을 차단한다\n- 토큰 사용량에 상한을 설정한다\n- 콘텐츠 안전성 분류기를\
  \ 출력에 적용한다\n\n## DON'T\n- LLM의 자체 판단만으로 안전성을 보장하지 않는다\n- 시스템 프롬프트에 민감한 정보를 포함하지\
  \ 않는다\n- 가드레일 없이 LLM을 사용자 입력에 직접 노출하지 않는다\n- 모든 가드레일을 LLM 기반으로만 구현하지 않는다 (규칙 기반\
  \ 병행)\n\n## 코드 예시\n```typescript\n// 입력 가드레일\nfunction validateInput(input: string):\
  \ { safe: boolean; reason?: string } {\n  // 1. 길이 제한\n  if (input.length > 10_000)\
  \ {\n    return { safe: false, reason: \"입력이 너무 깁니다\" };\n  }\n\n  // 2. 프롬프트 인젝션\
  \ 패턴 감지\n  const injectionPatterns = [\n    /ignore\\s+(previous|above|all)\\s+instructions/i,\n\
  \    /you\\s+are\\s+now/i,\n    /system\\s*:\\s*/i,\n    /\\[INST\\]/i,\n  ];\n\
  \  for (const pattern of injectionPatterns) {\n    if (pattern.test(input)) {\n\
  \      return { safe: false, reason: \"잠재적 프롬프트 인젝션 감지\" };\n    }\n  }\n\n  return\
  \ { safe: true };\n}\n\n// 출력 가드레일\nfunction validateOutput(output: string): string\
  \ {\n  // PII 마스킹\n  let sanitized = output\n    .replace(/\\b\\d{3}-\\d{2}-\\d{4}\\\
  b/g, \"[SSN]\")\n    .replace(/\\b[\\w.-]+@[\\w.-]+\\.\\w{2,}\\b/g, \"[EMAIL]\"\
  )\n    .replace(/\\b\\d{13,16}\\b/g, \"[CARD]\");\n\n  return sanitized;\n}\n\n\
  // 전체 파이프라인\nasync function safeLLMCall(userInput: string) {\n  const inputCheck\
  \ = validateInput(userInput);\n  if (!inputCheck.safe) {\n    logger.warn({ reason:\
  \ inputCheck.reason }, \"입력 가드레일 차단\");\n    return { error: \"요청을 처리할 수 없습니다\"\
  \ };\n  }\n\n  const response = await llm.chat({ messages: [/* ... */] });\n  const\
  \ safeOutput = validateOutput(response.content);\n\n  return { result: safeOutput\
  \ };\n}\n```\n"
