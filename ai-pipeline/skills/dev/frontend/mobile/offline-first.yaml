content: "# 오프라인 퍼스트(Offline-First) 가이드\n\n## 핵심 원칙\n- 네트워크가 없어도 앱의 핵심 기능이 동작하도록 설계한다\n\
  - 로컬 저장소를 진실의 원천(Source of Truth)으로 사용한다\n- 온라인 복귀 시 서버와 자동 동기화한다\n- 충돌(Conflict)\
  \ 해결 전략을 미리 정의한다\n\n## DO\n- CRDT 또는 Last-Write-Wins로 충돌 해결 전략을 선택한다\n- 오프라인 변경\
  \ 사항을 큐에 저장하고 온라인 시 순서대로 동기화한다\n- 동기화 상태(동기화됨, 동기화 중, 미동기화)를 사용자에게 표시한다\n- 네트워크\
  \ 상태 변화를 감지하여 자동 동기화를 트리거한다\n\n## DON'T\n- 오프라인 상태에서 앱 전체가 동작하지 않도록 하지 않는다\n- 무한정\
  \ 오프라인 데이터를 쌓지 않는다 (저장소 한도 관리)\n- 충돌 해결 없이 덮어쓰기만 하지 않는다\n- 동기화 실패를 사용자에게 알리지 않고\
  \ 묵인하지 않는다\n\n## 코드 예시\n```typescript\n// 오프라인 큐 기반 동기화\ninterface PendingOperation\
  \ {\n  id: string;\n  type: \"create\" | \"update\" | \"delete\";\n  entity: string;\n\
  \  data: unknown;\n  createdAt: number;\n}\n\nclass OfflineSyncManager {\n  private\
  \ queue: PendingOperation[] = [];\n\n  async performOperation(op: Omit<PendingOperation,\
  \ \"id\" | \"createdAt\">) {\n    // 1. 로컬 저장소에 즉시 반영\n    await localDb.apply(op);\n\
  \n    // 2. 큐에 추가\n    const pending = { ...op, id: generateId(), createdAt: Date.now()\
  \ };\n    this.queue.push(pending);\n    await AsyncStorage.setItem(\"sync_queue\"\
  , JSON.stringify(this.queue));\n\n    // 3. 온라인이면 즉시 동기화 시도\n    if (navigator.onLine)\
  \ await this.sync();\n  }\n\n  async sync() {\n    const queue = [...this.queue];\n\
  \    for (const op of queue) {\n      try {\n        await api.sync(op);\n     \
  \   this.queue = this.queue.filter(q => q.id !== op.id);\n      } catch (err) {\n\
  \        if (isConflict(err)) {\n          await this.resolveConflict(op, err.serverData);\n\
  \        } else {\n          break; // 네트워크 에러면 중단\n        }\n      }\n    }\n\
  \    await AsyncStorage.setItem(\"sync_queue\", JSON.stringify(this.queue));\n \
  \ }\n\n  private async resolveConflict(local: PendingOperation, serverData: unknown)\
  \ {\n    // Last-Write-Wins: 타임스탬프 비교\n    if (local.createdAt > (serverData as\
  \ any).updatedAt) {\n      await api.forceUpdate(local);\n    }\n    this.queue\
  \ = this.queue.filter(q => q.id !== local.id);\n  }\n}\n\n// 네트워크 상태 감지\nwindow.addEventListener(\"\
  online\", () => syncManager.sync());\n```\n"
