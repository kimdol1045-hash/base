content: "# React Native 개발 가이드\n\n## 핵심 원칙\n- Expo를 기본 도구로 사용하여 개발 경험을 극대화한다\n- 네이티브\
  \ 모듈이 꼭 필요한 경우에만 Bare Workflow로 전환한다\n- 플랫폼별 차이를 `Platform.OS`로 처리한다\n- 성능 최적화는\
  \ FlatList와 memo를 기본으로 한다\n\n## DO\n- Expo SDK를 활용하여 카메라, 위치, 알림 등을 구현한다\n- React\
  \ Navigation으로 네비게이션을 구성한다\n- 목록에는 반드시 `FlatList`를 사용한다 (`ScrollView` + map 금지)\n\
  - TypeScript strict 모드를 사용한다\n- OTA(Over-the-Air) 업데이트를 활용한다\n\n## DON'T\n- `ScrollView`\
  \ 안에 대량 데이터를 렌더링하지 않는다\n- 인라인 스타일을 반복 생성하지 않는다 (`StyleSheet.create` 사용)\n- JS 스레드에서\
  \ 무거운 연산을 실행하지 않는다\n- 웹과 동일한 CSS 단위를 사용하지 않는다 (dp 기반)\n\n## 코드 예시\n```tsx\nimport\
  \ { FlatList, StyleSheet, Text, View, Platform } from \"react-native\";\nimport\
  \ { SafeAreaView } from \"react-native-safe-area-context\";\n\ninterface User {\n\
  \  id: string;\n  name: string;\n  email: string;\n}\n\nfunction UserItem({ user\
  \ }: { user: User }) {\n  return (\n    <View style={styles.item}>\n      <Text\
  \ style={styles.name}>{user.name}</Text>\n      <Text style={styles.email}>{user.email}</Text>\n\
  \    </View>\n  );\n}\n\nexport function UserListScreen() {\n  const { data, isLoading,\
  \ refetch } = useUsers();\n\n  return (\n    <SafeAreaView style={styles.container}>\n\
  \      <FlatList\n        data={data}\n        keyExtractor={(item) => item.id}\n\
  \        renderItem={({ item }) => <UserItem user={item} />}\n        refreshing={isLoading}\n\
  \        onRefresh={refetch}\n        ItemSeparatorComponent={() => <View style={styles.separator}\
  \ />}\n        contentContainerStyle={styles.list}\n      />\n    </SafeAreaView>\n\
  \  );\n}\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, backgroundColor:\
  \ \"#fff\" },\n  list: { padding: 16 },\n  item: {\n    paddingVertical: 12,\n \
  \   paddingHorizontal: Platform.OS === \"ios\" ? 16 : 12,\n  },\n  name: { fontSize:\
  \ 16, fontWeight: \"600\" },\n  email: { fontSize: 14, color: \"#666\", marginTop:\
  \ 4 },\n  separator: { height: 1, backgroundColor: \"#eee\" },\n});\n```\n"
