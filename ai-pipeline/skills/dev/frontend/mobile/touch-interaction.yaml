content: "# 터치 인터랙션 가이드\n\n## 핵심 원칙\n- 터치 대상은 최소 44x44px (iOS) / 48x48dp (Android)를\
  \ 유지한다\n- 제스처는 직관적이고 되돌릴 수 있어야 한다\n- 시각적 피드백을 즉시 제공한다 (탭 → 하이라이트)\n- 실수로 인한 의도치\
  \ 않은 동작을 방지한다\n\n## DO\n- 스와이프, 드래그 등 제스처에 애니메이션 피드백을 제공한다\n- 삭제 같은 위험한 동작에 확인 단계를\
  \ 추가한다\n- Pull-to-Refresh 패턴을 목록에 구현한다\n- 엣지 스와이프(뒤로 가기)를 네이티브 제스처와 충돌하지 않게 한다\n\
  \n## DON'T\n- 호버(hover) 전용 인터랙션을 터치 환경에서 사용하지 않는다\n- 더블탭을 유일한 인터랙션 수단으로 사용하지 않는다\n\
  - 스크롤 영역 안에 스와이프 제스처를 중첩하지 않는다\n- 터치 대상 간 간격을 8px 미만으로 하지 않는다\n\n## 코드 예시\n```tsx\n\
  // React Native 스와이프 삭제\nimport { Swipeable } from \"react-native-gesture-handler\"\
  ;\nimport Animated from \"react-native-reanimated\";\n\nfunction SwipeableRow({\
  \ children, onDelete }: SwipeableRowProps) {\n  const renderRightActions = (progress:\
  \ Animated.SharedValue<number>) => (\n    <Animated.View style={[styles.deleteAction,\
  \ { opacity: progress }]}>\n      <Text style={styles.deleteText}>삭제</Text>\n  \
  \  </Animated.View>\n  );\n\n  return (\n    <Swipeable\n      renderRightActions={renderRightActions}\n\
  \      onSwipeableOpen={() => {\n        Alert.alert(\"삭제\", \"정말 삭제하시겠습니까?\", [\n\
  \          { text: \"취소\", style: \"cancel\" },\n          { text: \"삭제\", style:\
  \ \"destructive\", onPress: onDelete },\n        ]);\n      }}\n    >\n      {children}\n\
  \    </Swipeable>\n  );\n}\n\n// 웹 터치 대상 크기 보장 (Tailwind)\nfunction IconButton({\
  \ icon, onClick, label }: IconButtonProps) {\n  return (\n    <button\n      onClick={onClick}\n\
  \      aria-label={label}\n      className=\"min-h-[44px] min-w-[44px] flex items-center\
  \ justify-center\n                 rounded-full active:bg-gray-100 transition-colors\"\
  \n    >\n      {icon}\n    </button>\n  );\n}\n```\n"
