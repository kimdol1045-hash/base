content: "# React Portal 가이드\n\n## 핵심 원칙\n- Portal은 DOM 트리의 다른 위치에 자식을 렌더링한다\n- 모달,\
  \ 토스트, 드롭다운 등 오버레이 UI에 사용한다\n- CSS z-index, overflow 문제를 근본적으로 해결한다\n- React 이벤트\
  \ 버블링은 Portal에서도 논리적 트리를 따른다\n\n## DO\n- 모달, 다이얼로그, 토스트 알림에 Portal을 사용한다\n- document.body에\
  \ 마운트할 Portal 타겟 요소를 미리 생성한다\n- Portal 컨테이너의 접근성(aria 속성)을 설정한다\n- 포커스 트랩(Focus\
  \ Trap)을 모달 Portal에 적용한다\n\n## DON'T\n- SSR 환경에서 document 참조를 직접 사용하지 않는다 (useEffect\
  \ 내에서 처리)\n- Portal 내부에서 부모 컴포넌트의 CSS에 의존하지 않는다\n- 불필요하게 Portal을 사용하지 않는다 (일반 컴포넌트로\
  \ 충분한 경우)\n- Portal 컨테이너를 매 렌더링마다 새로 생성하지 않는다\n\n## 코드 예시\n```tsx\nimport { createPortal\
  \ } from \"react-dom\";\nimport { useEffect, useRef, useState } from \"react\";\n\
  \ninterface PortalProps {\n  children: React.ReactNode;\n  containerId?: string;\n\
  }\n\nexport function Portal({ children, containerId = \"portal-root\" }: PortalProps)\
  \ {\n  const [mounted, setMounted] = useState(false);\n  const containerRef = useRef<HTMLElement\
  \ | null>(null);\n\n  useEffect(() => {\n    let container = document.getElementById(containerId);\n\
  \    if (!container) {\n      container = document.createElement(\"div\");\n   \
  \   container.id = containerId;\n      document.body.appendChild(container);\n \
  \   }\n    containerRef.current = container;\n    setMounted(true);\n  }, [containerId]);\n\
  \n  if (!mounted || !containerRef.current) return null;\n  return createPortal(children,\
  \ containerRef.current);\n}\n\n// 모달에서 사용\nexport function Modal({ open, onClose,\
  \ children }: ModalProps) {\n  if (!open) return null;\n  return (\n    <Portal>\n\
  \      <div\n        className=\"fixed inset-0 z-50 flex items-center justify-center\"\
  \n        role=\"dialog\"\n        aria-modal=\"true\"\n      >\n        <div className=\"\
  fixed inset-0 bg-black/50\" onClick={onClose} />\n        <div className=\"relative\
  \ z-10 rounded-lg bg-white p-6 shadow-xl\">\n          {children}\n        </div>\n\
  \      </div>\n    </Portal>\n  );\n}\n```\n"
