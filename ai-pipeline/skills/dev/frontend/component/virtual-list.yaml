content: "# 가상 리스트(Virtual List) 가이드\n\n## 핵심 원칙\n- 화면에 보이는 항목만 렌더링하여 대량 데이터 목록의 성능을\
  \ 확보한다\n- DOM 노드 수를 최소화하여 메모리와 렌더링 비용을 절감한다\n- 스크롤 위치에 따라 동적으로 항목을 마운트/언마운트한다\n\
  - 고정 높이와 가변 높이 항목 모두 지원한다\n\n## DO\n- 1000개 이상의 목록에는 가상화를 적용한다\n- `@tanstack/react-virtual`을\
  \ 기본 라이브러리로 사용한다\n- 항목 높이가 고정이면 `estimateSize`를 정확히 설정한다\n- 무한 스크롤과 조합하여 페이징을 구현한다\n\
  - 오버스캔(overscan)을 설정하여 빠른 스크롤 시 빈 화면을 방지한다\n\n## DON'T\n- 소규모 목록(50개 미만)에 가상화를 적용하지\
  \ 않는다 (오버엔지니어링)\n- 항목 내부에서 무거운 계산을 수행하지 않는다 (memo 활용)\n- 스크롤 컨테이너의 높이를 미설정하지 않는다\n\
  - 키보드 네비게이션을 무시하지 않는다 (접근성)\n\n## 코드 예시\n```tsx\nimport { useVirtualizer } from\
  \ \"@tanstack/react-virtual\";\nimport { useRef } from \"react\";\n\ninterface VirtualListProps<T>\
  \ {\n  items: T[];\n  renderItem: (item: T, index: number) => React.ReactNode;\n\
  \  estimateSize?: number;\n}\n\nexport function VirtualList<T>({\n  items,\n  renderItem,\n\
  \  estimateSize = 50,\n}: VirtualListProps<T>) {\n  const parentRef = useRef<HTMLDivElement>(null);\n\
  \n  const virtualizer = useVirtualizer({\n    count: items.length,\n    getScrollElement:\
  \ () => parentRef.current,\n    estimateSize: () => estimateSize,\n    overscan:\
  \ 5,\n  });\n\n  return (\n    <div ref={parentRef} className=\"h-full overflow-auto\"\
  >\n      <div\n        className=\"relative w-full\"\n        style={{ height: `${virtualizer.getTotalSize()}px`\
  \ }}\n      >\n        {virtualizer.getVirtualItems().map((virtualItem) => (\n \
  \         <div\n            key={virtualItem.key}\n            className=\"absolute\
  \ left-0 top-0 w-full\"\n            style={{\n              height: `${virtualItem.size}px`,\n\
  \              transform: `translateY(${virtualItem.start}px)`,\n            }}\n\
  \          >\n            {renderItem(items[virtualItem.index], virtualItem.index)}\n\
  \          </div>\n        ))}\n      </div>\n    </div>\n  );\n}\n\n// 사용\n<VirtualList\n\
  \  items={users}\n  estimateSize={64}\n  renderItem={(user) => <UserCard user={user}\
  \ />}\n/>\n```\n"
