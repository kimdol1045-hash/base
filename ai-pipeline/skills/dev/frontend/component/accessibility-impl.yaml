content: "접근성 구현 규칙 (장애 유무와 관계없이 모든 사용자가 이용 가능한 UI를 만든다):\n\n### WCAG 2.1 AA 핵심 기준\n\
  - 색상 대비: 일반 텍스트 4.5:1, 대형 텍스트(18pt+) 3:1\n- 터치 타겟: 최소 44×44px (모바일), 24×24px (데스크톱)\n\
  - 포커스 표시: 모든 인터랙티브 요소에 visible focus indicator\n- 키보드 접근: 모든 기능을 키보드만으로 사용 가능\n\n\
  ### 1. Semantic HTML First\n\nDO:\n```tsx\n// ✅ 시맨틱 HTML — 스크린 리더가 구조를 이해\n<header>\n\
  \  <nav aria-label=\"메인 네비게이션\">\n    <ul role=\"list\">\n      <li><Link href=\"\
  /dashboard\">대시보드</Link></li>\n      <li><Link href=\"/settings\">설정</Link></li>\n\
  \    </ul>\n  </nav>\n</header>\n<main>\n  <h1>대시보드</h1>\n  <section aria-labelledby=\"\
  recent-projects\">\n    <h2 id=\"recent-projects\">최근 프로젝트</h2>\n    {/* ... */}\n\
  \  </section>\n</main>\n\n// ✅ 아이콘 버튼 — aria-label 필수\n<button aria-label=\"검색\"\
  \ onClick={toggleSearch}>\n  <SearchIcon aria-hidden=\"true\" />\n</button>\n\n\
  // ✅ 이미지 — 의미 있는 alt 텍스트\n<img src=\"/hero.jpg\" alt=\"팀원들이 화이트보드 앞에서 회의하는 모습\"\
  \ />\n// 장식 이미지: alt=\"\" (빈 문자열, 생략 아님)\n```\n\n### 2. 키보드 네비게이션\n\n```tsx\n//\
  \ ✅ 커스텀 드롭다운 — 키보드 완전 지원\nfunction Dropdown({ items, onSelect }: DropdownProps)\
  \ {\n  const [isOpen, setIsOpen] = useState(false);\n  const [activeIndex, setActiveIndex]\
  \ = useState(-1);\n\n  const handleKeyDown = (e: KeyboardEvent) => {\n    switch\
  \ (e.key) {\n      case \"ArrowDown\":\n        e.preventDefault();\n        setActiveIndex((i)\
  \ => Math.min(i + 1, items.length - 1));\n        break;\n      case \"ArrowUp\"\
  :\n        e.preventDefault();\n        setActiveIndex((i) => Math.max(i - 1, 0));\n\
  \        break;\n      case \"Enter\":\n      case \" \":\n        e.preventDefault();\n\
  \        if (activeIndex >= 0) onSelect(items[activeIndex]);\n        setIsOpen(false);\n\
  \        break;\n      case \"Escape\":\n        setIsOpen(false);\n        triggerRef.current?.focus();\
  \ // 트리거로 포커스 복귀\n        break;\n    }\n  };\n\n  return (\n    <div role=\"combobox\"\
  \ aria-expanded={isOpen} aria-haspopup=\"listbox\">\n      <button ref={triggerRef}\
  \ onClick={() => setIsOpen(!isOpen)}>\n        선택하세요\n      </button>\n      {isOpen\
  \ && (\n        <ul role=\"listbox\" onKeyDown={handleKeyDown}>\n          {items.map((item,\
  \ i) => (\n            <li key={item.id} role=\"option\" aria-selected={i === activeIndex}>\n\
  \              {item.label}\n            </li>\n          ))}\n        </ul>\n \
  \     )}\n    </div>\n  );\n}\n```\n\n### 3. Focus Trap — 모달/다이얼로그\n\n```tsx\n//\
  \ ✅ 모달 내부에 포커스 가두기\nimport { FocusTrap } from \"focus-trap-react\";\n\nfunction\
  \ Dialog({ isOpen, onClose, children }: DialogProps) {\n  return isOpen ? (\n  \
  \  <FocusTrap focusTrapOptions={{\n      initialFocus: false,\n      escapeDeactivates:\
  \ true,\n      onDeactivate: onClose,\n    }}>\n      <div role=\"dialog\" aria-modal=\"\
  true\" aria-labelledby=\"dialog-title\">\n        <h2 id=\"dialog-title\">확인</h2>\n\
  \        {children}\n        <button onClick={onClose}>닫기</button>\n      </div>\n\
  \    </FocusTrap>\n  ) : null;\n}\n```\n\n### 4. Live Region — 동적 콘텐츠 알림\n\n```tsx\n\
  // ✅ 토스트/알림 — 스크린 리더에 실시간 전달\n<div role=\"status\" aria-live=\"polite\" aria-atomic=\"\
  true\">\n  {message && <p>{message}</p>}  {/* \"저장되었습니다\" 등 */}\n</div>\n\n// ✅\
  \ 에러 메시지 — 즉시 전달\n<div role=\"alert\" aria-live=\"assertive\">\n  {error && <p className=\"\
  text-destructive\">{error}</p>}\n</div>\n```\n\nDON'T:\n```tsx\n// ❌ div를 버튼으로 사용\
  \ — 키보드/스크린리더 미지원\n<div onClick={handleClick} className=\"cursor-pointer\">클릭</div>\n\
  // → <button> 사용. focus, Enter, Space 자동 지원\n\n// ❌ alt 텍스트 누락 — 스크린 리더가 파일명 읽음\n\
  <img src=\"/photo-123.jpg\" />\n// → alt=\"설명\" 또는 alt=\"\" (장식) 필수\n\n// ❌ 보이는\
  \ 텍스트에 aria-label — 이중 읽기\n<button aria-label=\"저장\">저장</button>  // \"저장 저장\" 읽힘\n\
  // → 보이는 텍스트가 있으면 aria-label 불필요\n```\n\n### 테스트 도구\n- 자동: axe-core (`@axe-core/react`),\
  \ eslint-plugin-jsx-a11y\n- 수동: Tab 키로 전체 페이지 순회, VoiceOver/NVDA 테스트\n- 대비 검사: Chrome\
  \ DevTools > Rendering > CSS Contrast\n"
