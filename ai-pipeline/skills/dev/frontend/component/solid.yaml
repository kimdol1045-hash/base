content: "컴포넌트 설계 원칙 (복잡도를 제어하고 재사용성을 확보한다):\n\n### 1. 단일 책임 (SRP)\n한 컴포넌트는 한 가지 역할만\
  \ 수행한다. UI와 로직을 분리한다.\n\nDO:\n```tsx\n// ✅ UI만 담당하는 Presentational 컴포넌트\nfunction\
  \ UserCard({ user }: { user: User }) {\n  return (\n    <div className=\"rounded-lg\
  \ border p-4\">\n      <h3 className=\"text-lg font-semibold\">{user.name}</h3>\n\
  \      <p className=\"text-muted-foreground\">{user.email}</p>\n    </div>\n  );\n\
  }\n\n// ✅ 로직은 훅으로 분리\nfunction useUser(id: string) {\n  return useSWR<User>(`/api/users/${id}`,\
  \ fetcher);\n}\n```\n\nDON'T:\n```tsx\n// ❌ UI + fetch + 상태 + 이벤트가 한 컴포넌트에 혼재\n\
  function UserCard({ id }: { id: string }) {\n  const [user, setUser] = useState<User\
  \ | null>(null);\n  const [loading, setLoading] = useState(true);\n  useEffect(()\
  \ => {\n    fetch(`/api/users/${id}`).then(r => r.json()).then(setUser).finally(()\
  \ => setLoading(false));\n  }, [id]);\n  const handleDelete = async () => { await\
  \ fetch(`/api/users/${id}`, { method: \"DELETE\" }); };\n  if (loading) return <Skeleton\
  \ />;\n  return <div onClick={handleDelete}>{user?.name}</div>;\n}\n```\n\n### 2.\
  \ Props 제한 (밀러의 법칙)\n- Props는 **5개 이하** 권장. 초과 시 객체로 그룹핑하거나 컴포넌트를 분리한다.\n- Boolean\
  \ props가 **3개 이상**이면 variant 패턴으로 전환한다.\n\nDO:\n```tsx\n// ✅ variant 패턴으로 통합\ninterface\
  \ ButtonProps {\n  variant: \"primary\" | \"secondary\" | \"ghost\" | \"destructive\"\
  ;\n  size: \"sm\" | \"md\" | \"lg\";\n  children: React.ReactNode;\n}\n```\n\nDON'T:\n\
  ```tsx\n// ❌ Boolean props 남발\ninterface ButtonProps {\n  isPrimary?: boolean;\n\
  \  isGhost?: boolean;\n  isLarge?: boolean;\n  isSmall?: boolean;\n  isDestructive?:\
  \ boolean;\n  isOutline?: boolean;\n}\n```\n\n### 3. DRY — 2회 반복 시 추출\n- 같은 UI 패턴이\
  \ **2번 이상** 반복되면 컴포넌트로 추출한다.\n- 같은 로직이 **2번 이상** 반복되면 커스텀 훅으로 추출한다.\n\n### 4. 상태\
  \ 관리 단계\n로컬 → 공유 → 글로벌 순서로 복잡도를 올린다:\n```\nuseState (컴포넌트 내부) → props drilling (1~2단계)\
  \ → Context (테마, 인증)\n→ Zustand (복잡한 클라이언트 상태) → Server State (SWR/React Query)\n\
  ```\n\n### 5. 컴포넌트 크기 기준\n- JSX return 문이 **50줄 초과** 시 하위 컴포넌트로 분리한다.\n- 훅 호출이 **5개\
  \ 초과** 시 커스텀 훅으로 합성한다.\n- 하나의 파일이 **200줄 초과** 시 파일을 분리한다.\n\n### Edge Cases\n- children을\
  \ 받는 컴포넌트는 반드시 `React.ReactNode` 타입을 사용한다.\n- 이벤트 핸들러를 props로 전달할 때는 optional로 선언한다.\n\
  - 조건부 훅 호출은 React 규칙 위반이므로 절대 금지한다.\n"
