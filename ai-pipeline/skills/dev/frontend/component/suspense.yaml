content: "# React Suspense 활용 가이드\n\n## 핵심 원칙\n- Suspense는 비동기 작업(데이터 로딩, 코드 분할)의\
  \ 로딩 상태를 선언적으로 처리한다\n- 컴포넌트 트리의 일부분만 폴백(fallback)을 보여줄 수 있다\n- 중첩된 Suspense 경계로\
  \ 세밀한 로딩 상태를 제어한다\n- Server Components와 함께 사용하면 스트리밍 SSR이 가능하다\n\n## DO\n- 페이지 레이아웃의\
  \ 독립된 섹션마다 Suspense 경계를 설정한다\n- `loading.tsx` 파일로 Next.js App Router의 자동 Suspense를\
  \ 활용한다\n- Skeleton UI를 fallback으로 사용하여 레이아웃 시프트를 방지한다\n- `React.lazy()`와 함께 코드 분할에\
  \ 활용한다\n\n## DON'T\n- 전체 페이지를 하나의 Suspense로 감싸지 않는다 (부분 로딩 활용)\n- Suspense 안에서 useEffect로\
  \ 데이터를 페칭하지 않는다 (서버 컴포넌트 활용)\n- fallback에 무거운 컴포넌트를 렌더링하지 않는다\n- 오류 처리를 Suspense에\
  \ 의존하지 않는다 (ErrorBoundary 병행)\n\n## 코드 예시\n```tsx\nimport { Suspense } from \"react\"\
  ;\nimport { ErrorBoundary } from \"react-error-boundary\";\n\n// 페이지 레벨 Suspense\
  \ 구성\nexport default function DashboardPage() {\n  return (\n    <div className=\"\
  grid grid-cols-12 gap-4\">\n      <div className=\"col-span-8\">\n        <ErrorBoundary\
  \ fallback={<ErrorCard />}>\n          <Suspense fallback={<ChartSkeleton />}>\n\
  \            <AnalyticsChart />\n          </Suspense>\n        </ErrorBoundary>\n\
  \      </div>\n      <div className=\"col-span-4\">\n        <Suspense fallback={<ListSkeleton\
  \ count={5} />}>\n          <RecentActivities />\n        </Suspense>\n      </div>\n\
  \    </div>\n  );\n}\n\n// Server Component에서 데이터 페칭\nasync function AnalyticsChart()\
  \ {\n  const data = await fetchAnalytics(); // 서버에서 실행\n  return <Chart data={data}\
  \ />;\n}\n\n// Skeleton 컴포넌트\nfunction ChartSkeleton() {\n  return (\n    <div className=\"\
  animate-pulse rounded-lg bg-muted h-[400px]\" />\n  );\n}\n\nfunction ListSkeleton({\
  \ count }: { count: number }) {\n  return (\n    <div className=\"space-y-3\">\n\
  \      {Array.from({ length: count }, (_, i) => (\n        <div key={i} className=\"\
  h-12 animate-pulse rounded bg-muted\" />\n      ))}\n    </div>\n  );\n}\n```\n"
