content: "React 에러 처리 패턴 (예상치 못한 에러로부터 사용자 경험을 보호한다):\n\n### 1. Next.js error.tsx\
  \ — 페이지 레벨 에러 바운더리\nApp Router에서 자동으로 에러 바운더리 역할을 한다. 반드시 `'use client'`.\n\nDO:\n\
  ```tsx\n// ✅ app/dashboard/error.tsx\n\"use client\";\n\nimport { useEffect } from\
  \ \"react\";\nimport { AlertCircle } from \"lucide-react\";\nimport { Button } from\
  \ \"@/components/ui/button\";\n\nexport default function DashboardError({\n  error,\n\
  \  reset,\n}: {\n  error: Error & { digest?: string };\n  reset: () => void;\n})\
  \ {\n  useEffect(() => {\n    // 에러 리포팅 서비스에 전송\n    console.error(\"Dashboard error:\"\
  , error);\n    // Sentry.captureException(error);\n  }, [error]);\n\n  return (\n\
  \    <div className=\"flex flex-col items-center justify-center gap-4 py-16\">\n\
  \      <AlertCircle className=\"h-12 w-12 text-destructive\" />\n      <h2 className=\"\
  text-xl font-semibold\">대시보드 로딩에 실패했습니다</h2>\n      <p className=\"text-muted-foreground\
  \ max-w-md text-center\">\n        일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n      </p>\n\
  \      {process.env.NODE_ENV === \"development\" && (\n        <pre className=\"\
  mt-2 max-w-lg overflow-auto rounded bg-muted p-4 text-sm\">\n          {error.message}\n\
  \        </pre>\n      )}\n      <Button onClick={reset}>다시 시도</Button>\n    </div>\n\
  \  );\n}\n```\n\n### 2. 커스텀 ErrorBoundary — 컴포넌트 레벨 격리\n특정 섹션만 보호하고 나머지 UI는 정상 동작하게\
  \ 할 때 사용.\n\nDO:\n```tsx\n// ✅ 재사용 가능한 ErrorBoundary\n\"use client\";\n\nimport\
  \ { Component, type ErrorInfo, type ReactNode } from \"react\";\n\ninterface Props\
  \ {\n  children: ReactNode;\n  fallback: ReactNode | ((error: Error, reset: () =>\
  \ void) => ReactNode);\n  onError?: (error: Error, info: ErrorInfo) => void;\n}\n\
  \ninterface State {\n  error: Error | null;\n}\n\nexport class ErrorBoundary extends\
  \ Component<Props, State> {\n  state: State = { error: null };\n\n  static getDerivedStateFromError(error:\
  \ Error): State {\n    return { error };\n  }\n\n  componentDidCatch(error: Error,\
  \ info: ErrorInfo) {\n    this.props.onError?.(error, info);\n  }\n\n  reset = ()\
  \ => this.setState({ error: null });\n\n  render() {\n    if (this.state.error)\
  \ {\n      const { fallback } = this.props;\n      if (typeof fallback === \"function\"\
  ) {\n        return fallback(this.state.error, this.reset);\n      }\n      return\
  \ fallback;\n    }\n    return this.props.children;\n  }\n}\n```\n\n```tsx\n// ✅\
  \ 사용 예시 — 차트 섹션만 보호\n<ErrorBoundary\n  fallback={(error, reset) => (\n    <div className=\"\
  rounded border border-destructive p-4\">\n      <p>차트를 불러올 수 없습니다: {error.message}</p>\n\
  \      <button onClick={reset}>다시 시도</button>\n    </div>\n  )}\n  onError={(error)\
  \ => Sentry.captureException(error)}\n>\n  <DashboardChart data={chartData} />\n\
  </ErrorBoundary>\n```\n\n### 3. Suspense + ErrorBoundary 조합\n비동기 데이터 로딩과 에러를 함께\
  \ 처리한다.\n\nDO:\n```tsx\n// ✅ 로딩 + 에러 동시 처리\nimport { Suspense } from \"react\";\n\
  \nexport default function DashboardPage() {\n  return (\n    <div className=\"grid\
  \ grid-cols-2 gap-4\">\n      {/* 각 섹션이 독립적으로 로딩/에러 처리 */}\n      <ErrorBoundary\
  \ fallback={<ChartErrorFallback />}>\n        <Suspense fallback={<ChartSkeleton\
  \ />}>\n          <RevenueChart />\n        </Suspense>\n      </ErrorBoundary>\n\
  \n      <ErrorBoundary fallback={<TableErrorFallback />}>\n        <Suspense fallback={<TableSkeleton\
  \ />}>\n          <RecentOrders />\n        </Suspense>\n      </ErrorBoundary>\n\
  \    </div>\n  );\n}\n```\n\n### 4. 비동기 에러 처리 (훅 내부)\nErrorBoundary는 이벤트 핸들러, 비동기\
  \ 코드의 에러를 잡지 못한다.\n이벤트 핸들러 내 에러는 직접 try-catch로 처리한다.\n\nDO:\n```tsx\n// ✅ 이벤트 핸들러\
  \ 에러 처리\nfunction useDeleteUser() {\n  const [error, setError] = useState<Error\
  \ | null>(null);\n\n  const deleteUser = useCallback(async (userId: string) => {\n\
  \    try {\n      setError(null);\n      const res = await fetch(`/api/users/${userId}`,\
  \ { method: \"DELETE\" });\n      if (!res.ok) throw new Error(`삭제 실패: ${res.status}`);\n\
  \      toast.success(\"사용자가 삭제되었습니다\");\n    } catch (err) {\n      const error\
  \ = err instanceof Error ? err : new Error(\"Unknown\");\n      setError(error);\n\
  \      toast.error(error.message);\n    }\n  }, []);\n\n  return { deleteUser, error\
  \ };\n}\n```\n\nDON'T:\n```tsx\n// ❌ 에러 무시\nconst handleDelete = async () => {\n\
  \  await fetch(`/api/users/${id}`, { method: \"DELETE\" }); // 실패 시 무시됨\n};\n\n\
  // ❌ 사용자에게 기술적 에러 메시지 노출\n<p>{error.stack}</p>  // stack trace를 그대로 보여주기\n```\n\n\
  ### Edge Cases\n- ErrorBoundary는 **렌더링 중** 에러만 잡는다 (이벤트 핸들러 X, 비동기 X).\n- Server\
  \ Component의 에러는 가장 가까운 `error.tsx`에서 처리된다.\n- `global-error.tsx`는 루트 layout 에러를\
  \ 처리한다 (반드시 `<html>`, `<body>` 포함).\n- 개발 환경에서만 에러 상세를 보여주고, 프로덕션에서는 사용자 친화적 메시지를\
  \ 보여준다.\n"
