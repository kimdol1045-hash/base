bloom_level: APPLY
content: "# 코드 스플리팅 가이드\n\n## 핵심 원칙\n- 초기 로드에 필요하지 않은 코드를 별도 청크로 분리한다\n- 라우트 기반 스플리팅을\
  \ 기본으로 적용한다\n- 컴포넌트 레벨 lazy loading으로 세밀하게 최적화한다\n- 프리로딩(Preloading)으로 사용자 경험을 개선한다\n\
  \n## DO\n- `React.lazy()`와 `Suspense`로 컴포넌트를 지연 로드한다\n- `next/dynamic`으로 SSR이 불필요한\
  \ 컴포넌트를 클라이언트에서만 로드한다\n- 모달, 탭, 드로어 같은 초기에 보이지 않는 UI를 지연 로드한다\n- 마우스 오버 시 프리로드하여\
  \ 클릭 시 지연을 줄인다\n\n## DON'T\n- 모든 컴포넌트를 lazy loading하지 않는다 (임계 경로는 즉시 로드)\n- 크기가\
  \ 작은 컴포넌트(5KB 미만)를 별도 청크로 분리하지 않는다\n- Suspense fallback 없이 lazy 컴포넌트를 사용하지 않는다\n\
  - 순환 의존성으로 청크가 비대해지도록 하지 않는다\n\n## 코드 예시\n```tsx\nimport dynamic from \"next/dynamic\"\
  ;\nimport { lazy, Suspense } from \"react\";\n\n// Next.js dynamic import (SSR 비활성화)\n\
  const RichTextEditor = dynamic(\n  () => import(\"@/components/RichTextEditor\"\
  ),\n  { ssr: false, loading: () => <EditorSkeleton /> },\n);\n\n// React.lazy\n\
  const SettingsModal = lazy(() => import(\"@/components/SettingsModal\"));\n\n//\
  \ 프리로딩 패턴\nconst ChartModule = () => import(\"@/components/Chart\");\nconst LazyChart\
  \ = lazy(ChartModule);\n\nfunction Dashboard() {\n  const [showChart, setShowChart]\
  \ = useState(false);\n\n  return (\n    <div>\n      <button\n        onMouseEnter={()\
  \ => ChartModule()} // 호버 시 프리로드\n        onClick={() => setShowChart(true)}\n \
  \     >\n        차트 보기\n      </button>\n      {showChart && (\n        <Suspense\
  \ fallback={<ChartSkeleton />}>\n          <LazyChart />\n        </Suspense>\n\
  \      )}\n    </div>\n  );\n}\n```\n"
