content: "# Parallel Routes 가이드\n\n## 핵심 원칙\n- 하나의 레이아웃에서 여러 페이지를 동시에 렌더링한다\n- 슬롯(@folder)으로\
  \ 독립적인 라우팅 영역을 정의한다\n- 각 슬롯은 독립적으로 로딩/에러 상태를 가질 수 있다\n- 조건부 렌더링(인증 상태별 다른 콘텐츠)에\
  \ 유용하다\n\n## DO\n- 대시보드의 독립적인 패널에 Parallel Routes를 사용한다\n- 모달을 Parallel Routes로\
  \ 구현하여 URL과 동기화한다\n- 각 슬롯에 `loading.tsx`와 `default.tsx`를 제공한다\n- 인증 여부에 따라 다른 슬롯을\
  \ 렌더링한다\n\n## DON'T\n- 단순한 레이아웃에 불필요하게 Parallel Routes를 사용하지 않는다\n- `default.tsx`를\
  \ 누락하여 404 에러를 유발하지 않는다\n- 슬롯 간 상태 공유를 직접 props로 하지 않는다 (URL params 또는 Context)\n\
  - 너무 많은 슬롯을 한 레이아웃에 배치하지 않는다\n\n## 코드 예시\n```\napp/dashboard/\n├── layout.tsx  \
  \        # 메인 레이아웃\n├── page.tsx            # 기본 콘텐츠\n├── @analytics/         #\
  \ 분석 슬롯\n│   ├── page.tsx\n│   ├── loading.tsx\n│   └── default.tsx\n├── @notifications/\
  \     # 알림 슬롯\n│   ├── page.tsx\n│   ├── loading.tsx\n│   └── default.tsx\n└── @modal/\
  \             # 모달 슬롯\n    ├── (.)detail/[id]/page.tsx\n    └── default.tsx\n```\n\
  \n```tsx\n// app/dashboard/layout.tsx\nexport default function DashboardLayout({\n\
  \  children,\n  analytics,\n  notifications,\n  modal,\n}: {\n  children: React.ReactNode;\n\
  \  analytics: React.ReactNode;\n  notifications: React.ReactNode;\n  modal: React.ReactNode;\n\
  }) {\n  return (\n    <div className=\"grid grid-cols-12 gap-4\">\n      <main className=\"\
  col-span-8\">{children}</main>\n      <aside className=\"col-span-4 space-y-4\"\
  >\n        {analytics}\n        {notifications}\n      </aside>\n      {modal}\n\
  \    </div>\n  );\n}\n\n// app/dashboard/@analytics/default.tsx (필수)\nexport default\
  \ function Default() {\n  return null;\n}\n```\n"
