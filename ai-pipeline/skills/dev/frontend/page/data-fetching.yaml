content: "Next.js 14 데이터 페칭 패턴 (올바른 렌더링 전략을 선택하여 성능과 신선도를 균형 잡는다):\n\n### 1. Server\
  \ Components — 기본 데이터 페칭\nServer Component에서 직접 async/await로 데이터를 가져온다.\nfetch API에\
  \ 캐싱 옵션을 지정하여 렌더링 전략을 결정한다.\n\nDO:\n```tsx\n// ✅ 정적 생성 (SSG) — 빌드 타임에 생성, CDN 캐싱\n\
  // 변경이 드문 데이터: 블로그 글, 문서, 약관 등\nasync function getPost(slug: string) {\n  const\
  \ res = await fetch(`${API_URL}/posts/${slug}`, {\n    cache: \"force-cache\", //\
  \ 기본값. 무기한 캐싱\n  });\n  if (!res.ok) throw new Error(\"Failed to fetch post\");\n\
  \  return res.json() as Promise<Post>;\n}\n\n// ✅ ISR (Incremental Static Regeneration)\
  \ — 주기적 갱신\n// 자주 변하지만 실시간일 필요 없는 데이터: 상품 목록, 가격 등\nasync function getProducts()\
  \ {\n  const res = await fetch(`${API_URL}/products`, {\n    next: { revalidate:\
  \ 3600 }, // 1시간마다 갱신\n  });\n  return res.json() as Promise<Product[]>;\n}\n\n\
  // ✅ 동적 렌더링 (SSR) — 매 요청마다 새로 가져옴\n// 사용자별 데이터, 실시간 데이터\nasync function getUserProfile(userId:\
  \ string) {\n  const res = await fetch(`${API_URL}/users/${userId}`, {\n    cache:\
  \ \"no-store\", // 캐싱 없음\n  });\n  return res.json() as Promise<UserProfile>;\n\
  }\n```\n\n### 2. 렌더링 전략 판단 기준\n\n| 전략 | 캐싱 설정 | 적합한 데이터 | 예시 |\n|------|----------|-------------|------|\n\
  | **SSG** | `force-cache` (기본) | 변경 없음 | 블로그, 문서, 약관 |\n| **ISR** | `next: { revalidate:\
  \ N }` | 주기적 변경 | 상품 목록, 가격, 랭킹 |\n| **SSR** | `cache: \"no-store\"` | 매 요청 변경 |\
  \ 사용자 프로필, 장바구니 |\n| **CSR** | SWR/React Query | 실시간 인터랙션 | 댓글, 알림, 채팅 |\n\n###\
  \ 3. Server vs Client Component 판단 기준\n\n**Server Component 사용** (기본):\n- 데이터 페칭이\
  \ 필요한 경우\n- 민감한 정보(API 키, DB 접근)를 사용하는 경우\n- 번들 크기를 줄여야 하는 경우\n- SEO가 중요한 콘텐츠\n\n\
  **Client Component 사용** (`'use client'`):\n- `onClick`, `onChange` 등 이벤트 리스너가 필요한\
  \ 경우\n- `useState`, `useEffect` 등 React 훅이 필요한 경우\n- 브라우저 API (localStorage, geolocation)\
  \ 사용\n- 실시간 업데이트 (WebSocket, polling)\n\nDO:\n```tsx\n// ✅ Server Component에서 데이터\
  \ → Client Component에 주입\n// app/dashboard/page.tsx (Server)\nexport default async\
  \ function DashboardPage() {\n  const stats = await getStats();       // 서버에서 페칭\n\
  \  const recentOrders = await getOrders(); // 서버에서 페칭\n\n  return (\n    <div className=\"\
  grid grid-cols-12 gap-6\">\n      {/* 정적 표시 → Server Component */}\n      <StatsCards\
  \ stats={stats} />\n\n      {/* 필터/정렬 인터랙션 → Client Component */}\n      <OrderTable\
  \ initialOrders={recentOrders} />\n    </div>\n  );\n}\n\n// components/OrderTable.tsx\
  \ (Client)\n\"use client\";\nexport function OrderTable({ initialOrders }: { initialOrders:\
  \ Order[] }) {\n  const [filter, setFilter] = useState(\"\");\n  const filtered\
  \ = initialOrders.filter(o => o.status.includes(filter));\n  return (/* 인터랙티브 테이블\
  \ */);\n}\n```\n\nDON'T:\n```tsx\n// ❌ 페이지 전체를 Client Component로 — 번들 크기 증가 + SEO\
  \ 불리\n\"use client\";\nexport default function DashboardPage() {\n  const { data\
  \ } = useSWR(\"/api/stats\", fetcher);\n  return <div>{data?.revenue}</div>;\n}\n\
  \n// ❌ Server Component에서 이벤트 핸들러 사용 (불가능)\nexport default async function Page()\
  \ {\n  return <button onClick={() => alert(\"hi\")}>Click</button>; // 에러!\n}\n\
  ```\n\n### 4. 병렬 데이터 페칭\n여러 데이터가 필요하면 `Promise.all`로 병렬 처리한다.\n\nDO:\n```tsx\n//\
  \ ✅ 병렬 페칭 — 가장 느린 요청 시간만큼만 대기\nexport default async function DashboardPage() {\n\
  \  const [stats, orders, notifications] = await Promise.all([\n    getStats(),\n\
  \    getOrders(),\n    getNotifications(),\n  ]);\n\n  return (\n    <>\n      <StatsCards\
  \ stats={stats} />\n      <OrderTable orders={orders} />\n      <NotificationList\
  \ notifications={notifications} />\n    </>\n  );\n}\n```\n\nDON'T:\n```tsx\n//\
  \ ❌ 순차 페칭 — 워터폴 발생 (총 시간 = 각 요청 합산)\nexport default async function DashboardPage()\
  \ {\n  const stats = await getStats();           // 200ms\n  const orders = await\
  \ getOrders();         // 300ms (200ms 후 시작)\n  const notifications = await getNotifications();\
  \ // 150ms (500ms 후 시작)\n  // 총 650ms (병렬이면 300ms)\n}\n```\n\n### 5. Streaming &\
  \ Suspense\n독립적인 섹션은 Suspense로 감싸서 점진적 로딩한다.\n\n```tsx\n// ✅ 느린 섹션만 Suspense로 격리\n\
  export default async function Page() {\n  return (\n    <main>\n      <h1>대시보드</h1>\n\
  \      {/* 빠른 데이터: 즉시 렌더링 */}\n      <QuickStats />\n\n      {/* 느린 데이터: Suspense로\
  \ 스트리밍 */}\n      <Suspense fallback={<ChartSkeleton />}>\n        <SlowChart />\n\
  \      </Suspense>\n    </main>\n  );\n}\n```\n\n### Edge Cases\n- `cookies()`,\
  \ `headers()` 호출 시 자동으로 동적 렌더링으로 전환된다.\n- `searchParams`를 사용하면 동적 렌더링이 된다.\n- Server\
  \ Action (`'use server'`)은 mutation에만 사용한다 (데이터 변경).\n- revalidation: `revalidatePath()`,\
  \ `revalidateTag()` 으로 on-demand 갱신 가능.\n"
