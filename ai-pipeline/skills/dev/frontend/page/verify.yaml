content: "페이지 자기 검증 체크리스트 (출력 전 반드시 모든 항목을 점검한다):\n\n### A. 파일 구조 완전성 (FAIL 시 수정 필수)\n\
  - [ ] `page.tsx`가 존재하는가?\n- [ ] `loading.tsx`가 존재하고 Skeleton UI를 제공하는가?\n- [ ] `error.tsx`가\
  \ 존재하고 `'use client'` + `reset` 버튼이 있는가?\n- [ ] 동적 라우트에서 `not-found.tsx` 또는 `notFound()`\
  \ 호출이 있는가?\n\nPASS: page.tsx + loading.tsx + error.tsx 모두 존재\nFAIL: 하나라도 누락\n\n\
  ### B. Server/Client 분리 (FAIL 시 수정 필수)\n- [ ] `page.tsx`가 Server Component인가? (불필요한\
  \ `'use client'` 없음)\n- [ ] `'use client'`가 트리의 말단(최하위 인터랙션 컴포넌트)에만 있는가?\n- [ ]\
  \ Server Component에서 `useState`, `useEffect`를 사용하지 않았는가?\n- [ ] Client Component에서\
  \ `async/await`로 직접 데이터를 가져오지 않았는가?\n\nDO:\n```tsx\n// ✅ 올바른 분리\n// page.tsx (Server\
  \ Component)\nexport default async function Page() {\n  const data = await getData();\n\
  \  return <InteractiveSection data={data} />;\n}\n\n// InteractiveSection.tsx (Client\
  \ Component)\n\"use client\";\nexport function InteractiveSection({ data }: { data:\
  \ Data }) {\n  const [filter, setFilter] = useState(\"\");\n  return <FilteredList\
  \ data={data} filter={filter} onFilterChange={setFilter} />;\n}\n```\n\nDON'T:\n\
  ```tsx\n// ❌ 페이지 전체를 Client Component로 만듦\n\"use client\";\nexport default function\
  \ Page() {\n  const [data, setData] = useState(null);\n  useEffect(() => { fetch(\"\
  /api/data\").then(r => r.json()).then(setData); }, []);\n  return <div>{data?.title}</div>;\n\
  }\n```\n\nPASS: Server Component에서 데이터 페칭, Client는 인터랙션만\nFAIL: 페이지 레벨에서 `'use client'`\
  \ 사용 또는 `useEffect`로 데이터 페칭\n\n### C. 메타데이터 & SEO (FAIL 시 수정 권장)\n- [ ] `Metadata`\
  \ 객체 또는 `generateMetadata` 함수가 설정되었는가?\n- [ ] `title`과 `description`이 모두 있는가?\n\
  - [ ] 동적 페이지에서 `generateMetadata`로 동적 메타데이터를 생성하는가?\n- [ ] Open Graph 이미지가 설정되었는가?\
  \ (공유 가능 페이지)\n\nPASS: title + description 최소 설정\nFAIL: 메타데이터 완전 누락\n\n### D. 성능\
  \ (FAIL 시 수정 권장)\n- [ ] 정적 생성 가능한 페이지에 `generateStaticParams`를 사용하는가?\n- [ ] 무거운\
  \ 컴포넌트에 `dynamic import` (next/dynamic)를 사용하는가?\n- [ ] 이미지에 `next/image`를 사용하는가?\n\
  - [ ] 페이지에 불필요한 JavaScript 번들이 포함되지 않았는가?\n\n```tsx\n// ✅ 무거운 컴포넌트 dynamic import\n\
  import dynamic from \"next/dynamic\";\nconst HeavyChart = dynamic(() => import(\"\
  @/components/HeavyChart\"), {\n  loading: () => <ChartSkeleton />,\n  ssr: false,\n\
  });\n```\n\nPASS: 최적화 패턴 적용\nFAIL: 불필요한 클라이언트 번들 포함\n\n### E. 네비게이션 & UX (FAIL 시\
  \ 수정 권장)\n- [ ] `Link` 컴포넌트를 사용하는가? (`<a>` 태그 직접 사용 금지)\n- [ ] 뒤로 가기가 자연스럽게 동작하는가?\n\
  - [ ] 로딩 상태가 실제 레이아웃과 유사한 Skeleton인가? (스피너만 X)\n- [ ] 에러 상태에서 복구 방법(다시 시도 버튼)을 제공하는가?\n\
  \nPASS: 모든 네비게이션이 Link + 자연스러운 UX\nFAIL: `<a>` 태그 사용 또는 스피너만 제공\n"
