content: "# SSG (Static Site Generation) 가이드\n\n## 핵심 원칙\n- 빌드 시점에 HTML을 미리 생성하여 CDN에서\
  \ 서빙한다\n- 가장 빠른 응답 속도와 최고의 SEO 성능을 제공한다\n- 콘텐츠가 자주 변경되지 않는 페이지에 적합하다\n- Next.js\
  \ App Router에서는 기본 동작이 정적 렌더링이다\n\n## DO\n- 마케팅 페이지, 블로그, 문서 등에 SSG를 사용한다\n- `generateStaticParams`로\
  \ 동적 경로의 정적 페이지를 미리 생성한다\n- `fetch`의 기본 캐싱(`force-cache`)을 활용한다\n- 빌드 시간이 긴 경우 중요\
  \ 페이지만 미리 생성하고 나머지는 on-demand로 처리한다\n\n## DON'T\n- 사용자별 데이터가 필요한 페이지에 SSG를 사용하지\
  \ 않는다\n- 수천 개의 페이지를 모두 빌드 시점에 생성하지 않는다 (ISR 활용)\n- 빌드 시 외부 API 장애로 전체 배포가 실패하도록\
  \ 두지 않는다\n- 인증이 필요한 페이지를 정적으로 생성하지 않는다\n\n## 코드 예시\n```tsx\n// app/blog/[slug]/page.tsx\
  \ (SSG)\nimport { notFound } from \"next/navigation\";\n\n// 빌드 시 생성할 경로 목록\nexport\
  \ async function generateStaticParams() {\n  const posts = await fetch(`${CMS_URL}/posts`).then(r\
  \ => r.json());\n  return posts.map((post: Post) => ({ slug: post.slug }));\n}\n\
  \n// 메타데이터 생성\nexport async function generateMetadata({ params }: Props): Promise<Metadata>\
  \ {\n  const post = await getPost(params.slug);\n  if (!post) return {};\n  return\
  \ {\n    title: post.title,\n    description: post.excerpt,\n    openGraph: { images:\
  \ [post.coverImage] },\n  };\n}\n\nasync function getPost(slug: string) {\n  const\
  \ res = await fetch(`${CMS_URL}/posts/${slug}`, {\n    next: { tags: [`post-${slug}`]\
  \ },\n  });\n  if (!res.ok) return null;\n  return res.json();\n}\n\nexport default\
  \ async function BlogPost({ params }: Props) {\n  const post = await getPost(params.slug);\n\
  \  if (!post) notFound();\n\n  return (\n    <article className=\"prose mx-auto\
  \ max-w-3xl\">\n      <h1>{post.title}</h1>\n      <time>{formatDate(post.publishedAt)}</time>\n\
  \      <div dangerouslySetInnerHTML={{ __html: post.contentHtml }} />\n    </article>\n\
  \  );\n}\n```\n"
