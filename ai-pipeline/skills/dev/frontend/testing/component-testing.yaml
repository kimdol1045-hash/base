content: "# 컴포넌트 테스트 가이드\n\n## 핵심 원칙\n- 사용자 관점에서 컴포넌트의 동작을 테스트한다\n- 구현 세부사항(state,\
  \ 내부 메서드)이 아닌 DOM 출력과 인터랙션을 검증한다\n- Testing Library의 쿼리 우선순위를 따른다 (getByRole > getByText\
  \ > getByTestId)\n- 테스트가 실제 사용자의 사용 방식을 반영해야 한다\n\n## DO\n- `@testing-library/react`를\
  \ 사용한다\n- `userEvent`로 실제 사용자 인터랙션을 시뮬레이션한다\n- 접근성 역할(role)로 요소를 쿼리한다\n- 비동기 동작은\
  \ `waitFor` 또는 `findBy`로 처리한다\n\n## DON'T\n- `container.querySelector`로 DOM을 직접\
  \ 조회하지 않는다\n- `fireEvent` 대신 `userEvent`를 사용한다 (더 현실적)\n- 스타일, className을 테스트하지\
  \ 않는다 (동작을 테스트)\n- 스냅샷 테스트만으로 컴포넌트를 검증하지 않는다\n\n## 코드 예시\n```tsx\nimport { render,\
  \ screen, waitFor } from \"@testing-library/react\";\nimport userEvent from \"@testing-library/user-event\"\
  ;\nimport { LoginForm } from \"./LoginForm\";\n\ndescribe(\"LoginForm\", () => {\n\
  \  it(\"이메일과 비밀번호를 입력하고 로그인할 수 있다\", async () => {\n    const handleSubmit = vi.fn();\n\
  \    render(<LoginForm onSubmit={handleSubmit} />);\n\n    const user = userEvent.setup();\n\
  \n    await user.type(screen.getByRole(\"textbox\", { name: /이메일/i }), \"test@test.com\"\
  );\n    await user.type(screen.getByLabelText(/비밀번호/i), \"password123\");\n    await\
  \ user.click(screen.getByRole(\"button\", { name: /로그인/i }));\n\n    expect(handleSubmit).toHaveBeenCalledWith({\n\
  \      email: \"test@test.com\",\n      password: \"password123\",\n    });\n  });\n\
  \n  it(\"이메일 형식이 잘못되면 에러를 표시한다\", async () => {\n    render(<LoginForm onSubmit={vi.fn()}\
  \ />);\n    const user = userEvent.setup();\n\n    await user.type(screen.getByRole(\"\
  textbox\", { name: /이메일/i }), \"invalid\");\n    await user.click(screen.getByRole(\"\
  button\", { name: /로그인/i }));\n\n    expect(screen.getByRole(\"alert\")).toHaveTextContent(\"\
  올바른 이메일을 입력하세요\");\n  });\n\n  it(\"로딩 중에는 버튼이 비활성화된다\", async () => {\n    render(<LoginForm\
  \ onSubmit={vi.fn()} isLoading />);\n    expect(screen.getByRole(\"button\", { name:\
  \ /로그인/i })).toBeDisabled();\n  });\n});\n```\n"
