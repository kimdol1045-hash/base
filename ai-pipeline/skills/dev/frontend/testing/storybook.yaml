content: "# Storybook 활용 가이드\n\n## 핵심 원칙\n- 컴포넌트를 독립적으로 개발하고 문서화하는 도구이다\n- 다양한 props\
  \ 조합을 스토리로 정의하여 시각적으로 확인한다\n- 디자이너, QA, 개발자 간 커뮤니케이션 도구로 활용한다\n- 인터랙션 테스트와 비주얼 테스트의\
  \ 기반이 된다\n\n## DO\n- 공유 컴포넌트(디자인 시스템)에 스토리를 필수로 작성한다\n- args와 argTypes로 컨트롤 패널을\
  \ 구성한다\n- play 함수로 인터랙션 시나리오를 정의한다\n- autodocs로 자동 문서를 생성한다\n\n## DON'T\n- 페이지 전체를\
  \ 하나의 스토리로 작성하지 않는다 (컴포넌트 단위)\n- 스토리 없이 컴포넌트를 PR에 올리지 않는다\n- 외부 API에 의존하는 스토리를 만들지\
  \ 않는다 (MSW로 Mock)\n- 스토리를 최신 상태로 유지하지 않고 방치하지 않는다\n\n## 코드 예시\n```tsx\n// Button.stories.tsx\n\
  import type { Meta, StoryObj } from \"@storybook/react\";\nimport { within, userEvent,\
  \ expect } from \"@storybook/test\";\nimport { Button } from \"./Button\";\n\nconst\
  \ meta: Meta<typeof Button> = {\n  title: \"UI/Button\",\n  component: Button,\n\
  \  tags: [\"autodocs\"],\n  argTypes: {\n    variant: { control: \"select\", options:\
  \ [\"primary\", \"secondary\", \"ghost\"] },\n    size: { control: \"select\", options:\
  \ [\"sm\", \"md\", \"lg\"] },\n    disabled: { control: \"boolean\" },\n  },\n};\n\
  export default meta;\n\ntype Story = StoryObj<typeof Button>;\n\nexport const Primary:\
  \ Story = {\n  args: { children: \"버튼\", variant: \"primary\" },\n};\n\nexport const\
  \ Secondary: Story = {\n  args: { children: \"버튼\", variant: \"secondary\" },\n\
  };\n\nexport const AllVariants: Story = {\n  render: () => (\n    <div className=\"\
  flex gap-4\">\n      <Button variant=\"primary\">Primary</Button>\n      <Button\
  \ variant=\"secondary\">Secondary</Button>\n      <Button variant=\"ghost\">Ghost</Button>\n\
  \    </div>\n  ),\n};\n\n// 인터랙션 테스트\nexport const ClickTest: Story = {\n  args:\
  \ { children: \"클릭하세요\" },\n  play: async ({ canvasElement, args }) => {\n    const\
  \ canvas = within(canvasElement);\n    const button = canvas.getByRole(\"button\"\
  );\n    await userEvent.click(button);\n    await expect(args.onClick).toHaveBeenCalled();\n\
  \  },\n};\n```\n"
