content: "# 커스텀 훅 설계 가이드\n\n## 핵심 원칙\n- 컴포넌트에서 재사용 가능한 상태 로직을 커스텀 훅으로 추출한다\n- 훅 이름은\
  \ 반드시 `use` 접두사로 시작한다\n- 하나의 훅은 하나의 관심사만 처리한다 (단일 책임)\n- 훅의 반환값은 사용하기 쉬운 인터페이스로\
  \ 설계한다\n\n## DO\n- 상태 + 액션을 객체 또는 튜플로 반환한다\n- 훅 내부에서 cleanup 함수를 올바르게 구현한다\n- 제네릭을\
  \ 활용하여 타입 안전한 훅을 작성한다\n- 훅의 의존성(deps)을 최소화한다\n\n## DON'T\n- 훅 안에서 조건부로 다른 훅을 호출하지\
  \ 않는다 (Rules of Hooks)\n- 비즈니스 로직과 UI 로직을 하나의 훅에 혼합하지 않는다\n- 불필요한 상태를 만들지 않는다 (파생\
  \ 값은 useMemo로)\n- 너무 많은 파라미터를 받는 훅을 만들지 않는다 (옵션 객체 사용)\n\n## 코드 예시\n```tsx\n// 토글\
  \ 훅\nfunction useToggle(initial = false) {\n  const [value, setValue] = useState(initial);\n\
  \  const toggle = useCallback(() => setValue(v => !v), []);\n  const setTrue = useCallback(()\
  \ => setValue(true), []);\n  const setFalse = useCallback(() => setValue(false),\
  \ []);\n  return { value, toggle, setTrue, setFalse } as const;\n}\n\n// 로컬 스토리지\
  \ 동기화 훅\nfunction useLocalStorage<T>(key: string, initialValue: T) {\n  const [storedValue,\
  \ setStoredValue] = useState<T>(() => {\n    if (typeof window === \"undefined\"\
  ) return initialValue;\n    try {\n      const item = localStorage.getItem(key);\n\
  \      return item ? (JSON.parse(item) as T) : initialValue;\n    } catch {\n  \
  \    return initialValue;\n    }\n  });\n\n  const setValue = useCallback((value:\
  \ T | ((prev: T) => T)) => {\n    setStoredValue(prev => {\n      const newValue\
  \ = value instanceof Function ? value(prev) : value;\n      localStorage.setItem(key,\
  \ JSON.stringify(newValue));\n      return newValue;\n    });\n  }, [key]);\n\n\
  \  return [storedValue, setValue] as const;\n}\n\n// 사용\nfunction Settings() {\n\
  \  const sidebar = useToggle(true);\n  const [theme, setTheme] = useLocalStorage(\"\
  theme\", \"light\");\n\n  return (\n    <div>\n      <button onClick={sidebar.toggle}>사이드바\
  \ {sidebar.value ? \"닫기\" : \"열기\"}</button>\n      <select value={theme} onChange={e\
  \ => setTheme(e.target.value)}>\n        <option value=\"light\">라이트</option>\n\
  \        <option value=\"dark\">다크</option>\n      </select>\n    </div>\n  );\n\
  }\n```\n"
