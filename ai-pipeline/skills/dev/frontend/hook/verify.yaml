content: "커스텀 훅 자기 검증 체크리스트 (출력 전 반드시 모든 항목을 점검한다):\n\n### A. 네이밍 & 구조 (FAIL 시 수정\
  \ 필수)\n- [ ] 훅 이름이 `use`로 시작하는가?\n- [ ] 반환 타입 인터페이스가 명시적으로 선언되었는가?\n- [ ] 한 훅이 한\
  \ 가지 관심사만 다루는가?\n- [ ] 파일명이 `use[Feature].ts` 패턴인가?\n\nPASS: `use` 접두사 + 명시적 반환\
  \ 타입 + 단일 책임\nFAIL: 네이밍 규칙 위반 또는 반환 타입 미선언\n\n### B. 상태 & 에러 처리 (FAIL 시 수정 필수)\n\
  - [ ] 비동기 훅이 `isLoading` 상태를 반환하는가?\n- [ ] 비동기 훅이 `error` 상태를 반환하는가?\n- [ ] error\
  \ 타입이 `Error | null`로 정확하게 선언되었는가?\n- [ ] try-catch-finally 패턴을 사용하는가?\n\nDO:\n\
  ```tsx\n// ✅ 완전한 비동기 훅 반환\ninterface UseDataReturn<T> {\n  data: T | null;\n  isLoading:\
  \ boolean;\n  error: Error | null;\n  refetch: () => Promise<void>;\n}\n\nexport\
  \ function useData<T>(url: string): UseDataReturn<T> {\n  const [data, setData]\
  \ = useState<T | null>(null);\n  const [isLoading, setIsLoading] = useState(true);\n\
  \  const [error, setError] = useState<Error | null>(null);\n\n  const refetch =\
  \ useCallback(async () => {\n    try {\n      setIsLoading(true);\n      setError(null);\n\
  \      const res = await fetch(url);\n      if (!res.ok) throw new Error(`HTTP ${res.status}`);\n\
  \      setData(await res.json());\n    } catch (err) {\n      setError(err instanceof\
  \ Error ? err : new Error(\"Unknown\"));\n    } finally {\n      setIsLoading(false);\n\
  \    }\n  }, [url]);\n\n  useEffect(() => { refetch(); }, [refetch]);\n  return\
  \ { data, isLoading, error, refetch };\n}\n```\n\nDON'T:\n```tsx\n// ❌ error/loading\
  \ 누락, any 타입\nfunction useData(url: string) {\n  const [data, setData] = useState<any>(null);\n\
  \  useEffect(() => {\n    fetch(url).then(r => r.json()).then(setData);\n  }, [url]);\n\
  \  return data; // loading, error 상태 없음\n}\n```\n\nPASS: isLoading + error + 타입\
  \ 안전한 반환\nFAIL: 상태 누락 또는 any 타입 사용\n\n### C. useEffect 안전성 (FAIL 시 수정 필수)\n- [ ]\
  \ cleanup 함수가 필요한 경우 구현되었는가?\n  - 타이머(setInterval/setTimeout) → `clearInterval/clearTimeout`\n\
  \  - 이벤트 리스너 → `removeEventListener`\n  - 구독(WebSocket, subscription) → `unsubscribe/close`\n\
  \  - fetch 요청 → `AbortController`\n- [ ] 의존성 배열이 정확한가? (빠진 의존성 없음)\n- [ ] 빈 의존성\
  \ 배열 `[]`이 의도적인가?\n\nDO:\n```tsx\n// ✅ AbortController로 fetch cleanup\nuseEffect(()\
  \ => {\n  const controller = new AbortController();\n  fetch(url, { signal: controller.signal\
  \ })\n    .then(r => r.json())\n    .then(setData)\n    .catch(err => {\n      if\
  \ (err.name !== \"AbortError\") setError(err);\n    });\n  return () => controller.abort();\n\
  }, [url]);\n```\n\nPASS: 모든 사이드 이펙트에 cleanup 구현\nFAIL: cleanup 누락 (메모리 누수 위험)\n\n\
  ### D. React 규칙 준수 (FAIL 시 수정 필수)\n- [ ] 조건부 훅 호출이 없는가? (if/for 안에서 useState/useEffect\
  \ 금지)\n- [ ] 훅 내부에서 다른 훅 호출 순서가 일정한가?\n- [ ] 일반 함수 안에서 훅을 호출하지 않았는가? (컴포넌트/훅 내에서만)\n\
  \nPASS: React Hooks 규칙 100% 준수\nFAIL: 규칙 위반 1건 이상\n\n### E. 재사용성 & 유연성 (FAIL 시 수정\
  \ 권장)\n- [ ] Generic 타입을 활용하여 다양한 데이터 타입에 대응하는가?\n- [ ] 설정값을 파라미터로 주입받아 유연하게 사용할\
  \ 수 있는가?\n- [ ] 외부 의존성(fetch, localStorage 등)을 주입 가능한 구조인가?\n\nPASS: 제네릭 활용 + 설정\
  \ 주입 가능\nFAIL: 특정 타입/설정에 하드코딩\n"
