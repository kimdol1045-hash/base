content: "# 낙관적 업데이트(Optimistic Update) 가이드\n\n## 핵심 원칙\n- 서버 응답을 기다리지 않고 UI를 즉시 업데이트하여\
  \ 체감 속도를 높인다\n- 서버 실패 시 이전 상태로 롤백한다\n- 사용자에게 실패를 명확히 알린다\n- 데이터 일관성이 중요한 경우(결제 등)에는\
  \ 사용하지 않는다\n\n## DO\n- 좋아요, 즐겨찾기, 목록 순서 변경 등 빈번한 인터랙션에 적용한다\n- 롤백 시 이전 데이터를 정확히\
  \ 복원한다\n- SWR의 `optimisticData` 옵션을 활용한다\n- 에러 발생 시 토스트로 사용자에게 알린다\n\n## DON'T\n\
  - 결제, 삭제 등 되돌리기 어려운 작업에 낙관적 업데이트를 적용하지 않는다\n- 롤백 로직을 구현하지 않고 낙관적 업데이트만 적용하지 않는다\n\
  - 여러 단계의 연쇄 업데이트를 낙관적으로 처리하지 않는다\n- 서버 응답과 클라이언트 상태가 불일치할 가능성을 무시하지 않는다\n\n## 코드\
  \ 예시\n```tsx\nimport useSWRMutation from \"swr/mutation\";\nimport { toast } from\
  \ \"sonner\";\n\nfunction useLikePost(postId: string) {\n  const { data: post, mutate\
  \ } = usePost(postId);\n\n  const toggleLike = useCallback(async () => {\n    if\
  \ (!post) return;\n    const previousPost = post;\n    const newLiked = !post.isLiked;\n\
  \n    // 1. 즉시 UI 업데이트 (낙관적)\n    await mutate(\n      { ...post, isLiked: newLiked,\
  \ likeCount: post.likeCount + (newLiked ? 1 : -1) },\n      { revalidate: false\
  \ },\n    );\n\n    try {\n      // 2. 서버 요청\n      await fetch(`/api/v1/posts/${postId}/like`,\
  \ {\n        method: newLiked ? \"POST\" : \"DELETE\",\n      });\n      // 3. 서버\
  \ 데이터로 갱신\n      await mutate();\n    } catch {\n      // 4. 실패 시 롤백\n      await\
  \ mutate(previousPost, { revalidate: false });\n      toast.error(\"요청에 실패했습니다.\
  \ 다시 시도해주세요.\");\n    }\n  }, [post, postId, mutate]);\n\n  return { toggleLike,\
  \ isLiked: post?.isLiked ?? false };\n}\n\n// 사용\nfunction LikeButton({ postId }:\
  \ { postId: string }) {\n  const { toggleLike, isLiked } = useLikePost(postId);\n\
  \  return (\n    <button onClick={toggleLike}>\n      {isLiked ? \"❤️\" : \"\U0001F90D\
  \"}\n    </button>\n  );\n}\n```\n"
