content: "제로 트러스트 아키텍처 -- \"절대 신뢰하지 말고, 항상 검증하라\" (NIST SP 800-207):\n\n내부 네트워크라도\
  \ 암묵적으로 신뢰하지 않는다. 모든 요청은 매번 인증/인가/검증을 거친다.\n\n### 핵심 원칙\n1. **모든 요청 인증** -- 네트워크\
  \ 위치와 무관하게 매 요청 신원 확인\n2. **최소 권한 접근** -- 필요한 최소한의 리소스에만 접근 허용\n3. **마이크로 세그먼테이션**\
  \ -- 서비스 간 통신도 개별 인증\n4. **지속적 검증** -- 세션 유지 중에도 컨텍스트 변화 시 재검증\n5. **위반 가정** --\
  \ 이미 침해되었다고 가정하고 설계\n\n### 패턴 1: 모든 요청 인증 + 최소 권한\n```typescript\n// DO: 모든 내부 API\
  \ 간 호출에도 서비스 토큰 필수\nasync function callPaymentService(orderId: string, serviceToken:\
  \ string) {\n  const response = await fetch(`${PAYMENT_SERVICE_URL}/process/${orderId}`,\
  \ {\n    headers: {\n      \"Authorization\": `Bearer ${serviceToken}`,\n      \"\
  X-Service-Name\": \"order-service\",\n      \"X-Request-Id\": crypto.randomUUID(),\n\
  \    },\n  });\n  if (!response.ok) throw new Error(`Payment service error: ${response.status}`);\n\
  \  return response.json();\n}\n\n// DON'T: 내부 서비스 간 인증 없이 직접 호출\nconst response\
  \ = await fetch(`http://payment-service:3001/process/${orderId}`);\n// 내부 네트워크니까\
  \ 안전하다? -- 제로 트러스트 위반\n```\n\n### 패턴 2: 마이크로 세그먼테이션\n```typescript\n// DO: 서비스별\
  \ 전용 API 키 + 접근 범위 제한\nconst SERVICE_PERMISSIONS: Record<string, string[]> = {\n\
  \  \"order-service\":   [\"payment:create\", \"payment:read\"],\n  \"admin-service\"\
  :   [\"payment:create\", \"payment:read\", \"payment:refund\"],\n  \"analytics-service\"\
  : [\"payment:read\"], // 읽기만 가능\n};\n\nfunction authorizeService(serviceName: string,\
  \ requiredPermission: string) {\n  const perms = SERVICE_PERMISSIONS[serviceName];\n\
  \  if (!perms?.includes(requiredPermission)) {\n    throw Errors.forbidden(`Service\
  \ ${serviceName} lacks ${requiredPermission}`);\n  }\n}\n```\n\n### 패턴 3: 지속적 검증\
  \ (Continuous Verification)\n```typescript\n// DO: 컨텍스트 변화 감지 시 재인증 요구\nasync function\
  \ validateSession(c: Context): Promise<User> {\n  const user = c.get(\"user\");\n\
  \  const session = await sessionStore.get(user.sessionId);\n\n  // 비정상 컨텍스트 변화 감지\n\
  \  const currentIp = c.req.header(\"x-forwarded-for\");\n  const currentUa = c.req.header(\"\
  user-agent\");\n\n  if (session.ip !== currentIp || session.userAgent !== currentUa)\
  \ {\n    // IP 또는 User-Agent 변경 -> 세션 무효화 + 재인증 요구\n    await sessionStore.delete(user.sessionId);\n\
  \    throw Errors.authRequired(\"보안을 위해 다시 로그인해 주세요\");\n  }\n\n  // 세션 유효기간 sliding\
  \ window\n  await sessionStore.extend(user.sessionId, SESSION_TTL);\n  return user;\n\
  }\n```\n\n### 패턴 4: 위반 가정 (Assume Breach)\n```typescript\n// DO: 토큰 탈취에 대비한 단기 토큰\
  \ + 블랙리스트\nconst ACCESS_TOKEN_TTL = \"15m\";   // Access: 15분\nconst REFRESH_TOKEN_TTL\
  \ = \"7d\";   // Refresh: 7일\n\n// 로그아웃/비밀번호 변경 시 모든 세션 즉시 무효화\nasync function revokeAllSessions(userId:\
  \ string) {\n  await sessionStore.deleteByUser(userId);\n  await tokenBlacklist.addPattern(`user:${userId}:*`);\n\
  }\n```\n\n### 구현 체크리스트\n- [ ] 내부 서비스 간 통신에 mTLS 또는 서비스 토큰 적용\n- [ ] Access Token\
  \ 만료 15분 이하\n- [ ] Refresh Token httpOnly + Secure + SameSite=Strict\n- [ ] 비정상\
  \ 접근 패턴 감지 시 세션 무효화\n- [ ] 중요 작업(결제, 삭제)에 재인증 또는 MFA 요구\n- [ ] 모든 서비스 간 요청에 X-Request-Id\
  \ 전파 (추적용)\n"
