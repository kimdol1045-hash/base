content: "STRIDE 위협 모델링 -- 체계적 위협 식별과 대응 (Adam Shostack, 2014):\n\n모든 신규 기능/API 설계\
  \ 시 STRIDE 6가지 위협 유형을 점검한다.\n각 위협에 대해 \"이 시스템에서 이 공격이 가능한가?\" 질문을 던진다.\n\n### S:\
  \ Spoofing (위장)\n공격자가 다른 사용자/시스템으로 위장한다.\n**대응:**\n```typescript\n// DO: JWT 서명\
  \ 검증 + 발급자 확인\nconst payload = jwt.verify(token, secret, {\n  algorithms: [\"HS256\"\
  ],\n  issuer: \"myapp.com\",       // 발급자 검증\n  audience: \"myapp-api\",     //\
  \ 대상 검증\n});\n\n// DON'T: 토큰 디코딩만 하고 서명 미검증\nconst payload = JSON.parse(atob(token.split(\"\
  .\")[1])); // 서명 검증 없음!\n```\n**탐지:** 만료된 토큰, 조작된 토큰으로 API 호출 시 401 반환 여부.\n\n###\
  \ T: Tampering (변조)\n전송 중 또는 저장된 데이터를 무단 변경한다.\n**대응:**\n```typescript\n// DO: 요청\
  \ 무결성 검증 (Webhook 수신 시)\nfunction verifyWebhookSignature(body: string, signature:\
  \ string, secret: string): boolean {\n  const expected = crypto.createHmac(\"sha256\"\
  , secret).update(body).digest(\"hex\");\n  return crypto.timingsSafeEqual(Buffer.from(signature),\
  \ Buffer.from(expected));\n}\n\napp.post(\"/webhook\", async (c) => {\n  const rawBody\
  \ = await c.req.text();\n  const signature = c.req.header(\"X-Signature-256\") ??\
  \ \"\";\n  if (!verifyWebhookSignature(rawBody, signature, WEBHOOK_SECRET)) {\n\
  \    throw Errors.forbidden(\"서명 검증 실패\");\n  }\n  // 안전하게 처리\n});\n```\n**탐지:**\
  \ 변조된 payload로 요청 시 거부 여부.\n\n### R: Repudiation (부인)\n사용자가 수행한 행위를 부인한다 (\"나는 그\
  \ 작업을 하지 않았다\").\n**대응:**\n```typescript\n// DO: 변경 불가 감사 로그 + 타임스탬프\nconst auditEntry\
  \ = {\n  actor: user.id,\n  action: \"DELETE_USER\",\n  target: targetUserId,\n\
  \  ip: c.req.header(\"x-forwarded-for\"),\n  userAgent: c.req.header(\"user-agent\"\
  ),\n  timestamp: new Date().toISOString(),\n};\nawait auditLogService.append(auditEntry);\
  \ // append-only 스토리지\n```\n**핵심:** 로그는 별도 권한으로 보호, 삭제/수정 불가 정책.\n\n### I: Information\
  \ Disclosure (정보 노출)\n민감 정보가 비인가 주체에게 노출된다.\n**대응:**\n```typescript\n// DO: 에러 응답에서\
  \ 내부 정보 제거\napp.onError((err, c) => {\n  console.error(\"[ERROR]\", err); // 서버\
  \ 로그에만 상세 기록\n  return c.json({ error: { code: \"INTERNAL\", message: \"서버 오류\"\
  \ } }, 500);\n  // DON'T: c.json({ error: err.message, stack: err.stack })\n});\n\
  ```\n**탐지:** 5xx 응답 body에 스택 트레이스, DB 쿼리, 파일 경로 포함 여부.\n\n### D: Denial of Service\
  \ (서비스 거부)\n정상 사용자의 서비스 접근을 방해한다.\n**대응:**\n- Rate Limiting: IP별 100 req/min, 인증\
  \ 엔드포인트 5 req/min\n- 요청 크기 제한: body 1MB, 파일 업로드 10MB\n- 쿼리 복잡도 제한: GraphQL depth\
  \ limit 5, pagination max 100\n- 타임아웃: DB 쿼리 30초, API 응답 60초\n\n### E: Elevation\
  \ of Privilege (권한 상승)\n일반 사용자가 관리자 권한을 획득한다.\n**대응:**\n```typescript\n// DO: 서버\
  \ 측 역할 검증 (클라이언트 전송 역할 무시)\napp.post(\"/admin/users\", authMiddleware, async (c)\
  \ => {\n  const user = c.get(\"user\"); // DB에서 조회한 서버 측 역할\n  if (user.role !==\
  \ \"admin\") throw Errors.forbidden();\n  // DON'T: body에서 role을 받아 신뢰\n  // const\
  \ { role } = await c.req.json(); if (role === \"admin\") ...\n});\n```\n**탐지:**\
  \ 일반 사용자 토큰으로 관리자 API 호출 시 403 반환 여부.\n\n### STRIDE 위협 분석 템플릿\n| 위협 유형 | 해당 여부 |\
  \ 공격 시나리오 | 대응 수단 | 잔여 리스크 |\n|----------|----------|-------------|----------|-----------|\n\
  | Spoofing | Y/N | ... | ... | ... |\n| Tampering | Y/N | ... | ... | ... |\n| Repudiation\
  \ | Y/N | ... | ... | ... |\n| Info Disclosure | Y/N | ... | ... | ... |\n| DoS\
  \ | Y/N | ... | ... | ... |\n| EoP | Y/N | ... | ... | ... |\n"
