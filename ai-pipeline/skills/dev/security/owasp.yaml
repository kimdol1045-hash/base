content: "OWASP Top 10 (2021) -- 웹 애플리케이션 10대 보안 위협과 대응:\n\n### A01: Broken Access\
  \ Control (접근 제어 실패)\n```typescript\n// DON'T: IDOR -- 타인의 리소스 접근 가능\napp.get(\"\
  /orders/:id\", async (c) => {\n  return c.json(await db.select().from(orders).where(eq(orders.id,\
  \ c.req.param(\"id\"))));\n});\n\n// DO: 소유권 검증 필수\napp.get(\"/orders/:id\", authMiddleware,\
  \ async (c) => {\n  const order = await orderService.findById(c.req.param(\"id\"\
  ));\n  if (!order) throw Errors.notFound(\"주문\");\n  if (order.userId !== c.get(\"\
  user\").id) throw Errors.forbidden();\n  return c.json({ data: order });\n});\n\
  ```\n탐지: 다른 사용자의 리소스 ID로 요청 시 403 반환 여부 테스트.\n\n### A02: Cryptographic Failures\
  \ (암호화 실패)\n```typescript\n// DON'T: MD5/SHA1 해싱, 평문 전송\nconst hash = crypto.createHash(\"\
  md5\").update(password).digest(\"hex\");\n\n// DO: bcrypt/argon2id, TLS 강제\nconst\
  \ hash = await bcrypt.hash(password, 12);\n```\n탐지: `grep -r \"createHash.*md5\\\
  |createHash.*sha1\\|password.*=.*body\"` 코드 검색.\n\n### A03: Injection (인젝션)\n```typescript\n\
  // DON'T: SQL 문자열 연결\nconst query = `SELECT * FROM users WHERE name = '${name}'`;\n\
  \n// DO: Parameterized query\nconst user = await db.select().from(users).where(eq(users.name,\
  \ name));\n```\n탐지: 템플릿 리터럴 안에 사용자 입력이 직접 삽입되는 패턴 검색.\n\n### A04: Insecure Design\
  \ (불안전한 설계)\n- 위협 모델링(STRIDE)을 설계 단계에서 수행\n- 비즈니스 로직 제한: 일일 이체 한도, 비밀번호 시도 횟수 제한(5회/15분)\n\
  - Abuse case를 user story와 함께 작성\n\n### A05: Security Misconfiguration (보안 설정 오류)\n\
  ```typescript\n// DON'T: 디버그 모드 프로덕션 배포, 기본 계정 유지\napp.use(cors({ origin: \"*\"\
  \ })); // 모든 origin 허용\n\n// DO: 명시적 설정\napp.use(cors({ origin: [\"https://myapp.com\"\
  ], credentials: true }));\napp.use(helmet()); // 보안 헤더 일괄 적용\n```\n탐지: `origin:\
  \ \"*\"`, `debug: true`, 기본 포트/계정 사용 여부 점검.\n\n### A06: Vulnerable Components (취약한\
  \ 컴포넌트)\n```bash\n# DO: 정기 취약점 스캔\nnpm audit --audit-level=high\nnpx better-npm-audit\
  \ audit\n```\n- `package-lock.json`에서 known vulnerability 있는 패키지 확인\n- Dependabot\
  \ 또는 Snyk 연동 필수\n\n### A07: Auth Failures (인증 실패)\n```typescript\n// DO: 안전한 세션\
  \ 관리\nconst token = jwt.sign(payload, secret, { expiresIn: \"15m\", algorithm: \"\
  HS256\" });\n// Refresh Token은 httpOnly + Secure + SameSite=Strict 쿠키에 저장\nsetCookie(c,\
  \ \"refresh_token\", refreshToken, {\n  httpOnly: true, secure: true, sameSite:\
  \ \"Strict\", maxAge: 60 * 60 * 24 * 7,\n});\n```\n- 비밀번호 최소 12자, brute-force 방어(rate\
  \ limit 5회/15분)\n\n### A08: Software & Data Integrity Failures (무결성 실패)\n- CI/CD\
  \ 파이프라인에서 의존성 해시 검증 (`npm ci` 사용)\n- 서브리소스 무결성(SRI) 적용: `<script integrity=\"sha384-...\"\
  >`\n\n### A09: Logging & Monitoring Failures (로깅 실패)\n```typescript\n// DO: 보안 이벤트\
  \ 구조화 로깅\nlogger.warn({ event: \"AUTH_FAILURE\", ip: req.ip, email: maskEmail(email),\
  \ reason: \"invalid_password\" });\n// DON'T: 민감 정보 로깅\nlogger.info({ event: \"\
  LOGIN\", password: body.password }); // 비밀번호 로그 기록 금지\n```\n\n### A10: SSRF (서버\
  \ 사이드 요청 위조)\n```typescript\n// DO: URL 허용 목록 기반 검증\nconst ALLOWED_HOSTS = [\"api.example.com\"\
  , \"cdn.example.com\"];\nfunction validateUrl(url: string): boolean {\n  const parsed\
  \ = new URL(url);\n  return ALLOWED_HOSTS.includes(parsed.hostname) && parsed.protocol\
  \ === \"https:\";\n}\n\n// DON'T: 사용자 URL을 검증 없이 fetch\nconst response = await fetch(body.webhookUrl);\
  \ // SSRF 취약\n```\n"
