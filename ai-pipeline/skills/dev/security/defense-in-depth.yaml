content: "심층 방어 -- 네트워크부터 데이터까지 4개 레이어 보안 (Defense in Depth):\n\n단일 방어선이 뚫려도 다음 레이어가\
  \ 공격을 차단한다.\n각 레이어는 독립적으로 작동하며, 이전 레이어의 성공을 가정하지 않는다.\n\n### Layer 1: 네트워크 레이어\n\
  공격 트래픽이 서버에 도달하기 전에 차단한다.\n\n**방어 수단:**\n- WAF(Web Application Firewall): SQL Injection,\
  \ XSS 패턴 차단\n- DDoS 방어: Cloudflare/AWS Shield (L3/L4 공격 완화)\n- IP 허용/차단 목록: 관리자\
  \ API는 사무실 IP만 허용\n- TLS 1.3 강제: 모든 통신 암호화\n\n```typescript\n// DO: 보안 헤더 설정 (Helmet.js\
  \ 또는 직접 설정)\napp.use(async (c, next) => {\n  await next();\n  c.header(\"Strict-Transport-Security\"\
  , \"max-age=31536000; includeSubDomains\");\n  c.header(\"X-Content-Type-Options\"\
  , \"nosniff\");\n  c.header(\"X-Frame-Options\", \"DENY\");\n  c.header(\"Content-Security-Policy\"\
  , \"default-src 'self'; script-src 'self'\");\n  c.header(\"Referrer-Policy\", \"\
  strict-origin-when-cross-origin\");\n  c.header(\"Permissions-Policy\", \"camera=(),\
  \ microphone=(), geolocation=()\");\n});\n```\n\n### Layer 2: 호스트 레이어\n서버/컨테이너 자체의\
  \ 보안을 강화한다.\n\n**방어 수단:**\n- 컨테이너: non-root 사용자, 읽기 전용 파일시스템\n- 의존성: `npm audit`\
  \ 주기적 실행, Snyk/Dependabot 연동\n- 환경변수: 시크릿은 Vault/AWS Secrets Manager에 저장\n- 프로세스\
  \ 격리: 컨테이너별 리소스 제한 (CPU 1코어, RAM 512MB)\n\n```dockerfile\n# DO: 보안 강화된 Dockerfile\n\
  FROM node:20-alpine AS runner\nRUN addgroup -S appgroup && adduser -S appuser -G\
  \ appgroup\nUSER appuser\nCOPY --chown=appuser:appgroup ./dist ./dist\nEXPOSE 3000\n\
  CMD [\"node\", \"dist/index.js\"]\n\n# DON'T: root 실행, 전체 소스 포함\nFROM node:20\n\
  COPY . .\nCMD [\"npm\", \"start\"]\n```\n\n### Layer 3: 애플리케이션 레이어\n비즈니스 로직 수준의\
  \ 보안 제어를 적용한다.\n\n**방어 수단:**\n- 입력 검증: Zod 스키마 (허용 목록 기반)\n- 인증/인가: JWT + RBAC/ABAC\n\
  - Rate Limiting: IP 및 사용자별 제한\n- CSRF 방어: SameSite 쿠키 + CSRF 토큰\n- 세션 관리: 단기 토큰(15분)\
  \ + Refresh rotation\n\n```typescript\n// DO: 다중 보안 미들웨어 체인\napp.use(\"*\", securityHeaders);\
  \          // L1 보안 헤더\napp.use(\"*\", rateLimiter({ limit: 100 })); // L3 Rate\
  \ limit\napp.use(\"/api/*\", authMiddleware);       // L3 인증\napp.use(\"/api/*\"\
  , csrfProtection);       // L3 CSRF\n\n// DON'T: 단일 미들웨어에 의존\napp.use(\"/api/*\"\
  , authMiddleware);       // 인증만 있고 나머지 없음\n```\n\n### Layer 4: 데이터 레이어\n데이터 자체를\
  \ 보호하여 DB 유출 시에도 피해를 최소화한다.\n\n**방어 수단:**\n- 저장 시 암호화(Encryption at Rest): 민감 컬럼\
  \ AES-256-GCM\n- 필드 레벨 암호화: PII(이메일, 전화번호) 개별 암호화\n- 백업 암호화: 백업 파일도 암호화 필수\n- 접근\
  \ 감사: DB 쿼리 로그 + 이상 접근 탐지\n\n```typescript\n// DO: 민감 필드 암호화 저장\nawait db.insert(users).values({\n\
  \  email: encrypt(body.email, ENCRYPTION_KEY),     // 암호화 저장\n  passwordHash: await\
  \ bcrypt.hash(body.password, 12), // 해싱\n  phone: encrypt(body.phone, ENCRYPTION_KEY),\
  \     // 암호화 저장\n});\n\n// DON'T: 민감 정보 평문 저장\nawait db.insert(users).values({\n\
  \  email: body.email,       // 평문\n  password: body.password, // 평문 비밀번호!\n});\n\
  ```\n\n### 레이어별 체크리스트\n| 레이어 | 필수 항목 | 확인 |\n|--------|---------|------|\n| 네트워크\
  \ | TLS 1.3 + 보안 헤더 + CORS strict | [ ] |\n| 호스트 | non-root 컨테이너 + 의존성 스캔 | [ ]\
  \ |\n| 애플리케이션 | 입력검증 + 인증 + Rate limit | [ ] |\n| 데이터 | 민감필드 암호화 + 백업 암호화 | [ ]\
  \ |\n"
