content: "# GraphQL Federation 설계 가이드\n\n## 핵심 원칙\n- 각 서브그래프는 자신이 소유한 엔티티만 정의한다 (Separation\
  \ of Concerns)\n- Gateway(Router)는 스키마 조합과 쿼리 계획만 담당한다\n- 엔티티 간 참조는 `@key` 디렉티브로\
  \ 선언한다\n- 서브그래프 간 의존성을 최소화하고, 단방향 참조를 지향한다\n\n## DO\n- `@key` 디렉티브로 엔티티의 고유 식별자를\
  \ 명확히 정의한다\n- `__resolveReference`를 구현하여 엔티티 해석을 처리한다\n- 서브그래프 독립 배포가 가능하도록 스키마를\
  \ 설계한다\n- 공유 타입은 `@shareable` 디렉티브를 활용한다\n\n## DON'T\n- 하나의 서브그래프에서 다른 서브그래프의 핵심\
  \ 타입을 정의하지 않는다\n- Gateway에 비즈니스 로직을 넣지 않는다\n- 순환 의존성이 있는 서브그래프 구조를 만들지 않는다\n- Federation\
  \ 없이 단일 서비스에서 충분한 경우 무리하게 분리하지 않는다\n\n## 코드 예시\n```graphql\n# Users 서브그래프\ntype\
  \ User @key(fields: \"id\") {\n  id: ID!\n  email: String!\n  displayName: String\n\
  }\n\ntype Query {\n  user(id: ID!): User\n  me: User\n}\n\n# Orders 서브그래프\ntype\
  \ Order @key(fields: \"id\") {\n  id: ID!\n  items: [OrderItem!]!\n  totalAmount:\
  \ Int!\n  buyer: User!   # User 엔티티 참조\n}\n\nextend type User @key(fields: \"id\"\
  ) {\n  id: ID! @external\n  orders: [Order!]!   # User에 orders 필드 추가\n}\n```\n\n\
  ```typescript\n// Orders 서브그래프 리졸버\nconst resolvers = {\n  User: {\n    __resolveReference:\
  \ (ref, ctx) =>\n      ctx.loaders.userStub.load(ref.id),\n    orders: (user, _args,\
  \ ctx) =>\n      ctx.services.order.findByUserId(user.id),\n  },\n};\n```\n"
