content: "# GraphQL Subscription 설계 가이드\n\n## 핵심 원칙\n- Subscription은 실시간 데이터가 꼭 필요한\
  \ 경우에만 사용한다\n- `graphql-ws` 프로토콜을 사용한다 (deprecated된 `subscriptions-transport-ws`\
  \ 사용 금지)\n- PubSub 백엔드를 분리하여 수평 확장이 가능하도록 한다\n- 클라이언트 연결 수에 대한 제한을 반드시 설정한다\n\n\
  ## DO\n- Redis PubSub 또는 메시지 브로커를 백엔드로 사용한다\n- 연결 시 인증 토큰을 검증한다 (`connectionParams`)\n\
  - 구독 필터링을 서버 측에서 수행한다 (`withFilter`)\n- Heartbeat/keepalive를 구현하여 좀비 연결을 감지한다\n\n\
  ## DON'T\n- 인메모리 PubSub를 프로덕션에서 사용하지 않는다 (단일 서버에서만 동작)\n- 대량의 데이터를 Subscription으로\
  \ 전송하지 않는다 (변경 알림만 보내고 상세 데이터는 Query)\n- 연결 제한 없이 무한 구독을 허용하지 않는다\n- 인증 없이 Subscription\
  \ 연결을 허용하지 않는다\n\n## 코드 예시\n```typescript\nimport { createPubSub, withFilter } from\
  \ \"graphql-yoga\";\nimport { createRedisEventTarget } from \"@graphql-yoga/redis-event-target\"\
  ;\n\nconst pubSub = createPubSub<{\n  \"post:created\": [{ postCreated: Post }];\n\
  \  \"comment:added\": [{ commentAdded: Comment; postId: string }];\n}>();\n\nconst\
  \ resolvers = {\n  Subscription: {\n    commentAdded: {\n      subscribe: withFilter(\n\
  \        () => pubSub.subscribe(\"comment:added\"),\n        (payload, variables)\
  \ => payload.postId === variables.postId,\n      ),\n    },\n  },\n  Mutation: {\n\
  \    addComment: async (_parent, { input }, ctx) => {\n      const comment = await\
  \ ctx.services.comment.create(input);\n      pubSub.publish(\"comment:added\", {\n\
  \        commentAdded: comment,\n        postId: input.postId,\n      });\n    \
  \  return { comment, userErrors: [] };\n    },\n  },\n};\n```\n"
