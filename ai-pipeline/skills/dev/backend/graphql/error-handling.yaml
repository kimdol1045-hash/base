content: "# GraphQL 에러 처리 가이드\n\n## 핵심 원칙\n- 예상 가능한 에러는 스키마의 Union/Interface로 표현한다\
  \ (유저 에러)\n- 예상 불가능한 에러만 `errors` 배열에 포함시킨다 (시스템 에러)\n- 에러 코드를 표준화하여 클라이언트가 프로그래밍적으로\
  \ 처리할 수 있게 한다\n- 내부 에러 상세를 클라이언트에 노출하지 않는다\n\n## DO\n- Mutation 결과를 Result Union\
  \ 패턴으로 설계한다\n- 에러 코드를 Enum으로 정의하여 타입 안전성을 확보한다\n- `extensions` 필드에 에러 메타데이터를 포함한다\n\
  - Validation 에러는 필드 단위로 반환한다\n\n## DON'T\n- 모든 에러를 top-level `errors` 배열에만 의존하지\
  \ 않는다\n- 스택 트레이스를 프로덕션 에러 응답에 포함하지 않는다\n- HTTP 상태 코드로 GraphQL 에러를 구분하지 않는다 (항상 200)\n\
  - 에러 메시지를 하드코딩하지 않는다 (i18n 키 사용)\n\n## 코드 예시\n```graphql\ntype UserError {\n  field:\
  \ [String!]!\n  message: String!\n  code: ErrorCode!\n}\n\nenum ErrorCode {\n  VALIDATION_FAILED\n\
  \  NOT_FOUND\n  ALREADY_EXISTS\n  UNAUTHORIZED\n  RATE_LIMITED\n}\n\nunion CreateUserResult\
  \ = CreateUserSuccess | ValidationError | AlreadyExistsError\n\ntype CreateUserSuccess\
  \ {\n  user: User!\n}\n\ntype ValidationError implements BaseError {\n  message:\
  \ String!\n  code: ErrorCode!\n  fieldErrors: [FieldError!]!\n}\n```\n\n```typescript\n\
  // 에러 포매터\nfunction formatError(error: GraphQLError) {\n  const code = error.extensions?.code\
  \ ?? \"INTERNAL_ERROR\";\n  if (code === \"INTERNAL_ERROR\") {\n    logger.error(error.originalError);\n\
  \    return { message: \"서버 오류가 발생했습니다\", extensions: { code } };\n  }\n  return\
  \ error;\n}\n```\n"
