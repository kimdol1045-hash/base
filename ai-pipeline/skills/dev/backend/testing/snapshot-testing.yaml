content: "# 스냅샷 테스트 가이드\n\n## 핵심 원칙\n- API 응답, 설정 파일, 직렬화된 데이터의 예상치 못한 변경을 감지한다\n\
  - 첫 실행 시 스냅샷을 생성하고, 이후 실행에서 비교한다\n- 의도적 변경 시 스냅샷을 명시적으로 업데이트한다\n- 스냅샷 파일을 버전 관리에\
  \ 포함하여 코드 리뷰 시 변경 사항을 확인한다\n\n## DO\n- API 응답 구조의 변경 감지에 활용한다\n- 스냅샷 업데이트는 PR 리뷰에서\
  \ 변경 사유를 확인한다\n- 날짜, ID 등 동적 값은 스냅샷 전에 고정(mock)한다\n- 인라인 스냅샷을 짧은 데이터에 활용한다\n\n##\
  \ DON'T\n- 거대한 객체를 통째로 스냅샷하지 않는다 (핵심 필드만 선택)\n- 무의미하게 스냅샷을 업데이트(`-u`)하지 않는다 (변경\
  \ 원인 확인)\n- 동적 값(타임스탬프, UUID)을 포함한 스냅샷을 생성하지 않는다\n- 스냅샷 테스트로 로직 검증을 대체하지 않는다\n\n\
  ## 코드 예시\n```typescript\nimport { describe, it, expect } from \"vitest\";\n\ndescribe(\"\
  User API 응답\", () => {\n  it(\"사용자 목록 응답 구조가 변경되지 않아야 한다\", async () => {\n    const\
  \ response = await request(app).get(\"/api/v1/users\");\n    // 동적 값 제거\n    const\
  \ sanitized = response.body.data.map((user: any) => ({\n      ...user,\n      id:\
  \ \"[ID]\",\n      createdAt: \"[DATE]\",\n    }));\n    expect(sanitized).toMatchSnapshot();\n\
  \  });\n\n  it(\"에러 응답 형식이 일관되어야 한다\", async () => {\n    const response = await\
  \ request(app).get(\"/api/v1/users/invalid\");\n    expect(response.body).toMatchInlineSnapshot(`\n\
  \      {\n        \"error\": {\n          \"code\": \"NOT_FOUND\",\n          \"\
  message\": \"사용자를 찾을 수 없습니다\",\n        },\n      }\n    `);\n  });\n});\n\n// 스냅샷\
  \ 업데이트 명령어\n// npx vitest --update  (변경 원인 확인 후에만 실행)\n```\n"
