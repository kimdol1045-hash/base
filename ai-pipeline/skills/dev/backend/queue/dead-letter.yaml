content: "# Dead Letter Queue(DLQ) 설계 가이드\n\n## 핵심 원칙\n- 최대 재시도 횟수를 초과한 메시지는 DLQ로\
  \ 이동시킨다\n- DLQ 메시지를 모니터링하고 알림을 설정한다\n- DLQ 메시지를 분석하여 근본 원인을 파악한다\n- 원인 해결 후 DLQ\
  \ 메시지를 원래 큐로 재처리(redrive)한다\n\n## DO\n- 각 메인 큐에 대응하는 DLQ를 생성한다\n- DLQ 메시지에 실패 원인과\
  \ 재시도 횟수를 메타데이터로 기록한다\n- DLQ 메시지 수에 대한 알림 임계값을 설정한다\n- 재처리(redrive) 스크립트를 준비한다\n\
  - DLQ 보존 기간을 메인 큐보다 길게 설정한다\n\n## DON'T\n- DLQ 메시지를 무시하고 방치하지 않는다\n- DLQ 없이 무한 재시도를\
  \ 설정하지 않는다\n- 재처리 시 동일한 에러가 반복되지 않는지 확인하지 않고 일괄 재처리하지 않는다\n- DLQ의 보존 기간을 너무 짧게 설정하지\
  \ 않는다\n\n## 코드 예시\n```typescript\n// DLQ 설정 (AWS SQS)\nconst mainQueueConfig = {\n\
  \  RedrivePolicy: JSON.stringify({\n    deadLetterTargetArn: dlqArn,\n    maxReceiveCount:\
  \ 3, // 3회 실패 시 DLQ로 이동\n  }),\n};\n\n// DLQ 모니터링\nasync function monitorDLQ(dlqUrl:\
  \ string) {\n  const attrs = await sqs.getQueueAttributes({\n    QueueUrl: dlqUrl,\n\
  \    AttributeNames: [\"ApproximateNumberOfMessages\"],\n  });\n  const count =\
  \ Number(attrs.Attributes?.ApproximateNumberOfMessages ?? 0);\n  if (count > 0)\
  \ {\n    await alerting.notify({\n      severity: \"warning\",\n      message: `DLQ에\
  \ ${count}개의 미처리 메시지가 있습니다`,\n      queue: dlqUrl,\n    });\n  }\n}\n\n// DLQ 재처리\
  \ (redrive)\nasync function redriveDLQ(dlqUrl: string, mainQueueUrl: string) {\n\
  \  const messages = await sqs.receiveMessage({\n    QueueUrl: dlqUrl, MaxNumberOfMessages:\
  \ 10,\n  });\n  for (const msg of messages.Messages ?? []) {\n    await sqs.sendMessage({\
  \ QueueUrl: mainQueueUrl, MessageBody: msg.Body! });\n    await sqs.deleteMessage({\
  \ QueueUrl: dlqUrl, ReceiptHandle: msg.ReceiptHandle! });\n  }\n}\n```\n"
