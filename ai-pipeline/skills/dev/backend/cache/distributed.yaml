content: "# 분산 캐시 설계 가이드\n\n## 핵심 원칙\n- 분산 캐시는 여러 서버 인스턴스가 동일한 캐시 데이터를 공유한다\n- Redis\
  \ Cluster 또는 Memcached로 분산 캐시를 구현한다\n- 캐시 노드 장애 시에도 서비스가 정상 동작하도록 설계한다\n- 로컬 캐시(L1)와\
  \ 분산 캐시(L2)를 조합하여 성능을 극대화한다\n\n## DO\n- 2단계 캐시를 구현한다: 로컬 메모리(L1) → Redis(L2) → DB\n\
  - Redis Cluster를 사용하여 자동 샤딩과 고가용성을 확보한다\n- 캐시 연결 풀링을 설정하여 연결 오버헤드를 줄인다\n- 직렬화 형식을\
  \ 최적화한다 (MessagePack, Protocol Buffers)\n\n## DON'T\n- 캐시를 주 데이터 저장소로 사용하지 않는다\n\
  - 단일 Redis 인스턴스에 모든 데이터를 집중시키지 않는다\n- 네트워크 지연을 무시하고 모든 데이터를 분산 캐시에 넣지 않는다\n- L1\
  \ 캐시의 일관성 문제를 무시하지 않는다\n\n## 코드 예시\n```typescript\nimport { LRUCache } from \"lru-cache\"\
  ;\nimport Redis from \"ioredis\";\n\nclass TwoLevelCache {\n  private l1 = new LRUCache<string,\
  \ unknown>({\n    max: 1000,\n    ttl: 60_000, // 로컬 캐시 1분\n  });\n  private l2:\
  \ Redis;\n\n  constructor(redisUrl: string) {\n    this.l2 = new Redis(redisUrl);\n\
  \  }\n\n  async get<T>(key: string): Promise<T | null> {\n    // L1 조회\n    const\
  \ local = this.l1.get(key) as T | undefined;\n    if (local !== undefined) return\
  \ local;\n\n    // L2 조회\n    const remote = await this.l2.get(key);\n    if (remote)\
  \ {\n      const parsed = JSON.parse(remote) as T;\n      this.l1.set(key, parsed);\
  \ // L1에 승격\n      return parsed;\n    }\n    return null;\n  }\n\n  async set<T>(key:\
  \ string, value: T, ttlSeconds: number): Promise<void> {\n    this.l1.set(key, value);\n\
  \    await this.l2.set(key, JSON.stringify(value), \"EX\", ttlSeconds);\n  }\n\n\
  \  async invalidate(key: string): Promise<void> {\n    this.l1.delete(key);\n  \
  \  await this.l2.del(key);\n    // 다른 인스턴스의 L1 무효화를 위해 이벤트 발행\n    await this.l2.publish(\"\
  cache:invalidate\", key);\n  }\n}\n```\n"
