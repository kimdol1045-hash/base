content: "비밀번호 해싱, 정책, 리셋 플로우 (안전한 자격증명 관리의 모든 것):\n\n### 해싱 알고리즘 비교\n| 알고리즘 | 권장\
  \ | 파라미터 | 비고 |\n|----------|------|----------|------|\n| argon2id | ✅ 최우선 | memory:64MB,\
  \ iterations:3, parallelism:1 | GPU 공격 저항 |\n| bcrypt | ✅ 대안 | cost:12 (최소 10) |\
  \ 72바이트 제한 |\n| scrypt | ⚠️ 가능 | N:2^14, r:8, p:1 | 설정 복잡 |\n| SHA256/MD5 | ❌ 금지\
  \ | — | 무차별 대입에 취약 |\n\n### 비밀번호 해싱 구현\n```typescript\n// DO: argon2id 해싱 + timing-safe\
  \ 비교\nimport argon2 from 'argon2';\nimport crypto from 'crypto';\n\nasync function\
  \ hashPassword(password: string): Promise<string> {\n  return argon2.hash(password,\
  \ {\n    type: argon2.argon2id,\n    memoryCost: 65536,    // 64MB\n    timeCost:\
  \ 3,\n    parallelism: 1,\n  });\n}\n\nasync function verifyPassword(password: string,\
  \ hash: string): Promise<boolean> {\n  return argon2.verify(hash, password); //\
  \ 내부적으로 timing-safe\n}\n```\n\n### 비밀번호 정책\n- 최소 8자, 최대 72자 (bcrypt 제한 고려)\n- 복잡성:\
  \ 대/소문자 + 숫자 + 특수문자 중 3종 이상\n- Have I Been Pwned API로 유출 비밀번호 차단 (k-anonymity)\n\
  - 이전 5개 비밀번호 재사용 금지\n\n### 비밀번호 리셋 플로우\n```typescript\n// DO: 암호학적 안전 토큰, 1시간 만료,\
  \ 일회용\nasync function requestReset(email: string) {\n  const user = await db.findByEmail(email);\n\
  \  // 사용자 존재 여부와 무관하게 동일 응답 (enumeration 방지)\n  if (!user) return { message: 'If\
  \ the email exists, a reset link was sent.' };\n\n  const token = crypto.randomBytes(32).toString('hex');\n\
  \  const hashedToken = crypto.createHash('sha256').update(token).digest('hex');\n\
  \  await db.saveResetToken({\n    userId: user.id,\n    token: hashedToken,\n  \
  \  expiresAt: new Date(Date.now() + 3600_000), // 1시간\n  });\n  await email.send(user.email,\
  \ `https://app.com/reset?token=${token}`);\n  return { message: 'If the email exists,\
  \ a reset link was sent.' };\n}\n\nasync function executeReset(token: string, newPassword:\
  \ string) {\n  const hashedToken = crypto.createHash('sha256').update(token).digest('hex');\n\
  \  const record = await db.findResetToken(hashedToken);\n  if (!record || record.expiresAt\
  \ < new Date()) throw new Error('Invalid or expired');\n  await db.updatePassword(record.userId,\
  \ await hashPassword(newPassword));\n  await db.deleteResetToken(hashedToken); \
  \ // 일회용: 즉시 삭제\n  await db.invalidateAllSessions(record.userId); // 기존 세션 모두 만료\n\
  }\n```\n\nDON'T:\n```typescript\n// ❌ MD5/SHA1 해싱 — 초당 수십억 회 시도 가능\nconst hash =\
  \ crypto.createHash('md5').update(password).digest('hex');\n\n// ❌ 예측 가능한 리셋 토큰\n\
  const token = `reset-${userId}-${Date.now()}`; // 추측 가능!\n\n// ❌ 리셋 토큰 만료 없음, 재사용\
  \ 가능\n// ❌ Rate limit 없음 — 무차별 리셋 요청 가능\n```\n\n### 흔한 실수\n- 비밀번호 변경 후 기존 세션 유지\
  \ (탈취된 세션 계속 유효)\n- 리셋 이메일에서 사용자 존재 여부 노출 (\"해당 이메일 없음\")\n- 로그에 비밀번호 평문 기록 (req.body\
  \ 전체 로깅)\n"
