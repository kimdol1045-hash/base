content: "# SSO (Single Sign-On) 구현 가이드\n\n## 핵심 원칙\n- 사용자가 한 번의 인증으로 여러 서비스에 접근할\
  \ 수 있도록 한다\n- OIDC(OpenID Connect)를 기본 프로토콜로 사용한다\n- 엔터프라이즈 고객은 SAML 2.0 지원이 필요할\
  \ 수 있다\n- IdP(Identity Provider)에서 인증을 처리하고, SP(Service Provider)에서 인가를 처리한다\n\n\
  ## DO\n- OIDC Authorization Code Flow + PKCE를 사용한다\n- state 파라미터로 CSRF를 방지한다\n-\
  \ nonce 파라미터로 ID 토큰 재사용 공격을 방지한다\n- 사용자 프로비저닝(SCIM)을 지원한다\n- IdP 메타데이터를 자동 갱신한다\n\
  \n## DON'T\n- Implicit Flow를 사용하지 않는다 (Authorization Code Flow + PKCE 사용)\n- IdP에서\
  \ 받은 클레임을 검증 없이 신뢰하지 않는다\n- SSO 로그아웃(Single Logout)을 구현하지 않고 방치하지 않는다\n- 모든 사용자\
  \ 정보를 토큰에 넣지 않는다 (필요시 UserInfo 엔드포인트 조회)\n\n## 코드 예시\n```typescript\nimport { Issuer,\
  \ generators } from \"openid-client\";\n\n// OIDC 클라이언트 설정\nasync function createOidcClient(issuerUrl:\
  \ string) {\n  const issuer = await Issuer.discover(issuerUrl);\n  return new issuer.Client({\n\
  \    client_id: process.env.OIDC_CLIENT_ID!,\n    client_secret: process.env.OIDC_CLIENT_SECRET!,\n\
  \    redirect_uris: [`${APP_URL}/auth/callback`],\n    response_types: [\"code\"\
  ],\n  });\n}\n\n// 로그인 시작\napp.get(\"/auth/login\", async (req, res) => {\n  const\
  \ codeVerifier = generators.codeVerifier();\n  const codeChallenge = generators.codeChallenge(codeVerifier);\n\
  \  const state = generators.state();\n  const nonce = generators.nonce();\n\n  //\
  \ 세션에 저장 (콜백에서 검증용)\n  req.session.oidc = { codeVerifier, state, nonce };\n\n  const\
  \ authUrl = client.authorizationUrl({\n    scope: \"openid email profile\",\n  \
  \  state,\n    nonce,\n    code_challenge: codeChallenge,\n    code_challenge_method:\
  \ \"S256\",\n  });\n\n  res.redirect(authUrl);\n});\n\n// 콜백 처리\napp.get(\"/auth/callback\"\
  , async (req, res) => {\n  const { codeVerifier, state, nonce } = req.session.oidc!;\n\
  \  const params = client.callbackParams(req);\n\n  const tokenSet = await client.callback(\n\
  \    `${APP_URL}/auth/callback`,\n    params,\n    { code_verifier: codeVerifier,\
  \ state, nonce },\n  );\n\n  const userInfo = await client.userinfo(tokenSet.access_token!);\n\
  \  const user = await findOrCreateUser(userInfo);\n  req.session.userId = user.id;\n\
  \  res.redirect(\"/dashboard\");\n});\n```\n"
