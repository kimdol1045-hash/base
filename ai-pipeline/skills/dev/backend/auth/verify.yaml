content: "Auth 구현 자기 검증 체크리스트 (배포 전 반드시 확인):\n\n### A. 토큰/세션 관리\n- [ ] Access Token\
  \ 만료가 15분 이하인가?\n- [ ] Refresh Token rotation이 적용되어 있는가? (재사용 시 전체 무효화)\n- [ ] 로그아웃\
  \ 시 서버 측 토큰/세션이 무효화되는가? (블랙리스트 or 세션 삭제)\n- [ ] 토큰이 httpOnly, secure, sameSite 쿠키에\
  \ 저장되는가? (localStorage 사용 금지)\n\n### B. 비밀번호 보안\n- [ ] argon2id 또는 bcrypt(cost 12+)로\
  \ 해싱하는가?\n- [ ] 비밀번호 리셋 토큰이 crypto.randomBytes(32)로 생성되는가?\n- [ ] 리셋 토큰 만료(1시간)와\
  \ 일회용 처리가 되어 있는가?\n- [ ] 비밀번호 변경 시 기존 세션이 모두 무효화되는가?\n\n### C. CORS / CSRF / XSS\
  \ 방어\n- [ ] CORS origin이 와일드카드(*)가 아닌 명시적 도메인인가?\n- [ ] 쿠키 기반 인증 시 CSRF 토큰 또는 sameSite=strict가\
  \ 적용되어 있는가?\n- [ ] 사용자 입력이 적절히 sanitize/escape 되는가?\n\n### D. Rate Limiting\n- [\
  \ ] 로그인 엔드포인트: IP당 5회/분, 계정당 10회/시간 제한이 있는가?\n- [ ] 비밀번호 리셋 요청: IP당 3회/시간 제한이 있는가?\n\
  - [ ] MFA 코드 검증: 5회 실패 시 15분 잠금이 적용되는가?\n\n### E. 인가 (Authorization)\n- [ ] 모든 API에\
  \ 인증 미들웨어가 적용되어 있는가? (화이트리스트 방식)\n- [ ] 역할(role) 체크가 백엔드에서 수행되는가? (프론트 의존 금지)\n\
  - [ ] 리소스 소유권 검증이 적용되어 있는가? (본인 데이터만 접근)\n- [ ] 관리자 기능이 별도 라우터/미들웨어로 분리되어 있는가?\n\
  \n### F. MFA (다중 인증)\n- [ ] MFA 등록 시 검증 코드 확인 후 활성화하는가?\n- [ ] 백업 코드가 해싱되어 저장되는가?\
  \ (평문 금지)\n- [ ] MFA 비활성화 시 비밀번호 재확인을 요구하는가?\n\n### G. 로깅 및 감사\n- [ ] 로그인 성공/실패가\
  \ 기록되는가? (IP, User-Agent 포함)\n- [ ] 비밀번호 변경, MFA 변경, 역할 변경이 감사 로그에 남는가?\n- [ ] 로그에\
  \ 비밀번호, 토큰, 비밀키가 절대 포함되지 않는가?\n\n### 검증 방법\n```typescript\n// 자동화된 보안 테스트 예시\ndescribe('Auth\
  \ Security', () => {\n  it('만료된 access token은 거부', async () => {\n    const expired\
  \ = jwt.sign({ sub: 'user1' }, secret, { expiresIn: '0s' });\n    const res = await\
  \ request(app).get('/api/me').set('Authorization', `Bearer ${expired}`);\n    expect(res.status).toBe(401);\n\
  \  });\n\n  it('타인의 리소스 접근 시 403', async () => {\n    const userToken = getTokenFor('user2');\n\
  \    const res = await request(app).get('/api/posts/user1-post-id').set('Authorization',\
  \ `Bearer ${userToken}`);\n    expect(res.status).toBe(403);\n  });\n\n  it('Rate\
  \ limit 초과 시 429', async () => {\n    for (let i = 0; i < 6; i++) {\n      await\
  \ request(app).post('/api/login').send({ email: 'a@b.com', password: 'wrong' });\n\
  \    }\n    const res = await request(app).post('/api/login').send({ email: 'a@b.com',\
  \ password: 'wrong' });\n    expect(res.status).toBe(429);\n  });\n});\n```\n"
