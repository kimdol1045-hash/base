content: "다중 인증 MFA (비밀번호 탈취만으로 계정 침해를 막는 추가 인증 계층):\n\n### MFA 방식 비교\n| 방식 | 보안 수준\
  \ | UX | 권장 |\n|------|-----------|-----|------|\n| TOTP (앱) | ★★★★ | 보통 | ✅ 기본\
  \ |\n| WebAuthn/Passkey | ★★★★★ | 좋음 | ✅ 최우선 |\n| SMS OTP | ★★ | 좋음 | ⚠️ SIM swap\
  \ 위험 |\n| 이메일 OTP | ★★ | 보통 | ⚠️ 이메일 탈취 시 무력화 |\n| 백업 코드 | ★★★ | — | ✅ 복구용 필수 |\n\
  \n### TOTP 설정 및 검증\n```typescript\n// DO: TOTP 비밀키 생성, QR 코드, 검증\nimport speakeasy\
  \ from 'speakeasy';\nimport QRCode from 'qrcode';\n\n// 1. TOTP 설정 (사용자가 MFA 활성화\
  \ 시)\nasync function setupTOTP(userId: string) {\n  const secret = speakeasy.generateSecret({\n\
  \    name: `MyApp:${userId}`,\n    issuer: 'MyApp',\n    length: 32,\n  });\n  //\
  \ 임시 저장 (사용자 확인 전까지 pending 상태)\n  await db.savePendingMFA(userId, {\n    secret:\
  \ encrypt(secret.base32),  // 암호화 저장!\n    type: 'totp',\n  });\n  const qrUrl =\
  \ await QRCode.toDataURL(secret.otpauth_url!);\n  return { qrUrl, manualKey: secret.base32\
  \ };\n}\n\n// 2. TOTP 검증 (로그인 2단계)\nasync function verifyTOTP(userId: string, code:\
  \ string): Promise<boolean> {\n  const mfa = await db.getMFA(userId);\n  const secret\
  \ = decrypt(mfa.secret);\n  return speakeasy.totp.verify({\n    secret, encoding:\
  \ 'base32', token: code,\n    window: 1,  // ±30초 허용 (총 90초 창)\n  });\n}\n```\n\n\
  ### 백업 코드 관리\n```typescript\n// DO: 10개 백업 코드 생성, 해싱 저장\nimport crypto from 'crypto';\n\
  import argon2 from 'argon2';\n\nasync function generateBackupCodes(userId: string):\
  \ Promise<string[]> {\n  const codes: string[] = [];\n  const hashedCodes: string[]\
  \ = [];\n  for (let i = 0; i < 10; i++) {\n    const code = crypto.randomBytes(4).toString('hex');\
  \ // 8자 hex\n    codes.push(code);\n    hashedCodes.push(await argon2.hash(code));\n\
  \  }\n  await db.saveBackupCodes(userId, hashedCodes);\n  return codes; // 평문은 이때\
  \ 한 번만 사용자에게 표시!\n}\n\nasync function useBackupCode(userId: string, code: string):\
  \ Promise<boolean> {\n  const stored = await db.getBackupCodes(userId);\n  for (let\
  \ i = 0; i < stored.length; i++) {\n    if (await argon2.verify(stored[i], code))\
  \ {\n      stored.splice(i, 1); // 사용한 코드 삭제 (일회용)\n      await db.saveBackupCodes(userId,\
  \ stored);\n      return true;\n    }\n  }\n  return false;\n}\n```\n\nDON'T:\n\
  ```typescript\n// ❌ SMS만 사용 — SIM swap 공격에 취약\nawait sendSMS(user.phone, `Your code\
  \ is ${otp}`); // 유일한 MFA 수단\n\n// ❌ 백업 코드 평문 저장\nawait db.saveBackupCodes(userId,\
  \ plainCodes); // DB 유출 시 즉시 악용\n\n// ❌ TOTP 시도 횟수 제한 없음 — brute force (6자리 = 100만\
  \ 가지)\n// ❌ MFA 비밀키 암호화 없이 DB 저장\n```\n\n### Rate Limiting 기준\n- TOTP 검증: 5회 실패\
  \ 시 15분 잠금\n- 백업 코드: 3회 실패 시 30분 잠금\n- MFA 설정 변경: 비밀번호 재확인 필수\n\n### 흔한 실수\n- MFA\
  \ 설정 활성화 시 검증 코드 확인 없이 바로 적용\n- 백업 코드 소진 시 복구 방법 미제공\n- TOTP secret을 로그에 기록\n"
