content: "# ABAC (속성 기반 접근 제어) 가이드\n\n## 핵심 원칙\n- 사용자, 리소스, 환경의 속성(Attribute) 조합으로\
  \ 접근 권한을 결정한다\n- RBAC보다 유연하며, 복잡한 권한 로직을 정책(Policy)으로 표현한다\n- 정책 엔진을 분리하여 비즈니스 로직과\
  \ 권한 로직을 독립시킨다\n- 감사 로그에 어떤 정책이 적용되었는지 기록한다\n\n## DO\n- 정책을 코드 외부(JSON, YAML, OPA\
  \ Rego)에서 관리한다\n- 주체(Subject), 리소스(Resource), 행위(Action), 환경(Environment) 4요소로 평가한다\n\
  - 정책 변경 시 코드 배포 없이 적용 가능하도록 설계한다\n- 기본 거부(Default Deny) 원칙을 적용한다\n\n## DON'T\n-\
  \ if-else 체인으로 권한 로직을 하드코딩하지 않는다\n- 속성 평가에 외부 API 호출을 동기적으로 수행하지 않는다 (캐시 활용)\n-\
  \ 정책을 테스트하지 않고 프로덕션에 적용하지 않는다\n- 모든 경우에 ABAC를 사용하지 않는다 (단순 역할만 필요하면 RBAC)\n\n##\
  \ 코드 예시\n```typescript\ninterface PolicyContext {\n  subject: { id: string; role:\
  \ string; department: string; clearanceLevel: number };\n  resource: { type: string;\
  \ ownerId: string; sensitivity: string; department: string };\n  action: \"read\"\
  \ | \"write\" | \"delete\" | \"approve\";\n  environment: { time: Date; ipAddress:\
  \ string; location: string };\n}\n\ntype Policy = {\n  name: string;\n  condition:\
  \ (ctx: PolicyContext) => boolean;\n  effect: \"allow\" | \"deny\";\n};\n\nconst\
  \ policies: Policy[] = [\n  {\n    name: \"부서 내 문서 읽기\",\n    effect: \"allow\"\
  ,\n    condition: (ctx) =>\n      ctx.action === \"read\" &&\n      ctx.subject.department\
  \ === ctx.resource.department,\n  },\n  {\n    name: \"기밀 문서는 높은 보안등급만\",\n    effect:\
  \ \"deny\",\n    condition: (ctx) =>\n      ctx.resource.sensitivity === \"confidential\"\
  \ &&\n      ctx.subject.clearanceLevel < 3,\n  },\n  {\n    name: \"업무 시간 외 쓰기 금지\"\
  ,\n    effect: \"deny\",\n    condition: (ctx) => {\n      const hour = ctx.environment.time.getHours();\n\
  \      return ctx.action === \"write\" && (hour < 9 || hour > 18);\n    },\n  },\n\
  ];\n\nfunction evaluate(ctx: PolicyContext): boolean {\n  for (const policy of policies)\
  \ {\n    if (policy.condition(ctx)) {\n      if (policy.effect === \"deny\") return\
  \ false;\n    }\n  }\n  return policies.some(p => p.effect === \"allow\" && p.condition(ctx));\n\
  }\n```\n"
