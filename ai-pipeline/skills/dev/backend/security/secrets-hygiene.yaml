bloom_level: APPLY
content: '# 시크릿/API 키 관리 위생 가이드


  ## 핵심 원칙

  - API 키는 서버 사이드에서만 사용한다 — 클라이언트 번들에 포함 금지

  - 모든 시크릿은 환경변수로 관리한다 — 코드/설정 파일에 하드코딩 금지

  - .env 파일은 반드시 .gitignore에 포함한다

  - 키 유출 시 즉시 로테이션한다 — "나중에"는 없다


  ## 서버 사이드 전용 키

  ```bash

  # .env.local (서버 전용 — 클라이언트에 절대 노출 안됨)

  ANTHROPIC_API_KEY=<server-only-api-key>

  SUPABASE_SERVICE_ROLE_KEY=eyJhbG...

  STRIPE_SECRET_KEY=<stripe-secret-key>

  DATABASE_URL=postgresql://...


  # .env (클라이언트에 노출 가능한 것만)

  NEXT_PUBLIC_SUPABASE_URL=https://xxx.supabase.co

  NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbG...  # anon key는 공개 가능

  NEXT_PUBLIC_POSTHOG_KEY=phc_...           # 분석 키는 공개 가능

  ```


  ## Next.js 환경변수 규칙

  ```typescript

  // ✅ NEXT_PUBLIC_ 접두사 없음 → 서버 전용

  process.env.ANTHROPIC_API_KEY        // API Route에서만 접근 가능

  process.env.SUPABASE_SERVICE_ROLE_KEY // API Route에서만 접근 가능


  // ⚠️ NEXT_PUBLIC_ 접두사 → 클라이언트 번들에 포함됨

  process.env.NEXT_PUBLIC_SUPABASE_URL  // 브라우저 소스에서 보임

  ```


  ## .gitignore 필수 항목

  ```

  # 환경 변수

  .env

  .env.local

  .env.*.local


  # IDE/OS

  .idea/

  .vscode/settings.json

  .DS_Store


  # 인증서/키

  *.pem

  *.key

  *.p12

  ```


  ## 유출 방지 패턴


  ### 1. 런타임 검증

  ```typescript

  // 서버 시작 시 필수 환경변수 검증

  const REQUIRED_SECRETS = [
    "ANTHROPIC_API_KEY",
    "SUPABASE_SERVICE_ROLE_KEY",
    "DATABASE_URL",
  ] as const;


  function validateSecrets(): void {
    const missing = REQUIRED_SECRETS.filter((key) => !process.env[key]);
    if (missing.length > 0) {
      throw new Error(
        `Missing required environment variables: ${missing.join(", ")}`
      );
    }
  }


  // 앱 시작 시 호출

  validateSecrets();

  ```


  ### 2. 로그에서 시크릿 마스킹

  ```typescript

  function maskSecrets(obj: Record<string, unknown>): Record<string, unknown> {
    const sensitiveKeys = /key|secret|password|token|authorization/i;
    const masked: Record<string, unknown> = {};

    for (const [key, value] of Object.entries(obj)) {
      if (sensitiveKeys.test(key) && typeof value === "string") {
        masked[key] = value.slice(0, 4) + "****" + value.slice(-4);
      } else {
        masked[key] = value;
      }
    }

    return masked;
  }

  ```


  ### 3. Git 커밋 전 검사

  ```bash

  # pre-commit hook 또는 CI에서 실행

  # gitleaks (시크릿 탐지 도구)

  gitleaks detect --source . --verbose


  # 또는 간단한 grep 검사

  grep -rn "ANTHROPIC_API_KEY\|STRIPE_SECRET_KEY\|AKIA[0-9A-Z]" --include="*.ts" --include="*.tsx" src/

  ```


  ### 4. IP 비식별화 (분석/로그)

  ```typescript

  import { createHash } from "crypto";


  // ✅ IP를 해시하여 비식별화 (GDPR/개인정보 보호)

  function hashIP(ip: string, salt: string): string {
    return createHash("sha256")
      .update(ip + salt)
      .digest("hex")
      .slice(0, 16);  // 원본 IP 복원 불가
  }


  // 로그에 원본 IP 대신 해시 저장

  logger.info({
    hashedIp: hashIP(req.ip, process.env.IP_HASH_SALT!),
    path: req.path,
  });

  ```


  ## 유출 시 대응 절차

  1. 즉시 키 로테이션 (새 키 발급 → 환경변수 교체 → 배포)

  2. 유출 키 비활성화

  3. 유출 키가 사용된 로그 확인 (비인가 접근 여부)

  4. git history에서 키 제거 (git filter-branch 또는 BFG Repo-Cleaner)

  5. 포스트모템 작성


  ## 체크리스트

  - [ ] API 키가 NEXT_PUBLIC_ 접두사 없이 서버 전용으로 사용되는가?

  - [ ] .env.local이 .gitignore에 포함되어 있는가?

  - [ ] 서버 시작 시 필수 환경변수를 검증하는가?

  - [ ] 로그에 API 키/토큰이 포함되지 않는가?

  - [ ] gitleaks 또는 유사 도구로 커밋 전 검사하는가?

  - [ ] 분석 도구(PostHog 등)에 PII가 전송되지 않는가?

