content: "멀티테넌시 패턴 (한 시스템에서 여러 테넌트의 데이터를 안전하게 격리한다):\n\n### 3가지 전략 비교\n\n| 기준 | Shared\
  \ DB + RLS | Schema per Tenant | DB per Tenant |\n|------|----------------|-------------------|---------------|\n\
  | 격리 수준 | 논리적 (행 수준) | 논리적 (스키마 수준) | 물리적 (완전 격리) |\n| 비용 | 최저 | 중간 | 최고 |\n| 구현\
  \ 복잡도 | 낮음 | 중간 | 높음 |\n| 확장성 | 수천 테넌트 | 수백 테넌트 | 수십 테넌트 |\n| 백업/복구 | 전체 단위 | 스키마\
  \ 단위 | 테넌트 단위 |\n| 마이그레이션 | 1회 | N회 (자동화 필수) | N회 (자동화 필수) |\n| 적합 사례 | SaaS MVP,\
  \ B2C | B2B 중규모 | 금융, 의료 (규정 준수) |\n\n추천: **Shared DB + RLS** (90% 사례). 규정 요구 시에만\
  \ DB 분리.\n\n### RLS 구현 (Postgres + Supabase)\n\nDO:\n```typescript\n// ✅ Step 1:\
  \ 테넌트 컨텍스트 설정 미들웨어\nasync function tenantMiddleware(req: Request, next: Next) {\n\
  \  const tenantId = req.headers.get(\"X-Tenant-ID\");\n  if (!tenantId) throw new\
  \ ForbiddenError(\"Tenant ID required\");\n\n  // SET LOCAL은 현재 트랜잭션 내에서만 유효 (안전)\n\
  \  await db.$executeRaw`SELECT set_config('app.tenant_id', ${tenantId}, true)`;\n\
  \  return next(req);\n}\n\n// ✅ Step 2: RLS 정책 (SQL)\n// -- 모든 테넌트 테이블에 tenant_id\
  \ 컬럼 추가\n// ALTER TABLE projects ADD COLUMN tenant_id UUID NOT NULL;\n// ALTER TABLE\
  \ projects ENABLE ROW LEVEL SECURITY;\n//\n// CREATE POLICY tenant_isolation ON\
  \ projects\n//   USING (tenant_id = current_setting('app.tenant_id')::UUID)\n//\
  \   WITH CHECK (tenant_id = current_setting('app.tenant_id')::UUID);\n\n// ✅ Step\
  \ 3: 인덱스 (tenant_id 첫 번째)\n// CREATE INDEX idx_projects_tenant ON projects (tenant_id,\
  \ created_at DESC);\n```\n\n```typescript\n// ✅ 트랜잭션 내에서 SET LOCAL 사용 (트랜잭션 종료 시\
  \ 자동 해제)\nawait db.$transaction(async (tx) => {\n  await tx.$executeRaw`SELECT set_config('app.tenant_id',\
  \ ${tenantId}, true)`;\n  const projects = await tx.project.findMany();  // RLS\
  \ 자동 적용\n  return projects;\n});\n```\n\n### Schema per Tenant 패턴\n```typescript\n\
  // ✅ 테넌트별 스키마 전환\nasync function withTenantSchema<T>(\n  tenantId: string,\n  callback:\
  \ (tx: PrismaClient) => Promise<T>\n): Promise<T> {\n  const schema = `tenant_${tenantId}`;\n\
  \  await db.$executeRawUnsafe(`SET search_path TO \"${schema}\", public`);\n  return\
  \ callback(db);\n}\n```\n\nDON'T:\n```typescript\n// ❌ WHERE 절에 tenant_id 필터만 의존\
  \ — 누락 시 전체 데이터 노출\nasync function getProjects(tenantId: string) {\n  return db.project.findMany({\n\
  \    where: { tenantId }, // 개발자가 빠뜨리면 전체 노출\n  });\n}\n\n// ❌ SET 대신 SET LOCAL\
  \ — 커넥션 풀에서 다른 요청에 영향\nawait db.$executeRaw`SET app.tenant_id = ${tenantId}`; //\
  \ 커넥션 반환 후 잔류\n\n// ❌ RLS 없이 API에서만 필터링 — 직접 DB 접근 시 격리 불가\n```\n\n### 체크리스트\n-\
  \ [ ] 모든 테넌트 테이블에 `tenant_id` 컬럼 + NOT NULL\n- [ ] RLS 정책이 SELECT, INSERT, UPDATE,\
  \ DELETE 모두 적용\n- [ ] `SET LOCAL` 사용 (SET 아님)\n- [ ] tenant_id 포함 복합 인덱스\n- [ ]\
  \ 슈퍼관리자용 BYPASSRLS 역할 분리\n"
