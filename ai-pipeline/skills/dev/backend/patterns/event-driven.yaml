content: "이벤트 주도 아키텍처 (서비스 간 느슨한 결합을 달성한다):\n\n### Domain Event 설계\n이벤트 = 과거에 발생한\
  \ 사실. 불변. 과거형 명명.\n\n```typescript\ninterface DomainEvent {\n  eventId: string;\
  \        // UUID\n  eventType: string;      // \"OrderCreated\"\n  aggregateId:\
  \ string;    // 관련 Aggregate ID\n  occurredAt: string;     // ISO 8601\n  payload:\
  \ Record<string, unknown>;\n  metadata?: { userId?: string; correlationId?: string\
  \ };\n}\n\n// DO: 충분한 정보 포함 (소비자가 추가 조회 불필요하게)\nconst event: DomainEvent = {\n \
  \ eventId: crypto.randomUUID(),\n  eventType: \"OrderCreated\",\n  aggregateId:\
  \ orderId,\n  occurredAt: new Date().toISOString(),\n  payload: { userId, items,\
  \ totalAmount, currency },\n};\n```\n\n### 이벤트 버스 패턴\n```typescript\n// 인메모리 (단일\
  \ 서비스)\nclass EventBus {\n  private handlers = new Map<string, Function[]>();\n\n\
  \  subscribe(eventType: string, handler: Function) {\n    const list = this.handlers.get(eventType)\
  \ ?? [];\n    list.push(handler);\n    this.handlers.set(eventType, list);\n  }\n\
  \n  async publish(event: DomainEvent) {\n    const handlers = this.handlers.get(event.eventType)\
  \ ?? [];\n    await Promise.allSettled(handlers.map(h => h(event)));\n  }\n}\n```\n\
  \n### 주의사항\n- 이벤트 순서 보장: 같은 Aggregate의 이벤트는 순서 유지\n- 멱등성: 소비자가 같은 이벤트를 2번 받아도 안전하게\n\
  - 이벤트 스키마 버전 관리: v1 → v2 마이그레이션 전략\n- 실패 처리: Dead Letter Queue로 실패 이벤트 격리\n"
