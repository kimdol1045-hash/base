content: "이벤트 소싱 (상태 대신 이벤트의 시퀀스를 저장한다):\n\n### 핵심 개념\n전통적: `UPDATE orders SET status='shipped'\
  \ WHERE id=1`\n이벤트 소싱: `[OrderCreated, PaymentReceived, OrderShipped]` → 현재 상태 재구성\n\
  \n### 이벤트 저장소\n```typescript\ninterface DomainEvent {\n  eventId: string;\n  aggregateId:\
  \ string;\n  eventType: string;\n  payload: Record<string, unknown>;\n  occurredAt:\
  \ Date;\n  version: number;  // 낙관적 동시성 제어\n}\n\n// 이벤트 append-only 저장\nawait eventStore.append('order-123',\
  \ [\n  { eventType: 'OrderCreated', payload: { items, userId } },\n]);\n```\n\n\
  ### 상태 재구성\n```typescript\nfunction rebuildOrder(events: DomainEvent[]): Order {\n\
  \  return events.reduce((state, event) => {\n    switch (event.eventType) {\n  \
  \    case 'OrderCreated':\n        return { ...state, status: 'created', items:\
  \ event.payload.items };\n      case 'PaymentReceived':\n        return { ...state,\
  \ status: 'paid' };\n      case 'OrderShipped':\n        return { ...state, status:\
  \ 'shipped' };\n      default:\n        return state;\n    }\n  }, {} as Order);\n\
  }\n```\n\n### Snapshot (성능 최적화)\n이벤트가 많으면 매번 재구성이 비쌈 → N번째 이벤트마다 스냅샷 저장\n\n### CQRS와\
  \ 조합\n- Command: 이벤트 발행 (쓰기)\n- Query: Projection/Read Model에서 조회 (읽기)\n- Projection:\
  \ 이벤트를 구독하여 읽기 전용 뷰 업데이트\n\n### 주의사항\n- 이벤트 스키마 진화: 버전 관리 + upcaster 필수\n- 이벤트는\
  \ 불변 — 삭제/수정 금지 (보상 이벤트로 처리)\n- 복잡성 매우 높음 — 정말 필요한 경우에만 도입\n"
