content: "타임아웃 설계 (모든 외부 호출에는 반드시 타임아웃을 설정한다):\n\n### 계층별 타임아웃 기준\n| 계층 | 타임아웃 | 근거\
  \ |\n|------|----------|------|\n| Client (브라우저) | 30s | 사용자 체감 한계 |\n| API Gateway/LB\
  \ | 25s | Client보다 짧아야 함 |\n| Application Service | 20s | Gateway보다 짧아야 함 |\n| External\
  \ API 호출 | 10s | 제어 불가 구간, 짧게 |\n| DB Query | 5s | 5초 넘는 쿼리는 최적화 필요 |\n| Redis/Cache\
  \ | 1s | 캐시는 빨라야 의미 있음 |\n| DNS Lookup | 2s | 네트워크 기본 |\n\n핵심 원칙: **upstream(호출자)\
  \ > downstream(피호출자)** — 역전되면 upstream이 먼저 타임아웃\n\n### AbortController 기반 구현\n```typescript\n\
  // DO: AbortSignal.timeout()으로 fetch 타임아웃, 계층별 차등 적용\nasync function callExternalApi(endpoint:\
  \ string, data: unknown) {\n  const response = await fetch(endpoint, {\n    method:\
  \ 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify(data),\n\
  \    signal: AbortSignal.timeout(10_000), // 10초 타임아웃\n  });\n  if (!response.ok)\
  \ throw new HttpError(response.status);\n  return response.json();\n}\n\n// DB 쿼리\
  \ 타임아웃 (statement_timeout)\nasync function queryWithTimeout<T>(sql: string, params:\
  \ unknown[]): Promise<T> {\n  const client = await pool.connect();\n  try {\n  \
  \  await client.query('SET statement_timeout = 5000'); // 5초\n    const result =\
  \ await client.query(sql, params);\n    return result.rows as T;\n  } finally {\n\
  \    await client.query('RESET statement_timeout');\n    client.release();\n  }\n\
  }\n\n// 커넥션 풀 타임아웃 설정\nimport { Pool } from 'pg';\nconst pool = new Pool({\n  connectionTimeoutMillis:\
  \ 3000,   // 커넥션 획득 대기 3초\n  idleTimeoutMillis: 30000,        // 유휴 커넥션 30초 후 반환\n\
  \  query_timeout: 5000,             // 쿼리 실행 5초\n  max: 20,                    \
  \     // 최대 커넥션 수\n});\n```\n\n### 복합 호출 타임아웃\n```typescript\n// DO: 전체 요청에 대한 상위\
  \ 타임아웃 + 개별 호출 타임아웃\nasync function processOrder(orderId: string) {\n  // 전체 처리\
  \ 20초 제한\n  return Promise.race([\n    (async () => {\n      const inventory = await\
  \ callService('/inventory/check', { orderId }); // 10s\n      const payment = await\
  \ callExternalApi('/payment/charge', { orderId }); // 10s\n      return { inventory,\
  \ payment };\n    })(),\n    sleep(20_000).then(() => { throw new TimeoutError('Order\
  \ processing timeout'); }),\n  ]);\n}\n```\n\nDON'T:\n```typescript\n// ❌ 타임아웃 없는\
  \ 외부 호출 — 상대 서버 무응답 시 무한 대기\nconst res = await fetch('https://external-api.com/data');\
  \ // 타임아웃 없음!\n\n// ❌ 하위 서비스 타임아웃 > 상위 서비스 타임아웃\n// Gateway: 10s, Service: 20s →\
  \ Service가 처리 중인데 Gateway가 먼저 503 반환\n// 클라이언트는 에러, 서비스는 계속 실행 (좀비 요청)\n\n// ❌ DB\
  \ 커넥션 풀 타임아웃 미설정 — 커넥션 고갈 시 전체 서비스 마비\nconst pool = new Pool({ max: 20 }); // connectionTimeoutMillis\
  \ 기본값 0 = 무한 대기\n```\n\n### 타임아웃 모니터링\n- 타임아웃 발생률 메트릭: `timeout_total{service, target}`\n\
  - P99 응답시간이 타임아웃의 80%에 근접하면 알림\n- 타임아웃 로그에 호출 대상, 소요시간 포함\n\n### 흔한 실수\n- 개발 환경에서\
  \ 타임아웃 비활성화 후 프로덕션에서도 적용 안 됨\n- 타임아웃 후 리소스(DB 커넥션, 파일 핸들) 미정리\n- Promise.race 사용\
  \ 시 패배한 Promise의 에러 미처리 (unhandled rejection)\n"
