content: "Clean Architecture (의존성 방향으로 변경 영향 범위를 제어한다):\n\n### 계층 구조 (안쪽이 바깥을 모른다)\n\
  ```\nEntities (도메인 모델)\n  ← Use Cases (비즈니스 로직)\n    ← Interface Adapters (Controller,\
  \ Gateway, Presenter)\n      ← Frameworks & Drivers (Express, Prisma, React)\n```\n\
  \n### 의존성 규칙\n- 안쪽 계층은 바깥 계층을 절대 import 하지 않는다\n- 바깥에서 안쪽으로만 의존\n- 경계를 넘을 때는 인터페이스(Port)를\
  \ 사용\n\n### 디렉토리 구조 예시\n```\nsrc/\n  domain/          # Entity, Value Object, Domain\
  \ Event\n    entities/\n    value-objects/\n  application/     # Use Case, Port\
  \ (interface)\n    use-cases/\n    ports/\n  infrastructure/  # 외부 구현 (DB, API,\
  \ 메일)\n    repositories/\n    services/\n  presentation/    # Controller, Route,\
  \ DTO\n    controllers/\n    dtos/\n```\n\n### Port & Adapter 패턴\n```typescript\n\
  // Port (application 계층에 위치)\ninterface UserRepository {\n  findById(id: string):\
  \ Promise<User | null>;\n  save(user: User): Promise<void>;\n}\n\n// Adapter (infrastructure\
  \ 계층에 위치)\nclass PrismaUserRepository implements UserRepository {\n  async findById(id:\
  \ string) {\n    return prisma.user.findUnique({ where: { id } });\n  }\n}\n```\n\
  \n### 적용 판단\n- ✅ 적용: 비즈니스 로직 복잡, 프레임워크 교체 가능성, 장기 프로젝트\n- ❌ 과잉: CRUD 앱, 프로토타입, 마이크로서비스\
  \ (서비스 자체가 작음)\n"
