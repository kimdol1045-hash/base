content: "Strangler Fig 패턴 (레거시를 점진적으로 교체한다):\n\n### 핵심 원리\n새 시스템이 레거시를 감싸면서 점진적으로\
  \ 기능을 대체.\n빅뱅 마이그레이션의 위험 없이 안전하게 전환.\n\n### 구현 단계\n1. **Intercept**: 프록시/게이트웨이를\
  \ 앞에 배치\n2. **Route**: 요청을 신/구 시스템으로 분기\n3. **Replace**: 기능 하나씩 새 시스템으로 이전\n4. **Remove**:\
  \ 모든 트래픽 이전 후 레거시 제거\n\n### 라우팅 전략\n```\nAPI Gateway\n  /api/users/*    → New Service\
  \ (이전 완료)\n  /api/orders/*   → New Service (이전 중)\n  /api/reports/*  → Legacy System\
  \ (아직)\n```\n\n### 데이터 동기화\n- 이중 쓰기: 양쪽 모두 기록 (일시적)\n- Change Data Capture: 레거시\
  \ DB 변경을 이벤트로 전파\n- 읽기는 새 시스템, 쓰기는 레거시에서 시작 → 점진 전환\n\n### 주의사항\n- 프록시 레이어가 SPOF가\
  \ 되지 않도록\n- 양쪽 시스템 동시 운영 기간 최소화\n- 기능 단위로 전환 (테이블 단위 X)\n- 전환 완료 후 반드시 레거시 코드 제거\n"
