content: "LLM API 연동 패턴 (안정적이고 비용 효율적인 LLM 통합을 구현한다):\n\n### Streaming 응답 (SSE)\n\
  ```typescript\nimport Anthropic from '@anthropic-ai/sdk';\n\n// DO: 스트리밍으로 체감 응답\
  \ 시간 단축 (TTFB < 500ms)\nasync function streamChat(prompt: string, res: Response)\
  \ {\n  const client = new Anthropic();\n\n  const stream = client.messages.stream({\n\
  \    model: 'claude-sonnet-4-20250514',\n    max_tokens: 1024,\n    messages: [{\
  \ role: 'user', content: prompt }],\n  });\n\n  // SSE 형식으로 클라이언트에 전달\n  res.writeHead(200,\
  \ {\n    'Content-Type': 'text/event-stream',\n    'Cache-Control': 'no-cache',\n\
  \    Connection: 'keep-alive',\n  });\n\n  stream.on('text', (text) => {\n    res.write(`data:\
  \ ${JSON.stringify({ text })}\\n\\n`);\n  });\n\n  const finalMessage = await stream.finalMessage();\n\
  \  res.write(`data: ${JSON.stringify({\n    done: true,\n    usage: finalMessage.usage,\
  \ // 토큰 사용량 추적\n  })}\\n\\n`);\n  res.end();\n}\n```\n\n### 토큰 예산 관리\n```typescript\n\
  // DO: 요청별 토큰 예산 설정 + 비용 추적\ninterface TokenBudget {\n  maxInputTokens: number;\
  \   // 시스템 + 사용자 프롬프트\n  maxOutputTokens: number;  // 응답\n  estimatedCost: number;\
  \    // USD\n}\n\nconst BUDGETS: Record<string, TokenBudget> = {\n  chat:    { maxInputTokens:\
  \ 4000,  maxOutputTokens: 1024, estimatedCost: 0.02 },\n  summary: { maxInputTokens:\
  \ 8000,  maxOutputTokens: 2048, estimatedCost: 0.05 },\n  analysis:{ maxInputTokens:\
  \ 16000, maxOutputTokens: 4096, estimatedCost: 0.15 },\n};\n\n// 요청 전 토큰 수 검증\n\
  function validateTokenBudget(input: string, type: keyof typeof BUDGETS) {\n  const\
  \ budget = BUDGETS[type];\n  const estimatedTokens = Math.ceil(input.length / 4);\
  \ // 근사치\n  if (estimatedTokens > budget.maxInputTokens) {\n    throw new Error(`입력이\
  \ 토큰 예산 초과: ${estimatedTokens} > ${budget.maxInputTokens}`);\n  }\n}\n```\n\n###\
  \ Rate Limit 처리 (429 Retry)\n```typescript\n// DO: 지수 백오프로 429 재시도\nasync function\
  \ callWithRetry<T>(\n  fn: () => Promise<T>,\n  maxRetries = 3,\n): Promise<T> {\n\
  \  for (let attempt = 0; attempt <= maxRetries; attempt++) {\n    try {\n      return\
  \ await fn();\n    } catch (error: any) {\n      if (error.status === 429 && attempt\
  \ < maxRetries) {\n        const retryAfter = error.headers?.['retry-after']\n \
  \         ? parseInt(error.headers['retry-after']) * 1000\n          : Math.pow(2,\
  \ attempt) * 1000; // 1s, 2s, 4s\n        await new Promise(r => setTimeout(r, retryAfter));\n\
  \        continue;\n      }\n      throw error;\n    }\n  }\n  throw new Error('Max\
  \ retries exceeded');\n}\n```\n\n### Structured Output 검증\n```typescript\nimport\
  \ { z } from 'zod';\n\n// DO: LLM 출력을 스키마로 검증\nconst AnalysisSchema = z.object({\n\
  \  sentiment: z.enum(['positive', 'negative', 'neutral']),\n  confidence: z.number().min(0).max(1),\n\
  \  summary: z.string().max(200),\n});\n\nconst raw = await callLLM('다음 리뷰를 분석해주세요.\
  \ JSON으로 응답.');\nconst parsed = AnalysisSchema.safeParse(JSON.parse(raw));\nif (!parsed.success)\
  \ {\n  // 재시도 또는 fallback 처리\n  logger.warn('LLM 출력 검증 실패', parsed.error);\n}\n\
  ```\n\nDON'T:\n```typescript\n// ❌ 블로킹 응답 (스트리밍 미사용) → 사용자 10초 대기\nconst response\
  \ = await client.messages.create({ ... });\nres.json({ text: response.content[0].text\
  \ });\n\n// ❌ 토큰 예산 없이 무제한 입력 → 비용 폭발\nconst response = await client.messages.create({\n\
  \  messages: [{ role: 'user', content: entireDocument }], // 100K 토큰?\n});\n\n//\
  \ ❌ Rate limit 무시 → 연쇄 실패\nconst response = await client.messages.create({ ... });\
  \ // 429 시 그대로 에러\n\n// ❌ LLM 출력 무조건 신뢰 → JSON 파싱 에러, 잘못된 값\nconst data = JSON.parse(response.content[0].text);\
  \ // 파싱 실패 가능\nawait db.insert(data); // 검증 없이 DB 저장\n```\n\n### 비용 추적\n- 요청마다 input/output\
  \ 토큰 수 로깅\n- 일별/사용자별 비용 대시보드 구축\n- 월 예산 한도 설정 + 80% 도달 시 알림\n"
