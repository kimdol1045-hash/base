content: "재시도 패턴 (일시적 장애를 자동 복구하되 시스템을 과부하하지 않는다):\n\n### Exponential Backoff + Jitter\
  \ 공식\n`delay = min(base * 2^attempt + random(0, jitter), maxDelay)`\n\n### 재시도 지연\
  \ 테이블\n| 시도 | 기본 지연 | + Jitter (0~1s) | 최대 제한 |\n|------|-----------|-----------------|-----------|\n\
  | 1회 | 1s | 1.0~2.0s | — |\n| 2회 | 2s | 2.0~3.0s | — |\n| 3회 | 4s | 4.0~5.0s | —\
  \ |\n| 4회 | 8s | 8.0~9.0s | 10s (cap) |\n| 최대 재시도: 3회 (총 4회 시도) |\n\n### 구현\n```typescript\n\
  // DO: exponential backoff + jitter, 재시도 가능 에러만 구분\ninterface RetryConfig {\n  maxRetries:\
  \ number;\n  baseDelay: number;    // ms\n  maxDelay: number;     // ms\n  jitterMax:\
  \ number;    // ms\n}\n\nconst DEFAULT_RETRY: RetryConfig = {\n  maxRetries: 3,\n\
  \  baseDelay: 1000,\n  maxDelay: 10000,\n  jitterMax: 1000,\n};\n\nasync function\
  \ withRetry<T>(\n  fn: () => Promise<T>,\n  config: RetryConfig = DEFAULT_RETRY,\n\
  \  isRetryable: (err: Error) => boolean = defaultRetryable,\n): Promise<T> {\n \
  \ let lastError: Error;\n  for (let attempt = 0; attempt <= config.maxRetries; attempt++)\
  \ {\n    try {\n      return await fn();\n    } catch (err) {\n      lastError =\
  \ err as Error;\n      if (attempt === config.maxRetries || !isRetryable(lastError))\
  \ throw lastError;\n      const delay = Math.min(\n        config.baseDelay * Math.pow(2,\
  \ attempt) + Math.random() * config.jitterMax,\n        config.maxDelay,\n     \
  \ );\n      await sleep(delay);\n    }\n  }\n  throw lastError!;\n}\n\n// 재시도 가능\
  \ 여부 판단\nfunction defaultRetryable(err: Error): boolean {\n  if (err instanceof\
  \ HttpError) {\n    // 5xx, 408(Timeout), 429(Too Many Requests)만 재시도\n    return\
  \ err.status >= 500 || err.status === 408 || err.status === 429;\n  }\n  // 네트워크\
  \ 에러는 재시도\n  return err.message.includes('ECONNRESET') || err.message.includes('ETIMEDOUT');\n\
  }\n\n// 사용 예시\nconst result = await withRetry(\n  () => externalApi.fetchData(id),\n\
  \  { maxRetries: 3, baseDelay: 1000, maxDelay: 10000, jitterMax: 500 },\n);\n```\n\
  \nDON'T:\n```typescript\n// ❌ 고정 지연 — Thundering Herd 유발 (모든 클라이언트가 동시에 재시도)\nasync\
  \ function retryFixed(fn: () => Promise<any>) {\n  for (let i = 0; i < 10; i++)\
  \ {  // ❌ 무한에 가까운 재시도\n    try { return await fn(); }\n    catch { await sleep(1000);\
  \ }  // ❌ 고정 1초, jitter 없음\n  }\n}\n\n// ❌ 비멱등 POST 요청을 무조건 재시도 — 중복 결제 발생!\nawait\
  \ withRetry(() => fetch('/api/payments', { method: 'POST', body }));\n\n// ❌ 모든\
  \ 에러 재시도 — 400 Bad Request도 재시도 (의미 없음)\n```\n\n### 재시도 가능 vs 불가\n| 재시도 가능 | 재시도\
  \ 불가 |\n|-------------|-------------|\n| 503 Service Unavailable | 400 Bad Request\
  \ |\n| 429 Too Many Requests | 401 Unauthorized |\n| 408 Request Timeout | 403 Forbidden\
  \ |\n| ECONNRESET, ETIMEDOUT | 404 Not Found |\n| DB deadlock | 422 Validation Error\
  \ |\n\n### 흔한 실수\n- 비멱등 연산(결제, 주문)에 Idempotency Key 없이 재시도\n- maxRetries가 너무 높아(10+)\
  \ 장애 지속 시 큐 적체\n- Circuit Breaker와 함께 사용하지 않아 불필요한 재시도 반복\n"
