content: "메시지 큐 패턴 (비동기 처리로 서비스 간 결합도를 낮추고 부하를 평탄화한다):\n\n### 큐 기술 비교\n| 기술 | 프로토콜\
  \ | 장점 | 적합 사례 |\n|------|----------|------|-----------|\n| BullMQ | Redis | 간편,\
  \ 지연/반복 작업 | Node.js 모노리스 |\n| RabbitMQ | AMQP | 라우팅, 교환기, 신뢰성 | MSA 간 통신 |\n| SQS\
  \ | HTTP | 관리형, 무한 확장 | AWS 서버리스 |\n| Kafka | TCP | 순서 보장, 재처리 | 이벤트 스트리밍, 로그 |\n\
  \n### BullMQ 구현\n```typescript\n// DO: 도메인별 큐 분리, 멱등 컨슈머, DLQ 처리\nimport { Queue,\
  \ Worker, QueueEvents } from 'bullmq';\nimport Redis from 'ioredis';\n\nconst connection\
  \ = new Redis({ host: 'localhost', port: 6379, maxRetriesPerRequest: null });\n\n\
  // 도메인별 큐 분리\nconst emailQueue = new Queue('email', { connection });\nconst paymentQueue\
  \ = new Queue('payment', { connection });\n\n// Producer: 작업 추가\nasync function\
  \ sendWelcomeEmail(userId: string) {\n  await emailQueue.add('welcome', { userId\
  \ }, {\n    attempts: 3,                    // 최대 3회 재시도\n    backoff: { type: 'exponential',\
  \ delay: 2000 }, // 2s, 4s, 8s\n    removeOnComplete: { count: 1000 },  // 완료된 작업\
  \ 1000개만 유지\n    removeOnFail: { count: 5000 },\n  });\n}\n\n// 지연 작업: 결제 후 30분\
  \ 뒤 리뷰 요청\nawait emailQueue.add('review-request', { orderId }, {\n  delay: 30 *\
  \ 60 * 1000, // 30분 후 실행\n});\n\n// 반복 작업: 매일 오전 9시 일일 보고서\nawait emailQueue.add('daily-report',\
  \ {}, {\n  repeat: { pattern: '0 9 * * *' }, // cron 표현식\n});\n\n// Consumer: 멱등\
  \ 처리\nconst emailWorker = new Worker('email', async (job) => {\n  // 멱등성: 이미 보낸\
  \ 이메일인지 확인\n  const sent = await db.findEmail({ jobId: job.id, type: job.name });\n\
  \  if (sent) return { skipped: true };\n\n  switch (job.name) {\n    case 'welcome':\n\
  \      await mailer.send({ to: job.data.userId, template: 'welcome' });\n      break;\n\
  \    case 'review-request':\n      await mailer.send({ to: job.data.orderId, template:\
  \ 'review' });\n      break;\n  }\n  // 처리 기록 저장\n  await db.saveEmailLog({ jobId:\
  \ job.id, type: job.name, sentAt: new Date() });\n}, {\n  connection,\n  concurrency:\
  \ 5,       // 동시 처리 5개\n  limiter: { max: 10, duration: 1000 }, // 초당 최대 10건 (rate\
  \ limit)\n});\n```\n\n### DLQ (Dead Letter Queue) 처리\n```typescript\n// 실패 작업 모니터링\
  \ 및 재처리\nemailWorker.on('failed', async (job, err) => {\n  if (job && job.attemptsMade\
  \ >= job.opts.attempts!) {\n    logger.error(`Job ${job.id} moved to DLQ`, { error:\
  \ err.message, data: job.data });\n    await alerting.notify(`Email job failed permanently:\
  \ ${job.id}`);\n    // DLQ 큐에 명시적 이동\n    await dlqQueue.add('email-failed', { originalJob:\
  \ job.data, error: err.message });\n  }\n});\n```\n\nDON'T:\n```typescript\n// ❌\
  \ 단일 큐에 모든 작업 — 이메일 폭주가 결제 처리를 블로킹\nconst queue = new Queue('everything', { connection\
  \ });\nawait queue.add('email', emailData);\nawait queue.add('payment', paymentData);\
  \ // 이메일 작업에 밀려 지연\n\n// ❌ DLQ 없음 — 실패 작업이 영구 유실\n// ❌ 멱등하지 않은 컨슈머 — 재시도 시 이메일 중복\
  \ 발송\n// ❌ concurrency 무제한 — 외부 서비스 rate limit 초과\n```\n\n### 흔한 실수\n- Redis 연결\
  \ 끊김 시 작업 유실 (persistence 설정 필요: appendonly yes)\n- 작업 데이터에 거대한 payload 포함 (ID만\
  \ 전달 후 조회 권장)\n- 완료된 작업을 삭제하지 않아 Redis 메모리 폭증\n"
