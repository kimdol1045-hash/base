content: "# WebSocket 인증/인가 가이드\n\n## 핵심 원칙\n- WebSocket 연결 수립 시 반드시 인증을 수행한다\n- 토큰\
  \ 만료 시 연결을 종료하고 재인증을 요구한다\n- 메시지 단위로 권한을 검사한다 (연결 인증만으로 불충분)\n- Origin 헤더를 검증하여\
  \ CSWSH(Cross-Site WebSocket Hijacking)를 방지한다\n\n## DO\n- 핸드셰이크 단계에서 JWT를 검증한다 (쿼리\
  \ 파라미터 또는 프로토콜 헤더)\n- 토큰 갱신 메커니즘을 구현한다 (만료 전 refresh)\n- 허용된 Origin만 연결을 수락한다\n\
  - Rate limiting을 메시지 단위로 적용한다\n\n## DON'T\n- URL 쿼리스트링에 토큰을 전달한 후 로그에 기록되도록 방치하지\
  \ 않는다\n- 한번 인증된 연결에 대해 이후 권한 검사를 생략하지 않는다\n- 모든 Origin을 허용하지 않는다\n- 평문(ws://)으로\
  \ 프로덕션 WebSocket을 운영하지 않는다 (wss:// 필수)\n\n## 코드 예시\n```typescript\nimport { verify\
  \ } from \"jsonwebtoken\";\n\nfunction authenticateWebSocket(req: IncomingMessage):\
  \ User {\n  // 1. Origin 검증\n  const origin = req.headers.origin;\n  if (!ALLOWED_ORIGINS.includes(origin!))\
  \ {\n    throw new Error(\"Origin not allowed\");\n  }\n\n  // 2. 토큰 추출 (Sec-WebSocket-Protocol\
  \ 헤더 활용)\n  const protocols = req.headers[\"sec-websocket-protocol\"]?.split(\"\
  , \");\n  const token = protocols?.find(p => p.startsWith(\"auth.\"))?.slice(5);\n\
  \  if (!token) throw new Error(\"No auth token\");\n\n  // 3. 토큰 검증\n  const payload\
  \ = verify(token, JWT_SECRET) as JwtPayload;\n  return { id: payload.sub, roles:\
  \ payload.roles };\n}\n\n// 메시지 단위 권한 검사\nfunction handleMessage(user: User, msg:\
  \ WsMessage) {\n  if (msg.type === \"admin:action\" && !user.roles.includes(\"admin\"\
  )) {\n    return { error: \"FORBIDDEN\", message: \"관리자 권한이 필요합니다\" };\n  }\n  //\
  \ ... 메시지 처리\n}\n```\n"
