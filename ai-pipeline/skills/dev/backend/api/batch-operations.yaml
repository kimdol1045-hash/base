content: "Batch Operations 패턴 (대량 작업은 개별 API 호출이 아닌 일괄 처리로 한다 -- 100번의 요청을 1번으로 줄여라):\n\
  \n### Batch API 설계 원칙\n- 각 항목의 성공/실패를 개별 보고\n- 전체 실패(all-or-nothing)와 부분 성공(partial)\
  \ 모드 지원\n- 최대 배치 크기 제한 (기본 100건)\n\nDO:\n```typescript\n// 1. Batch Create 요청/응답\
  \ 스키마\nconst BatchCreateSchema = z.object({\n  items: z.array(CreateItemSchema).min(1).max(100),\n\
  \  mode: z.enum([\"atomic\", \"partial\"]).default(\"partial\"),\n  // atomic: 하나라도\
  \ 실패하면 전체 롤백\n  // partial: 성공한 것만 저장, 실패는 개별 보고\n});\n\nconst BatchResponseSchema\
  \ = z.object({\n  succeeded: z.number(),\n  failed: z.number(),\n  total: z.number(),\n\
  \  results: z.array(z.object({\n    index: z.number(),\n    status: z.enum([\"success\"\
  , \"error\"]),\n    data: z.any().optional(),\n    error: z.object({\n      code:\
  \ z.string(),\n      message: z.string(),\n    }).optional(),\n  })),\n});\n\n//\
  \ 2. Atomic 모드 (트랜잭션)\napp.post(\"/api/v1/products/batch\", authMiddleware, async\
  \ (c) => {\n  const { items, mode } = BatchCreateSchema.parse(await c.req.json());\n\
  \n  if (mode === \"atomic\") {\n    return await handleAtomicBatch(c, items);\n\
  \  }\n  return await handlePartialBatch(c, items);\n});\n\nasync function handleAtomicBatch(c:\
  \ Context, items: CreateItemInput[]) {\n  const results = await db.transaction(async\
  \ (tx) => {\n    const created: any[] = [];\n    for (let i = 0; i < items.length;\
  \ i++) {\n      try {\n        const product = await tx.insert(products).values(items[i]).returning();\n\
  \        created.push({ index: i, status: \"success\", data: product[0] });\n  \
  \    } catch (err) {\n        // 트랜잭션 전체 롤백\n        throw new BatchError(`Item\
  \ ${i} failed: ${err.message}`, i, created);\n      }\n    }\n    return created;\n\
  \  });\n\n  return c.json({\n    succeeded: results.length,\n    failed: 0,\n  \
  \  total: items.length,\n    results,\n  }, 201);\n}\n\n// 3. Partial 모드 (개별 처리)\n\
  async function handlePartialBatch(c: Context, items: CreateItemInput[]) {\n  const\
  \ results: BatchResult[] = [];\n  let succeeded = 0;\n  let failed = 0;\n\n  for\
  \ (let i = 0; i < items.length; i++) {\n    try {\n      const product = await db.insert(products).values(items[i]).returning();\n\
  \      results.push({ index: i, status: \"success\", data: product[0] });\n    \
  \  succeeded++;\n    } catch (err) {\n      results.push({\n        index: i,\n\
  \        status: \"error\",\n        error: {\n          code: mapErrorCode(err),\n\
  \          message: err instanceof Error ? err.message : \"Unknown error\",\n  \
  \      },\n      });\n      failed++;\n    }\n  }\n\n  const statusCode = failed\
  \ === 0 ? 201 : failed === items.length ? 400 : 207;\n  return c.json({ succeeded,\
  \ failed, total: items.length, results }, statusCode);\n}\n\n// 4. Batch Update\
  \ (PATCH)\nconst BatchUpdateSchema = z.object({\n  operations: z.array(z.object({\n\
  \    id: z.string().uuid(),\n    data: UpdateItemSchema,\n  })).min(1).max(100),\n\
  });\n\napp.patch(\"/api/v1/products/batch\", authMiddleware, async (c) => {\n  const\
  \ { operations } = BatchUpdateSchema.parse(await c.req.json());\n  const results:\
  \ BatchResult[] = [];\n\n  await db.transaction(async (tx) => {\n    for (let i\
  \ = 0; i < operations.length; i++) {\n      const { id, data } = operations[i];\n\
  \      const updated = await tx.update(products)\n        .set({ ...data, updatedAt:\
  \ new Date() })\n        .where(eq(products.id, id))\n        .returning();\n\n\
  \      if (updated.length === 0) {\n        results.push({\n          index: i,\
  \ status: \"error\",\n          error: { code: \"NOT_FOUND\", message: `Product\
  \ ${id} not found` },\n        });\n      } else {\n        results.push({ index:\
  \ i, status: \"success\", data: updated[0] });\n      }\n    }\n  });\n\n  return\
  \ c.json({ succeeded: results.filter(r => r.status === \"success\").length, failed:\
  \ results.filter(r => r.status === \"error\").length, total: operations.length,\
  \ results });\n});\n\n// 5. Batch Delete\napp.delete(\"/api/v1/products/batch\"\
  , authMiddleware, async (c) => {\n  const { ids } = z.object({\n    ids: z.array(z.string().uuid()).min(1).max(100),\n\
  \  }).parse(await c.req.json());\n\n  const deleted = await db.delete(products)\n\
  \    .where(inArray(products.id, ids))\n    .returning({ id: products.id });\n\n\
  \  const deletedIds = new Set(deleted.map(d => d.id));\n  const results = ids.map((id,\
  \ i) => ({\n    index: i,\n    status: deletedIds.has(id) ? \"success\" as const\
  \ : \"error\" as const,\n    ...(deletedIds.has(id) ? { data: { id } } : { error:\
  \ { code: \"NOT_FOUND\", message: `Product ${id} not found` } }),\n  }));\n\n  return\
  \ c.json({\n    succeeded: deleted.length,\n    failed: ids.length - deleted.length,\n\
  \    total: ids.length,\n    results,\n  });\n});\n```\n\n### HTTP 상태 코드 기준\n| 상태\
  \ 코드 | 조건 | 설명 |\n|-----------|------|------|\n| 201 | 전체 성공 | 모든 항목이 성공적으로 생성됨\
  \ |\n| 207 | 부분 성공 | 일부 성공, 일부 실패 (Multi-Status) |\n| 400 | 전체 실패 | 모든 항목이 실패 |\n\
  | 413 | 배치 초과 | 최대 배치 크기(100건) 초과 |\n\nDON'T:\n```typescript\n// ❌ 전체 실패만 반환 --\
  \ 어떤 항목이 실패했는지 알 수 없음\napp.post(\"/products/batch\", async (c) => {\n  try {\n \
  \   await db.insert(products).values(items);\n    return c.json({ success: true\
  \ });\n  } catch {\n    return c.json({ success: false }, 400);  // 어떤 항목이 문제인지\
  \ 모름\n  }\n});\n\n// ❌ 배치 크기 제한 없음 -- 10만 건 요청으로 서버 과부하\nconst items = await c.req.json();\
  \  // 크기 제한 없음\nfor (const item of items) { await db.insert(products).values(item);\
  \ }\n\n// ❌ 진행 상태 피드백 없는 대량 처리 -- 클라이언트 타임아웃\napp.post(\"/products/import\", async\
  \ (c) => {\n  const items = await c.req.json();  // 10,000건\n  for (const item of\
  \ items) { await processItem(item); }  // 5분 소요\n  return c.json({ done: true });\
  \  // 클라이언트는 이미 타임아웃\n});\n```\n\n### 흔한 실수\n- 207 Multi-Status 대신 항상 200/400만 반환\
  \ -> 부분 성공 구분 불가\n- 배치 내 항목 순서(index)를 응답에 포함하지 않음 -> 어떤 항목이 실패인지 매핑 불가\n- 대량 배치(1000건\
  \ 이상)를 동기 처리 -> 비동기 작업 + 진행 상태 API로 전환 필요\n- atomic 모드에서 부분 성공 응답 반환 -> 트랜잭션 전체\
  \ 롤백과 모순\n- DELETE 배치에서 존재하지 않는 ID를 에러 처리하지 않음 -> 클라이언트 혼란\n"
