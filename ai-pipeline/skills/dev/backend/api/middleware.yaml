content: "미들웨어/파이프라인 패턴 (횡단 관심사를 비즈니스 로직에서 분리하여 재사용성과 가독성을 높인다):\n\n### 미들웨어란?\n요청(Request)과\
  \ 응답(Response) 사이에서 실행되는 함수 체인이다.\n각 미들웨어는 요청을 가로채어 처리하거나, 다음 미들웨어로 넘긴다.\nGoF의 Chain\
  \ of Responsibility 패턴을 HTTP 서버에 적용한 것이다.\n\n### 미들웨어 실행 순서 (순서가 핵심이다)\n```\n요청\
  \ → [CORS] → [보안헤더] → [Rate Limit] → [로깅] → [인증] → [인가] → [핸들러]\n              \
  \                                                            ↓\n응답 ← [에러핸들러] ← ←\
  \ ← ← ← ← ← ← ← ← ← ← ← ← ← ← ← ← ← ← ← [결과]\n```\n\n### Hono 미들웨어 등록\n```typescript\n\
  import { Hono } from \"hono\";\nimport { cors } from \"hono/cors\";\nimport { secureHeaders\
  \ } from \"hono/secure-headers\";\nimport { logger } from \"hono/logger\";\n\nconst\
  \ app = new Hono();\n\n// 1. 보안 헤더 (가장 먼저 -- 모든 응답에 적용)\napp.use(\"*\", secureHeaders());\n\
  \n// 2. CORS (preflight 요청을 가장 빨리 처리)\napp.use(\"*\", cors({\n  origin: [\"https://myapp.com\"\
  ],\n  credentials: true,\n}));\n\n// 3. 요청 로깅\napp.use(\"*\", logger());\n\n// 4.\
  \ Rate limiting (인증 전에 -- 비인증 요청도 제한)\napp.use(\"/api/auth/*\", loginRateLimiter);\n\
  \n// 5. 인증 (보호 라우트에만 적용)\napp.use(\"/api/v1/*\", authMiddleware);\n\n// 6. 라우트 핸들러\n\
  app.get(\"/api/v1/users\", listUsersHandler);\n\n// 7. 에러 핸들러 (가장 마지막 -- 모든 에러를\
  \ 잡음)\napp.onError(globalErrorHandler);\n\n// 8. 404 핸들러\napp.notFound((c) => c.json({\n\
  \  error: { code: \"NOT_FOUND\", message: \"요청한 리소스를 찾을 수 없습니다\" }\n}, 404));\n\
  ```\n\n### 커스텀 미들웨어 작성\nDO:\n```typescript\n// 요청 처리 시간 측정 미들웨어\nasync function\
  \ timing(c: Context, next: Next) {\n  const start = performance.now();\n  await\
  \ next();  // 반드시 await -- 다음 미들웨어 실행\n  const ms = Math.round(performance.now()\
  \ - start);\n  c.header(\"X-Response-Time\", `${ms}ms`);\n}\n\n// 요청 ID 부여 미들웨어\
  \ (로그 추적용)\nasync function requestId(c: Context, next: Next) {\n  const id = c.req.header(\"\
  X-Request-Id\") ?? crypto.randomUUID();\n  c.set(\"requestId\", id);\n  c.header(\"\
  X-Request-Id\", id);\n  await next();\n}\n```\n\nDON'T:\n```typescript\n// ❌ next()를\
  \ await하지 않음 -- 응답 헤더 설정이 안 됨\nfunction badMiddleware(c: Context, next: Next) {\n\
  \  next();  // await 누락!\n  c.header(\"X-Custom\", \"value\");  // next 완료 전에 실행됨\n\
  }\n\n// ❌ 미들웨어에서 비즈니스 로직 처리\napp.use(\"*\", async (c, next) => {\n  const user =\
  \ await db.query.users.findFirst({ ... });  // DB 호출은 핸들러에서!\n  await next();\n\
  });\n\n// ❌ 에러 핸들러를 라우트 핸들러보다 먼저 등록\napp.onError(errorHandler);  // 이 위치에선 라우트 에러를\
  \ 잡지 못함\napp.get(\"/users\", handler);\n```\n\n### 라우트 그룹별 미들웨어\n```typescript\n\
  // 공개 라우트 그룹\nconst publicApi = new Hono();\npublicApi.post(\"/auth/login\", loginHandler);\n\
  publicApi.post(\"/auth/register\", registerHandler);\n\n// 인증 필수 라우트 그룹\nconst protectedApi\
  \ = new Hono();\nprotectedApi.use(\"*\", authMiddleware);\nprotectedApi.get(\"/users\"\
  , listUsersHandler);\nprotectedApi.get(\"/users/:id\", getUserHandler);\n\n// 관리자\
  \ 전용 라우트 그룹\nconst adminApi = new Hono();\nadminApi.use(\"*\", authMiddleware);\n\
  adminApi.use(\"*\", requireRole(\"admin\"));\nadminApi.delete(\"/users/:id\", deleteUserHandler);\n\
  \n// 조합\napp.route(\"/api/v1\", publicApi);\napp.route(\"/api/v1\", protectedApi);\n\
  app.route(\"/api/v1/admin\", adminApi);\n```\n\n### Express 에러 미들웨어 (참고)\nExpress에서는\
  \ 에러 미들웨어의 시그니처가 다르다 (4개 파라미터).\n```typescript\n// Express 에러 미들웨어 -- 반드시 4개 파라미터\n\
  app.use((err: Error, req: Request, res: Response, next: NextFunction) => {\n  //\
  \ 에러 처리\n});\n```\n\n### 흔한 실수\n- 미들웨어 등록 순서 실수: CORS를 인증 뒤에 놓으면 preflight 요청이 401\
  \ 반환\n- `next()` 호출 누락: 요청이 멈추고 timeout 발생\n- 에러 미들웨어를 라우트 정의 전에 등록: 에러를 잡지 못함\n\
  - 모든 라우트에 인증 미들웨어 적용 후 공개 라우트 예외 처리 누락\n- 미들웨어에서 response body를 읽으면 스트림이 소진되어 후속\
  \ 처리 불가\n"
