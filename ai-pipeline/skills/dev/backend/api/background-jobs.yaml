content: "Background Job 패턴 (요청 핸들러에서 오래 걸리는 작업을 직접 처리하지 않는다 -- 큐에 넣고 즉시 응답한다):\n\n\
  ### BullMQ 큐 아키텍처\n```\nAPI Server → Queue (Redis) → Worker → Result/DLQ\n```\n\n\
  DO:\n```typescript\n// 1. 큐 정의 (우선순위별 분리)\nimport { Queue, Worker, QueueEvents }\
  \ from \"bullmq\";\n\nconst connection = { host: env.REDIS_HOST, port: env.REDIS_PORT\
  \ };\n\n// 기능별 큐 분리\nconst emailQueue = new Queue(\"email\", { connection, defaultJobOptions:\
  \ {\n  attempts: 3,\n  backoff: { type: \"exponential\", delay: 1_000 },\n  removeOnComplete:\
  \ { age: 86_400 },  // 완료 후 24시간 보관\n  removeOnFail: { age: 604_800 },     // 실패\
  \ 후 7일 보관\n}});\n\nconst imageQueue = new Queue(\"image-processing\", { connection,\
  \ defaultJobOptions: {\n  attempts: 2,\n  backoff: { type: \"exponential\", delay:\
  \ 2_000 },\n  timeout: 60_000,  // 1분 타임아웃\n}});\n\n// 2. API에서 큐에 작업 추가\napp.post(\"\
  /api/v1/orders\", authMiddleware, async (c) => {\n  const order = await createOrder(c.get(\"\
  userId\"), body);\n\n  // 이메일 발송은 큐에 위임 (즉시 응답)\n  await emailQueue.add(\"order-confirmation\"\
  , {\n    orderId: order.id,\n    email: order.userEmail,\n  }, {\n    priority:\
  \ 1,  // 높은 우선순위\n    jobId: `order-email-${order.id}`,  // 중복 방지 키\n  });\n\n \
  \ // 비동기 후처리도 큐에 위임\n  await imageQueue.add(\"generate-receipt\", { orderId: order.id\
  \ });\n\n  return c.json({ data: order }, 201);\n});\n\n// 3. Worker 정의 (별도 프로세스)\n\
  const emailWorker = new Worker(\"email\", async (job) => {\n  const { orderId, email\
  \ } = job.data;\n\n  // 멱등성 확인: 이미 발송된 이메일인지 체크\n  const alreadySent = await db.query.emailLogs.findFirst({\n\
  \    where: and(eq(emailLogs.orderId, orderId), eq(emailLogs.type, \"order-confirmation\"\
  )),\n  });\n  if (alreadySent) {\n    console.log(`Email already sent for order\
  \ ${orderId}, skipping`);\n    return { skipped: true };\n  }\n\n  await sendEmail({\
  \ to: email, template: \"order-confirmation\", data: { orderId } });\n  await db.insert(emailLogs).values({\
  \ orderId, type: \"order-confirmation\", sentAt: new Date() });\n\n  return { sent:\
  \ true };\n}, {\n  connection,\n  concurrency: 5,          // 동시 처리 5개\n  limiter:\
  \ { max: 10, duration: 1_000 },  // 초당 10건 제한\n});\n\n// 4. 이벤트 모니터링\nconst emailEvents\
  \ = new QueueEvents(\"email\", { connection });\nemailEvents.on(\"failed\", ({ jobId,\
  \ failedReason }) => {\n  logger.error(`Job ${jobId} failed: ${failedReason}`);\n\
  });\nemailEvents.on(\"completed\", ({ jobId }) => {\n  logger.info(`Job ${jobId}\
  \ completed`);\n});\n```\n\n### Dead Letter Queue (DLQ) 처리\n```typescript\n// 최대\
  \ 재시도 후 실패한 작업을 DLQ로 이동\nconst dlqQueue = new Queue(\"dead-letter\", { connection\
  \ });\n\nemailWorker.on(\"failed\", async (job, err) => {\n  if (job && job.attemptsMade\
  \ >= job.opts.attempts!) {\n    await dlqQueue.add(\"failed-email\", {\n      originalQueue:\
  \ \"email\",\n      originalData: job.data,\n      error: err.message,\n      failedAt:\
  \ new Date().toISOString(),\n      attempts: job.attemptsMade,\n    });\n    logger.error(`Job\
  \ moved to DLQ: ${job.id}`, { error: err.message });\n  }\n});\n\n// DLQ 수동 재처리\
  \ API (관리자용)\napp.post(\"/admin/dlq/:jobId/retry\", adminMiddleware, async (c) =>\
  \ {\n  const dlqJob = await dlqQueue.getJob(c.req.param(\"jobId\"));\n  if (!dlqJob)\
  \ throw Errors.notFound(\"DLQ 작업\");\n\n  const targetQueue = new Queue(dlqJob.data.originalQueue,\
  \ { connection });\n  await targetQueue.add(\"retry\", dlqJob.data.originalData);\n\
  \  await dlqJob.remove();\n\n  return c.json({ data: { message: \"재처리 요청됨\" } });\n\
  });\n```\n\n### 재시도 전략\n| 시도 | 대기 시간 | 누적 시간 | 비고 |\n|------|-----------|-----------|------|\n\
  | 1차 | 1초 | 1초 | 일시적 오류 대응 |\n| 2차 | 4초 | 5초 | 네트워크 복구 대기 |\n| 3차 | 16초 | 21초 |\
  \ 최종 시도 후 DLQ 이동 |\n\nDON'T:\n```typescript\n// ❌ 요청 핸들러에서 직접 이메일 발송 -- 응답 지연 +\
  \ 실패 시 재시도 불가\napp.post(\"/api/v1/orders\", async (c) => {\n  const order = await\
  \ createOrder(body);\n  await sendEmail(order.email, \"confirmation\");  // 3초 블로킹\n\
  \  return c.json({ data: order });\n});\n\n// ❌ 작업 중복 방지 없음 -- 같은 이메일 여러 번 발송\n\
  await emailQueue.add(\"send\", data);  // jobId 없음 → 중복 추가 가능\n\n// ❌ 모든 작업을 하나의\
  \ 큐에 -- 우선순위 관리 불가\nawait generalQueue.add(\"email\", emailData);\nawait generalQueue.add(\"\
  video-encode\", videoData);  // 이메일이 영상 인코딩에 밀림\n\n// ❌ Worker에서 멱등성 미보장 -- 재시도\
  \ 시 이중 처리\nconst worker = new Worker(\"payment\", async (job) => {\n  await chargeUser(job.data.userId,\
  \ job.data.amount);  // 재시도 시 이중 과금!\n});\n```\n\n### 흔한 실수\n- Worker 프로세스가 API\
  \ 서버와 같은 프로세스 -> 크래시 시 모든 작업 중단\n- 완료된 작업을 영구 보관 -> Redis 메모리 폭증 (removeOnComplete\
  \ 설정 필수)\n- 작업 타임아웃 미설정 -> 무한 대기 작업이 Worker 슬롯 점유\n- concurrency를 너무 높게 설정 -> 외부\
  \ 서비스 Rate Limit 초과\n- 큐 상태 모니터링 미구축 -> Bull Board 또는 Arena로 대시보드 구축 권장\n"
