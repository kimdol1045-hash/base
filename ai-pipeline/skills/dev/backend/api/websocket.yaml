content: "WebSocket 패턴 (실시간 양방향 통신은 연결 생명주기를 반드시 관리해야 한다 -- 끊어진 연결은 유령이 된다):\n\n###\
  \ 연결 생명주기\n`connect → authenticate → join rooms → exchange messages → heartbeat\
  \ → disconnect`\n\nDO:\n```typescript\n// Socket.io 서버 설정 (인증 + 룸 + 하트비트)\nimport\
  \ { Server } from \"socket.io\";\nimport { verifyToken } from \"./auth\";\n\nconst\
  \ io = new Server(httpServer, {\n  cors: { origin: env.ALLOWED_ORIGINS, credentials:\
  \ true },\n  pingInterval: 25_000,   // 25초마다 ping\n  pingTimeout: 10_000,    //\
  \ 10초 내 pong 없으면 연결 끊기\n  maxHttpBufferSize: 1e6, // 메시지 최대 1MB\n});\n\n// 1단계:\
  \ 연결 시 인증 미들웨어\nio.use(async (socket, next) => {\n  const token = socket.handshake.auth?.token;\n\
  \  if (!token) return next(new Error(\"인증 토큰이 필요합니다\"));\n\n  try {\n    const payload\
  \ = await verifyToken(token);\n    socket.data.userId = payload.sub;\n    socket.data.role\
  \ = payload.role;\n    next();\n  } catch {\n    next(new Error(\"유효하지 않은 토큰입니다\"\
  ));\n  }\n});\n\n// 2단계: 이벤트 핸들링\nio.on(\"connection\", (socket) => {\n  const userId\
  \ = socket.data.userId;\n\n  // 개인 룸 자동 입장 (1:1 알림용)\n  socket.join(`user:${userId}`);\n\
  \n  // 채팅방 입장\n  socket.on(\"room:join\", async (roomId: string) => {\n    const\
  \ hasAccess = await checkRoomAccess(userId, roomId);\n    if (!hasAccess) {\n  \
  \    socket.emit(\"error\", { code: \"FORBIDDEN\", message: \"접근 권한이 없습니다\" });\n\
  \      return;\n    }\n    socket.join(`room:${roomId}`);\n    socket.to(`room:${roomId}`).emit(\"\
  room:user-joined\", { userId, roomId });\n  });\n\n  // 메시지 전송 (룸 기반)\n  socket.on(\"\
  message:send\", async (data: { roomId: string; content: string }) => {\n    const\
  \ validated = MessageSchema.safeParse(data);\n    if (!validated.success) {\n  \
  \    socket.emit(\"error\", { code: \"VALIDATION_ERROR\", message: \"잘못된 메시지 형식\"\
  \ });\n      return;\n    }\n\n    const message = await saveMessage({ ...validated.data,\
  \ senderId: userId });\n    io.to(`room:${data.roomId}`).emit(\"message:new\", message);\n\
  \  });\n\n  // 타이핑 인디케이터\n  socket.on(\"typing:start\", (roomId: string) => {\n\
  \    socket.to(`room:${roomId}`).emit(\"typing:update\", { userId, isTyping: true\
  \ });\n  });\n\n  // 연결 해제\n  socket.on(\"disconnect\", (reason) => {\n    console.log(`User\
  \ ${userId} disconnected: ${reason}`);\n    // 온라인 상태 업데이트\n    updateUserPresence(userId,\
  \ \"offline\");\n  });\n});\n```\n\n### 클라이언트 재연결 (Exponential Backoff)\n```typescript\n\
  // 클라이언트 측 재연결 전략\nimport { io, Socket } from \"socket.io-client\";\n\nfunction\
  \ createSocket(token: string): Socket {\n  const socket = io(env.WS_URL, {\n   \
  \ auth: { token },\n    reconnection: true,\n    reconnectionAttempts: 10,\n   \
  \ reconnectionDelay: 1_000,     // 최초 1초\n    reconnectionDelayMax: 30_000, // 최대\
  \ 30초\n    randomizationFactor: 0.5,     // jitter 추가\n    timeout: 10_000,    \
  \          // 연결 타임아웃 10초\n  });\n\n  socket.on(\"connect\", () => {\n    console.log(\"\
  Connected, re-joining rooms...\");\n    // 재연결 시 룸 재입장\n    socket.emit(\"room:rejoin\"\
  , { lastMessageId });\n  });\n\n  socket.on(\"connect_error\", (err) => {\n    if\
  \ (err.message === \"유효하지 않은 토큰입니다\") {\n      // 토큰 만료 시 갱신 후 재연결\n      refreshToken().then((newToken)\
  \ => {\n        socket.auth = { token: newToken };\n        socket.connect();\n\
  \      });\n    }\n  });\n\n  return socket;\n}\n```\n\n### 스케일링 (Redis Adapter)\n\
  ```typescript\n// 다중 서버 환경에서 Socket.io Redis Adapter\nimport { createAdapter } from\
  \ \"@socket.io/redis-adapter\";\n\nconst pubClient = new Redis(env.REDIS_URL);\n\
  const subClient = pubClient.duplicate();\nio.adapter(createAdapter(pubClient, subClient));\n\
  // 이제 서버 A의 socket이 서버 B의 룸으로 메시지 전송 가능\n```\n\nDON'T:\n```typescript\n// ❌ 인증 없이\
  \ 연결 허용 -- 누구나 메시지 수신 가능\nio.on(\"connection\", (socket) => {\n  socket.on(\"message\"\
  , (data) => { /* userId 없이 처리 */ });\n});\n\n// ❌ 하트비트 없이 연결 유지 -- 좀비 연결 누적\nconst\
  \ io = new Server(httpServer, {\n  pingInterval: 0,  // 하트비트 비활성화\n});\n\n// ❌ 전체\
  \ 브로드캐스트 -- 모든 연결에 불필요한 메시지 전송\nio.emit(\"message\", data);  // 룸 구분 없이 전체 전송\n\n\
  // ❌ 메시지 크기 제한 없음 -- 대용량 메시지로 서버 과부하\nconst io = new Server(httpServer, { maxHttpBufferSize:\
  \ Infinity });\n```\n\n### 연결 관리 기준\n| 설정 | 값 | 이유 |\n|------|-----|------|\n| pingInterval\
  \ | 25초 | 클라이언트 생존 확인 |\n| pingTimeout | 10초 | 무응답 연결 정리 |\n| maxHttpBufferSize\
  \ | 1MB | 메모리 보호 |\n| reconnectionAttempts | 10회 | 과도한 재시도 방지 |\n| reconnectionDelayMax\
  \ | 30초 | 서버 부하 분산 |\n\n### 흔한 실수\n- 재연결 시 이전 룸을 자동 복구하지 않음 -> 메시지 수신 누락\n- 서버 스케일아웃\
  \ 시 Redis Adapter 미적용 -> 다른 서버의 룸에 메시지 도달 불가\n- 메시지 입력값 검증 누락 -> XSS 공격 벡터\n- disconnect\
  \ 이벤트에서 리소스 정리 누락 -> 메모리 누수\n- 인증 토큰 만료 후에도 연결 유지 -> 주기적 토큰 재검증 필요 (1시간 간격)\n"
