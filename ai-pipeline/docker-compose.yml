version: "3.9"

services:
  app:
    build: .
    container_name: ai-pipeline-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      GRAPH_RAG_NEO4J_URI: bolt://neo4j:7687
      GRAPH_RAG_QDRANT_HOST: qdrant
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: ai-pipeline-neo4j
    ports:
      - "7474:7474"   # HTTP (Browser)
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${GRAPH_RAG_NEO4J_PASSWORD:?Set GRAPH_RAG_NEO4J_PASSWORD in .env}
      GRAPH_RAG_NEO4J_PASSWORD: ${GRAPH_RAG_NEO4J_PASSWORD:?Set GRAPH_RAG_NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${GRAPH_RAG_NEO4J_PASSWORD}\" 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-pipeline-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-pipeline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
